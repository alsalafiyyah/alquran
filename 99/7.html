  <p><strong>99:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَمَن يَعۡمَلۡ مِثۡقَالَ ذَرَّةٍ خَيۡرٗا يَرَهُۥ</p>
  <p style="font-size:18px;">7. So whosoever does good equal to the weight of an atom (or a small ant) shall see it.</p>
