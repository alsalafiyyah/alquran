  <p><strong>99:6</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَوۡمَئِذٖ يَصۡدُرُ ٱلنَّاسُ أَشۡتَاتٗا لِّيُرَوۡاْ أَعۡمَٰلَهُمۡ</p>
  <p style="font-size:18px;">6. That Day mankind will proceed in scattered groups that they may be shown their deeds.[1]</p>
