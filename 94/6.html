  <p><strong>94:6</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ مَعَ ٱلۡعُسۡرِ يُسۡرٗا</p>
  <p style="font-size:18px;">6. Verily, along with every hardship is relief (i.e. there is one hardship with two reliefs, so one hardship cannot overcome two reliefs).</p>
