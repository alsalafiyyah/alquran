<div class="single-verse">
  <p><strong>45:37</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَهُ ٱلۡكِبۡرِيَآءُ فِي ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِۖ وَهُوَ ٱلۡعَزِيزُ ٱلۡحَكِيمُ</p>
  <p style="font-size:18px;">37. And His (Alone) is the Majesty in the heavens and the earth, and He is the All-Mighty, the All-Wise.</p>
