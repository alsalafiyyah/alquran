<div class="single-verse">
  <p><strong>45:4</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَفِي خَلۡقِكُمۡ وَمَا يَبُثُّ مِن دَآبَّةٍ ءَايَٰتٞ لِّقَوۡمٖ يُوقِنُونَ</p>
  <p style="font-size:18px;">4. And in your creation, and what He scattered (through the earth) of moving (living) creatures are signs for people who have Faith with certainty.</p>
