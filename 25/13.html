  <p><strong>25:13</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِذَآ أُلۡقُواْ مِنۡهَا مَكَانٗا ضَيِّقٗا مُّقَرَّنِينَ دَعَوۡاْ هُنَالِكَ ثُبُورٗا</p>
