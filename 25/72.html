<div class="single-verse">
  <p><strong>25:72</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱلَّذِينَ لَا يَشۡهَدُونَ ٱلزُّورَ وَإِذَا مَرُّواْ بِٱللَّغۡوِ مَرُّواْ كِرَامٗا</p>
  <p style="font-size:18px;">72. And those who do not bear witness to falsehood, and if they pass by some evil play or evil talk, they pass by it with dignity.</p>
