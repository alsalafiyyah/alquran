<div class="single-verse">
  <p><strong>25:11</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">بَلۡ كَذَّبُواْ بِٱلسَّاعَةِۖ وَأَعۡتَدۡنَا لِمَن كَذَّبَ بِٱلسَّاعَةِ سَعِيرًا</p>
  <p style="font-size:18px;">11. Nay, they deny the Hour (the Day of Resurrection), and for those who deny the Hour, We have prepared a flaming Fire (i.e. Hell).</p>
