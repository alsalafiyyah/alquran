  <p><strong>25:9</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱنظُرۡ كَيۡفَ ضَرَبُواْ لَكَ ٱلۡأَمۡثَٰلَ فَضَلُّواْ فَلَا يَسۡتَطِيعُونَ سَبِيلٗا</p>
  <p style="font-size:18px;">9. See how they coin similitudes for you, so they have gone astray, and they cannot find a (Right) Path.</p>
