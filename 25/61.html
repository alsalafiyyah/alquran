<div class="single-verse">
  <p><strong>25:61</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">تَبَارَكَ ٱلَّذِي جَعَلَ فِي ٱلسَّمَآءِ بُرُوجٗا وَجَعَلَ فِيهَا سِرَٰجٗا وَقَمَرٗا مُّنِيرٗا</p>
  <p style="font-size:18px;">61. Blessed be He Who has placed in the heaven big stars, and has placed therein a great lamp (sun), and a moon giving light.</p>
