  <p><strong>25:25</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَيَوۡمَ تَشَقَّقُ ٱلسَّمَآءُ بِٱلۡغَمَٰمِ وَنُزِّلَ ٱلۡمَلَٰٓئِكَةُ تَنزِيلًا</p>
  <p style="font-size:18px;">25. And (remember) the Day when the heaven shall be rent asunder with clouds, and the angels will be sent down, with a grand descending.</p>
