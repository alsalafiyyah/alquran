<div class="single-verse">
  <p><strong>25:52</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَلَا تُطِعِ ٱلۡكَٰفِرِينَ وَجَٰهِدۡهُم بِهِۦ جِهَادٗا كَبِيرٗا</p>
  <p style="font-size:18px;">52. So obey not the disbelievers, but strive against them (by preaching) with the utmost endeavour with it (the Qur’ân).</p>
