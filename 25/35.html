<div class="single-verse">
  <p><strong>25:35</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَقَدۡ ءَاتَيۡنَا مُوسَى ٱلۡكِتَٰبَ وَجَعَلۡنَا مَعَهُۥٓ أَخَاهُ هَٰرُونَ وَزِيرٗا</p>
  <p style="font-size:18px;">35. And indeed We gave Mûsâ (Moses) the Scripture [the Taurât (Torah)], and placed his brother Hârûn (Aaron) with him as a helper;</p>
