<div class="single-verse">
  <p><strong>25:71</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمَن تَابَ وَعَمِلَ صَٰلِحٗا فَإِنَّهُۥ يَتُوبُ إِلَى ٱللَّهِ مَتَابٗا</p>
  <p style="font-size:18px;">71. And whosoever repents and does righteous good deeds; then verily, he repents towards Allâh with true repentance.</p>
