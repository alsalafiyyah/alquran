  <p><strong>25:69</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يُضَٰعَفۡ لَهُ ٱلۡعَذَابُ يَوۡمَ ٱلۡقِيَٰمَةِ وَيَخۡلُدۡ فِيهِۦ مُهَانًا</p>
