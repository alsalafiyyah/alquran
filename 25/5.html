<div class="single-verse">
  <p><strong>25:5</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَقَالُوٓاْ أَسَٰطِيرُ ٱلۡأَوَّلِينَ ٱكۡتَتَبَهَا فَهِيَ تُمۡلَىٰ عَلَيۡهِ بُكۡرَةٗ وَأَصِيلٗا</p>
  <p style="font-size:18px;">5. And they say: "Tales of the ancients, which he has written down: and they are dictated to him morning and afternoon."</p>
