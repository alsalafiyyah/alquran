<div class="single-verse">
  <p><strong>96:19</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">كَلَّا لَا تُطِعۡهُ وَٱسۡجُدۡۤ وَٱقۡتَرِب۩</p>
  <p style="font-size:18px;">19. Nay! (O Muhammad صلى الله عليه وسلم)! Do not obey him (Abû Jahl). Fall prostrate and draw near to Allâh!</p>
