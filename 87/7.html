  <p><strong>87:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِلَّا مَا شَآءَ ٱللَّهُۚ إِنَّهُۥ يَعۡلَمُ ٱلۡجَهۡرَ وَمَا يَخۡفَىٰ</p>
