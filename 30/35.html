<div class="single-verse">
  <p><strong>30:35</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَمۡ أَنزَلۡنَا عَلَيۡهِمۡ سُلۡطَٰنٗا فَهُوَ يَتَكَلَّمُ بِمَا كَانُواْ بِهِۦ يُشۡرِكُونَ</p>
  <p style="font-size:18px;">35. Or have We revealed to them an authority (a Scripture), which speaks of that which they have been associating with Him?</p>
