<div class="single-verse">
  <p><strong>30:11</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱللَّهُ يَبۡدَؤُاْ ٱلۡخَلۡقَ ثُمَّ يُعِيدُهُۥ ثُمَّ إِلَيۡهِ تُرۡجَعُونَ</p>
  <p style="font-size:18px;">11. Allâh (Alone) originates the creation, then He will repeat it, then to Him you will be returned.</p>
