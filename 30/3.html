  <p><strong>30:3</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فِيٓ أَدۡنَى ٱلۡأَرۡضِ وَهُم مِّنۢ بَعۡدِ غَلَبِهِمۡ سَيَغۡلِبُونَ</p>
  <p style="font-size:18px;">3. In the nearest land (Syria, Iraq, Jordan, and Palestine), and they, after their defeat, will be victorious.</p>
