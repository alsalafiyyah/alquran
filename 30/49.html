<div class="single-verse">
  <p><strong>30:49</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِن كَانُواْ مِن قَبۡلِ أَن يُنَزَّلَ عَلَيۡهِم مِّن قَبۡلِهِۦ لَمُبۡلِسِينَ</p>
  <p style="font-size:18px;">49. And verily before that (rain) - just before it was sent down upon them - they were in despair!</p>
