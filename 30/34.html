<div class="single-verse">
  <p><strong>30:34</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لِيَكۡفُرُواْ بِمَآ ءَاتَيۡنَٰهُمۡۚ فَتَمَتَّعُواْ فَسَوۡفَ تَعۡلَمُونَ</p>
  <p style="font-size:18px;">34. So as to be ungrateful for the graces which We have bestowed on them. Then enjoy (your short life); but you will come to know.</p>
