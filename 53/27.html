<div class="single-verse">
  <p><strong>53:27</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ ٱلَّذِينَ لَا يُؤۡمِنُونَ بِٱلۡأٓخِرَةِ لَيُسَمُّونَ ٱلۡمَلَٰٓئِكَةَ تَسۡمِيَةَ ٱلۡأُنثَىٰ</p>
  <p style="font-size:18px;">27. Verily, those who believe not in the Hereafter, name the angels with female names.</p>
