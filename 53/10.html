  <p><strong>53:10</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَأَوۡحَىٰٓ إِلَىٰ عَبۡدِهِۦ مَآ أَوۡحَىٰ</p>
  <p style="font-size:18px;">10. So (Allâh) revealed to His slave [Muhammad صلى الله عليه وسلم through Jibrîl (Gabriel) عليه السلام] whatever He revealed.</p>
