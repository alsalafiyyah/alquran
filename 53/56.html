  <p><strong>53:56</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">هَٰذَا نَذِيرٞ مِّنَ ٱلنُّذُرِ ٱلۡأُولَىٰٓ</p>
  <p style="font-size:18px;">56. This (Muhammad صلى الله عليه وسلم) is a warner (Messenger) of the (series of) warners (Messengers) of old.[6]</p>
