<div class="single-verse">
  <p><strong>34:35</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَقَالُواْ نَحۡنُ أَكۡثَرُ أَمۡوَٰلٗا وَأَوۡلَٰدٗا وَمَا نَحۡنُ بِمُعَذَّبِينَ</p>
  <p style="font-size:18px;">35. And they say: "We are more in wealth and in children, and we are not going to be punished."</p>
