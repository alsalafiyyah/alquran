<div class="single-verse">
  <p><strong>34:25</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قُل لَّا تُسۡـَٔلُونَ عَمَّآ أَجۡرَمۡنَا وَلَا نُسۡـَٔلُ عَمَّا تَعۡمَلُونَ</p>
  <p style="font-size:18px;">25. Say (O Muhammad صلى الله عليه وسلم to polytheists, pagans) "You will not be asked about our sins, nor shall we be asked of what you do."</p>
</div>
