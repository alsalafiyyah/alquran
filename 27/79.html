<div class="single-verse">
  <p><strong>27:79</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَتَوَكَّلۡ عَلَى ٱللَّهِۖ إِنَّكَ عَلَى ٱلۡحَقِّ ٱلۡمُبِينِ</p>
  <p style="font-size:18px;">79. So put your trust in Allâh; surely, you (O Muhammad صلى الله عليه وسلم) are on manifest truth.</p>
