<div class="single-verse">
  <p><strong>27:75</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمَا مِنۡ غَآئِبَةٖ فِي ٱلسَّمَآءِ وَٱلۡأَرۡضِ إِلَّا فِي كِتَٰبٖ مُّبِينٍ</p>
  <p style="font-size:18px;">75. And there is nothing hidden in the heaven and the earth but it is in a Clear Book (i.e. Al-Lauh Al-Mahfûz).</p>
