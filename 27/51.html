<div class="single-verse">
  <p><strong>27:51</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَٱنظُرۡ كَيۡفَ كَانَ عَٰقِبَةُ مَكۡرِهِمۡ أَنَّا دَمَّرۡنَٰهُمۡ وَقَوۡمَهُمۡ أَجۡمَعِينَ</p>
  <p style="font-size:18px;">51. Then see how was the end of their plot! Verily! We destroyed them and their nation, all together.</p>
