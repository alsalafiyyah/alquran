<div class="single-verse">
  <p><strong>27:11</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِلَّا مَن ظَلَمَ ثُمَّ بَدَّلَ حُسۡنَۢا بَعۡدَ سُوٓءٖ فَإِنِّي غَفُورٞ رَّحِيمٞ</p>
  <p style="font-size:18px;">11. "Except him who has done wrong and afterwards has changed evil for good; then surely, I am Oft-Forgiving, Most Merciful.</p>
