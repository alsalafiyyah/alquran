<div class="single-verse">
  <p><strong>27:35</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِنِّي مُرۡسِلَةٌ إِلَيۡهِم بِهَدِيَّةٖ فَنَاظِرَةُۢ بِمَ يَرۡجِعُ ٱلۡمُرۡسَلُونَ</p>
  <p style="font-size:18px;">35. "But verily! I am going to send him a present, and see with what (answer) the messengers return."</p>
