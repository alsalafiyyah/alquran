<div class="single-verse">
  <p><strong>27:78</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ رَبَّكَ يَقۡضِي بَيۡنَهُم بِحُكۡمِهِۦۚ وَهُوَ ٱلۡعَزِيزُ ٱلۡعَلِيمُ</p>
  <p style="font-size:18px;">78. Verily, your Lord will decide between them (various sects) by His Judgement. And He is the All-Mighty, the All-Knowing.</p>
