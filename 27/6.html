<div class="single-verse">
  <p><strong>27:6</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِنَّكَ لَتُلَقَّى ٱلۡقُرۡءَانَ مِن لَّدُنۡ حَكِيمٍ عَلِيمٍ</p>
  <p style="font-size:18px;">6. And verily, you (O Muhammad صلى الله عليه وسلم) are being taught the Qur’ân from One, All-Wise, All-Knowing.</p>
