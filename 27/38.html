<div class="single-verse">
  <p><strong>27:38</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ يَٰٓأَيُّهَا ٱلۡمَلَؤُاْ أَيُّكُمۡ يَأۡتِينِي بِعَرۡشِهَا قَبۡلَ أَن يَأۡتُونِي مُسۡلِمِينَ</p>
  <p style="font-size:18px;">38. He said: "O chiefs! Which of you can bring me her throne before they come to me surrendering themselves in obedience?"</p>
