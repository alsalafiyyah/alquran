  <p><strong>27:71</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَيَقُولُونَ مَتَىٰ هَٰذَا ٱلۡوَعۡدُ إِن كُنتُمۡ صَٰدِقِينَ</p>
  <p style="font-size:18px;">71. And they (the disbelievers in the Oneness of Allâh) say: "When (will) this promise (be fulfilled), if you are truthful?"</p>
