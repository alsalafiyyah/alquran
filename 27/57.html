<div class="single-verse">
  <p><strong>27:57</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَأَنجَيۡنَٰهُ وَأَهۡلَهُۥٓ إِلَّا ٱمۡرَأَتَهُۥ قَدَّرۡنَٰهَا مِنَ ٱلۡغَٰبِرِينَ</p>
  <p style="font-size:18px;">57. So We saved him and his family, except his wife. We destined her to be of those who remained behind.</p>
