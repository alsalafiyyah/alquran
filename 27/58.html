<div class="single-verse">
  <p><strong>27:58</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَأَمۡطَرۡنَا عَلَيۡهِم مَّطَرٗاۖ فَسَآءَ مَطَرُ ٱلۡمُنذَرِينَ</p>
  <p style="font-size:18px;">58. And We rained down on them a rain (of stones). So evil was the rain of those who were warned.</p>
