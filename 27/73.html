<div class="single-verse">
  <p><strong>27:73</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِنَّ رَبَّكَ لَذُو فَضۡلٍ عَلَى ٱلنَّاسِ وَلَٰكِنَّ أَكۡثَرَهُمۡ لَا يَشۡكُرُونَ</p>
  <p style="font-size:18px;">73. "Verily, your Lord is full of Grace for mankind, yet most of them do not give thanks."</p>
