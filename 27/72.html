  <p><strong>27:72</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قُلۡ عَسَىٰٓ أَن يَكُونَ رَدِفَ لَكُم بَعۡضُ ٱلَّذِي تَسۡتَعۡجِلُونَ</p>
  <p style="font-size:18px;">72. Say: "Perhaps that which you wish to hasten on, may be close behind you.</p>
