  <p><strong>27:20</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَتَفَقَّدَ ٱلطَّيۡرَ فَقَالَ مَالِيَ لَآ أَرَى ٱلۡهُدۡهُدَ أَمۡ كَانَ مِنَ ٱلۡغَآئِبِينَ</p>
  <p style="font-size:18px;">20. He inspected the birds, and said: "What is the matter that I see not the hoopoe? Or is he among the absentees?</p>
