<div class="single-verse">
  <p><strong>27:76</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ هَٰذَا ٱلۡقُرۡءَانَ يَقُصُّ عَلَىٰ بَنِيٓ إِسۡرَٰٓءِيلَ أَكۡثَرَ ٱلَّذِي هُمۡ فِيهِ يَخۡتَلِفُونَ</p>
  <p style="font-size:18px;">76. Verily, this Qur’ân narrates to the Children of Israel most of that in which they differ.</p>
