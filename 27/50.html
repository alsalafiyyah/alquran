  <p><strong>27:50</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمَكَرُواْ مَكۡرٗا وَمَكَرۡنَا مَكۡرٗا وَهُمۡ لَا يَشۡعُرُونَ</p>
  <p style="font-size:18px;">50. So they plotted a plot, and We plotted a plot, while they perceived not.</p>
