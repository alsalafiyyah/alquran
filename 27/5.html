<div class="single-verse">
  <p><strong>27:5</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أُوْلَٰٓئِكَ ٱلَّذِينَ لَهُمۡ سُوٓءُ ٱلۡعَذَابِ وَهُمۡ فِي ٱلۡأٓخِرَةِ هُمُ ٱلۡأَخۡسَرُونَ</p>
  <p style="font-size:18px;">5. They are those for whom there will be an evil torment (in this world). And in the Hereafter they will be the greatest losers.</p>
