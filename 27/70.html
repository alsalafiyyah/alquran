<div class="single-verse">
  <p><strong>27:70</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَا تَحۡزَنۡ عَلَيۡهِمۡ وَلَا تَكُن فِي ضَيۡقٖ مِّمَّا يَمۡكُرُونَ</p>
  <p style="font-size:18px;">70. And grieve you not over them, nor be straitened (in distress) because of what they plot.</p>
