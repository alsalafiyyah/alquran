<div class="single-verse">
  <p><strong>27:55</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَئِنَّكُمۡ لَتَأۡتُونَ ٱلرِّجَالَ شَهۡوَةٗ مِّن دُونِ ٱلنِّسَآءِۚ بَلۡ أَنتُمۡ قَوۡمٞ تَجۡهَلُونَ</p>
  <p style="font-size:18px;">55. "Do you practise your lusts on men instead of women? Nay, but you are a people who behave senselessly."</p>
