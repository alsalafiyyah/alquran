<div class="single-verse">
  <p><strong>27:21</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَأُعَذِّبَنَّهُۥ عَذَابٗا شَدِيدًا أَوۡ لَأَاْذۡبَحَنَّهُۥٓ أَوۡ لَيَأۡتِيَنِّي بِسُلۡطَٰنٖ مُّبِينٖ</p>
  <p style="font-size:18px;">21. "I will surely punish him with a severe torment, or slaughter him, unless he brings me a clear reason."</p>
