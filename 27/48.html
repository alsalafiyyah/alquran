<div class="single-verse">
  <p><strong>27:48</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَكَانَ فِي ٱلۡمَدِينَةِ تِسۡعَةُ رَهۡطٖ يُفۡسِدُونَ فِي ٱلۡأَرۡضِ وَلَا يُصۡلِحُونَ</p>
  <p style="font-size:18px;">48. And there were in the city nine men (from the sons of their chiefs), who made mischief in the land, and would not reform.</p>
