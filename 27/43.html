<div class="single-verse">
  <p><strong>27:43</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَصَدَّهَا مَا كَانَت تَّعۡبُدُ مِن دُونِ ٱللَّهِۖ إِنَّهَا كَانَتۡ مِن قَوۡمٖ كَٰفِرِينَ</p>
  <p style="font-size:18px;">43. And that which she used to worship besides Allâh has prevented her (from Islâm), for she was of a disbelieving people.</p>
