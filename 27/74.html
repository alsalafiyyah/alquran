  <p><strong>27:74</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِنَّ رَبَّكَ لَيَعۡلَمُ مَا تُكِنُّ صُدُورُهُمۡ وَمَا يُعۡلِنُونَ</p>
