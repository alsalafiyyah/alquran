---
layout: default
title: "The Holy Quran - English Translation"
---

<!-- Hero Section -->
<div class="text-center max-w-2xl mx-auto my-12">
  <h1 class="text-4xl font-extrabold tracking-tight text-slate-900 sm:text-5xl">
    The Holy Quran
  </h1>
  <p class="mt-4 text-lg text-slate-600 leading-relaxed">
    Select a Surah to read the Arabic text alongside the comprehensive English translation, complete with contextual footnotes.
  </p>
</div>

<!-- Grid Layout for Surahs -->
<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
  {% for i in (1..114) %}
    <a href="/alquran/{{ i }}/" class="group flex flex-col justify-center items-center p-5 bg-white border border-slate-200 rounded-xl shadow-xs transition-all duration-200 hover:-translate-y-1 hover:border-emerald-500 hover:shadow-md">
      <span class="text-xs font-semibold text-slate-400 group-hover:text-emerald-600 transition-colors">
        SURAH
      </span>
      <span class="text-2xl font-bold text-slate-800 mt-1">
        {{ i }}
      </span>
    </a>
  {% endfor %}
</div>
