<div class="single-verse">
  <p><strong>16:122</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَءَاتَيۡنَٰهُ فِي ٱلدُّنۡيَا حَسَنَةٗۖ وَإِنَّهُۥ فِي ٱلۡأٓخِرَةِ لَمِنَ ٱلصَّٰلِحِينَ</p>
  <p style="font-size:18px;">122. And We gave him good in this world, and in the Hereafter he shall be of the righteous.</p>
