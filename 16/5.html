<div class="single-verse">
  <p><strong>16:5</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱلۡأَنۡعَٰمَ خَلَقَهَاۖ لَكُمۡ فِيهَا دِفۡءٞ وَمَنَٰفِعُ وَمِنۡهَا تَأۡكُلُونَ</p>
  <p style="font-size:18px;">5. And the cattle, He has created them for you; in them there is warmth (warm clothing), and numerous benefits, and of them you eat.</p>
