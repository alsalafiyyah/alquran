<div class="single-verse">
  <p><strong>16:47</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَوۡ يَأۡخُذَهُمۡ عَلَىٰ تَخَوُّفٖ فَإِنَّ رَبَّكُمۡ لَرَءُوفٞ رَّحِيمٌ</p>
  <p style="font-size:18px;">47. Or that He may catch them with gradual wasting (of their wealth and health). Truly! Your Lord is indeed full of Kindness, Most Merciful?</p>
