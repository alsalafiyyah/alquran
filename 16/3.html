<div class="single-verse">
  <p><strong>16:3</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">خَلَقَ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضَ بِٱلۡحَقِّۚ تَعَٰلَىٰ عَمَّا يُشۡرِكُونَ</p>
  <p style="font-size:18px;">3. He has created the heavens and the earth with truth. High is He, Exalted above all that they associate as partners with Him.</p>
