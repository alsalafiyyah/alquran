<div class="single-verse">
  <p><strong>16:18</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِن تَعُدُّواْ نِعۡمَةَ ٱللَّهِ لَا تُحۡصُوهَآۗ إِنَّ ٱللَّهَ لَغَفُورٞ رَّحِيمٞ</p>
  <p style="font-size:18px;">18. And if you would count the favours of Allâh, never could you be able to count them. Truly! Allâh is Oft-Forgiving, Most Merciful.</p>
