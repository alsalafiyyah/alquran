<div class="single-verse">
  <p><strong>16:23</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَا جَرَمَ أَنَّ ٱللَّهَ يَعۡلَمُ مَا يُسِرُّونَ وَمَا يُعۡلِنُونَۚ إِنَّهُۥ لَا يُحِبُّ ٱلۡمُسۡتَكۡبِرِينَ</p>
  <p style="font-size:18px;">23. Certainly, Allâh knows what they conceal and what they reveal. Truly, He likes not the proud.</p>
