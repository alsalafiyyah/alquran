<div class="single-verse">
  <p><strong>16:4</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">خَلَقَ ٱلۡإِنسَٰنَ مِن نُّطۡفَةٖ فَإِذَا هُوَ خَصِيمٞ مُّبِينٞ</p>
  <p style="font-size:18px;">4. He has created man from Nutfah (mixed drops of male and female sexual discharge), then behold, this same (man) becomes an open opponent.</p>
