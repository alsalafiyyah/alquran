<div class="single-verse">
  <p><strong>16:82</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَإِن تَوَلَّوۡاْ فَإِنَّمَا عَلَيۡكَ ٱلۡبَلَٰغُ ٱلۡمُبِينُ</p>
  <p style="font-size:18px;">82. Then, if they turn away, your duty (O Muhammad صلى الله عليه و سلم) is only to convey (the Message) in a clear way.</p>
