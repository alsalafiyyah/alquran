<div class="single-verse">
  <p><strong>16:54</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ثُمَّ إِذَا كَشَفَ ٱلضُّرَّ عَنكُمۡ إِذَا فَرِيقٞ مِّنكُم بِرَبِّهِمۡ يُشۡرِكُونَ</p>
  <p style="font-size:18px;">54. Then, when He has removed the harm from you, behold! some of you associate others in worship with their Lord (Allâh).</p>
