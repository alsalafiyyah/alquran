<div class="single-verse">
  <p><strong>16:98</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَإِذَا قَرَأۡتَ ٱلۡقُرۡءَانَ فَٱسۡتَعِذۡ بِٱللَّهِ مِنَ ٱلشَّيۡطَٰنِ ٱلرَّجِيمِ</p>
  <p style="font-size:18px;">98. So when you want to recite the Qur’ân, seek refuge with Allâh from Shaitân (Satan), the outcast (the cursed one).</p>
