<div class="single-verse">
  <p><strong>16:46</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَوۡ يَأۡخُذَهُمۡ فِي تَقَلُّبِهِمۡ فَمَا هُم بِمُعۡجِزِينَ</p>
  <p style="font-size:18px;">46. Or that He may catch them in the midst of their going to and fro (in their jobs), so that there be no escape for them (from Allâh’s punishment)?</p>
