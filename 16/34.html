<div class="single-verse">
  <p><strong>16:34</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَأَصَابَهُمۡ سَيِّـَٔاتُ مَا عَمِلُواْ وَحَاقَ بِهِم مَّا كَانُواْ بِهِۦ يَسۡتَهۡزِءُونَ</p>
  <p style="font-size:18px;">34. Then, the evil results of their deeds overtook them, and that at which they used to mock at surrounded them.</p>
