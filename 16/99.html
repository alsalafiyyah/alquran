<div class="single-verse">
  <p><strong>16:99</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّهُۥ لَيۡسَ لَهُۥ سُلۡطَٰنٌ عَلَى ٱلَّذِينَ ءَامَنُواْ وَعَلَىٰ رَبِّهِمۡ يَتَوَكَّلُونَ</p>
  <p style="font-size:18px;">99. Verily! He has no power over those who believe and put their trust only in their Lord (Allâh).</p>
