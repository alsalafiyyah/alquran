<div class="single-verse">
  <p><strong>72:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَأَنَّا لَمَسۡنَا ٱلسَّمَآءَ فَوَجَدۡنَٰهَا مُلِئَتۡ حَرَسٗا شَدِيدٗا وَشُهُبٗا</p>
  <p style="font-size:18px;">8. ‘And we have sought to reach the heaven; but found it filled with stern guards and flaming fires.</p>
