<div class="single-verse">
  <p><strong>72:18</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَأَنَّ ٱلۡمَسَٰجِدَ لِلَّهِ فَلَا تَدۡعُواْ مَعَ ٱللَّهِ أَحَدٗا</p>
  <p style="font-size:18px;">18. And the mosques are for Allâh (Alone): so invoke not anyone along with Allâh.[3]</p>
  <div style="margin-top:20px; border-left:3px solid #ccc; padding-left:10px; color:#555;"><small>[3] (V.72:18) See the footnote of (V.2:165).</small></div>
