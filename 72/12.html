<div class="single-verse">
  <p><strong>72:12</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَأَنَّا ظَنَنَّآ أَن لَّن نُّعۡجِزَ ٱللَّهَ فِي ٱلۡأَرۡضِ وَلَن نُّعۡجِزَهُۥ هَرَبٗا</p>
  <p style="font-size:18px;">12. ‘And we think that we cannot escape (the punishment of) Allâh in the earth, nor can we escape Him by flight.</p>
