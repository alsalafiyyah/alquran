<div class="single-verse">
  <p><strong>72:11</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَأَنَّا مِنَّا ٱلصَّٰلِحُونَ وَمِنَّا دُونَ ذَٰلِكَۖ كُنَّا طَرَآئِقَ قِدَدٗا</p>
  <p style="font-size:18px;">11. ‘There are among us some that are righteous, and some the contrary; we are groups having different ways (religious sects).</p>
