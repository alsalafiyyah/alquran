<div class="single-verse">
  <p><strong>72:10</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَأَنَّا لَا نَدۡرِيٓ أَشَرٌّ أُرِيدَ بِمَن فِي ٱلۡأَرۡضِ أَمۡ أَرَادَ بِهِمۡ رَبُّهُمۡ رَشَدٗا</p>
  <p style="font-size:18px;">10. ‘And we know not whether evil is intended for those on earth, or whether their Lord intends for them a Right Path.</p>
