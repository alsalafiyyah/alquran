<div class="single-verse">
  <p><strong>72:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَأَنَّهُمۡ ظَنُّواْ كَمَا ظَنَنتُمۡ أَن لَّن يَبۡعَثَ ٱللَّهُ أَحَدٗا</p>
  <p style="font-size:18px;">7. ‘And they thought as you thought, that Allâh will not send any Messenger (to mankind or jinn).</p>
