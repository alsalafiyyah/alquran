<div class="single-verse">
  <p><strong>72:20</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قُلۡ إِنَّمَآ أَدۡعُواْ رَبِّي وَلَآ أُشۡرِكُ بِهِۦٓ أَحَدٗا</p>
  <p style="font-size:18px;">20. Say (O Muhammad صلى الله عليه وسلم): "I invoke only my Lord (Allâh Alone), and I associate none as partners along with Him."</p>
