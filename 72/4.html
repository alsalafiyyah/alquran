<div class="single-verse">
  <p><strong>72:4</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَأَنَّهُۥ كَانَ يَقُولُ سَفِيهُنَا عَلَى ٱللَّهِ شَطَطٗا</p>
  <p style="font-size:18px;">4. ‘And that the foolish among us [i.e. Iblîs (Satan) or the polytheists amongst the jinn] used to utter against Allâh that which was an enormity in falsehood.</p>
