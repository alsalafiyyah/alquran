<div class="single-verse">
  <p><strong>72:5</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَأَنَّا ظَنَنَّآ أَن لَّن تَقُولَ ٱلۡإِنسُ وَٱلۡجِنُّ عَلَى ٱللَّهِ كَذِبٗا</p>
  <p style="font-size:18px;">5. ‘And verily, we thought that men and jinn would not utter a lie against Allâh.</p>
