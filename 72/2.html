<div class="single-verse">
  <p><strong>72:2</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَهۡدِيٓ إِلَى ٱلرُّشۡدِ فَـَٔامَنَّا بِهِۦۖ وَلَن نُّشۡرِكَ بِرَبِّنَآ أَحَدٗا</p>
  <p style="font-size:18px;">2. ‘It guides to the Right Path, and we have believed therein, and we shall never join (in worship) anything with our Lord (Allâh).</p>
