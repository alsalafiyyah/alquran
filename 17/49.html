<div class="single-verse">
  <p><strong>17:49</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَقَالُوٓاْ أَءِذَا كُنَّا عِظَٰمٗا وَرُفَٰتًا أَءِنَّا لَمَبۡعُوثُونَ خَلۡقٗا جَدِيدٗا</p>
  <p style="font-size:18px;">49. And they say: "When we are bones and fragments (destroyed), should we really be resurrected (to be) a new creation?"</p>
