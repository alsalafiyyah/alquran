<div class="single-verse">
  <p><strong>17:103</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَأَرَادَ أَن يَسۡتَفِزَّهُم مِّنَ ٱلۡأَرۡضِ فَأَغۡرَقۡنَٰهُ وَمَن مَّعَهُۥ جَمِيعٗا</p>
  <p style="font-size:18px;">103. So he resolved to turn them out of the land (of Egypt). But We drowned him and all who were with him.</p>
