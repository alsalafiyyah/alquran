<div class="single-verse">
  <p><strong>17:48</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱنظُرۡ كَيۡفَ ضَرَبُواْ لَكَ ٱلۡأَمۡثَالَ فَضَلُّواْ فَلَا يَسۡتَطِيعُونَ سَبِيلٗا</p>
  <p style="font-size:18px;">48. See what examples they have put forward for you. So they have gone astray, and never can they find a way.</p>
