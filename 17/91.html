<div class="single-verse">
  <p><strong>17:91</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَوۡ تَكُونَ لَكَ جَنَّةٞ مِّن نَّخِيلٖ وَعِنَبٖ فَتُفَجِّرَ ٱلۡأَنۡهَٰرَ خِلَٰلَهَا تَفۡجِيرًا</p>
  <p style="font-size:18px;">91. "Or you have a garden of date-palms and grapes, and cause rivers to gush forth in their midst abundantly;</p>
