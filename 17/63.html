<div class="single-verse">
  <p><strong>17:63</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ ٱذۡهَبۡ فَمَن تَبِعَكَ مِنۡهُمۡ فَإِنَّ جَهَنَّمَ جَزَآؤُكُمۡ جَزَآءٗ مَّوۡفُورٗا</p>
  <p style="font-size:18px;">63. (Allâh) said: "Go, and whosoever of them follows you, surely Hell will be the recompense of you (all) - an ample recompense.</p>
