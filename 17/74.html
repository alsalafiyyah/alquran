  <p><strong>17:74</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَوۡلَآ أَن ثَبَّتۡنَٰكَ لَقَدۡ كِدتَّ تَرۡكَنُ إِلَيۡهِمۡ شَيۡـٔٗا قَلِيلًا</p>
  <p style="font-size:18px;">74. And had We not made you stand firm, you would nearly have inclined to them a little.</p>
