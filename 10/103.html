<div class="single-verse">
  <p><strong>10:103</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ثُمَّ نُنَجِّي رُسُلَنَا وَٱلَّذِينَ ءَامَنُواْۚ كَذَٰلِكَ حَقًّا عَلَيۡنَا نُنجِ ٱلۡمُؤۡمِنِينَ</p>
  <p style="font-size:18px;">103. Then (in the end) We save Our Messengers and those who believe! Thus it is incumbent upon Us to save the believers.</p>
</div>
