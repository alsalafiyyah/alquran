<div class="single-verse">
  <p><strong>10:29</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَكَفَىٰ بِٱللَّهِ شَهِيدَۢا بَيۡنَنَا وَبَيۡنَكُمۡ إِن كُنَّا عَنۡ عِبَادَتِكُمۡ لَغَٰفِلِينَ</p>
  <p style="font-size:18px;">29. "So sufficient is Allâh as a witness between us and you that we indeed knew nothing of your worship of us."</p>
