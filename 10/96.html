<div class="single-verse">
  <p><strong>10:96</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ ٱلَّذِينَ حَقَّتۡ عَلَيۡهِمۡ كَلِمَتُ رَبِّكَ لَا يُؤۡمِنُونَ</p>
  <p style="font-size:18px;">96. Truly! Those, against whom the Word (Wrath) of your Lord has been justified, will not believe.</p>
