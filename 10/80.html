<div class="single-verse">
  <p><strong>10:80</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَلَمَّا جَآءَ ٱلسَّحَرَةُ قَالَ لَهُم مُّوسَىٰٓ أَلۡقُواْ مَآ أَنتُم مُّلۡقُونَ</p>
  <p style="font-size:18px;">80. And when the sorcerers came, Mûsâ (Moses) said to them: "Cast down what you want to cast!"</p>
