  <p><strong>10:63</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱلَّذِينَ ءَامَنُواْ وَكَانُواْ يَتَّقُونَ</p>
  <p style="font-size:18px;">63. Those who believed (in the Oneness of Allâh - Islâmic Monotheism), and used to fear Allâh much (by abstaining from evil deeds and sins and by doing righteous deeds).</p>
