<div class="single-verse">
  <p><strong>10:76</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَلَمَّا جَآءَهُمُ ٱلۡحَقُّ مِنۡ عِندِنَا قَالُوٓاْ إِنَّ هَٰذَا لَسِحۡرٞ مُّبِينٞ</p>
  <p style="font-size:18px;">76. So when came to them the truth from Us, they said: "This is indeed clear magic."</p>
