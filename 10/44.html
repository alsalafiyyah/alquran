<div class="single-verse">
  <p><strong>10:44</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ ٱللَّهَ لَا يَظۡلِمُ ٱلنَّاسَ شَيۡـٔٗا وَلَٰكِنَّ ٱلنَّاسَ أَنفُسَهُمۡ يَظۡلِمُونَ</p>
  <p style="font-size:18px;">44. Truly! Allâh wrongs not mankind in aught; but mankind wrong themselves.</p>
