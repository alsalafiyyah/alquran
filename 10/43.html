<div class="single-verse">
  <p><strong>10:43</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمِنۡهُم مَّن يَنظُرُ إِلَيۡكَۚ أَفَأَنتَ تَهۡدِي ٱلۡعُمۡيَ وَلَوۡ كَانُواْ لَا يُبۡصِرُونَ</p>
  <p style="font-size:18px;">43. And among them are some who look at you, but can you guide the blind - even though they see not?</p>
