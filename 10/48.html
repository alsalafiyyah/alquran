  <p><strong>10:48</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَيَقُولُونَ مَتَىٰ هَٰذَا ٱلۡوَعۡدُ إِن كُنتُمۡ صَٰدِقِينَ</p>
  <p style="font-size:18px;">48. And they say: "When will be this promise (the torment or the Day of Resurrection), if you speak the truth?"</p>
