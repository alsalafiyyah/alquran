<div class="single-verse">
  <p><strong>10:14</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ثُمَّ جَعَلۡنَٰكُمۡ خَلَٰٓئِفَ فِي ٱلۡأَرۡضِ مِنۢ بَعۡدِهِمۡ لِنَنظُرَ كَيۡفَ تَعۡمَلُونَ</p>
  <p style="font-size:18px;">14. Then We made you successors after them, generations after generations in the land, that We might see how you would work.</p>
