<div class="single-verse">
  <p><strong>10:42</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمِنۡهُم مَّن يَسۡتَمِعُونَ إِلَيۡكَۚ أَفَأَنتَ تُسۡمِعُ ٱلصُّمَّ وَلَوۡ كَانُواْ لَا يَعۡقِلُونَ</p>
  <p style="font-size:18px;">42. And among them are some who listen to you, but can you make the deaf to hear - even though they apprehend not?</p>
