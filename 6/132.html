<div class="single-verse">
  <p><strong>6:132</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلِكُلّٖ دَرَجَٰتٞ مِّمَّا عَمِلُواْۚ وَمَا رَبُّكَ بِغَٰفِلٍ عَمَّا يَعۡمَلُونَ</p>
  <p style="font-size:18px;">132. For all there will be degrees (or ranks) according to what they did. And your Lord is not unaware of what they do.</p>
