<div class="single-verse">
  <p><strong>6:72</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَأَنۡ أَقِيمُواْ ٱلصَّلَوٰةَ وَٱتَّقُوهُۚ وَهُوَ ٱلَّذِيٓ إِلَيۡهِ تُحۡشَرُونَ</p>
  <p style="font-size:18px;">72. And to perform As-Salât (Iqâmat-as-Salât), and to be obedient to Allâh and fear Him, and it is He to Whom you shall be gathered.</p>
</div>
