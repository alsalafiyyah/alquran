<div class="single-verse">
  <p><strong>6:163</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَا شَرِيكَ لَهُۥۖ وَبِذَٰلِكَ أُمِرۡتُ وَأَنَا۠ أَوَّلُ ٱلۡمُسۡلِمِينَ</p>
  <p style="font-size:18px;">163. "He has no partner. And of this I have been commanded, and I am the first of the Muslims."</p>
