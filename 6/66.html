<div class="single-verse">
  <p><strong>6:66</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَكَذَّبَ بِهِۦ قَوۡمُكَ وَهُوَ ٱلۡحَقُّۚ قُل لَّسۡتُ عَلَيۡكُم بِوَكِيلٖ</p>
  <p style="font-size:18px;">66. But your people (O Muhammad صلى الله عليه وسلم) have denied it (the Qur’ân) though it is the truth. Say: "I am not a Wakîl (guardian) over you."</p>
</div>
