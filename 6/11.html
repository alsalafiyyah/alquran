<div class="single-verse">
  <p><strong>6:11</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قُلۡ سِيرُواْ فِي ٱلۡأَرۡضِ ثُمَّ ٱنظُرُواْ كَيۡفَ كَانَ عَٰقِبَةُ ٱلۡمُكَذِّبِينَ</p>
  <p style="font-size:18px;">11. Say (O Muhammad صلى الله عليه وسلم): "Travel in the land and see what was the end of those who rejected truth."</p>
