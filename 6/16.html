<div class="single-verse">
  <p><strong>6:16</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">مَّن يُصۡرَفۡ عَنۡهُ يَوۡمَئِذٖ فَقَدۡ رَحِمَهُۥۚ وَذَٰلِكَ ٱلۡفَوۡزُ ٱلۡمُبِينُ</p>
  <p style="font-size:18px;">16. He who is averted from (such a torment) on that Day, (Allâh) has surely been Merciful to him. And that would be the obvious success.</p>
