<div class="single-verse">
  <p><strong>6:18</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَهُوَ ٱلۡقَاهِرُ فَوۡقَ عِبَادِهِۦۚ وَهُوَ ٱلۡحَكِيمُ ٱلۡخَبِيرُ</p>
  <p style="font-size:18px;">18. And He is the Irresistible, (Supreme) above His slaves, and He is the All-Wise, Well-Acquainted with all things.</p>
