<div class="single-verse">
  <p><strong>6:67</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لِّكُلِّ نَبَإٖ مُّسۡتَقَرّٞۚ وَسَوۡفَ تَعۡلَمُونَ</p>
  <p style="font-size:18px;">67. For every news there is a reality[7] and you will come to know.</p>
  <div style="margin-top:20px; border-left:3px solid #ccc; padding-left:10px; color:#555;"><small>[7] (V.6:67): i.e. for everything there is an appointed term, and for every deed there is a recompense.</small></div>
