<div class="single-verse">
  <p><strong>6:13</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">۞ وَلَهُۥ مَا سَكَنَ فِي ٱلَّيۡلِ وَٱلنَّهَارِۚ وَهُوَ ٱلسَّمِيعُ ٱلۡعَلِيمُ</p>
  <p style="font-size:18px;">13. And to Him belongs whatsoever exists in the night and the day, and He is the All-Hearing, the All-Knowing."</p>
