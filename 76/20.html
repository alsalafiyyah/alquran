<div class="single-verse">
  <p><strong>76:20</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِذَا رَأَيۡتَ ثَمَّ رَأَيۡتَ نَعِيمٗا وَمُلۡكٗا كَبِيرًا</p>
  <p style="font-size:18px;">20. And when you look there (in Paradise), you will see a delight (that cannot be imagined), and a great dominion.</p>
