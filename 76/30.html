<div class="single-verse">
  <p><strong>76:30</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمَا تَشَآءُونَ إِلَّآ أَن يَشَآءَ ٱللَّهُۚ إِنَّ ٱللَّهَ كَانَ عَلِيمًا حَكِيمٗا</p>
  <p style="font-size:18px;">30. But you cannot will, unless Allâh wills. Verily, Allâh is Ever All-Knowing, All-Wise.</p>
