<div class="single-verse">
  <p><strong>76:31</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يُدۡخِلُ مَن يَشَآءُ فِي رَحۡمَتِهِۦۚ وَٱلظَّٰلِمِينَ أَعَدَّ لَهُمۡ عَذَابًا أَلِيمَۢا</p>
  <p style="font-size:18px;">31. He will admit to His Mercy whom He wills and as for the Zâlimûn - (polytheists, wrong-doers) He has prepared a painful torment.</p>
