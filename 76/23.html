<div class="single-verse">
  <p><strong>76:23</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّا نَحۡنُ نَزَّلۡنَا عَلَيۡكَ ٱلۡقُرۡءَانَ تَنزِيلٗا</p>
  <p style="font-size:18px;">23. Verily, it is We Who have sent down the Qur’ân to you (O Muhammad صلى الله عليه وسلم) by stages.</p>
