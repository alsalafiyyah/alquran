<div class="single-verse">
  <p><strong>76:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يُوفُونَ بِٱلنَّذۡرِ وَيَخَافُونَ يَوۡمٗا كَانَ شَرُّهُۥ مُسۡتَطِيرٗا</p>
  <p style="font-size:18px;">7. They (are those who) fulfil (their) vows, and they fear a Day whose evil will be wide-spreading.</p>
