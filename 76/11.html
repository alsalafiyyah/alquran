<div class="single-verse">
  <p><strong>76:11</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَوَقَىٰهُمُ ٱللَّهُ شَرَّ ذَٰلِكَ ٱلۡيَوۡمِ وَلَقَّىٰهُمۡ نَضۡرَةٗ وَسُرُورٗا</p>
  <p style="font-size:18px;">11. So Allâh saved them from the evil of that Day, and gave them Nadrah (a light of beauty) and joy.</p>
