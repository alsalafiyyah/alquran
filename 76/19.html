<div class="single-verse">
  <p><strong>76:19</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">۞ وَيَطُوفُ عَلَيۡهِمۡ وِلۡدَٰنٞ مُّخَلَّدُونَ إِذَا رَأَيۡتَهُمۡ حَسِبۡتَهُمۡ لُؤۡلُؤٗا مَّنثُورٗا</p>
  <p style="font-size:18px;">19. And round about them will (serve) boys of everlasting youth. If you see them, you would think them scattered pearls.</p>
