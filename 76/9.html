<div class="single-verse">
  <p><strong>76:9</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّمَا نُطۡعِمُكُمۡ لِوَجۡهِ ٱللَّهِ لَا نُرِيدُ مِنكُمۡ جَزَآءٗ وَلَا شُكُورًا</p>
  <p style="font-size:18px;">9. (Saying): "We feed you seeking Allâh’s Countenance only. We wish for no reward, nor thanks from you.</p>
