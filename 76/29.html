<div class="single-verse">
  <p><strong>76:29</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ هَٰذِهِۦ تَذۡكِرَةٞۖ فَمَن شَآءَ ٱتَّخَذَ إِلَىٰ رَبِّهِۦ سَبِيلٗا</p>
  <p style="font-size:18px;">29. Verily, this (Verse of the Qur’ân) is an admonition, so whosoever wills, let him take a Path to his Lord (Allâh).</p>
