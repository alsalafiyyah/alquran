<div class="single-verse">
  <p><strong>76:27</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ هَٰٓؤُلَآءِ يُحِبُّونَ ٱلۡعَاجِلَةَ وَيَذَرُونَ وَرَآءَهُمۡ يَوۡمٗا ثَقِيلٗا</p>
  <p style="font-size:18px;">27. Verily, these (disbelievers) love the present life of this world, and put behind them a heavy Day (that will be hard).</p>
