<div class="single-verse">
  <p><strong>76:1</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">هَلۡ أَتَىٰ عَلَى ٱلۡإِنسَٰنِ حِينٞ مِّنَ ٱلدَّهۡرِ لَمۡ يَكُن شَيۡـٔٗا مَّذۡكُورًا</p>
  <p style="font-size:18px;">1. Has there not been over man a period of time, when he was not a thing worth mentioning?</p>
