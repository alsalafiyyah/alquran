<div class="single-verse">
  <p><strong>76:26</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمِنَ ٱلَّيۡلِ فَٱسۡجُدۡ لَهُۥ وَسَبِّحۡهُ لَيۡلٗا طَوِيلًا</p>
  <p style="font-size:18px;">26. And during night, prostrate yourself to Him (i.e. the offering of Maghrib and ‘Ishâ’ prayers), and glorify Him a long night through (i.e. Tahajjud prayer).</p>
</div>
