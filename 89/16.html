<div class="single-verse">
  <p><strong>89:16</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَأَمَّآ إِذَا مَا ٱبۡتَلَىٰهُ فَقَدَرَ عَلَيۡهِ رِزۡقَهُۥ فَيَقُولُ رَبِّيٓ أَهَٰنَنِ</p>
  <p style="font-size:18px;">16. But when He tries him by straitening his means of life, he says: "My Lord has humiliated me!"</p>
