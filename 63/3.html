<div class="single-verse">
  <p><strong>63:3</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ذَٰلِكَ بِأَنَّهُمۡ ءَامَنُواْ ثُمَّ كَفَرُواْ فَطُبِعَ عَلَىٰ قُلُوبِهِمۡ فَهُمۡ لَا يَفۡقَهُونَ</p>
  <p style="font-size:18px;">3. That is because they believed, and then disbelieved; therefore their hearts are sealed, so they understand not.</p>
</div>
