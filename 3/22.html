<div class="single-verse">
  <p><strong>3:22</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أُوْلَٰٓئِكَ ٱلَّذِينَ حَبِطَتۡ أَعۡمَٰلُهُمۡ فِي ٱلدُّنۡيَا وَٱلۡأٓخِرَةِ وَمَا لَهُم مِّن نَّٰصِرِينَ</p>
  <p style="font-size:18px;">22. They are those whose works will be lost in this world and in the Hereafter, and they will have no helpers.</p>
