<div class="single-verse">
  <p><strong>3:197</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">مَتَٰعٞ قَلِيلٞ ثُمَّ مَأۡوَىٰهُمۡ جَهَنَّمُۖ وَبِئۡسَ ٱلۡمِهَادُ</p>
  <p style="font-size:18px;">197. A brief enjoyment; then, their ultimate abode is Hell; and worst indeed is that place for rest.</p>
