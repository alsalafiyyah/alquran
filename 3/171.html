<div class="single-verse">
  <p><strong>3:171</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">۞ يَسۡتَبۡشِرُونَ بِنِعۡمَةٖ مِّنَ ٱللَّهِ وَفَضۡلٖ وَأَنَّ ٱللَّهَ لَا يُضِيعُ أَجۡرَ ٱلۡمُؤۡمِنِينَ</p>
  <p style="font-size:18px;">171. They rejoice in a Grace and a Bounty from Allâh, and that Allâh will not waste the reward of the believers.</p>
