<div class="single-verse">
  <p><strong>3:132</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَأَطِيعُواْ ٱللَّهَ وَٱلرَّسُولَ لَعَلَّكُمۡ تُرۡحَمُونَ</p>
  <p style="font-size:18px;">132. And obey Allâh and the Messenger (Muhammad صلى الله عليه وسلم) that you may obtain mercy.[24]</p>
