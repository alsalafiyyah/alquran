<div class="single-verse">
  <p><strong>3:74</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَخۡتَصُّ بِرَحۡمَتِهِۦ مَن يَشَآءُۗ وَٱللَّهُ ذُو ٱلۡفَضۡلِ ٱلۡعَظِيمِ</p>
  <p style="font-size:18px;">74. He selects for His Mercy (Islâm and the Qur’ân with Prophethood) whom He wills and Allâh is the Owner of Great Bounty.</p>
