<div class="single-verse">
  <p><strong>3:2</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱللَّهُ لَآ إِلَٰهَ إِلَّا هُوَ ٱلۡحَيُّ ٱلۡقَيُّومُ</p>
  <p style="font-size:18px;">2. Allâh! Lâ ilâha illa Huwa (none has the right to be worshipped but He), Al-Hayyul-Qayyum (the Ever Living, the One Who sustains and protects all that exists).</p>
