<div class="single-verse">
  <p><strong>3:94</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَمَنِ ٱفۡتَرَىٰ عَلَى ٱللَّهِ ٱلۡكَذِبَ مِنۢ بَعۡدِ ذَٰلِكَ فَأُوْلَٰٓئِكَ هُمُ ٱلظَّٰلِمُونَ</p>
  <p style="font-size:18px;">94. Then after that, whosoever shall invent a lie against Allâh, ... such shall indeed be the Zâlimûn (disbelievers).</p>
</div>
