  <p><strong>3:5</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ ٱللَّهَ لَا يَخۡفَىٰ عَلَيۡهِ شَيۡءٞ فِي ٱلۡأَرۡضِ وَلَا فِي ٱلسَّمَآءِ</p>
  <p style="font-size:18px;">5. Truly, nothing is hidden from Allâh, in the earth or in the heaven.</p>
