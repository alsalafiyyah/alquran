<div class="single-verse">
  <p><strong>3:139</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَا تَهِنُواْ وَلَا تَحۡزَنُواْ وَأَنتُمُ ٱلۡأَعۡلَوۡنَ إِن كُنتُم مُّؤۡمِنِينَ</p>
  <p style="font-size:18px;">139. So do not become weak (against your enemy), nor be sad, and you will be superior (in victory) if you are indeed (true) believers.</p>
</div>
