<div class="single-verse">
  <p><strong>3:127</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لِيَقۡطَعَ طَرَفٗا مِّنَ ٱلَّذِينَ كَفَرُوٓاْ أَوۡ يَكۡبِتَهُمۡ فَيَنقَلِبُواْ خَآئِبِينَ</p>
  <p style="font-size:18px;">127. That He might cut off a part of those who disbelieve, or expose them to infamy, so that they retire frustrated.</p>
