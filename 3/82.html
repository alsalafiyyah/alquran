<div class="single-verse">
  <p><strong>3:82</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَمَن تَوَلَّىٰ بَعۡدَ ذَٰلِكَ فَأُوْلَٰٓئِكَ هُمُ ٱلۡفَٰسِقُونَ</p>
  <p style="font-size:18px;">82. Then whoever turns away after this, they are the Fâsiqûn (rebellious: those who turn away from Allâh’s Obedience).</p>
