<div class="single-verse">
  <p><strong>3:63</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَإِن تَوَلَّوۡاْ فَإِنَّ ٱللَّهَ عَلِيمُۢ بِٱلۡمُفۡسِدِينَ</p>
  <p style="font-size:18px;">63. And if they turn away (and do not accept these true proofs and evidence), then surely, Allâh is All-Aware of those who do mischief.</p>
