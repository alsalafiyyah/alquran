<div class="single-verse">
  <p><strong>3:138</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">هَٰذَا بَيَانٞ لِّلنَّاسِ وَهُدٗى وَمَوۡعِظَةٞ لِّلۡمُتَّقِينَ</p>
  <p style="font-size:18px;">138. This (the Qur’ân) is a plain statement for mankind, a guidance and instruction to those who are Al-Muttaqûn (the pious - See V.2:2).</p>
