<div class="single-verse">
  <p><strong>3:88</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">خَٰلِدِينَ فِيهَا لَا يُخَفَّفُ عَنۡهُمُ ٱلۡعَذَابُ وَلَا هُمۡ يُنظَرُونَ</p>
  <p style="font-size:18px;">88. They will abide therein (Hell). Neither will their torment be lightened, nor will it be delayed or postponed (for a while).</p>
