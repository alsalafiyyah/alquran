<div class="single-verse">
  <p><strong>3:51</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ ٱللَّهَ رَبِّي وَرَبُّكُمۡ فَٱعۡبُدُوهُۚ هَٰذَا صِرَٰطٞ مُّسۡتَقِيمٞ</p>
  <p style="font-size:18px;">51. Truly! Allâh is my Lord and your Lord, so worship Him (Alone). This is the Straight Path.</p>
