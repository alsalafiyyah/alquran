<div class="single-verse">
  <p><strong>3:150</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">بَلِ ٱللَّهُ مَوۡلَىٰكُمۡۖ وَهُوَ خَيۡرُ ٱلنَّٰصِرِينَ</p>
  <p style="font-size:18px;">150. Nay, Allâh is your Maulâ (Patron, Lord, Helper, Protector), and He is the Best of helpers.</p>
