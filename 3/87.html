<div class="single-verse">
  <p><strong>3:87</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أُوْلَٰٓئِكَ جَزَآؤُهُمۡ أَنَّ عَلَيۡهِمۡ لَعۡنَةَ ٱللَّهِ وَٱلۡمَلَٰٓئِكَةِ وَٱلنَّاسِ أَجۡمَعِينَ</p>
  <p style="font-size:18px;">87. They are those whose recompense is that on them (rests) the Curse of Allâh, of the angels, and of all mankind.</p>
