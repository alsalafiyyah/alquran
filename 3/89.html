<div class="single-verse">
  <p><strong>3:89</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِلَّا ٱلَّذِينَ تَابُواْ مِنۢ بَعۡدِ ذَٰلِكَ وَأَصۡلَحُواْ فَإِنَّ ٱللَّهَ غَفُورٞ رَّحِيمٌ</p>
  <p style="font-size:18px;">89. Except for those who repent after that and do righteous deeds. Verily, Allâh is Oft-Forgiving, Most Merciful.</p>
</div>
