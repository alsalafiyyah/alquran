<div class="single-verse">
  <p><strong>3:109</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلِلَّهِ مَا فِي ٱلسَّمَٰوَٰتِ وَمَا فِي ٱلۡأَرۡضِۚ وَإِلَى ٱللَّهِ تُرۡجَعُ ٱلۡأُمُورُ</p>
  <p style="font-size:18px;">109. And to Allâh belongs all that is in the heavens and all that is in the earth. And all matters go back (for decision) to Allâh.</p>
</div>
