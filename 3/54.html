<div class="single-verse">
  <p><strong>3:54</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمَكَرُواْ وَمَكَرَ ٱللَّهُۖ وَٱللَّهُ خَيۡرُ ٱلۡمَٰكِرِينَ</p>
  <p style="font-size:18px;">54. And they (disbelievers) plotted to kill ‘Îsâ [(Jesus) عليه السلام], and Allâh plotted too. And Allâh is the Best of those who plot.</p>
