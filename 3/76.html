<div class="single-verse">
  <p><strong>3:76</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">بَلَىٰۚ مَنۡ أَوۡفَىٰ بِعَهۡدِهِۦ وَٱتَّقَىٰ فَإِنَّ ٱللَّهَ يُحِبُّ ٱلۡمُتَّقِينَ</p>
  <p style="font-size:18px;">76. Yes, whoever fulfils his pledge and fears Allâh much; verily, then Allâh loves those who are Al-Muttaqûn (the pious - See V.2:2).</p>
</div>
