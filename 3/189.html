  <p><strong>3:189</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلِلَّهِ مُلۡكُ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِۗ وَٱللَّهُ عَلَىٰ كُلِّ شَيۡءٖ قَدِيرٌ</p>
