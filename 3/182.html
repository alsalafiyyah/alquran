<div class="single-verse">
  <p><strong>3:182</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ذَٰلِكَ بِمَا قَدَّمَتۡ أَيۡدِيكُمۡ وَأَنَّ ٱللَّهَ لَيۡسَ بِظَلَّامٖ لِّلۡعَبِيدِ</p>
  <p style="font-size:18px;">182. This is because of that (evil) which your hands have sent before you. And certainly, Allâh is never unjust to (His) slaves.</p>
