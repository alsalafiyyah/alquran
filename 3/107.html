<div class="single-verse">
  <p><strong>3:107</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَأَمَّا ٱلَّذِينَ ٱبۡيَضَّتۡ وُجُوهُهُمۡ فَفِي رَحۡمَةِ ٱللَّهِۖ هُمۡ فِيهَا خَٰلِدُونَ</p>
  <p style="font-size:18px;">107. And for those whose faces will become white, they will be in Allâh’s Mercy (Paradise), therein they shall dwell forever.</p>
</div>
