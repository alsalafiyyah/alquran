<div class="single-verse">
  <p><strong>3:58</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ذَٰلِكَ نَتۡلُوهُ عَلَيۡكَ مِنَ ٱلۡأٓيَٰتِ وَٱلذِّكۡرِ ٱلۡحَكِيمِ</p>
  <p style="font-size:18px;">58. This is what We recite to you (O Muhammad صلى الله عليه وسلم) of the Verses and the Wise Reminder (i.e. the Qur’ân).</p>
