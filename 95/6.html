<div class="single-verse">
  <p><strong>95:6</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِلَّا ٱلَّذِينَ ءَامَنُواْ وَعَمِلُواْ ٱلصَّٰلِحَٰتِ فَلَهُمۡ أَجۡرٌ غَيۡرُ مَمۡنُونٖ</p>
  <p style="font-size:18px;">6. Save those who believe (in Islâmic Monotheism) and do righteous deeds. Then they shall have a reward without end (Paradise).</p>
