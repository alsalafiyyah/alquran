<div class="single-verse">
  <p><strong>8:51</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ذَٰلِكَ بِمَا قَدَّمَتۡ أَيۡدِيكُمۡ وَأَنَّ ٱللَّهَ لَيۡسَ بِظَلَّٰمٖ لِّلۡعَبِيدِ</p>
  <p style="font-size:18px;">51. "This is because of that which your hands had forwarded. And verily, Allâh is not unjust to His slaves."</p>
