  <p><strong>8:21</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَا تَكُونُواْ كَٱلَّذِينَ قَالُواْ سَمِعۡنَا وَهُمۡ لَا يَسۡمَعُونَ</p>
