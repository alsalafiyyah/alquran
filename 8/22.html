<div class="single-verse">
  <p><strong>8:22</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">۞ إِنَّ شَرَّ ٱلدَّوَآبِّ عِندَ ٱللَّهِ ٱلصُّمُّ ٱلۡبُكۡمُ ٱلَّذِينَ لَا يَعۡقِلُونَ</p>
  <p style="font-size:18px;">22. Verily! The worst of (moving) living creatures with Allâh are the deaf and the dumb, who understand not (i.e. the disbelievers).</p>
</div>
