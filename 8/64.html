<div class="single-verse">
  <p><strong>8:64</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَٰٓأَيُّهَا ٱلنَّبِيُّ حَسۡبُكَ ٱللَّهُ وَمَنِ ٱتَّبَعَكَ مِنَ ٱلۡمُؤۡمِنِينَ</p>
  <p style="font-size:18px;">64. O Prophet (Muhammad صلى الله عليه وسلم)! Allâh is Sufficient for you and for the believers who follow you.</p>
