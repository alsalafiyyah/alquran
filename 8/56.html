<div class="single-verse">
  <p><strong>8:56</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱلَّذِينَ عَٰهَدتَّ مِنۡهُمۡ ثُمَّ يَنقُضُونَ عَهۡدَهُمۡ فِي كُلِّ مَرَّةٖ وَهُمۡ لَا يَتَّقُونَ</p>
  <p style="font-size:18px;">56. They are those with whom you made a covenant, but they break their covenant every time and they do not fear Allâh.</p>
