<div class="single-verse">
  <p><strong>8:68</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَّوۡلَا كِتَٰبٞ مِّنَ ٱللَّهِ سَبَقَ لَمَسَّكُمۡ فِيمَآ أَخَذۡتُمۡ عَذَابٌ عَظِيمٞ</p>
  <p style="font-size:18px;">68. Were it not a previous ordainment from Allâh, a severe torment would have touched you for what you took.</p>
