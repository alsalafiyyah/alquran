<div class="single-verse">
  <p><strong>8:28</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱعۡلَمُوٓاْ أَنَّمَآ أَمۡوَٰلُكُمۡ وَأَوۡلَٰدُكُمۡ فِتۡنَةٞ وَأَنَّ ٱللَّهَ عِندَهُۥٓ أَجۡرٌ عَظِيمٞ</p>
  <p style="font-size:18px;">28. And know that your possessions and your children are but a trial and that surely with Allâh is a mighty reward.</p>
</div>
