<div class="single-verse">
  <p><strong>98:2</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">رَسُولٞ مِّنَ ٱللَّهِ يَتۡلُواْ صُحُفٗا مُّطَهَّرَةٗ</p>
  <p style="font-size:18px;">2. A Messenger (Muhammad صلى الله عليه وسلم) from Allâh, reciting (the Qur’ân) purified pages [purified from Al-Bâtil (falsehood)].</p>
