<div class="single-verse">
  <p><strong>83:12</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمَا يُكَذِّبُ بِهِۦٓ إِلَّا كُلُّ مُعۡتَدٍ أَثِيمٍ</p>
  <p style="font-size:18px;">12. And none can deny it except every transgressor beyond bounds, (in disbelief, oppression and disobedience to Allâh) the sinner!</p>
