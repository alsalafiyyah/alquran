<div class="single-verse">
  <p><strong>83:29</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ ٱلَّذِينَ أَجۡرَمُواْ كَانُواْ مِنَ ٱلَّذِينَ ءَامَنُواْ يَضۡحَكُونَ</p>
  <p style="font-size:18px;">29. Verily, (during the worldly life) those who committed crimes used to laugh at those who believed.</p>
