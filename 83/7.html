<div class="single-verse">
  <p><strong>83:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">كَلَّآ إِنَّ كِتَٰبَ ٱلۡفُجَّارِ لَفِي سِجِّينٖ</p>
  <p style="font-size:18px;">7. Nay! Truly, the Record (writing of the deeds) of the Fujjâr (disbelievers, polytheists, sinners, evil-doers and the wicked) is (preserved) in Sijjîn.</p>
