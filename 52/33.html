<div class="single-verse">
  <p><strong>52:33</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَمۡ يَقُولُونَ تَقَوَّلَهُۥۚ بَل لَّا يُؤۡمِنُونَ</p>
  <p style="font-size:18px;">33. Or do they say: "He (Muhammad صلى الله عليه وسلم) has forged it (this Qur’ân)?" Nay! They believe not!</p>
