<div class="single-verse">
  <p><strong>52:45</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَذَرۡهُمۡ حَتَّىٰ يُلَٰقُواْ يَوۡمَهُمُ ٱلَّذِي فِيهِ يُصۡعَقُونَ</p>
  <p style="font-size:18px;">45. So leave them alone till they meet their Day, in which they will sink into a fainting (with horror).</p>
