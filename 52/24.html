<div class="single-verse">
  <p><strong>52:24</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">۞ وَيَطُوفُ عَلَيۡهِمۡ غِلۡمَانٞ لَّهُمۡ كَأَنَّهُمۡ لُؤۡلُؤٞ مَّكۡنُونٞ</p>
  <p style="font-size:18px;">24. And there will go round boy-servants of theirs, to serve them as if they were preserved pearls.</p>
