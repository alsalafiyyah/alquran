<div class="single-verse">
  <p><strong>52:31</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قُلۡ تَرَبَّصُواْ فَإِنِّي مَعَكُم مِّنَ ٱلۡمُتَرَبِّصِينَ</p>
  <p style="font-size:18px;">31. Say (O Muhammad صلى الله عليه وسلم to them): "Wait! I am with you among the waiters!"</p>
