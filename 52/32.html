<div class="single-verse">
  <p><strong>52:32</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَمۡ تَأۡمُرُهُمۡ أَحۡلَٰمُهُم بِهَٰذَآۚ أَمۡ هُمۡ قَوۡمٞ طَاغُونَ</p>
  <p style="font-size:18px;">32. Do their minds command them this [i.e. to tell a lie against you (Muhammad صلى الله عليه وسلم)] or are they people transgressing all bounds?</p>
