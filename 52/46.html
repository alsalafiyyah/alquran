<div class="single-verse">
  <p><strong>52:46</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَوۡمَ لَا يُغۡنِي عَنۡهُمۡ كَيۡدُهُمۡ شَيۡـٔٗا وَلَا هُمۡ يُنصَرُونَ</p>
  <p style="font-size:18px;">46. The Day when their plotting shall not avail them at all nor will they be helped (i.e. they will receive their torment in Hell).</p>
