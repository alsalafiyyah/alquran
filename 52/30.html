<div class="single-verse">
  <p><strong>52:30</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَمۡ يَقُولُونَ شَاعِرٞ نَّتَرَبَّصُ بِهِۦ رَيۡبَ ٱلۡمَنُونِ</p>
  <p style="font-size:18px;">30. Or do they say: "(Muhammad صلى الله عليه وسلم) is a poet! We await for him some calamity by time!"</p>
