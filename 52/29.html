<div class="single-verse">
  <p><strong>52:29</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَذَكِّرۡ فَمَآ أَنتَ بِنِعۡمَتِ رَبِّكَ بِكَاهِنٖ وَلَا مَجۡنُونٍ</p>
  <p style="font-size:18px;">29. Therefore, remind (mankind of Islâmic Monotheism, O Muhammad صلى الله عليه وسلم). By the Grace of Allâh, you are neither a soothsayer, nor a madman.</p>
</div>
