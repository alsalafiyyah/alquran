<div class="single-verse">
  <p><strong>52:36</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَمۡ خَلَقُواْ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضَۚ بَل لَّا يُوقِنُونَ</p>
  <p style="font-size:18px;">36. Or did they create the heavens and the earth? Nay, but they have no firm Belief.</p>
