<div class="single-verse">
  <p><strong>52:34</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَلۡيَأۡتُواْ بِحَدِيثٖ مِّثۡلِهِۦٓ إِن كَانُواْ صَٰدِقِينَ</p>
  <p style="font-size:18px;">34. Let them then produce a recital like unto it (the Qur’ân) if they are truthful.</p>
