<div class="single-verse">
  <p><strong>52:26</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُوٓاْ إِنَّا كُنَّا قَبۡلُ فِيٓ أَهۡلِنَا مُشۡفِقِينَ</p>
  <p style="font-size:18px;">26. Saying: "Aforetime, we were afraid (of the punishment of Allâh) in the midst of our families.</p>
