<div class="single-verse">
  <p><strong>52:44</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِن يَرَوۡاْ كِسۡفٗا مِّنَ ٱلسَّمَآءِ سَاقِطٗا يَقُولُواْ سَحَابٞ مَّرۡكُومٞ</p>
  <p style="font-size:18px;">44. And if they were to see a piece of the heaven falling down, they would say: "Clouds gathered in heaps!"</p>
