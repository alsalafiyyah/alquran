<div class="single-verse">
  <p><strong>44:38</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمَا خَلَقۡنَا ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضَ وَمَا بَيۡنَهُمَا لَٰعِبِينَ</p>
  <p style="font-size:18px;">38. And We created not the heavens and the earth, and all that is between them, for mere play.</p>
