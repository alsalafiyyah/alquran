  <p><strong>44:17</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">۞ وَلَقَدۡ فَتَنَّا قَبۡلَهُمۡ قَوۡمَ فِرۡعَوۡنَ وَجَآءَهُمۡ رَسُولٞ كَرِيمٌ</p>
  <p style="font-size:18px;">17. And indeed We tried before them Fir‘aun’s (Pharaoh) people, when there came to them a noble Messenger [i.e. Mûsâ (Moses) عليه السلام],</p>
