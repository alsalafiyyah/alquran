<div class="single-verse">
  <p><strong>44:18</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَنۡ أَدُّوٓاْ إِلَيَّ عِبَادَ ٱللَّهِۖ إِنِّي لَكُمۡ رَسُولٌ أَمِينٞ</p>
  <p style="font-size:18px;">18. Saying: "Deliver to me the slaves of Allâh (i.e. the Children of Israel). Verily, I am to you a Messenger worthy of all trust.</p>
