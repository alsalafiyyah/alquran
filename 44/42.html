<div class="single-verse">
  <p><strong>44:42</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِلَّا مَن رَّحِمَ ٱللَّهُۚ إِنَّهُۥ هُوَ ٱلۡعَزِيزُ ٱلرَّحِيمُ</p>
  <p style="font-size:18px;">42. Except him on whom Allâh has Mercy. Verily, He is the All-Mighty, the Most Merciful.</p>
