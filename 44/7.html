  <p><strong>44:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">رَبِّ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِ وَمَا بَيۡنَهُمَآۖ إِن كُنتُم مُّوقِنِينَ</p>
  <p style="font-size:18px;">7. The Lord of the heavens and the earth and all that is between them, if you (but) have a faith with certainty.</p>
