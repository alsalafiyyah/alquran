  <p><strong>44:19</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَأَن لَّا تَعۡلُواْ عَلَى ٱللَّهِۖ إِنِّيٓ ءَاتِيكُم بِسُلۡطَٰنٖ مُّبِينٖ</p>
  <p style="font-size:18px;">19. "And exalt not yourselves against Allâh. Truly, I have come to you with a manifest authority.</p>
