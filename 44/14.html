<div class="single-verse">
  <p><strong>44:14</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ثُمَّ تَوَلَّوۡاْ عَنۡهُ وَقَالُواْ مُعَلَّمٞ مَّجۡنُونٌ</p>
  <p style="font-size:18px;">14. Then they had turned away from him (Messenger Muhammad صلى الله عليه و سلم) and said: (He is) one taught (by a human being), a madman!"</p>
