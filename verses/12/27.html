<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Yusuf (12:27)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَإِن كَانَ قَمِيصُهُۥ قُدَّ مِن دُبُرٖ فَكَذَبَتۡ وَهُوَ مِنَ ٱلصَّٰدِقِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">27. "But if it be that his shirt is torn from the back, then she has told a lie and he is speaking the truth!"</p>
