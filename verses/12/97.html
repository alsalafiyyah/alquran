<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>12:97</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ يَٰٓأَبَانَا ٱسۡتَغۡفِرۡ لَنَا ذُنُوبَنَآ إِنَّا كُنَّا خَٰطِـِٔينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">97. They said: "O our father! Ask Forgiveness (from Allâh) for our sins, indeed we have been sinners."</p>
