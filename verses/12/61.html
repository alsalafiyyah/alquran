<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>12:61</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ سَنُرَٰوِدُ عَنۡهُ أَبَاهُ وَإِنَّا لَفَٰعِلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">61. They said: "We shall try to get permission (for him) from his father, and verily, we shall do it."</p>
