<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>12:91</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ تَٱللَّهِ لَقَدۡ ءَاثَرَكَ ٱللَّهُ عَلَيۡنَا وَإِن كُنَّا لَخَٰطِـِٔينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">91. They said: "By Allâh! Indeed Allâh has preferred you above us, and we certainly have been sinners."</p>
