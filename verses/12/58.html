<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>12:58</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَجَآءَ إِخۡوَةُ يُوسُفَ فَدَخَلُواْ عَلَيۡهِ فَعَرَفَهُمۡ وَهُمۡ لَهُۥ مُنكِرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">58. And Yûsuf’s (Joseph) brethren came and they entered unto him, and he recognized them, but they recognized him not.</p>
