<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Yusuf (12:44)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُوٓاْ أَضۡغَٰثُ أَحۡلَٰمٖۖ وَمَا نَحۡنُ بِتَأۡوِيلِ ٱلۡأَحۡلَٰمِ بِعَٰلِمِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">44. They said: "Mixed up false dreams and we are not skilled in the interpretation of dreams."</p>
