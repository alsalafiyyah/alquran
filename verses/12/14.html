<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Yusuf (12:14)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ لَئِنۡ أَكَلَهُ ٱلذِّئۡبُ وَنَحۡنُ عُصۡبَةٌ إِنَّآ إِذٗا لَّخَٰسِرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">14. They said: "If a wolf devours him, while we are a strong group (to guard him), then surely, we are the losers."</p>
</div>
