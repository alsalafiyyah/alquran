<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>12:11</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ يَٰٓأَبَانَا مَا لَكَ لَا تَأۡمَ۬نَّا عَلَىٰ يُوسُفَ وَإِنَّا لَهُۥ لَنَٰصِحُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">11. They said: "O our father! Why do you not trust us with Yûsuf (Joseph) though we are indeed his well-wishers?"</p>
