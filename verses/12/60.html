<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>12:60</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَإِن لَّمۡ تَأۡتُونِي بِهِۦ فَلَا كَيۡلَ لَكُمۡ عِندِي وَلَا تَقۡرَبُونِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">60. "But if you bring him not to me, there shall be no measure (of corn) for you with me, nor shall you come near me."</p>
