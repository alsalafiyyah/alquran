<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>12:35</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ثُمَّ بَدَا لَهُم مِّنۢ بَعۡدِ مَا رَأَوُاْ ٱلۡأٓيَٰتِ لَيَسۡجُنُنَّهُۥ حَتَّىٰ حِينٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">35. Then it occurred to them, after they had seen the proofs (of his innocence), to imprison him for a time.</p>
