<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>12:89</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ هَلۡ عَلِمۡتُم مَّا فَعَلۡتُم بِيُوسُفَ وَأَخِيهِ إِذۡ أَنتُمۡ جَٰهِلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">89. He said: "Do you know what you did with Yûsuf (Joseph) and his brother, when you were ignorant?"</p>
