<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>12:49</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ثُمَّ يَأۡتِي مِنۢ بَعۡدِ ذَٰلِكَ عَامٞ فِيهِ يُغَاثُ ٱلنَّاسُ وَفِيهِ يَعۡصِرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">49. "Then thereafter will come a year in which people will have abundant rain and in which they will press (wine and oil)."</p>
