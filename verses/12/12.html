<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>12:12</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَرۡسِلۡهُ مَعَنَا غَدٗا يَرۡتَعۡ وَيَلۡعَبۡ وَإِنَّا لَهُۥ لَحَٰفِظُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">12. "Send him with us tomorrow to enjoy himself and play, and verily, we will take care of him."</p>
