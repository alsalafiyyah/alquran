<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>12:98</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ سَوۡفَ أَسۡتَغۡفِرُ لَكُمۡ رَبِّيٓۖ إِنَّهُۥ هُوَ ٱلۡغَفُورُ ٱلرَّحِيمُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">98. He said: "I will ask my Lord for forgiveness for you, verily He! Only He is the Oft-Forgiving, the Most Merciful."</p>
</div>
