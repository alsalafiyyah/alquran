<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>12:74</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ فَمَا جَزَٰٓؤُهُۥٓ إِن كُنتُمۡ كَٰذِبِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">74. They [Yûsuf’s (Joseph) men] said: "What then shall be the penalty of him, if you are (proved to be) liars."</p>
