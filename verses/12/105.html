<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>12:105</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَكَأَيِّن مِّنۡ ءَايَةٖ فِي ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِ يَمُرُّونَ عَلَيۡهَا وَهُمۡ عَنۡهَا مُعۡرِضُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">105. And how many a sign in the heavens and the earth they pass by, while they are averse therefrom.</p>
