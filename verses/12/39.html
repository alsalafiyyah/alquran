  <p class="text-emerald-700 font-bold mb-4"><strong>12:39</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يَٰصَٰحِبَيِ ٱلسِّجۡنِ ءَأَرۡبَابٞ مُّتَفَرِّقُونَ خَيۡرٌ أَمِ ٱللَّهُ ٱلۡوَٰحِدُ ٱلۡقَهَّارُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">39. "O two companions of the prison! Are many different lords (gods) better or Allâh, the One, the Irresistible?</p>
