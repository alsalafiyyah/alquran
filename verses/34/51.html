<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>34:51</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَوۡ تَرَىٰٓ إِذۡ فَزِعُواْ فَلَا فَوۡتَ وَأُخِذُواْ مِن مَّكَانٖ قَرِيبٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">51. And if you could but see, when they will be terrified with no escape (for them), and they will be seized from a near place.</p>
