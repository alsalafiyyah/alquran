<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>34:35</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَقَالُواْ نَحۡنُ أَكۡثَرُ أَمۡوَٰلٗا وَأَوۡلَٰدٗا وَمَا نَحۡنُ بِمُعَذَّبِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">35. And they say: "We are more in wealth and in children, and we are not going to be punished."</p>
