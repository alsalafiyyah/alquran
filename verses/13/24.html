  <p class="text-emerald-700 font-bold mb-4"><strong>13:24</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">سَلَٰمٌ عَلَيۡكُم بِمَا صَبَرۡتُمۡۚ فَنِعۡمَ عُقۡبَى ٱلدَّارِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">24. "Salâmun ‘Alaikum (peace be upon you) for you persevered in patience! Excellent indeed is the final home!"</p>
