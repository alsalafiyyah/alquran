<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Qadr (97:4)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">تَنَزَّلُ ٱلۡمَلَٰٓئِكَةُ وَٱلرُّوحُ فِيهَا بِإِذۡنِ رَبِّهِم مِّن كُلِّ أَمۡرٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">4. Therein descend the angels and the Rûh [Jibrîl (Gabrîl)] by Allâh’s Permission with all Decrees,</p>
