<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>52:33</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَمۡ يَقُولُونَ تَقَوَّلَهُۥۚ بَل لَّا يُؤۡمِنُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">33. Or do they say: "He (Muhammad صلى الله عليه وسلم) has forged it (this Qur’ân)?" Nay! They believe not!</p>
