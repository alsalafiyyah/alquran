<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>52:30</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَمۡ يَقُولُونَ شَاعِرٞ نَّتَرَبَّصُ بِهِۦ رَيۡبَ ٱلۡمَنُونِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">30. Or do they say: "(Muhammad صلى الله عليه وسلم) is a poet! We await for him some calamity by time!"</p>
