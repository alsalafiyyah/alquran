<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>52:44</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَإِن يَرَوۡاْ كِسۡفٗا مِّنَ ٱلسَّمَآءِ سَاقِطٗا يَقُولُواْ سَحَابٞ مَّرۡكُومٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">44. And if they were to see a piece of the heaven falling down, they would say: "Clouds gathered in heaps!"</p>
