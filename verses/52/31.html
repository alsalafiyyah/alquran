<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>52:31</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قُلۡ تَرَبَّصُواْ فَإِنِّي مَعَكُم مِّنَ ٱلۡمُتَرَبِّصِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">31. Say (O Muhammad صلى الله عليه وسلم to them): "Wait! I am with you among the waiters!"</p>
