  <p class="text-emerald-700 font-bold mb-4"><strong>52:26</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُوٓاْ إِنَّا كُنَّا قَبۡلُ فِيٓ أَهۡلِنَا مُشۡفِقِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">26. Saying: "Aforetime, we were afraid (of the punishment of Allâh) in the midst of our families.</p>
