<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>At-Tur (52:24)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">۞ وَيَطُوفُ عَلَيۡهِمۡ غِلۡمَانٞ لَّهُمۡ كَأَنَّهُمۡ لُؤۡلُؤٞ مَّكۡنُونٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">24. And there will go round boy-servants of theirs, to serve them as if they were preserved pearls.</p>
