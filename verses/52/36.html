<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>52:36</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَمۡ خَلَقُواْ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضَۚ بَل لَّا يُوقِنُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">36. Or did they create the heavens and the earth? Nay, but they have no firm Belief.</p>
