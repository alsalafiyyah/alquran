<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>52:45</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَذَرۡهُمۡ حَتَّىٰ يُلَٰقُواْ يَوۡمَهُمُ ٱلَّذِي فِيهِ يُصۡعَقُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">45. So leave them alone till they meet their Day, in which they will sink into a fainting (with horror).</p>
