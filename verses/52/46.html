<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>52:46</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يَوۡمَ لَا يُغۡنِي عَنۡهُمۡ كَيۡدُهُمۡ شَيۡـٔٗا وَلَا هُمۡ يُنصَرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">46. The Day when their plotting shall not avail them at all nor will they be helped (i.e. they will receive their torment in Hell).</p>
