<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>24:17</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يَعِظُكُمُ ٱللَّهُ أَن تَعُودُواْ لِمِثۡلِهِۦٓ أَبَدًا إِن كُنتُم مُّؤۡمِنِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">17. Allâh forbids you from it and warns you not to repeat the like of it forever, if you are believers.</p>
