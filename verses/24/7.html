<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>24:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَٱلۡخَٰمِسَةُ أَنَّ لَعۡنَتَ ٱللَّهِ عَلَيۡهِ إِن كَانَ مِنَ ٱلۡكَٰذِبِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">7. And the fifth (testimony should be) the invoking of the Curse of Allâh on him if he be of those who tell a lie (against her).</p>
