<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>24:9</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَٱلۡخَٰمِسَةَ أَنَّ غَضَبَ ٱللَّهِ عَلَيۡهَآ إِن كَانَ مِنَ ٱلصَّٰدِقِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">9. And the fifth (testimony) should be that the Wrath of Allâh be upon her if he (her husband) speaks the truth.</p>
