<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>An-Nur (24:42)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلِلَّهِ مُلۡكُ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِۖ وَإِلَى ٱللَّهِ ٱلۡمَصِيرُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">42. And to Allâh belongs the sovereignty of the heavens and the earth, and to Allâh is the return (of all).</p>
