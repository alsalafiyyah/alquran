  <p class="text-emerald-700 font-bold mb-4"><strong>24:18</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَيُبَيِّنُ ٱللَّهُ لَكُمُ ٱلۡأٓيَٰتِۚ وَٱللَّهُ عَلِيمٌ حَكِيمٌ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">18. And Allâh makes the Ayât (proofs, evidence, verses, lessons, signs, revelations, etc.) plain to you, and Allâh is All-Knowing, All-Wise.</p>
