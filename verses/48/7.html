<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>48:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلِلَّهِ جُنُودُ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِۚ وَكَانَ ٱللَّهُ عَزِيزًا حَكِيمًا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">7. And to Allâh belong the hosts of the heavens and the earth. And Allâh is Ever All-Powerful, All-Wise.</p>
