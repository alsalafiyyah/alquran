<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>75:18</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَإِذَا قَرَأۡنَٰهُ فَٱتَّبِعۡ قُرۡءَانَهُۥ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">18. And when We have recited it to you [O Muhammad صلى الله عليه وسلم through Jibrîl (Gabriel)], then follow its (the Qur’an’s) recital.</p>
