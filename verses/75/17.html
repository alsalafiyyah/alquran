<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Qiyamah (75:17)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ عَلَيۡنَا جَمۡعَهُۥ وَقُرۡءَانَهُۥ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">17. It is for Us to collect it and to give you (O Muhammad صلى الله عليه وسلم) the ability to recite it (the Qur’ân).</p>
