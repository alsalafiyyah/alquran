  <p class="text-emerald-700 font-bold mb-4"><strong>75:13</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يُنَبَّؤُاْ ٱلۡإِنسَٰنُ يَوۡمَئِذِۭ بِمَا قَدَّمَ وَأَخَّرَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">13. On that Day man will be informed of what he sent forward (of his evil good deeds), and what he left behind (of his good or evil traditions).</p>
