<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Qiyamah (75:32)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَٰكِن كَذَّبَ وَتَوَلَّىٰ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">32. But on the contrary, he belied (this Qur’ân and the Message of Muhammad صلى الله عليه وسلم) and turned away!</p>
