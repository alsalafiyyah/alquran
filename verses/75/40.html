<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>75:40</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَلَيۡسَ ذَٰلِكَ بِقَٰدِرٍ عَلَىٰٓ أَن يُحۡـِۧيَ ٱلۡمَوۡتَىٰ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">40. Is not He (Allâh Who does that) Able to give life to the dead? (Yes! He is Able to do all things).</p>
