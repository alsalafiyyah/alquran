<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>71:12</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَيُمۡدِدۡكُم بِأَمۡوَٰلٖ وَبَنِينَ وَيَجۡعَل لَّكُمۡ جَنَّٰتٖ وَيَجۡعَل لَّكُمۡ أَنۡهَٰرٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">12. ‘And give you increase in wealth and children, and bestow on you gardens and bestow on you rivers.’"</p>
