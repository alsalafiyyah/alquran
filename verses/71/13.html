  <p class="text-emerald-700 font-bold mb-4"><strong>Nuh (71:13)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">مَّا لَكُمۡ لَا تَرۡجُونَ لِلَّهِ وَقَارٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">13. What is the matter with you, that [you fear not Allâh (His punishment), and] you hope not for reward (from Allâh or you believe not in His Oneness).</p>
