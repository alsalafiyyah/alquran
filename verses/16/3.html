<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>An-Nahl (16:3)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">خَلَقَ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضَ بِٱلۡحَقِّۚ تَعَٰلَىٰ عَمَّا يُشۡرِكُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">3. He has created the heavens and the earth with truth. High is He, Exalted above all that they associate as partners with Him.</p>
