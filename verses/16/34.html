<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>16:34</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَأَصَابَهُمۡ سَيِّـَٔاتُ مَا عَمِلُواْ وَحَاقَ بِهِم مَّا كَانُواْ بِهِۦ يَسۡتَهۡزِءُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">34. Then, the evil results of their deeds overtook them, and that at which they used to mock at surrounded them.</p>
