<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>An-Nahl (16:98)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَإِذَا قَرَأۡتَ ٱلۡقُرۡءَانَ فَٱسۡتَعِذۡ بِٱللَّهِ مِنَ ٱلشَّيۡطَٰنِ ٱلرَّجِيمِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">98. So when you want to recite the Qur’ân, seek refuge with Allâh from Shaitân (Satan), the outcast (the cursed one).</p>
</div>
