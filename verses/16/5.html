<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>16:5</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَٱلۡأَنۡعَٰمَ خَلَقَهَاۖ لَكُمۡ فِيهَا دِفۡءٞ وَمَنَٰفِعُ وَمِنۡهَا تَأۡكُلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">5. And the cattle, He has created them for you; in them there is warmth (warm clothing), and numerous benefits, and of them you eat.</p>
