<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>16:82</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَإِن تَوَلَّوۡاْ فَإِنَّمَا عَلَيۡكَ ٱلۡبَلَٰغُ ٱلۡمُبِينُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">82. Then, if they turn away, your duty (O Muhammad صلى الله عليه و سلم) is only to convey (the Message) in a clear way.</p>
