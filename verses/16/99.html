<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>16:99</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّهُۥ لَيۡسَ لَهُۥ سُلۡطَٰنٌ عَلَى ٱلَّذِينَ ءَامَنُواْ وَعَلَىٰ رَبِّهِمۡ يَتَوَكَّلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">99. Verily! He has no power over those who believe and put their trust only in their Lord (Allâh).</p>
