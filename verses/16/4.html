<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>16:4</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">خَلَقَ ٱلۡإِنسَٰنَ مِن نُّطۡفَةٖ فَإِذَا هُوَ خَصِيمٞ مُّبِينٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">4. He has created man from Nutfah (mixed drops of male and female sexual discharge), then behold, this same (man) becomes an open opponent.</p>
