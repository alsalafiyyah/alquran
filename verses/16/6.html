  <p class="text-emerald-700 font-bold mb-4"><strong>16:6</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَكُمۡ فِيهَا جَمَالٌ حِينَ تُرِيحُونَ وَحِينَ تَسۡرَحُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">6. And wherein is beauty for you, when you bring them home in the evening, and as you lead them forth to pasture in the morning.</p>
