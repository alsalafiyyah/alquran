<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>16:23</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَا جَرَمَ أَنَّ ٱللَّهَ يَعۡلَمُ مَا يُسِرُّونَ وَمَا يُعۡلِنُونَۚ إِنَّهُۥ لَا يُحِبُّ ٱلۡمُسۡتَكۡبِرِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">23. Certainly, Allâh knows what they conceal and what they reveal. Truly, He likes not the proud.</p>
