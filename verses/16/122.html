<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>An-Nahl (16:122)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَءَاتَيۡنَٰهُ فِي ٱلدُّنۡيَا حَسَنَةٗۖ وَإِنَّهُۥ فِي ٱلۡأٓخِرَةِ لَمِنَ ٱلصَّٰلِحِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">122. And We gave him good in this world, and in the Hereafter he shall be of the righteous.</p>
