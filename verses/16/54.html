<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>16:54</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ثُمَّ إِذَا كَشَفَ ٱلضُّرَّ عَنكُمۡ إِذَا فَرِيقٞ مِّنكُم بِرَبِّهِمۡ يُشۡرِكُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">54. Then, when He has removed the harm from you, behold! some of you associate others in worship with their Lord (Allâh).</p>
