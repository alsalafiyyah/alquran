  <p class="text-emerald-700 font-bold mb-4"><strong>37:131</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّا كَذَٰلِكَ نَجۡزِي ٱلۡمُحۡسِنِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">131. Verily, thus do We reward the Muhsinûn (good-doers, who perform good deeds totally for Allâh’s sake only - See V.2:112).</p>
