  <p class="text-emerald-700 font-bold mb-4"><strong>37:30</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَا كَانَ لَنَا عَلَيۡكُم مِّن سُلۡطَٰنِۭۖ بَلۡ كُنتُمۡ قَوۡمٗا طَٰغِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">30. "And we had no authority over you. Nay! But you were Tâghûn (transgressing) people (polytheists, and disbelievers).</p>
