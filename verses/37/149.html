<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>37:149</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَٱسۡتَفۡتِهِمۡ أَلِرَبِّكَ ٱلۡبَنَاتُ وَلَهُمُ ٱلۡبَنُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">149. Now ask them (O Muhammad صلى الله عليه وسلم): "Are there (only) daughters for your Lord and sons for them?"</p>
