  <p class="text-emerald-700 font-bold mb-4"><strong>37:39</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَا تُجۡزَوۡنَ إِلَّا مَا كُنتُمۡ تَعۡمَلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">39. And you will be requited nothing except for what you used to do (evil deeds, sins, and Allâh’s disobedience which you used to do in this world)</p>
