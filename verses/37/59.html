  <p class="text-emerald-700 font-bold mb-4"><strong>As-Saffat (37:59)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِلَّا مَوۡتَتَنَا ٱلۡأُولَىٰ وَمَا نَحۡنُ بِمُعَذَّبِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">59. Except our first death, and we shall not be punished? (after we have entered Paradise)."</p>
