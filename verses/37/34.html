<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>As-Saffat (37:34)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّا كَذَٰلِكَ نَفۡعَلُ بِٱلۡمُجۡرِمِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">34. Certainly, that is how We deal with Al-Mujrimûn (polytheists, sinners, disbelievers, criminals, the disobedient to Allâh).</p>
