<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>37:97</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ ٱبۡنُواْ لَهُۥ بُنۡيَٰنٗا فَأَلۡقُوهُ فِي ٱلۡجَحِيمِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">97. They said: "Build for him a building (it is said that the building was like a furnace) and throw him into the blazing fire!"</p>
