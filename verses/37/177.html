<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>As-Saffat (37:177)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَإِذَا نَزَلَ بِسَاحَتِهِمۡ فَسَآءَ صَبَاحُ ٱلۡمُنذَرِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">177. Then, when it descends in their courtyard (i.e. near to them), evil will be the morning for those who had been warned!</p>
