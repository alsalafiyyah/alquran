<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>37:19</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَإِنَّمَا هِيَ زَجۡرَةٞ وَٰحِدَةٞ فَإِذَا هُمۡ يَنظُرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">19. It will be a single Zajrah [shout (i.e. the second blowing of the Trumpet)], and behold, they will be staring!</p>
