<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>37:12</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">بَلۡ عَجِبۡتَ وَيَسۡخَرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">12. Nay, you (O Muhammad صلى الله عليه وسلم) wondered (at their insolence) while they mock (at you and at the Qur’ân).</p>
