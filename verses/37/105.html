<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>37:105</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَدۡ صَدَّقۡتَ ٱلرُّءۡيَآۚ إِنَّا كَذَٰلِكَ نَجۡزِي ٱلۡمُحۡسِنِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">105. You have fulfilled the dream!" Verily thus do We reward the Muhsinûn (good-doers - See 2:112).</p>
