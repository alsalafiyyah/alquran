  <p class="text-emerald-700 font-bold mb-4"><strong>As-Saffat (37:91)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَرَاغَ إِلَىٰٓ ءَالِهَتِهِمۡ فَقَالَ أَلَا تَأۡكُلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">91. Then he turned to their âlihah (gods) and said: "Will you not eat (of the offering before you)?</p>
