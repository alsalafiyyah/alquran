<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>37:47</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَا فِيهَا غَوۡلٞ وَلَا هُمۡ عَنۡهَا يُنزَفُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">47. Neither will they have Ghoul (any kind of hurt, abdominal pain, headache, a sin) from that, nor will they suffer intoxication therefrom.</p>
