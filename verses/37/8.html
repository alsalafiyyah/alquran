<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>As-Saffat (37:8)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَّا يَسَّمَّعُونَ إِلَى ٱلۡمَلَإِ ٱلۡأَعۡلَىٰ وَيُقۡذَفُونَ مِن كُلِّ جَانِبٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">8. They cannot listen to the higher group (angels) for they are pelted from every side.</p>
