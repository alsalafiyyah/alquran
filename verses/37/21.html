  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">هَٰذَا يَوۡمُ ٱلۡفَصۡلِ ٱلَّذِي كُنتُم بِهِۦ تُكَذِّبُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">21. (It will be said): "This is the Day of Judgement which you used to deny."</p>
