<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>37:36</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَيَقُولُونَ أَئِنَّا لَتَارِكُوٓاْ ءَالِهَتِنَا لِشَاعِرٖ مَّجۡنُونِۭ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">36. And (they) said: "Are we going to abandon our âlihah (gods) for the sake of a mad poet?"</p>
