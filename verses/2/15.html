  <p class="text-emerald-700 font-bold mb-4"><strong>2:15</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱللَّهُ يَسۡتَهۡزِئُ بِهِمۡ وَيَمُدُّهُمۡ فِي طُغۡيَٰنِهِمۡ يَعۡمَهُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">15. Allâh mocks at them and gives them increase in their wrong-doing to wander blindly.</p>
