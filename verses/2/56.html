<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Baqarah (2:56)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ثُمَّ بَعَثۡنَٰكُم مِّنۢ بَعۡدِ مَوۡتِكُمۡ لَعَلَّكُمۡ تَشۡكُرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">56. Then We raised you up after your death, so that you might be grateful.</p>
