<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>2:202</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أُوْلَٰٓئِكَ لَهُمۡ نَصِيبٞ مِّمَّا كَسَبُواْۚ وَٱللَّهُ سَرِيعُ ٱلۡحِسَابِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">202. For them there will be allotted a share for what they have earned. And Allâh is Swift at reckoning.</p>
