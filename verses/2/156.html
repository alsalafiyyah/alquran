<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>2:156</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱلَّذِينَ إِذَآ أَصَٰبَتۡهُم مُّصِيبَةٞ قَالُوٓاْ إِنَّا لِلَّهِ وَإِنَّآ إِلَيۡهِ رَٰجِعُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">156. Who, when afflicted with calamity, say: "Truly! To Allâh we belong and truly, to Him we shall return."</p>
