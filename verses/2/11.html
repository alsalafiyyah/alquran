<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>2:11</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَإِذَا قِيلَ لَهُمۡ لَا تُفۡسِدُواْ فِي ٱلۡأَرۡضِ قَالُوٓاْ إِنَّمَا نَحۡنُ مُصۡلِحُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">11. And when it is said to them: "Make not mischief on the earth," they say: "We are only peace-makers."</p>
