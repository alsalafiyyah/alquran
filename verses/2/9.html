<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>2:9</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يُخَٰدِعُونَ ٱللَّهَ وَٱلَّذِينَ ءَامَنُواْ وَمَا يَخۡدَعُونَ إِلَّآ أَنفُسَهُمۡ وَمَا يَشۡعُرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">9. They (think to) deceive Allâh and those who believe, while they only deceive themselves, and perceive (it) not!</p>
