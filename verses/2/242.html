<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Baqarah (2:242)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">كَذَٰلِكَ يُبَيِّنُ ٱللَّهُ لَكُمۡ ءَايَٰتِهِۦ لَعَلَّكُمۡ تَعۡقِلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">242. Thus Allâh makes clear His Ayât (Laws) to you, in order that you may understand.</p>
