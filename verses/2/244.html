<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>2:244</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَقَٰتِلُواْ فِي سَبِيلِ ٱللَّهِ وَٱعۡلَمُوٓاْ أَنَّ ٱللَّهَ سَمِيعٌ عَلِيمٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">244. And fight in the Way of Allâh and know that Allâh is All-Hearer, All-Knower.</p>
