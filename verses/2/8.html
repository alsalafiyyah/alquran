<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>2:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمِنَ ٱلنَّاسِ مَن يَقُولُ ءَامَنَّا بِٱللَّهِ وَبِٱلۡيَوۡمِ ٱلۡأٓخِرِ وَمَا هُم بِمُؤۡمِنِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">8. And of mankind, there are some (hypocrites) who say: "We believe in Allâh and the Last Day" while in fact they believe not.</p>
</div>
