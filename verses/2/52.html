  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Baqarah (2:52)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ثُمَّ عَفَوۡنَا عَنكُم مِّنۢ بَعۡدِ ذَٰلِكَ لَعَلَّكُمۡ تَشۡكُرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">52. Then after that We forgave you so that you might be grateful.</p>
