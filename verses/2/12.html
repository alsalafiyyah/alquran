  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Baqarah (2:12)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَلَآ إِنَّهُمۡ هُمُ ٱلۡمُفۡسِدُونَ وَلَٰكِن لَّا يَشۡعُرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">12. Verily! They are the ones who make mischief, but they perceive not.</p>
