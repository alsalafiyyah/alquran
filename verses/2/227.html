  <p class="text-emerald-700 font-bold mb-4"><strong>2:227</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَإِنۡ عَزَمُواْ ٱلطَّلَٰقَ فَإِنَّ ٱللَّهَ سَمِيعٌ عَلِيمٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">227. And if they decide upon divorce, then Allâh is All-Hearer, All-Knower.</p>
