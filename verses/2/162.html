<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>2:162</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">خَٰلِدِينَ فِيهَا لَا يُخَفَّفُ عَنۡهُمُ ٱلۡعَذَابُ وَلَا هُمۡ يُنظَرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">162. They will abide therein (under the curse in Hell), their punishment will neither be lightened, nor will they be reprieved.</p>
