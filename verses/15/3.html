<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Hijr (15:3)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ذَرۡهُمۡ يَأۡكُلُواْ وَيَتَمَتَّعُواْ وَيُلۡهِهِمُ ٱلۡأَمَلُۖ فَسَوۡفَ يَعۡلَمُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">3. Leave them to eat and enjoy, and let them be preoccupied with (false) hope. They will come to know!</p>
