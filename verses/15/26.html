<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>15:26</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَقَدۡ خَلَقۡنَا ٱلۡإِنسَٰنَ مِن صَلۡصَٰلٖ مِّنۡ حَمَإٖ مَّسۡنُونٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">26. And indeed, We created man from dried (sounding) clay of altered mud.</p>
