  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Hijr (15:4)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَآ أَهۡلَكۡنَا مِن قَرۡيَةٍ إِلَّا وَلَهَا كِتَابٞ مَّعۡلُومٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">4. And never did We destroy a township but there was a known decree for it.</p>
