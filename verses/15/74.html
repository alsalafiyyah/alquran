<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>15:74</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَجَعَلۡنَا عَٰلِيَهَا سَافِلَهَا وَأَمۡطَرۡنَا عَلَيۡهِمۡ حِجَارَةٗ مِّن سِجِّيلٍ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">74. And We turned (the towns of Sodom in Palestine) upside down and rained down on them stones of baked clay.</p>
