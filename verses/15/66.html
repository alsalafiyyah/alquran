<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>15:66</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَقَضَيۡنَآ إِلَيۡهِ ذَٰلِكَ ٱلۡأَمۡرَ أَنَّ دَابِرَ هَٰٓؤُلَآءِ مَقۡطُوعٞ مُّصۡبِحِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">66. And We made known this decree to him, that the root of those (sinners) was to be cut off in the early morning.</p>
</div>
