<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>15:70</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُوٓاْ أَوَلَمۡ نَنۡهَكَ عَنِ ٱلۡعَٰلَمِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">70. They (people of the city) said: "Did we not forbid you from entertaining (or protecting) any of the ‘Âlamîn (people, foreigners and strangers from us)?"</p>
