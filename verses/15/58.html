<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Hijr (15:58)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُوٓاْ إِنَّآ أُرۡسِلۡنَآ إِلَىٰ قَوۡمٖ مُّجۡرِمِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">58. They (the angels) said: "We have been sent to a people who are Mujrimûn (criminals, disbelievers, polytheists, sinners).</p>
