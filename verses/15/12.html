<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>15:12</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">كَذَٰلِكَ نَسۡلُكُهُۥ فِي قُلُوبِ ٱلۡمُجۡرِمِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">12. Thus do We let it (polytheism and disbelief) enter the hearts of the Mujrimûn [criminals, polytheists and pagans (because of their mocking at the Messengers)].</p>
