  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Hijr (15:63)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ بَلۡ جِئۡنَٰكَ بِمَا كَانُواْ فِيهِ يَمۡتَرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">63. They said: "Nay, we have come to you with that (torment) which they have been doubting.</p>
