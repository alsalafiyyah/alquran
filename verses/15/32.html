  <p class="text-emerald-700 font-bold mb-4"><strong>15:32</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ يَٰٓإِبۡلِيسُ مَا لَكَ أَلَّا تَكُونَ مَعَ ٱلسَّٰجِدِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">32. (Allâh) said: "O Iblîs (Satan)! What is your reason for not being among the prostrators?"</p>
