<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Hijr (15:10)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَقَدۡ أَرۡسَلۡنَا مِن قَبۡلِكَ فِي شِيَعِ ٱلۡأَوَّلِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">10. Indeed, We sent (Messengers) before you (O Muhammad صلى الله عليه و سلم) amongst the sects (communities) of old.</p>
