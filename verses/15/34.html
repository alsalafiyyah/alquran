<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>15:34</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ فَٱخۡرُجۡ مِنۡهَا فَإِنَّكَ رَجِيمٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">34. (Allâh) said: "Then, get out from here, for verily, you are Rajîm (an outcast or a cursed one)." [Tafsîr At-Tabarî]</p>
