<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Hijr (15:49)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">۞ نَبِّئۡ عِبَادِيٓ أَنِّيٓ أَنَا ٱلۡغَفُورُ ٱلرَّحِيمُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">49. Declare (O Muhammad صلى الله عليه و سلم) unto My slaves, that truly, I am the Oft-Forgiving, the Most-Merciful.</p>
