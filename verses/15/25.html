  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَإِنَّ رَبَّكَ هُوَ يَحۡشُرُهُمۡۚ إِنَّهُۥ حَكِيمٌ عَلِيمٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">25. And verily, your Lord will gather them together. Truly, He is All-Wise, All-Knowing.</p>
