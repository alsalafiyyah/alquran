<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Hijr (15:71)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ هَٰٓؤُلَآءِ بَنَاتِيٓ إِن كُنتُمۡ فَٰعِلِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">71. [Lût (Lot)] said: "These (the girls of the nation) are my daughters (to marry lawfully), if you must act (so)."</p>
