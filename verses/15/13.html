<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>15:13</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَا يُؤۡمِنُونَ بِهِۦ وَقَدۡ خَلَتۡ سُنَّةُ ٱلۡأَوَّلِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">13. They would not believe in it (the Qur’ân); and already the example of (Allâh’s punishment of) the ancients (who disbelieved) has gone forth.</p>
