<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>15:56</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ وَمَن يَقۡنَطُ مِن رَّحۡمَةِ رَبِّهِۦٓ إِلَّا ٱلضَّآلُّونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">56. [Ibrâhîm (Abraham)] said: "And who despairs of the Mercy of his Lord except those who are astray?"</p>
