<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>15:53</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ لَا تَوۡجَلۡ إِنَّا نُبَشِّرُكَ بِغُلَٰمٍ عَلِيمٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">53. They (the angels) said: "Do not be afraid! We give you glad tidings of a boy (son) possessing much knowledge and wisdom."</p>
