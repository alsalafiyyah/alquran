  <p class="text-emerald-700 font-bold mb-4"><strong>15:55</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ بَشَّرۡنَٰكَ بِٱلۡحَقِّ فَلَا تَكُن مِّنَ ٱلۡقَٰنِطِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">55. They (the angels) said: "We give you glad tidings in truth. So be not of the despairing."</p>
