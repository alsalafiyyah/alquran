  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَقَدۡ جَعَلۡنَا فِي ٱلسَّمَآءِ بُرُوجٗا وَزَيَّنَّٰهَا لِلنَّٰظِرِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">16. And indeed, We have put the big stars in the heaven and We beautified it for the beholders.[3]</p>
