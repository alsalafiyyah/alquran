<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>15:72</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَعَمۡرُكَ إِنَّهُمۡ لَفِي سَكۡرَتِهِمۡ يَعۡمَهُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">72. Verily, by your life (O Muhammad صلى الله عليه و سلم), in their wild intoxication, they were wandering blindly.</p>
