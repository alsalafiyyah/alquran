<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Hijr (15:60)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِلَّا ٱمۡرَأَتَهُۥ قَدَّرۡنَآ إِنَّهَا لَمِنَ ٱلۡغَٰبِرِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">60. "Except his wife, of whom We have decreed that she shall be of those who remain behind (i.e. she will be destroyed)."</p>
