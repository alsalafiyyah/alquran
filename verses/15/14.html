<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>15:14</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَوۡ فَتَحۡنَا عَلَيۡهِم بَابٗا مِّنَ ٱلسَّمَآءِ فَظَلُّواْ فِيهِ يَعۡرُجُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">14. And even if We opened to them a gate from the heaven and they were to keep on ascending thereto (all the day long)</p>
