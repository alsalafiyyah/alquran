<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>35:23</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنۡ أَنتَ إِلَّا نَذِيرٌ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">23. You (O Muhammad صلى الله عليه وسلم) are only a warner (i.e. your duty is to convey Allâh’s Message to mankind but the guidance is Allâh’s).</p>
