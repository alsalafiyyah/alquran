  <p class="text-emerald-700 font-bold mb-4"><strong>Fatir (35:26)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ثُمَّ أَخَذۡتُ ٱلَّذِينَ كَفَرُواْۖ فَكَيۡفَ كَانَ نَكِيرِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">26. Then I took hold of those who disbelieved: and how terrible was My denial (punishment)!</p>
