<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>36:49</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">مَا يَنظُرُونَ إِلَّا صَيۡحَةٗ وَٰحِدَةٗ تَأۡخُذُهُمۡ وَهُمۡ يَخِصِّمُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">49. They await only but a single Saihah (shout), which will seize them while they are disputing!</p>
