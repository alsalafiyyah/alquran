<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>36:68</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَن نُّعَمِّرۡهُ نُنَكِّسۡهُ فِي ٱلۡخَلۡقِۚ أَفَلَا يَعۡقِلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">68. And he whom We grant long life - We reverse him in creation (weakness after strength). Will they not then understand?</p>
