<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>36:75</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَا يَسۡتَطِيعُونَ نَصۡرَهُمۡ وَهُمۡ لَهُمۡ جُندٞ مُّحۡضَرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">75. They cannot help them, but they will be brought forward as a troop against those who worshipped them (at the time of Reckoning).</p>
