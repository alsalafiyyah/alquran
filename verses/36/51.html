<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>36:51</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَنُفِخَ فِي ٱلصُّورِ فَإِذَا هُم مِّنَ ٱلۡأَجۡدَاثِ إِلَىٰ رَبِّهِمۡ يَنسِلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">51. And the Trumpet will be blown (i.e. the second blowing) and behold from the graves they will come out quickly to their Lord.</p>
