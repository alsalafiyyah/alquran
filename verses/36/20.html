  <p class="text-emerald-700 font-bold mb-4"><strong>36:20</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَجَآءَ مِنۡ أَقۡصَا ٱلۡمَدِينَةِ رَجُلٞ يَسۡعَىٰ قَالَ يَٰقَوۡمِ ٱتَّبِعُواْ ٱلۡمُرۡسَلِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">20. And there came a man running from the farthest part of the town. He said: "O my people! Obey the Messengers.</p>
