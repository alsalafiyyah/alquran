<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>36:41</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَءَايَةٞ لَّهُمۡ أَنَّا حَمَلۡنَا ذُرِّيَّتَهُمۡ فِي ٱلۡفُلۡكِ ٱلۡمَشۡحُونِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">41. And an Ayâh (sign) for them is that We bore their offspring in the laden ship [of Nûh (Noah)].</p>
