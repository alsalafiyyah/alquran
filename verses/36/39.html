<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>36:39</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَٱلۡقَمَرَ قَدَّرۡنَٰهُ مَنَازِلَ حَتَّىٰ عَادَ كَٱلۡعُرۡجُونِ ٱلۡقَدِيمِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">39. And the moon, We have measured for it mansions (to traverse) till it returns like the old dried curved date stalk.</p>
