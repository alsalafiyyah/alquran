<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Ya-Sin (36:10)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَسَوَآءٌ عَلَيۡهِمۡ ءَأَنذَرۡتَهُمۡ أَمۡ لَمۡ تُنذِرۡهُمۡ لَا يُؤۡمِنُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">10. It is the same to them whether you warn them or you warn them not, they will not believe.</p>
