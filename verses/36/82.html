<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>36:82</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّمَآ أَمۡرُهُۥٓ إِذَآ أَرَادَ شَيۡـًٔا أَن يَقُولَ لَهُۥ كُن فَيَكُونُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">82. Verily, His Command, when He intends a thing, is only that He says to it, "Be!" - and it is!</p>
