<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>36:50</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَلَا يَسۡتَطِيعُونَ تَوۡصِيَةٗ وَلَآ إِلَىٰٓ أَهۡلِهِمۡ يَرۡجِعُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">50. Then they will not be able to make bequest, nor they will return to their family.</p>
