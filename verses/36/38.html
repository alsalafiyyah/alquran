<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>36:38</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَٱلشَّمۡسُ تَجۡرِي لِمُسۡتَقَرّٖ لَّهَاۚ ذَٰلِكَ تَقۡدِيرُ ٱلۡعَزِيزِ ٱلۡعَلِيمِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">38. And the sun runs on its fixed course for a term (appointed). That is the Decree of the All-Mighty, the All-Knowing.</p>
