<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>36:35</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لِيَأۡكُلُواْ مِن ثَمَرِهِۦ وَمَا عَمِلَتۡهُ أَيۡدِيهِمۡۚ أَفَلَا يَشۡكُرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">35. So that they may eat of the fruit thereof - and their hands made it not. Will they not, then, give thanks?</p>
