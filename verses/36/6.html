<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>36:6</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لِتُنذِرَ قَوۡمٗا مَّآ أُنذِرَ ءَابَآؤُهُمۡ فَهُمۡ غَٰفِلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">6. In order that you may warn a people whose forefathers were not warned, so they are heedless.</p>
