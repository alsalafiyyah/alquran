  <p class="text-emerald-700 font-bold mb-4"><strong>Ya-Sin (36:72)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَذَلَّلۡنَٰهَا لَهُمۡ فَمِنۡهَا رَكُوبُهُمۡ وَمِنۡهَا يَأۡكُلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">72. And We have subdued them unto them so that some of them they have for riding and some they eat.</p>
