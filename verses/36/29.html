  <p class="text-emerald-700 font-bold mb-4"><strong>36:29</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِن كَانَتۡ إِلَّا صَيۡحَةٗ وَٰحِدَةٗ فَإِذَا هُمۡ خَٰمِدُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">29. It was but one Saihah (shout) and lo! they (all) were still (silent,dead,destroyed).</p>
