<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>36:80</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱلَّذِي جَعَلَ لَكُم مِّنَ ٱلشَّجَرِ ٱلۡأَخۡضَرِ نَارٗا فَإِذَآ أَنتُم مِّنۡهُ تُوقِدُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">80. He Who produces for you fire out of the green tree, when behold you kindle therewith.</p>
