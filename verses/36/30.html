<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Ya-Sin (36:30)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يَٰحَسۡرَةً عَلَى ٱلۡعِبَادِۚ مَا يَأۡتِيهِم مِّن رَّسُولٍ إِلَّا كَانُواْ بِهِۦ يَسۡتَهۡزِءُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">30. Alas for mankind! There never came a Messenger to them but they used to mock at him.</p>
