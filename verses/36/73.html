<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>36:73</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَهُمۡ فِيهَا مَنَٰفِعُ وَمَشَارِبُۚ أَفَلَا يَشۡكُرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">73. And they have (other) benefits from them, and they get (milk) to drink. Will they not then be grateful?</p>
