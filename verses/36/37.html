<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>36:37</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَءَايَةٞ لَّهُمُ ٱلَّيۡلُ نَسۡلَخُ مِنۡهُ ٱلنَّهَارَ فَإِذَا هُم مُّظۡلِمُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">37. And a sign for them is the night. We withdraw therefrom the day, and behold, they are in darkness.</p>
