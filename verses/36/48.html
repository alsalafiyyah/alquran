<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>36:48</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَيَقُولُونَ مَتَىٰ هَٰذَا ٱلۡوَعۡدُ إِن كُنتُمۡ صَٰدِقِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">48. And they say: "When will this promise (i.e. Resurrection) be fulfilled, if you are truthful?"</p>
