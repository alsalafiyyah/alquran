<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>36:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَقَدۡ حَقَّ ٱلۡقَوۡلُ عَلَىٰٓ أَكۡثَرِهِمۡ فَهُمۡ لَا يُؤۡمِنُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">7. Indeed the Word (of punishment) has proved true against most of them, so they will not believe.</p>
