<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>36:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّا جَعَلۡنَا فِيٓ أَعۡنَٰقِهِمۡ أَغۡلَٰلٗا فَهِيَ إِلَى ٱلۡأَذۡقَانِ فَهُم مُّقۡمَحُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">8. Verily We have put on their necks iron collars reaching to the chins, so that their heads are raised up.</p>
