<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>36:53</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِن كَانَتۡ إِلَّا صَيۡحَةٗ وَٰحِدَةٗ فَإِذَا هُمۡ جَمِيعٞ لَّدَيۡنَا مُحۡضَرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">53. It will be but a single Saihah (shout), so behold they will all be brought up before Us!</p>
