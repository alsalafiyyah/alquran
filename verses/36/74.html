  <p class="text-emerald-700 font-bold mb-4"><strong>36:74</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَٱتَّخَذُواْ مِن دُونِ ٱللَّهِ ءَالِهَةٗ لَّعَلَّهُمۡ يُنصَرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">74. And they have taken besides Allâh âlihah (gods), hoping that they might be helped (by those so-called gods).</p>
