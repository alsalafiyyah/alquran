<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>53:27</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ ٱلَّذِينَ لَا يُؤۡمِنُونَ بِٱلۡأٓخِرَةِ لَيُسَمُّونَ ٱلۡمَلَٰٓئِكَةَ تَسۡمِيَةَ ٱلۡأُنثَىٰ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">27. Verily, those who believe not in the Hereafter, name the angels with female names.</p>
