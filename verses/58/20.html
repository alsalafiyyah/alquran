<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>58:20</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ ٱلَّذِينَ يُحَآدُّونَ ٱللَّهَ وَرَسُولَهُۥٓ أُوْلَٰٓئِكَ فِي ٱلۡأَذَلِّينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">20. Those who oppose Allâh and His Messenger (Muhammad صلى الله عليه وسلم) they will be among the lowest (most humiliated).</p>
