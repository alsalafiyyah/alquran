<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>58:15</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَعَدَّ ٱللَّهُ لَهُمۡ عَذَابٗا شَدِيدًاۖ إِنَّهُمۡ سَآءَ مَا كَانُواْ يَعۡمَلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">15. Allâh has prepared for them a severe torment. Evil indeed is that which they used to do.</p>
