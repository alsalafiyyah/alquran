<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>51:42</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">مَا تَذَرُ مِن شَيۡءٍ أَتَتۡ عَلَيۡهِ إِلَّا جَعَلَتۡهُ كَٱلرَّمِيمِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">42. It spared nothing that it reached, but blew it into broken spreads of rotten ruins.</p>
