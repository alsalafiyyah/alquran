<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>51:26</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَرَاغَ إِلَىٰٓ أَهۡلِهِۦ فَجَآءَ بِعِجۡلٖ سَمِينٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">26. Then he turned to his household, and brought out a roasted calf [as the property of Ibrâhîm (Abraham) was mainly cows].</p>
