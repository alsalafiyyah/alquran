<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Adh-Dhariyat (51:52)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">كَذَٰلِكَ مَآ أَتَى ٱلَّذِينَ مِن قَبۡلِهِم مِّن رَّسُولٍ إِلَّا قَالُواْ سَاحِرٌ أَوۡ مَجۡنُونٌ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">52. Likewise, no Messenger came to those before them but they said: "A sorcerer or a madman!"</p>
