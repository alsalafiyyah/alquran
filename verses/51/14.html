  <p class="text-emerald-700 font-bold mb-4"><strong>51:14</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ذُوقُواْ فِتۡنَتَكُمۡ هَٰذَا ٱلَّذِي كُنتُم بِهِۦ تَسۡتَعۡجِلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">14. "Taste you your trial (punishment i.e. burning)! This is what you used to ask to be hastened!"</p>
