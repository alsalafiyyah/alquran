<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>51:36</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَمَا وَجَدۡنَا فِيهَا غَيۡرَ بَيۡتٖ مِّنَ ٱلۡمُسۡلِمِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">36. But We found not there any household of the Muslims except one [of Lût (Lot) and his two daughters].</p>
