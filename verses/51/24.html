<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Adh-Dhariyat (51:24)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">هَلۡ أَتَىٰكَ حَدِيثُ ضَيۡفِ إِبۡرَٰهِيمَ ٱلۡمُكۡرَمِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">24. Has the story reached you, of the honoured guests [three angels; Jibrîl (Gabriel) along with another two] of Ibrâhîm (Abraham)?</p>
