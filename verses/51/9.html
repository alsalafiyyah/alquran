<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>51:9</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يُؤۡفَكُ عَنۡهُ مَنۡ أُفِكَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">9. Turned aside therefrom (i.e. from Muhammad صلى الله عليه وسلم and the Qur’ân) is he who is turned aside (by the Decree and Preordainment القضاء والقدر of Allâh).</p>
