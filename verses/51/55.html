<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>51:55</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَذَكِّرۡ فَإِنَّ ٱلذِّكۡرَىٰ تَنفَعُ ٱلۡمُؤۡمِنِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">55. And remind (by preaching the Qur’ân, O Muhammad صلى الله عليه وسلم), for verily, the reminding profits the believers.</p>
