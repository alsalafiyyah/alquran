<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>51:39</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَتَوَلَّىٰ بِرُكۡنِهِۦ وَقَالَ سَٰحِرٌ أَوۡ مَجۡنُونٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">39. But [Fir‘aun (Pharaoh)] turned away (from Belief in might) along with his hosts, and said: "A sorcerer, or a madman."</p>
