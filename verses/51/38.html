<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>51:38</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَفِي مُوسَىٰٓ إِذۡ أَرۡسَلۡنَٰهُ إِلَىٰ فِرۡعَوۡنَ بِسُلۡطَٰنٖ مُّبِينٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">38. And in Mûsâ (Moses) (too, there is a sign), when We sent him to Fir‘aun (Pharaoh) with a manifest authority.</p>
