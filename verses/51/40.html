<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>51:40</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَأَخَذۡنَٰهُ وَجُنُودَهُۥ فَنَبَذۡنَٰهُمۡ فِي ٱلۡيَمِّ وَهُوَ مُلِيمٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">40. So We took him and his hosts, and dumped them into the sea, for he was blameworthy.</p>
