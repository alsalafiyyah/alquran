<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>51:46</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَقَوۡمَ نُوحٖ مِّن قَبۡلُۖ إِنَّهُمۡ كَانُواْ قَوۡمٗا فَٰسِقِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">46. (So were) the people of Nûh (Noah) before them. Verily, they were a people who were Fâsiqûn (rebellious, disobedient to Allâh).</p>
