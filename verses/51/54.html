<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>51:54</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَتَوَلَّ عَنۡهُمۡ فَمَآ أَنتَ بِمَلُومٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">54. So turn away (O Muhammad صلى الله عليه وسلم) from them (Quraish pagans), you are not blame-worthy (as you have conveyed Allâh’s Message).</p>
