  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَٱلسَّمَآءَ بَنَيۡنَٰهَا بِأَيۡيْدٖ وَإِنَّا لَمُوسِعُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">47. With power did We construct the heaven. Verily, We are Able to extend the vastness of space thereof.</p>
