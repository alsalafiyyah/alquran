<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>'Abasa (80:42)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أُوْلَٰٓئِكَ هُمُ ٱلۡكَفَرَةُ ٱلۡفَجَرَةُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">42. Such will be the Kafarah (disbelievers in Allâh, in His Oneness, and in His Messenger Muhammad صلى الله عليه وسلم, etc.), the Fajarah (wicked evil doers).</p>
