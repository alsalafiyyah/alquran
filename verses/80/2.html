<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>80:2</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَن جَآءَهُ ٱلۡأَعۡمَىٰ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">2. Because there came to him the blind man (i.e. ‘Abdullâh bin Umm-Maktûm, who came to the Prophet صلى الله عليه وسلم while he was preaching to one or some of the Quraish chiefs).</p>
