  <p class="text-emerald-700 font-bold mb-4"><strong>'Abasa (80:7)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَا عَلَيۡكَ أَلَّا يَزَّكَّىٰ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">7. What does it matter to you if he will not become pure (from disbelief: you are only a Messenger, your duty is to convey the Message of Allâh).</p>
