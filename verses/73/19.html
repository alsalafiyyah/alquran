<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>73:19</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ هَٰذِهِۦ تَذۡكِرَةٞۖ فَمَن شَآءَ ٱتَّخَذَ إِلَىٰ رَبِّهِۦ سَبِيلًا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">19. Verily, this is an admonition: therefore whosoever will, let him take a Path to His Lord!</p>
