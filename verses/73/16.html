<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>73:16</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَعَصَىٰ فِرۡعَوۡنُ ٱلرَّسُولَ فَأَخَذۡنَٰهُ أَخۡذٗا وَبِيلٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">16. But Fir‘aun (Pharaoh) disobeyed the Messenger [Mûsâ (Moses)]; so We seized him with a severe punishment.</p>
