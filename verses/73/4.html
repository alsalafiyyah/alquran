<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Muzzammil (73:4)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَوۡ زِدۡ عَلَيۡهِ وَرَتِّلِ ٱلۡقُرۡءَانَ تَرۡتِيلًا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">4. Or a little more. And recite the Qur’ân (aloud) in a slow, (pleasant tone and) style.[1]</p>
  <div class="mt-6 bg-slate-50 border-l-4 border-slate-300 p-4 text-xs text-slate-500 rounded-r-md leading-relaxed"><small>[1] (V.73:4) See the footnote of (V.29:51).</small></div>
