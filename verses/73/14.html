<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>73:14</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يَوۡمَ تَرۡجُفُ ٱلۡأَرۡضُ وَٱلۡجِبَالُ وَكَانَتِ ٱلۡجِبَالُ كَثِيبٗا مَّهِيلًا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">14. On the Day when the earth and the mountains will be in violent shake, and the mountains will be a heap of sand poured out.</p>
