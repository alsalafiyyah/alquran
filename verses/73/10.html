<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>73:10</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَٱصۡبِرۡ عَلَىٰ مَا يَقُولُونَ وَٱهۡجُرۡهُمۡ هَجۡرٗا جَمِيلٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">10. And be patient (O Muhammad صلى الله عليه وسلم) with what they say, and keep away from them in a good way.</p>
