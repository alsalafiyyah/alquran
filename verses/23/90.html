<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>23:90</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">بَلۡ أَتَيۡنَٰهُم بِٱلۡحَقِّ وَإِنَّهُمۡ لَكَٰذِبُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">90. Nay, but We have brought them the truth (Islâmic Monotheism), and verily, they (disbelievers) are liars.</p>
