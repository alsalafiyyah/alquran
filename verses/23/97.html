<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>23:97</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَقُل رَّبِّ أَعُوذُ بِكَ مِنۡ هَمَزَٰتِ ٱلشَّيَٰطِينِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">97. And say: "My Lord! I seek refuge with You from the whisperings (suggestions) of the Shayâtîn (devils).</p>
