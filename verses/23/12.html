  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَقَدۡ خَلَقۡنَا ٱلۡإِنسَٰنَ مِن سُلَٰلَةٖ مِّن طِينٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">12. And indeed We created man (Adam) out of an extract of clay (water and earth).</p>
