<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>23:118</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَقُل رَّبِّ ٱغۡفِرۡ وَٱرۡحَمۡ وَأَنتَ خَيۡرُ ٱلرَّٰحِمِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">118. And say (O Muhammad صلى الله عليه وسلم): "My Lord! Forgive and have mercy, for You are the Best of those who show mercy!"</p>
</div>
