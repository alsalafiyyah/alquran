<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>23:52</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَإِنَّ هَٰذِهِۦٓ أُمَّتُكُمۡ أُمَّةٗ وَٰحِدَةٗ وَأَنَا۠ رَبُّكُمۡ فَٱتَّقُونِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">52. And verily this your religion (of Islâmic Monotheism) is one religion, and I am your Lord, so fear (keep your duty to) Me.</p>
</div>
