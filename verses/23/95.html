<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>23:95</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَإِنَّا عَلَىٰٓ أَن نُّرِيَكَ مَا نَعِدُهُمۡ لَقَٰدِرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">95. And indeed We are Able to show you (O Muhammad صلى الله عليه وسلم) that with which We have threatened them.</p>
