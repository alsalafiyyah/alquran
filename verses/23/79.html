  <p class="text-emerald-700 font-bold mb-4"><strong>23:79</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَهُوَ ٱلَّذِي ذَرَأَكُمۡ فِي ٱلۡأَرۡضِ وَإِلَيۡهِ تُحۡشَرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">79. And it is He Who has created you on the earth, and to Him you shall be gathered back.</p>
