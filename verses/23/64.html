<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>23:64</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">حَتَّىٰٓ إِذَآ أَخَذۡنَا مُتۡرَفِيهِم بِٱلۡعَذَابِ إِذَا هُمۡ يَجۡـَٔرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">64. Until when We seize those of them who lead a luxurious life with punishment: behold they make humble invocation with a loud voice.</p>
