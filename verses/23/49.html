  <p class="text-emerald-700 font-bold mb-4"><strong>23:49</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَقَدۡ ءَاتَيۡنَا مُوسَى ٱلۡكِتَٰبَ لَعَلَّهُمۡ يَهۡتَدُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">49. And indeed We gave Mûsâ (Moses) the Scripture, that they may be guided.</p>
