  <p class="text-emerald-700 font-bold mb-4"><strong>23:104</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">تَلۡفَحُ وُجُوهَهُمُ ٱلنَّارُ وَهُمۡ فِيهَا كَٰلِحُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">104. The Fire will burn their faces, and therein they will grin, with displaced lips (disfigured).</p>
