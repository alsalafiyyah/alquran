<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>23:94</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">رَبِّ فَلَا تَجۡعَلۡنِي فِي ٱلۡقَوۡمِ ٱلظَّٰلِمِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">94. "My Lord! Then (save me from Your punishment), put me not amongst the people who are the Zâlimûn (polytheists and wrong-doers)."</p>
