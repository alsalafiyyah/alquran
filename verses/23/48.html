<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Mu'minun (23:48)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَكَذَّبُوهُمَا فَكَانُواْ مِنَ ٱلۡمُهۡلَكِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">48. So they denied them both [Mûsâ (Moses) and Hârûn (Aaron)] and became of those who were destroyed.</p>
