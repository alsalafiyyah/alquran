<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>23:107</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">رَبَّنَآ أَخۡرِجۡنَا مِنۡهَا فَإِنۡ عُدۡنَا فَإِنَّا ظَٰلِمُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">107. "Our Lord! Bring us out of this. If ever we return (to evil), then indeed we shall be Zâlimûn: (polytheists, oppressors, unjust, and wrong-doers)."</p>
