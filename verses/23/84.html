<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Mu'minun (23:84)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قُل لِّمَنِ ٱلۡأَرۡضُ وَمَن فِيهَآ إِن كُنتُمۡ تَعۡلَمُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">84. Say: "Whose is the earth and whosoever is therein? If you know!"</p>
