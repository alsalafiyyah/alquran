<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>23:38</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنۡ هُوَ إِلَّا رَجُلٌ ٱفۡتَرَىٰ عَلَى ٱللَّهِ كَذِبٗا وَمَا نَحۡنُ لَهُۥ بِمُؤۡمِنِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">38. "He is only a man who has invented a lie against Allâh, and we are not going to believe in him."</p>
