<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>23:6</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِلَّا عَلَىٰٓ أَزۡوَٰجِهِمۡ أَوۡ مَا مَلَكَتۡ أَيۡمَٰنُهُمۡ فَإِنَّهُمۡ غَيۡرُ مَلُومِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">6. Except from their wives or (the slaves) that their right hands possess, - for then, they are free from blame;</p>
