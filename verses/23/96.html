  <p class="text-emerald-700 font-bold mb-4"><strong>23:96</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱدۡفَعۡ بِٱلَّتِي هِيَ أَحۡسَنُ ٱلسَّيِّئَةَۚ نَحۡنُ أَعۡلَمُ بِمَا يَصِفُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">96. Repel evil with that which is better. We are Best-Acquainted with the things they utter.</p>
