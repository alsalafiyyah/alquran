<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Mu'minun (23:111)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنِّي جَزَيۡتُهُمُ ٱلۡيَوۡمَ بِمَا صَبَرُوٓاْ أَنَّهُمۡ هُمُ ٱلۡفَآئِزُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">111. Verily I have rewarded them this Day for their patience: they are indeed the ones that are successful.</p>
