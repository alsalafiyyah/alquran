  <p class="text-emerald-700 font-bold mb-4"><strong>23:102</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَمَن ثَقُلَتۡ مَوَٰزِينُهُۥ فَأُوْلَٰٓئِكَ هُمُ ٱلۡمُفۡلِحُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">102. Then, those whose scales (of good deeds) are heavy, they are the successful.</p>
