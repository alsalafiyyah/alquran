<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>23:37</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنۡ هِيَ إِلَّا حَيَاتُنَا ٱلدُّنۡيَا نَمُوتُ وَنَحۡيَا وَمَا نَحۡنُ بِمَبۡعُوثِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">37. "There is nothing but our life of this world! We die and we live! And we are not going to be resurrected!</p>
