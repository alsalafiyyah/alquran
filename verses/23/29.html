<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>23:29</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَقُل رَّبِّ أَنزِلۡنِي مُنزَلٗا مُّبَارَكٗا وَأَنتَ خَيۡرُ ٱلۡمُنزِلِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">29. And say: "My Lord! Cause me to land at a blessed landing-place, for You are the Best of those who bring to land."</p>
