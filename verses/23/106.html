<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>23:106</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ رَبَّنَا غَلَبَتۡ عَلَيۡنَا شِقۡوَتُنَا وَكُنَّا قَوۡمٗا ضَآلِّينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">106. They will say: "Our Lord! Our wretchedness overcame us, and we were (an) erring people.</p>
