<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Mu'minun (23:82)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُوٓاْ أَءِذَا مِتۡنَا وَكُنَّا تُرَابٗا وَعِظَٰمًا أَءِنَّا لَمَبۡعُوثُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">82. They said: "When we are dead and have become dust and bones, shall we be resurrected indeed?</p>
