  <p class="text-emerald-700 font-bold mb-4"><strong>23:34</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَئِنۡ أَطَعۡتُم بَشَرٗا مِّثۡلَكُمۡ إِنَّكُمۡ إِذٗا لَّخَٰسِرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">34. "If you were to obey a human being like yourselves, then verily you indeed would be losers.</p>
