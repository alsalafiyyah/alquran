<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>23:114</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَٰلَ إِن لَّبِثۡتُمۡ إِلَّا قَلِيلٗاۖ لَّوۡ أَنَّكُمۡ كُنتُمۡ تَعۡلَمُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">114. He (Allâh) will say: "You stayed not but a little, if you had only known!</p>
