<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>23:74</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَإِنَّ ٱلَّذِينَ لَا يُؤۡمِنُونَ بِٱلۡأٓخِرَةِ عَنِ ٱلصِّرَٰطِ لَنَٰكِبُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">74. And verily, those who believe not in the Hereafter are indeed deviating far astray from the Path (true religion - Islâmic Monotheism).</p>
</div>
