<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>23:17</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَقَدۡ خَلَقۡنَا فَوۡقَكُمۡ سَبۡعَ طَرَآئِقَ وَمَا كُنَّا عَنِ ٱلۡخَلۡقِ غَٰفِلِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">17. And indeed We have created above you seven heavens (one over the other), and We are never unaware of the creation.</p>
