<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>23:73</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَإِنَّكَ لَتَدۡعُوهُمۡ إِلَىٰ صِرَٰطٖ مُّسۡتَقِيمٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">73. And certainly, you (O Muhammad صلى الله عليه وسلم) call them to the Straight Path (true religion - Islâmic Monotheism).</p>
