<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Mu'minun (23:89)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">سَيَقُولُونَ لِلَّهِۚ قُلۡ فَأَنَّىٰ تُسۡحَرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">89. They will say: "(All that belongs) to Allâh." Say: "How then are you deceived and turn away from the truth?"</p>
