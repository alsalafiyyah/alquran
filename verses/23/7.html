  <p class="text-emerald-700 font-bold mb-4"><strong>23:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَمَنِ ٱبۡتَغَىٰ وَرَآءَ ذَٰلِكَ فَأُوْلَٰٓئِكَ هُمُ ٱلۡعَادُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">7. But whoever seeks beyond that, then those are the transgressors;</p>
