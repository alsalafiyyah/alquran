<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>23:25</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنۡ هُوَ إِلَّا رَجُلُۢ بِهِۦ جِنَّةٞ فَتَرَبَّصُواْ بِهِۦ حَتَّىٰ حِينٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">25. "He is only a man in whom is madness, so wait for him a while."</p>
