<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>62:4</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ذَٰلِكَ فَضۡلُ ٱللَّهِ يُؤۡتِيهِ مَن يَشَآءُۚ وَٱللَّهُ ذُو ٱلۡفَضۡلِ ٱلۡعَظِيمِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">4. That is the Grace of Allâh, which He bestows on whom He wills. And Allâh is the Owner of Mighty Grace.</p>
