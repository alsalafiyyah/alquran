<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Qalam (68:34)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ لِلۡمُتَّقِينَ عِندَ رَبِّهِمۡ جَنَّٰتِ ٱلنَّعِيمِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">34. Verily, for the Muttaqûn (the pious - See V.2:2) are Gardens of delight (Paradise) with their Lord.</p>
