<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>68:39</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَمۡ لَكُمۡ أَيۡمَٰنٌ عَلَيۡنَا بَٰلِغَةٌ إِلَىٰ يَوۡمِ ٱلۡقِيَٰمَةِ إِنَّ لَكُمۡ لَمَا تَحۡكُمُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">39. Or have you oaths from Us, reaching to the Day of Resurrection, that yours will be what you judge?</p>
