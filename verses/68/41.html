<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>68:41</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَمۡ لَهُمۡ شُرَكَآءُ فَلۡيَأۡتُواْ بِشُرَكَآئِهِمۡ إِن كَانُواْ صَٰدِقِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">41. Or have they "partners"? Then let them bring their "partners" if they are truthful!</p>
