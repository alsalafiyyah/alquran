<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>68:28</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ أَوۡسَطُهُمۡ أَلَمۡ أَقُل لَّكُمۡ لَوۡلَا تُسَبِّحُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">28. The best among them said: "Did I not tell you: why say you not: Inshâ’ Allâh (If Allâh wills)."</p>
