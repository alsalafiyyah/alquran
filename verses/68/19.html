<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>68:19</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَطَافَ عَلَيۡهَا طَآئِفٞ مِّن رَّبِّكَ وَهُمۡ نَآئِمُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">19. Then there passed by on the (garden) a visitation (fire) from your Lord at night and burnt it while they were asleep.</p>
