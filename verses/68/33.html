<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Qalam (68:33)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">كَذَٰلِكَ ٱلۡعَذَابُۖ وَلَعَذَابُ ٱلۡأٓخِرَةِ أَكۡبَرُۚ لَوۡ كَانُواْ يَعۡلَمُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">33. Such is the punishment (in this life), but truly, the punishment of the Hereafter is greater if they but knew.</p>
