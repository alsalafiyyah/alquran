<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Qalam (68:10)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَا تُطِعۡ كُلَّ حَلَّافٖ مَّهِينٍ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">10. And (O Muhammad صلى الله عليه وسلم) obey you not everyone Hallaf Mahîn (the one who swears much and is a liar or is worthless). [Tafsir At-Tabari]</p>
