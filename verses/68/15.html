  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِذَا تُتۡلَىٰ عَلَيۡهِ ءَايَٰتُنَا قَالَ أَسَٰطِيرُ ٱلۡأَوَّلِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">15. When Our Verses (of the Qur’ân) are recited to him, he says: "Tales of the men of old!"</p>
