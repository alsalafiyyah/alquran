<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>68:35</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَفَنَجۡعَلُ ٱلۡمُسۡلِمِينَ كَٱلۡمُجۡرِمِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">35. Shall We then treat the Muslims (believers of Islamic Monotheism, doers of righteous deeds) like the Mujrimûn (criminals, polytheists and disbelievers, etc.)?</p>
