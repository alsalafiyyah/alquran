<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>68:47</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَمۡ عِندَهُمُ ٱلۡغَيۡبُ فَهُمۡ يَكۡتُبُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">47. Or that the Ghaib (the Unseen - here in this Verse it means Al-Lauh Al-Mahfûz) is in their hands, so that they can write it down?</p>
