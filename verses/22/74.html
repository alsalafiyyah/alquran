  <p class="text-emerald-700 font-bold mb-4"><strong>22:74</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">مَا قَدَرُواْ ٱللَّهَ حَقَّ قَدۡرِهِۦٓۚ إِنَّ ٱللَّهَ لَقَوِيٌّ عَزِيزٌ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">74. They have not estimated Allâh His Rightful Estimate. Verily, Allâh is All-Strong, All-Mighty.</p>
