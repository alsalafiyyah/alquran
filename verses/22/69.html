<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Hajj (22:69)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱللَّهُ يَحۡكُمُ بَيۡنَكُمۡ يَوۡمَ ٱلۡقِيَٰمَةِ فِيمَا كُنتُمۡ فِيهِ تَخۡتَلِفُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">69. "Allâh will judge between you on the Day of Resurrection about that wherein you used to differ."</p>
