<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>22:49</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قُلۡ يَٰٓأَيُّهَا ٱلنَّاسُ إِنَّمَآ أَنَا۠ لَكُمۡ نَذِيرٞ مُّبِينٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">49. Say (O Muhammad صلى الله عليه وسلم): "O mankind! I am (sent) to you only as a plain warner."</p>
