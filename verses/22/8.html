<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>22:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمِنَ ٱلنَّاسِ مَن يُجَٰدِلُ فِي ٱللَّهِ بِغَيۡرِ عِلۡمٖ وَلَا هُدٗى وَلَا كِتَٰبٖ مُّنِيرٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">8. And among men is he who disputes about Allâh, without knowledge or guidance, or a Book giving light (from Allâh),</p>
