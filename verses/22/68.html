<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Hajj (22:68)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَإِن جَٰدَلُوكَ فَقُلِ ٱللَّهُ أَعۡلَمُ بِمَا تَعۡمَلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">68. And if they argue with you (as regards the slaughtering of the sacrifices), say "Allâh knows best of what you do.</p>
