<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>22:76</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يَعۡلَمُ مَا بَيۡنَ أَيۡدِيهِمۡ وَمَا خَلۡفَهُمۡۚ وَإِلَى ٱللَّهِ تُرۡجَعُ ٱلۡأُمُورُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">76. He knows what is before them, and what is behind them. And to Allâh return all matters (for decision).</p>
