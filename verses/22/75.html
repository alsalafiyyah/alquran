<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>22:75</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱللَّهُ يَصۡطَفِي مِنَ ٱلۡمَلَٰٓئِكَةِ رُسُلٗا وَمِنَ ٱلنَّاسِۚ إِنَّ ٱللَّهَ سَمِيعُۢ بَصِيرٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">75. Allâh chooses Messengers from angels and from men. Verily, Allâh is All-Hearer, All-Seer.</p>
