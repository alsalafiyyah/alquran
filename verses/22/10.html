<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>22:10</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ذَٰلِكَ بِمَا قَدَّمَتۡ يَدَاكَ وَأَنَّ ٱللَّهَ لَيۡسَ بِظَلَّٰمٖ لِّلۡعَبِيدِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">10. That is because of what your hands have sent forth, and verily, Allâh is not unjust to (His) slaves.</p>
