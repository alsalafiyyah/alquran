  <p class="text-emerald-700 font-bold mb-4"><strong>33:70</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُواْ ٱتَّقُواْ ٱللَّهَ وَقُولُواْ قَوۡلٗا سَدِيدٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">70. O you who believe! Keep your duty to Allâh and fear Him, and speak (always) the truth.</p>
