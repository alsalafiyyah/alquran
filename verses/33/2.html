<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Ahzab (33:2)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَٱتَّبِعۡ مَا يُوحَىٰٓ إِلَيۡكَ مِن رَّبِّكَۚ إِنَّ ٱللَّهَ كَانَ بِمَا تَعۡمَلُونَ خَبِيرٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">2. And follow that which is revealed to you from your Lord. Verily, Allâh is Well-Acquainted with what you do.</p>
