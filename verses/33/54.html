<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>33:54</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِن تُبۡدُواْ شَيۡـًٔا أَوۡ تُخۡفُوهُ فَإِنَّ ٱللَّهَ كَانَ بِكُلِّ شَيۡءٍ عَلِيمٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">54. Whether you reveal anything or conceal it, verily, Allâh is Ever All-Knower of everything.</p>
