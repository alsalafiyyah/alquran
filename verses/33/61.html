<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Ahzab (33:61)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">مَّلۡعُونِينَۖ أَيۡنَمَا ثُقِفُوٓاْ أُخِذُواْ وَقُتِّلُواْ تَقۡتِيلٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">61. Accursed, they shall be seized wherever found, and killed with a (terrible) slaughter.</p>
