<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>33:64</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ ٱللَّهَ لَعَنَ ٱلۡكَٰفِرِينَ وَأَعَدَّ لَهُمۡ سَعِيرًا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">64. Verily, Allâh has cursed the disbelievers, and has prepared for them a flaming Fire (Hell).</p>
