  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَتَوَكَّلۡ عَلَى ٱللَّهِۚ وَكَفَىٰ بِٱللَّهِ وَكِيلٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">3. And put your trust in Allâh, and Sufficient is Allâh as a Wakîl (Trustee, or Disposer of affairs).</p>
