<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Ahzab (33:65)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">خَٰلِدِينَ فِيهَآ أَبَدٗاۖ لَّا يَجِدُونَ وَلِيّٗا وَلَا نَصِيرٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">65. Wherein they will abide for ever, and they will find neither a Walî (a protector) nor a helper.</p>
