<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>87:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِلَّا مَا شَآءَ ٱللَّهُۚ إِنَّهُۥ يَعۡلَمُ ٱلۡجَهۡرَ وَمَا يَخۡفَىٰ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">7. Except what Allâh may will. He knows what is apparent and what is hidden.</p>
