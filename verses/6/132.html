<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>6:132</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلِكُلّٖ دَرَجَٰتٞ مِّمَّا عَمِلُواْۚ وَمَا رَبُّكَ بِغَٰفِلٍ عَمَّا يَعۡمَلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">132. For all there will be degrees (or ranks) according to what they did. And your Lord is not unaware of what they do.</p>
