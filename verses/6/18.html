  <p class="text-emerald-700 font-bold mb-4"><strong>6:18</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَهُوَ ٱلۡقَاهِرُ فَوۡقَ عِبَادِهِۦۚ وَهُوَ ٱلۡحَكِيمُ ٱلۡخَبِيرُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">18. And He is the Irresistible, (Supreme) above His slaves, and He is the All-Wise, Well-Acquainted with all things.</p>
