<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>6:163</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَا شَرِيكَ لَهُۥۖ وَبِذَٰلِكَ أُمِرۡتُ وَأَنَا۠ أَوَّلُ ٱلۡمُسۡلِمِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">163. "He has no partner. And of this I have been commanded, and I am the first of the Muslims."</p>
