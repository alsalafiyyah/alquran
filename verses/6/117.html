<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>6:117</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ رَبَّكَ هُوَ أَعۡلَمُ مَن يَضِلُّ عَن سَبِيلِهِۦۖ وَهُوَ أَعۡلَمُ بِٱلۡمُهۡتَدِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">117. Verily, your Lord! It is He Who knows best who strays from His Way, and He knows best the rightly guided ones.</p>
