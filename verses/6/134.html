  <p class="text-emerald-700 font-bold mb-4"><strong>6:134</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ مَا تُوعَدُونَ لَأٓتٖۖ وَمَآ أَنتُم بِمُعۡجِزِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">134. Surely, that which you are promised will verily come to pass, and you cannot escape (from the punishment of Allâh).</p>
