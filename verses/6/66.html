<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>6:66</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَكَذَّبَ بِهِۦ قَوۡمُكَ وَهُوَ ٱلۡحَقُّۚ قُل لَّسۡتُ عَلَيۡكُم بِوَكِيلٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">66. But your people (O Muhammad صلى الله عليه وسلم) have denied it (the Qur’ân) though it is the truth. Say: "I am not a Wakîl (guardian) over you."</p>
</div>
