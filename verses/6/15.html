<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>6:15</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قُلۡ إِنِّيٓ أَخَافُ إِنۡ عَصَيۡتُ رَبِّي عَذَابَ يَوۡمٍ عَظِيمٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">15. Say: "I fear, if I disobey my Lord, the torment of a Mighty Day."</p>
