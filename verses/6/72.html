<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>6:72</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَأَنۡ أَقِيمُواْ ٱلصَّلَوٰةَ وَٱتَّقُوهُۚ وَهُوَ ٱلَّذِيٓ إِلَيۡهِ تُحۡشَرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">72. And to perform As-Salât (Iqâmat-as-Salât), and to be obedient to Allâh and fear Him, and it is He to Whom you shall be gathered.</p>
