<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>6:11</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قُلۡ سِيرُواْ فِي ٱلۡأَرۡضِ ثُمَّ ٱنظُرُواْ كَيۡفَ كَانَ عَٰقِبَةُ ٱلۡمُكَذِّبِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">11. Say (O Muhammad صلى الله عليه وسلم): "Travel in the land and see what was the end of those who rejected truth."</p>
