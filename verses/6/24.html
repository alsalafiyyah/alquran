<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-An'am (6:24)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱنظُرۡ كَيۡفَ كَذَبُواْ عَلَىٰٓ أَنفُسِهِمۡۚ وَضَلَّ عَنۡهُم مَّا كَانُواْ يَفۡتَرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">24. Look! How they lie against themselves! But the (lie) which they invented will disappear from them.</p>
