<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-An'am (6:13)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">۞ وَلَهُۥ مَا سَكَنَ فِي ٱلَّيۡلِ وَٱلنَّهَارِۚ وَهُوَ ٱلسَّمِيعُ ٱلۡعَلِيمُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">13. And to Him belongs whatsoever exists in the night and the day, and He is the All-Hearing, the All-Knowing."</p>
