<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>6:85</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَزَكَرِيَّا وَيَحۡيَىٰ وَعِيسَىٰ وَإِلۡيَاسَۖ كُلّٞ مِّنَ ٱلصَّٰلِحِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">85. And Zakariyâ (Zachariya), and Yahya (John) and ‘Îsâ (Jesus) and Iliyâs (Elias), each one of them was of the righteous.</p>
