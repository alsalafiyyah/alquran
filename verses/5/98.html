<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>5:98</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱعۡلَمُوٓاْ أَنَّ ٱللَّهَ شَدِيدُ ٱلۡعِقَابِ وَأَنَّ ٱللَّهَ غَفُورٞ رَّحِيمٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">98. Know that Allâh is Severe in punishment and that Allâh is Oft-Forgiving, Most Merciful.</p>
