  <p class="text-emerald-700 font-bold mb-4"><strong>5:102</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَدۡ سَأَلَهَا قَوۡمٞ مِّن قَبۡلِكُمۡ ثُمَّ أَصۡبَحُواْ بِهَا كَٰفِرِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">102. Before you, a community asked such questions, then on that account they became disbelievers.</p>
