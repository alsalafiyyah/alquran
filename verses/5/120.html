<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>5:120</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لِلَّهِ مُلۡكُ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِ وَمَا فِيهِنَّۚ وَهُوَ عَلَىٰ كُلِّ شَيۡءٖ قَدِيرُۢ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">120. To Allâh belongs the dominion of the heavens and the earth and all that is therein, and He is Able to do all things.</p>
