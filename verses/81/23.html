<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>81:23</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَقَدۡ رَءَاهُ بِٱلۡأُفُقِ ٱلۡمُبِينِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">23. And indeed he (Muhammad صلى الله عليه وسلم) saw him [Jibrîl (Gabriel)] in the clear horizon (towards the east).</p>
