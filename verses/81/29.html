<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>81:29</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَا تَشَآءُونَ إِلَّآ أَن يَشَآءَ ٱللَّهُ رَبُّ ٱلۡعَٰلَمِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">29. And you cannot will unless (it be) that Allâh wills - the Lord of the ‘Âlamîn (mankind, jinn and all that exists).</p>
