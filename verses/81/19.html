<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>At-Takwir (81:19)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّهُۥ لَقَوۡلُ رَسُولٖ كَرِيمٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">19. Verily, this is the Word (this Qur’ân brought by) a most honourable messenger [Jibrîl (Gabrîl), from Allâh to Prophet Muhammad صلى الله عليه وسلم].</p>
