  <p class="text-emerald-700 font-bold mb-4"><strong>At-Takwir (81:15)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَلَآ أُقۡسِمُ بِٱلۡخُنَّسِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">15. So verily, I swear by the planets that recede (i.e. disappear during the day and appear during the night).</p>
