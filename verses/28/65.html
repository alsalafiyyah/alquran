  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَيَوۡمَ يُنَادِيهِمۡ فَيَقُولُ مَاذَآ أَجَبۡتُمُ ٱلۡمُرۡسَلِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">65. And (remember) the Day (Allâh) will call to them, and say: "What answer gave you to the Messengers?"</p>
