<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>28:66</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَعَمِيَتۡ عَلَيۡهِمُ ٱلۡأَنۢبَآءُ يَوۡمَئِذٖ فَهُمۡ لَا يَتَسَآءَلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">66. Then the news of a good answer will be obscured to them on that day, and they will not be able to ask one another.</p>
