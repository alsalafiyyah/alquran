<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>28:41</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَجَعَلۡنَٰهُمۡ أَئِمَّةٗ يَدۡعُونَ إِلَى ٱلنَّارِۖ وَيَوۡمَ ٱلۡقِيَٰمَةِ لَا يُنصَرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">41. And We made them leaders inviting to the Fire: and on the Day of Resurrection, they will not be helped.</p>
