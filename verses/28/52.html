<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>28:52</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱلَّذِينَ ءَاتَيۡنَٰهُمُ ٱلۡكِتَٰبَ مِن قَبۡلِهِۦ هُم بِهِۦ يُؤۡمِنُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">52. Those to whom We gave the Scripture [i.e. the Taurât (Torah) and the Injeel (Gospel)] before it, they believe in it (the Qur’ân).</p>
