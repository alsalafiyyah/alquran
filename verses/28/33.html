<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>28:33</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ رَبِّ إِنِّي قَتَلۡتُ مِنۡهُمۡ نَفۡسٗا فَأَخَافُ أَن يَقۡتُلُونِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">33. He said: "My Lord! I have killed a man among them, and I fear that they will kill me.</p>
