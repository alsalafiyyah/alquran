<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Qasas (28:69)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَرَبُّكَ يَعۡلَمُ مَا تُكِنُّ صُدُورُهُمۡ وَمَا يُعۡلِنُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">69. And your Lord knows what their breasts conceal, and what they reveal.</p>
