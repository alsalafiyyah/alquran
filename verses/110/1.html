  <p class="text-emerald-700 font-bold mb-4"><strong>An-Nasr (110:1)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِذَا جَآءَ نَصۡرُ ٱللَّهِ وَٱلۡفَتۡحُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">1. When there comes the Help of Allâh (to you, O Muhammad صلى الله عليه وسلم against your enemies) and the conquest (of Makkah).</p>
