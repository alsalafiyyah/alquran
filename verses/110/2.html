<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>110:2</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَرَأَيۡتَ ٱلنَّاسَ يَدۡخُلُونَ فِي دِينِ ٱللَّهِ أَفۡوَاجٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">2. And you see that the people enter Allah’s religion (Islâm) in crowds.</p>
