  <p class="text-emerald-700 font-bold mb-4"><strong>10:97</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَوۡ جَآءَتۡهُمۡ كُلُّ ءَايَةٍ حَتَّىٰ يَرَوُاْ ٱلۡعَذَابَ ٱلۡأَلِيمَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">97. Even if every sign should come to them, until they see the painful torment.</p>
