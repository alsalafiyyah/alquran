<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>10:80</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَلَمَّا جَآءَ ٱلسَّحَرَةُ قَالَ لَهُم مُّوسَىٰٓ أَلۡقُواْ مَآ أَنتُم مُّلۡقُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">80. And when the sorcerers came, Mûsâ (Moses) said to them: "Cast down what you want to cast!"</p>
