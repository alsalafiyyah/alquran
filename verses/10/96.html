<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>10:96</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ ٱلَّذِينَ حَقَّتۡ عَلَيۡهِمۡ كَلِمَتُ رَبِّكَ لَا يُؤۡمِنُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">96. Truly! Those, against whom the Word (Wrath) of your Lord has been justified, will not believe.</p>
