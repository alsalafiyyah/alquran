<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>10:29</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَكَفَىٰ بِٱللَّهِ شَهِيدَۢا بَيۡنَنَا وَبَيۡنَكُمۡ إِن كُنَّا عَنۡ عِبَادَتِكُمۡ لَغَٰفِلِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">29. "So sufficient is Allâh as a witness between us and you that we indeed knew nothing of your worship of us."</p>
