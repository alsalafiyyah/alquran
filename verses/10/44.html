<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>10:44</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ ٱللَّهَ لَا يَظۡلِمُ ٱلنَّاسَ شَيۡـٔٗا وَلَٰكِنَّ ٱلنَّاسَ أَنفُسَهُمۡ يَظۡلِمُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">44. Truly! Allâh wrongs not mankind in aught; but mankind wrong themselves.</p>
