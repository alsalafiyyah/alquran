<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>10:43</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمِنۡهُم مَّن يَنظُرُ إِلَيۡكَۚ أَفَأَنتَ تَهۡدِي ٱلۡعُمۡيَ وَلَوۡ كَانُواْ لَا يُبۡصِرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">43. And among them are some who look at you, but can you guide the blind - even though they see not?</p>
