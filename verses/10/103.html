<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>10:103</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ثُمَّ نُنَجِّي رُسُلَنَا وَٱلَّذِينَ ءَامَنُواْۚ كَذَٰلِكَ حَقًّا عَلَيۡنَا نُنجِ ٱلۡمُؤۡمِنِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">103. Then (in the end) We save Our Messengers and those who believe! Thus it is incumbent upon Us to save the believers.</p>
</div>
