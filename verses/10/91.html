<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>10:91</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ءَآلۡـَٰٔنَ وَقَدۡ عَصَيۡتَ قَبۡلُ وَكُنتَ مِنَ ٱلۡمُفۡسِدِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">91. Now (you believe) while you refused to believe before and you were one of the Mufsidûn (evil-doers, the corrupters).</p>
