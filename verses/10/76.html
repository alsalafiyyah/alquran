<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>10:76</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَلَمَّا جَآءَهُمُ ٱلۡحَقُّ مِنۡ عِندِنَا قَالُوٓاْ إِنَّ هَٰذَا لَسِحۡرٞ مُّبِينٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">76. So when came to them the truth from Us, they said: "This is indeed clear magic."</p>
