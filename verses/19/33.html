  <p class="text-emerald-700 font-bold mb-4"><strong>19:33</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَٱلسَّلَٰمُ عَلَيَّ يَوۡمَ وُلِدتُّ وَيَوۡمَ أَمُوتُ وَيَوۡمَ أُبۡعَثُ حَيّٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">33. "And Salâm (peace) be upon me the day I was born, and the day I die, and the day I shall be raised alive!"</p>
