<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Maryam (19:34)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ذَٰلِكَ عِيسَى ٱبۡنُ مَرۡيَمَۖ قَوۡلَ ٱلۡحَقِّ ٱلَّذِي فِيهِ يَمۡتَرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">34. Such is ‘Îsâ (Jesus), son of Maryam (Mary). (It is) a statement of truth, about which they doubt (or dispute).</p>
