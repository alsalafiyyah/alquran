  <p class="text-emerald-700 font-bold mb-4"><strong>19:93</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِن كُلُّ مَن فِي ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِ إِلَّآ ءَاتِي ٱلرَّحۡمَٰنِ عَبۡدٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">93. There is none in the heavens and the earth but comes unto the Most Gracious (Allâh) as a slave.</p>
