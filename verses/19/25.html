  <p class="text-emerald-700 font-bold mb-4"><strong>19:25</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَهُزِّيٓ إِلَيۡكِ بِجِذۡعِ ٱلنَّخۡلَةِ تُسَٰقِطۡ عَلَيۡكِ رُطَبٗا جَنِيّٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">25. "And shake the trunk of date-palm towards you, it will let fall fresh ripe-dates upon you."</p>
