<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>19:67</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَوَلَا يَذۡكُرُ ٱلۡإِنسَٰنُ أَنَّا خَلَقۡنَٰهُ مِن قَبۡلُ وَلَمۡ يَكُ شَيۡـٔٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">67. Does not man remember that We created him before, while he was nothing?</p>
