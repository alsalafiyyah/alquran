  <p class="text-emerald-700 font-bold mb-4"><strong>19:19</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ إِنَّمَآ أَنَا۠ رَسُولُ رَبِّكِ لِأَهَبَ لَكِ غُلَٰمٗا زَكِيّٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">19. (The angel) said: "I am only a messenger from your Lord, (to announce) to you the gift of a righteous son."</p>
