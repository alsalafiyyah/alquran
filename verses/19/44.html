<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>19:44</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يَٰٓأَبَتِ لَا تَعۡبُدِ ٱلشَّيۡطَٰنَۖ إِنَّ ٱلشَّيۡطَٰنَ كَانَ لِلرَّحۡمَٰنِ عَصِيّٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">44. "O my father! Worship not Shaitân (Satan). Verily Shaitân (Satan) has been a rebel against the Most Gracious (Allâh).</p>
