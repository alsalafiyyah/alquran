<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Maryam (19:15)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَسَلَٰمٌ عَلَيۡهِ يَوۡمَ وُلِدَ وَيَوۡمَ يَمُوتُ وَيَوۡمَ يُبۡعَثُ حَيّٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">15. And Salâm (peace) be on him the day he was born, and the day he dies, and the day he will be raised up to life (again)!</p>
