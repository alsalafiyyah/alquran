<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>19:82</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">كَلَّاۚ سَيَكۡفُرُونَ بِعِبَادَتِهِمۡ وَيَكُونُونَ عَلَيۡهِمۡ ضِدًّا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">82. Nay, but they (the so-called gods) will deny their worship of them, and become opponents to them (on the Day of Resurrection).</p>
