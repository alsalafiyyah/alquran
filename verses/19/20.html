<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>19:20</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَتۡ أَنَّىٰ يَكُونُ لِي غُلَٰمٞ وَلَمۡ يَمۡسَسۡنِي بَشَرٞ وَلَمۡ أَكُ بَغِيّٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">20. She said: "How can I have a son, when no man has touched me, nor am I unchaste?"</p>
