<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>19:52</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَنَٰدَيۡنَٰهُ مِن جَانِبِ ٱلطُّورِ ٱلۡأَيۡمَنِ وَقَرَّبۡنَٰهُ نَجِيّٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">52. And We called him from the right side of the Mount, and made him draw near to Us for a talk with him [Mûsâ (Moses)].</p>
