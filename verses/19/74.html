<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>19:74</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَكَمۡ أَهۡلَكۡنَا قَبۡلَهُم مِّن قَرۡنٍ هُمۡ أَحۡسَنُ أَثَٰثٗا وَرِءۡيٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">74. And how many a generation (past nations) have We destroyed before them, who were better in wealth, goods and outward appearance?</p>
