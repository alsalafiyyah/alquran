<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Maryam (19:83)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَلَمۡ تَرَ أَنَّآ أَرۡسَلۡنَا ٱلشَّيَٰطِينَ عَلَى ٱلۡكَٰفِرِينَ تَؤُزُّهُمۡ أَزّٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">83. See you not that We have sent the Shayâtîn (devils) against the disbelievers to push them to do evil.</p>
