  <p class="text-emerald-700 font-bold mb-4"><strong>19:70</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ثُمَّ لَنَحۡنُ أَعۡلَمُ بِٱلَّذِينَ هُمۡ أَوۡلَىٰ بِهَا صِلِيّٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">70. Then, verily, We know best those who are most worthy of being burnt therein.</p>
