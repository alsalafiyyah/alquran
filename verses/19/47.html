<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>19:47</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ سَلَٰمٌ عَلَيۡكَۖ سَأَسۡتَغۡفِرُ لَكَ رَبِّيٓۖ إِنَّهُۥ كَانَ بِي حَفِيّٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">47. Ibrâhîm (Abraham) said: "Peace be on you! I will ask Forgiveness of my Lord for you. Verily He is unto me Ever Most Gracious.</p>
