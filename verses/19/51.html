<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>19:51</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَٱذۡكُرۡ فِي ٱلۡكِتَٰبِ مُوسَىٰٓۚ إِنَّهُۥ كَانَ مُخۡلَصٗا وَكَانَ رَسُولٗا نَّبِيّٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">51. And mention in the Book (this Qur’ân) Mûsâ (Moses). Verily he was chosen and he was a Messenger (and) a Prophet.</p>
