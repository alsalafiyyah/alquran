  <p class="text-emerald-700 font-bold mb-4"><strong>19:66</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَيَقُولُ ٱلۡإِنسَٰنُ أَءِذَا مَا مِتُّ لَسَوۡفَ أُخۡرَجُ حَيًّا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">66. And man (the disbeliever) says: "When I am dead, shall I then be raised up alive?"</p>
