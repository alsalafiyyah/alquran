<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Maryam (19:18)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَتۡ إِنِّيٓ أَعُوذُ بِٱلرَّحۡمَٰنِ مِنكَ إِن كُنتَ تَقِيّٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">18. She said: "Verily! I seek refuge with the Most Gracious (Allâh) from you, if you do fear Allâh."</p>
