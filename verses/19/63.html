<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>19:63</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">تِلۡكَ ٱلۡجَنَّةُ ٱلَّتِي نُورِثُ مِنۡ عِبَادِنَا مَن كَانَ تَقِيّٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">63. Such is the Paradise which We shall give as an inheritance to those of Our slaves who have been Al-Muttaqûn (the pious - See V.2:2).</p>
