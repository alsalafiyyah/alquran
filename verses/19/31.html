<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>19:31</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَجَعَلَنِي مُبَارَكًا أَيۡنَ مَا كُنتُ وَأَوۡصَٰنِي بِٱلصَّلَوٰةِ وَٱلزَّكَوٰةِ مَا دُمۡتُ حَيّٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">31. "And He has made me blessed wheresoever I be, and has enjoined on me Salât (prayer), and Zakât, as long as I live."</p>
