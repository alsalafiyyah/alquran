<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>19:53</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَوَهَبۡنَا لَهُۥ مِن رَّحۡمَتِنَآ أَخَاهُ هَٰرُونَ نَبِيّٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">53. And We granted him his brother Hârûn (Aaron), (also) a Prophet, out of Our Mercy.</p>
