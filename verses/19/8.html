<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>19:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ رَبِّ أَنَّىٰ يَكُونُ لِي غُلَٰمٞ وَكَانَتِ ٱمۡرَأَتِي عَاقِرٗا وَقَدۡ بَلَغۡتُ مِنَ ٱلۡكِبَرِ عِتِيّٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">8. He said: "My Lord! How can I have a son, when my wife is barren, and I have reached the extreme old age."</p>
