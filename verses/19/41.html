<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>19:41</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَٱذۡكُرۡ فِي ٱلۡكِتَٰبِ إِبۡرَٰهِيمَۚ إِنَّهُۥ كَانَ صِدِّيقٗا نَّبِيًّا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">41. And mention in the Book (the Qur’ân) Ibrâhîm (Abraham). Verily he was a man of truth, a Prophet.</p>
</div>
