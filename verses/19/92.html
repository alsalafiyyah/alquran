<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>19:92</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَا يَنۢبَغِي لِلرَّحۡمَٰنِ أَن يَتَّخِذَ وَلَدًا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">92. But it is not suitable for (the Majesty of) the Most Gracious (Allâh) that He should beget a son (or offspring or children).</p>
