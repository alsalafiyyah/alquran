<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>19:5</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَإِنِّي خِفۡتُ ٱلۡمَوَٰلِيَ مِن وَرَآءِي وَكَانَتِ ٱمۡرَأَتِي عَاقِرٗا فَهَبۡ لِي مِن لَّدُنكَ وَلِيّٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">5. "And verily I fear my relatives after me, and my wife is barren. So give me from Yourself an heir.</p>
