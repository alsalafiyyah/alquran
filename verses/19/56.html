<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>19:56</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَٱذۡكُرۡ فِي ٱلۡكِتَٰبِ إِدۡرِيسَۚ إِنَّهُۥ كَانَ صِدِّيقٗا نَّبِيّٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">56. And mention in the Book (the Qur’ân) Idrîs (Enoch).Verily he was a man of truth, (and) a Prophet.</p>
