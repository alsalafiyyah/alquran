<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>67:25</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَيَقُولُونَ مَتَىٰ هَٰذَا ٱلۡوَعۡدُ إِن كُنتُمۡ صَٰدِقِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">25. They say: "When will this promise (i.e. the Day of Resurrection) come to pass if you are telling the truth.?"</p>
