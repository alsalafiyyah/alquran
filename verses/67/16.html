<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>67:16</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ءَأَمِنتُم مَّن فِي ٱلسَّمَآءِ أَن يَخۡسِفَ بِكُمُ ٱلۡأَرۡضَ فَإِذَا هِيَ تَمُورُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">16. Do you feel secure that He, Who is over the heaven (Allâh), will not cause the earth to sink with you, and then it should quake?</p>
