  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Mulk (67:18)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَقَدۡ كَذَّبَ ٱلَّذِينَ مِن قَبۡلِهِمۡ فَكَيۡفَ كَانَ نَكِيرِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">18. And indeed those before them belied (the Messengers of Allâh), then how terrible was My denial (punishment)?</p>
