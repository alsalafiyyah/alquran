<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>67:24</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قُلۡ هُوَ ٱلَّذِي ذَرَأَكُمۡ فِي ٱلۡأَرۡضِ وَإِلَيۡهِ تُحۡشَرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">24. Say: "It is He Who has created you on the earth, and to Him shall you be gathered (in the Hereafter)."</p>
