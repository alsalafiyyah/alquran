<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>67:6</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلِلَّذِينَ كَفَرُواْ بِرَبِّهِمۡ عَذَابُ جَهَنَّمَۖ وَبِئۡسَ ٱلۡمَصِيرُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">6. And for those who disbelieve in their Lord (Allâh) is the torment of Hell, and worst indeed is that destination.</p>
