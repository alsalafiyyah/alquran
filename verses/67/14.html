  <p class="text-emerald-700 font-bold mb-4"><strong>67:14</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَلَا يَعۡلَمُ مَنۡ خَلَقَ وَهُوَ ٱللَّطِيفُ ٱلۡخَبِيرُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">14. Should not He Who has created know? And He is the Most Kind and Courteous (to His slaves), All-Aware (of everything).</p>
