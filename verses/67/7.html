<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>67:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِذَآ أُلۡقُواْ فِيهَا سَمِعُواْ لَهَا شَهِيقٗا وَهِيَ تَفُورُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">7. When they are cast therein, they will hear the (terrible) drawing in of its breath as it blazes forth.</p>
