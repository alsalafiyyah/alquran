<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>67:4</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ثُمَّ ٱرۡجِعِ ٱلۡبَصَرَ كَرَّتَيۡنِ يَنقَلِبۡ إِلَيۡكَ ٱلۡبَصَرُ خَاسِئٗا وَهُوَ حَسِيرٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">4. Then look again and yet again: your sight will return to you in a state of humiliation and worn out.</p>
