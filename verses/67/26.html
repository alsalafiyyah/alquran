<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>67:26</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قُلۡ إِنَّمَا ٱلۡعِلۡمُ عِندَ ٱللَّهِ وَإِنَّمَآ أَنَا۠ نَذِيرٞ مُّبِينٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">26. Say (O Muhammad صلى الله عليه وسلم): "The knowledge (of its exact time) is with Allâh only, and I am only a plain warner."</p>
</div>
