  <p class="text-emerald-700 font-bold mb-4"><strong>67:1</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">تَبَٰرَكَ ٱلَّذِي بِيَدِهِ ٱلۡمُلۡكُ وَهُوَ عَلَىٰ كُلِّ شَيۡءٖ قَدِيرٌ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">1. Blessed be He in Whose Hand is the dominion; and He is Able to do all things.</p>
