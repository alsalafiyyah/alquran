<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>89:17</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">كَلَّاۖ بَل لَّا تُكۡرِمُونَ ٱلۡيَتِيمَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">17. Nay! But you treat not the orphans with kindness and generosity (i.e. you neither treat them well, nor give them their exact right of inheritance)!</p>
