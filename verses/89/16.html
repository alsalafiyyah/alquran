<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>89:16</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَأَمَّآ إِذَا مَا ٱبۡتَلَىٰهُ فَقَدَرَ عَلَيۡهِ رِزۡقَهُۥ فَيَقُولُ رَبِّيٓ أَهَٰنَنِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">16. But when He tries him by straitening his means of life, he says: "My Lord has humiliated me!"</p>
