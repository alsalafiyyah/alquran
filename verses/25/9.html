<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Furqan (25:9)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱنظُرۡ كَيۡفَ ضَرَبُواْ لَكَ ٱلۡأَمۡثَٰلَ فَضَلُّواْ فَلَا يَسۡتَطِيعُونَ سَبِيلٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">9. See how they coin similitudes for you, so they have gone astray, and they cannot find a (Right) Path.</p>
