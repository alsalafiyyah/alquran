<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>25:52</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَلَا تُطِعِ ٱلۡكَٰفِرِينَ وَجَٰهِدۡهُم بِهِۦ جِهَادٗا كَبِيرٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">52. So obey not the disbelievers, but strive against them (by preaching) with the utmost endeavour with it (the Qur’ân).</p>
