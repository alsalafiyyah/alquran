<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>25:14</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَّا تَدۡعُواْ ٱلۡيَوۡمَ ثُبُورٗا وَٰحِدٗا وَٱدۡعُواْ ثُبُورٗا كَثِيرٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">14. Exclaim not today for one destruction, but exclaim for many destructions.</p>
