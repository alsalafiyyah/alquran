  <p class="text-emerald-700 font-bold mb-4"><strong>25:56</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَآ أَرۡسَلۡنَٰكَ إِلَّا مُبَشِّرٗا وَنَذِيرٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">56. And We have sent you (O Muhammad صلى الله عليه وسلم) only as a bearer of glad tidings and a warner.</p>
