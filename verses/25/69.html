  <p class="text-emerald-700 font-bold mb-4"><strong>25:69</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يُضَٰعَفۡ لَهُ ٱلۡعَذَابُ يَوۡمَ ٱلۡقِيَٰمَةِ وَيَخۡلُدۡ فِيهِۦ مُهَانًا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">69. The torment will be doubled to him on the Day of Resurrection, and he will abide therein in disgrace;</p>
