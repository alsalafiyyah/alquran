<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Furqan (25:71)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَن تَابَ وَعَمِلَ صَٰلِحٗا فَإِنَّهُۥ يَتُوبُ إِلَى ٱللَّهِ مَتَابٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">71. And whosoever repents and does righteous good deeds; then verily, he repents towards Allâh with true repentance.</p>
