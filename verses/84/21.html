<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Inshiqaq (84:21)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَإِذَا قُرِئَ عَلَيۡهِمُ ٱلۡقُرۡءَانُ لَا يَسۡجُدُونَۤ۩</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">21. And when the Qur’ân is recited to them, they fall not prostrate.</p>
