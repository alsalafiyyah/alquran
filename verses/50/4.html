<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>50:4</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَدۡ عَلِمۡنَا مَا تَنقُصُ ٱلۡأَرۡضُ مِنۡهُمۡۖ وَعِندَنَا كِتَٰبٌ حَفِيظُۢ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">4. We know that which the earth takes of them (their dead bodies), and with Us is a Book preserved (i.e. the Book of Decrees).</p>
