  <p class="text-emerald-700 font-bold mb-4"><strong>50:35</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَهُم مَّا يَشَآءُونَ فِيهَا وَلَدَيۡنَا مَزِيدٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">35. There they will have all that they desire - and We have more (for them, i.e. a glance at the All-Mighty, All-Majestic جل جلاله).</p>
