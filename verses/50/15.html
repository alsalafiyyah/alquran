<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>50:15</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَفَعَيِينَا بِٱلۡخَلۡقِ ٱلۡأَوَّلِۚ بَلۡ هُمۡ فِي لَبۡسٖ مِّنۡ خَلۡقٖ جَدِيدٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">15. Were We then tired with the first creation? Nay, they are in confused doubt about a new creation (i.e. Resurrection).</p>
