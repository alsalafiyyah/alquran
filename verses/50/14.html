<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>50:14</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَأَصۡحَٰبُ ٱلۡأَيۡكَةِ وَقَوۡمُ تُبَّعٖۚ كُلّٞ كَذَّبَ ٱلرُّسُلَ فَحَقَّ وَعِيدِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">14. And the Dwellers of the Wood, and the people of Tubba‘. Everyone of them denied (their) Messengers, so My Threat took effect.</p>
