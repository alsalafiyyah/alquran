<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Qaf (50:42)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يَوۡمَ يَسۡمَعُونَ ٱلصَّيۡحَةَ بِٱلۡحَقِّۚ ذَٰلِكَ يَوۡمُ ٱلۡخُرُوجِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">42. The Day when they will hear As-Saihah (shout) in truth: that will be the Day of coming out (from the graves, i.e. the Day of Resurrection).</p>
</div>
