<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>50:19</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَجَآءَتۡ سَكۡرَةُ ٱلۡمَوۡتِ بِٱلۡحَقِّۖ ذَٰلِكَ مَا كُنتَ مِنۡهُ تَحِيدُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">19. And the stupor of death will come in truth: "This is what you have been avoiding!"</p>
