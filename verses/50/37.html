<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>50:37</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ فِي ذَٰلِكَ لَذِكۡرَىٰ لِمَن كَانَ لَهُۥ قَلۡبٌ أَوۡ أَلۡقَى ٱلسَّمۡعَ وَهُوَ شَهِيدٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">37. Verily, therein is indeed a reminder for him who has a heart or gives ear while he is heedful.</p>
