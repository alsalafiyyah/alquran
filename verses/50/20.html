<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Qaf (50:20)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَنُفِخَ فِي ٱلصُّورِۚ ذَٰلِكَ يَوۡمُ ٱلۡوَعِيدِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">20. And the Trumpet will be blown - that will be the Day whereof warning (had been given) (i.e. the Day of Resurrection).</p>
