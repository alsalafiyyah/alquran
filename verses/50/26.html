<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>50:26</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱلَّذِي جَعَلَ مَعَ ٱللَّهِ إِلَٰهًا ءَاخَرَ فَأَلۡقِيَاهُ فِي ٱلۡعَذَابِ ٱلشَّدِيدِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">26. "Who set up another ilâh (god) with Allâh. Then both of you cast him in the severe torment."</p>
