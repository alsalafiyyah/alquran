  <p class="text-emerald-700 font-bold mb-4"><strong>Qaf (50:29)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">مَا يُبَدَّلُ ٱلۡقَوۡلُ لَدَيَّ وَمَآ أَنَا۠ بِظَلَّٰمٖ لِّلۡعَبِيدِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">29. The Sentence that comes from Me cannot be changed, and I am not unjust to the slaves."</p>
