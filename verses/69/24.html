  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Haqqah (69:24)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">كُلُواْ وَٱشۡرَبُواْ هَنِيٓـَٔۢا بِمَآ أَسۡلَفۡتُمۡ فِي ٱلۡأَيَّامِ ٱلۡخَالِيَةِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">24. Eat and drink at ease for that which you have sent on before you in days past!</p>
