<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Haqqah (69:9)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَجَآءَ فِرۡعَوۡنُ وَمَن قَبۡلَهُۥ وَٱلۡمُؤۡتَفِكَٰتُ بِٱلۡخَاطِئَةِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">9. And Fir‘aun (Pharaoh), and those before him, and the cities overthrown [the towns of the people of [Lût (Lot)] committed sin.</p>
