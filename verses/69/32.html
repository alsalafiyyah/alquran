  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ثُمَّ فِي سِلۡسِلَةٖ ذَرۡعُهَا سَبۡعُونَ ذِرَاعٗا فَٱسۡلُكُوهُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">32. "Then fasten him with a chain whereof the length is seventy cubits!"</p>
