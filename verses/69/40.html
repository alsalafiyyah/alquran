  <p class="text-emerald-700 font-bold mb-4"><strong>69:40</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّهُۥ لَقَوۡلُ رَسُولٖ كَرِيمٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">40. That this is verily, the word of an honoured Messenger [i.e. Jibrîl (Gabriel) or Muhammad صلى الله عليه وسلم which he has brought from Allâh].</p>
