  <p class="text-emerald-700 font-bold mb-4"><strong>69:12</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لِنَجۡعَلَهَا لَكُمۡ تَذۡكِرَةٗ وَتَعِيَهَآ أُذُنٞ وَٰعِيَةٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">12. That We might make it (Noah’s ship) an admonition for you and that it might be retained by the retaining ears.</p>
