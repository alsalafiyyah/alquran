  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Haqqah (69:42)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَا بِقَوۡلِ كَاهِنٖۚ قَلِيلٗا مَّا تَذَكَّرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">42. Nor is it the word of a soothsayer (or a foreteller): little is that you remember!</p>
