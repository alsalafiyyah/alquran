  <p class="text-emerald-700 font-bold mb-4"><strong>69:14</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَحُمِلَتِ ٱلۡأَرۡضُ وَٱلۡجِبَالُ فَدُكَّتَا دَكَّةٗ وَٰحِدَةٗ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">14. And the earth and the mountains shall be removed from their places, and crushed with a single crushing.</p>
