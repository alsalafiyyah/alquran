<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>69:19</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَأَمَّا مَنۡ أُوتِيَ كِتَٰبَهُۥ بِيَمِينِهِۦ فَيَقُولُ هَآؤُمُ ٱقۡرَءُواْ كِتَٰبِيَهۡ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">19. Then as for him who will be given his Record in his right hand will say: "Here! read my Record!</p>
