<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>64:15</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّمَآ أَمۡوَٰلُكُمۡ وَأَوۡلَٰدُكُمۡ فِتۡنَةٞۚ وَٱللَّهُ عِندَهُۥٓ أَجۡرٌ عَظِيمٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">15. Your wealth and your children are only a trial, whereas Allâh! With Him is a great reward (Paradise).</p>
