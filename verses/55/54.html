<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>55:54</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">مُتَّكِـِٔينَ عَلَىٰ فُرُشِۭ بَطَآئِنُهَا مِنۡ إِسۡتَبۡرَقٖۚ وَجَنَى ٱلۡجَنَّتَيۡنِ دَانٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">54. Reclining upon the couches lined with silk brocade, and the fruits of the two Gardens will be near at hand.</p>
