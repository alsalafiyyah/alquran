  <p class="text-emerald-700 font-bold mb-4"><strong>55:9</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَأَقِيمُواْ ٱلۡوَزۡنَ بِٱلۡقِسۡطِ وَلَا تُخۡسِرُواْ ٱلۡمِيزَانَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">9. And observe the weight with equity and do not make the balance deficient.</p>
