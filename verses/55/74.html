<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>55:74</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَمۡ يَطۡمِثۡهُنَّ إِنسٞ قَبۡلَهُمۡ وَلَا جَآنّٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">74. With whom no man or jinni has had tamth[5] before them.</p>
  <div class="mt-6 bg-slate-50 border-l-4 border-slate-300 p-4 text-xs text-slate-500 rounded-r-md leading-relaxed"><small>[5] (V.55:74) Tamth means: Opening their hymens with sexual intercourse.</small></div>
