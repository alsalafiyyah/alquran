<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>55:35</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يُرۡسَلُ عَلَيۡكُمَا شُوَاظٞ مِّن نَّارٖ وَنُحَاسٞ فَلَا تَنتَصِرَانِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">35. There will be sent against you both, smokeless flames of fire and (molten) brass, and you will not be able to defend yourselves.</p>
