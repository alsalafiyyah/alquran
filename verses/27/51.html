<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>27:51</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَٱنظُرۡ كَيۡفَ كَانَ عَٰقِبَةُ مَكۡرِهِمۡ أَنَّا دَمَّرۡنَٰهُمۡ وَقَوۡمَهُمۡ أَجۡمَعِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">51. Then see how was the end of their plot! Verily! We destroyed them and their nation, all together.</p>
