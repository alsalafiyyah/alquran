<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>27:72</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قُلۡ عَسَىٰٓ أَن يَكُونَ رَدِفَ لَكُم بَعۡضُ ٱلَّذِي تَسۡتَعۡجِلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">72. Say: "Perhaps that which you wish to hasten on, may be close behind you.</p>
