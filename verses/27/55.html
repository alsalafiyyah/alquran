<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>27:55</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَئِنَّكُمۡ لَتَأۡتُونَ ٱلرِّجَالَ شَهۡوَةٗ مِّن دُونِ ٱلنِّسَآءِۚ بَلۡ أَنتُمۡ قَوۡمٞ تَجۡهَلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">55. "Do you practise your lusts on men instead of women? Nay, but you are a people who behave senselessly."</p>
