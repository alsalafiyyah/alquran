  <p class="text-emerald-700 font-bold mb-4"><strong>27:20</strong></p>

  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">20. He inspected the birds, and said: "What is the matter that I see not the hoopoe? Or is he among the absentees?</p>
