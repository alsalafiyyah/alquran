  <p class="text-emerald-700 font-bold mb-4"><strong>27:71</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَيَقُولُونَ مَتَىٰ هَٰذَا ٱلۡوَعۡدُ إِن كُنتُمۡ صَٰدِقِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">71. And they (the disbelievers in the Oneness of Allâh) say: "When (will) this promise (be fulfilled), if you are truthful?"</p>
