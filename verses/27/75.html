<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>An-Naml (27:75)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَا مِنۡ غَآئِبَةٖ فِي ٱلسَّمَآءِ وَٱلۡأَرۡضِ إِلَّا فِي كِتَٰبٖ مُّبِينٍ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">75. And there is nothing hidden in the heaven and the earth but it is in a Clear Book (i.e. Al-Lauh Al-Mahfûz).</p>
