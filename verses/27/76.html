<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>27:76</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ هَٰذَا ٱلۡقُرۡءَانَ يَقُصُّ عَلَىٰ بَنِيٓ إِسۡرَٰٓءِيلَ أَكۡثَرَ ٱلَّذِي هُمۡ فِيهِ يَخۡتَلِفُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">76. Verily, this Qur’ân narrates to the Children of Israel most of that in which they differ.</p>
