  <p class="text-emerald-700 font-bold mb-4"><strong>27:50</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَكَرُواْ مَكۡرٗا وَمَكَرۡنَا مَكۡرٗا وَهُمۡ لَا يَشۡعُرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">50. So they plotted a plot, and We plotted a plot, while they perceived not.</p>
