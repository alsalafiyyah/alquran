<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>An-Naml (27:57)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَأَنجَيۡنَٰهُ وَأَهۡلَهُۥٓ إِلَّا ٱمۡرَأَتَهُۥ قَدَّرۡنَٰهَا مِنَ ٱلۡغَٰبِرِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">57. So We saved him and his family, except his wife. We destined her to be of those who remained behind.</p>
