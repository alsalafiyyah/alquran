<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>27:43</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَصَدَّهَا مَا كَانَت تَّعۡبُدُ مِن دُونِ ٱللَّهِۖ إِنَّهَا كَانَتۡ مِن قَوۡمٖ كَٰفِرِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">43. And that which she used to worship besides Allâh has prevented her (from Islâm), for she was of a disbelieving people.</p>
