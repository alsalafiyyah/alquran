<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>27:58</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَأَمۡطَرۡنَا عَلَيۡهِم مَّطَرٗاۖ فَسَآءَ مَطَرُ ٱلۡمُنذَرِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">58. And We rained down on them a rain (of stones). So evil was the rain of those who were warned.</p>
