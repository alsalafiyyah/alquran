  <p class="text-emerald-700 font-bold mb-4"><strong>27:73</strong></p>

  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">73. "Verily, your Lord is full of Grace for mankind, yet most of them do not give thanks."</p>
