<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>An-Naml (27:70)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَا تَحۡزَنۡ عَلَيۡهِمۡ وَلَا تَكُن فِي ضَيۡقٖ مِّمَّا يَمۡكُرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">70. And grieve you not over them, nor be straitened (in distress) because of what they plot.</p>
