<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>27:79</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَتَوَكَّلۡ عَلَى ٱللَّهِۖ إِنَّكَ عَلَى ٱلۡحَقِّ ٱلۡمُبِينِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">79. So put your trust in Allâh; surely, you (O Muhammad صلى الله عليه وسلم) are on manifest truth.</p>
