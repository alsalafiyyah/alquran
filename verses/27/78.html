<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>27:78</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ رَبَّكَ يَقۡضِي بَيۡنَهُم بِحُكۡمِهِۦۚ وَهُوَ ٱلۡعَزِيزُ ٱلۡعَلِيمُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">78. Verily, your Lord will decide between them (various sects) by His Judgement. And He is the All-Mighty, the All-Knowing.</p>
