<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>27:35</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَإِنِّي مُرۡسِلَةٌ إِلَيۡهِم بِهَدِيَّةٖ فَنَاظِرَةُۢ بِمَ يَرۡجِعُ ٱلۡمُرۡسَلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">35. "But verily! I am going to send him a present, and see with what (answer) the messengers return."</p>
