<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>56:70</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَوۡ نَشَآءُ جَعَلۡنَٰهُ أُجَاجٗا فَلَوۡلَا تَشۡكُرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">70. If We willed, We verily could make it salt (and undrinkable): why then do you not give thanks (to Allâh)?</p>
