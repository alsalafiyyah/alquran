<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>56:65</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَوۡ نَشَآءُ لَجَعَلۡنَٰهُ حُطَٰمٗا فَظَلۡتُمۡ تَفَكَّهُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">65. Were it Our Will, We could crumble it to dry pieces, and you would be regretful (or left in wonderment) [Tafsir Ibn Kathîr].</p>
