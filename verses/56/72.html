  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ءَأَنتُمۡ أَنشَأۡتُمۡ شَجَرَتَهَآ أَمۡ نَحۡنُ ٱلۡمُنشِـُٔونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">72. Is it you who made the tree thereof to grow, or are We the Grower?</p>
