<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>56:47</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَكَانُواْ يَقُولُونَ أَئِذَا مِتۡنَا وَكُنَّا تُرَابٗا وَعِظَٰمًا أَءِنَّا لَمَبۡعُوثُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">47. And they used to say: "When we die and become dust and bones, shall we then indeed be resurrected?</p>
