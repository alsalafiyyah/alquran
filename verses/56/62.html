<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>56:62</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَقَدۡ عَلِمۡتُمُ ٱلنَّشۡأَةَ ٱلۡأُولَىٰ فَلَوۡلَا تَذَكَّرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">62. And indeed, you have already known the first form of creation (i.e. the creation of Adam): why then do you not remember (or take heed)?</p>
