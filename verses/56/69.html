  <p class="text-emerald-700 font-bold mb-4"><strong>56:69</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ءَأَنتُمۡ أَنزَلۡتُمُوهُ مِنَ ٱلۡمُزۡنِ أَمۡ نَحۡنُ ٱلۡمُنزِلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">69. Is it you who cause it from the rain-clouds to come down, or are We the Causer of it to come down?</p>
