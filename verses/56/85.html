<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>56:85</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَنَحۡنُ أَقۡرَبُ إِلَيۡهِ مِنكُمۡ وَلَٰكِن لَّا تُبۡصِرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">85. But We (i.e. Our angels who take the soul) are nearer to him than you, but you see not, (Tafsir At-Tabarî)</p>
