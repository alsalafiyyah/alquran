<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Waqi'ah (56:59)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ءَأَنتُمۡ تَخۡلُقُونَهُۥٓ أَمۡ نَحۡنُ ٱلۡخَٰلِقُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">59. Is it you who create it (i.e. make this semen into a perfect human being), or are We the Creator?</p>
