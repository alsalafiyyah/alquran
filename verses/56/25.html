  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Waqi'ah (56:25)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَا يَسۡمَعُونَ فِيهَا لَغۡوٗا وَلَا تَأۡثِيمًا</p>
