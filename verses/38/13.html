  <p class="text-emerald-700 font-bold mb-4"><strong>38:13</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَثَمُودُ وَقَوۡمُ لُوطٖ وَأَصۡحَٰبُ لۡـَٔيۡكَةِۚ أُوْلَٰٓئِكَ ٱلۡأَحۡزَابُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">13. And Thamûd, and the people of Lût (Lot), and the Dwellers of the Wood: such were the Confederates.</p>
