<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>38:48</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَٱذۡكُرۡ إِسۡمَٰعِيلَ وَٱلۡيَسَعَ وَذَا ٱلۡكِفۡلِۖ وَكُلّٞ مِّنَ ٱلۡأَخۡيَارِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">48. And remember Ismâ‘îl (Ishmael), Alyasa‘ (Elisha), and Dhul-Kifl (Isaiah), all are among the best.</p>
