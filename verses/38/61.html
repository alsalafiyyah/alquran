<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>38:61</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ رَبَّنَا مَن قَدَّمَ لَنَا هَٰذَا فَزِدۡهُ عَذَابٗا ضِعۡفٗا فِي ٱلنَّارِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">61. They will say: "Our Lord! Whoever brought this upon us, add to him a double torment in the Fire!"</p>
