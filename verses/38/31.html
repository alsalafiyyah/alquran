<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Sad (38:31)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِذۡ عُرِضَ عَلَيۡهِ بِٱلۡعَشِيِّ ٱلصَّٰفِنَٰتُ ٱلۡجِيَادُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">31. When there were displayed before him, in the afternoon, well trained horses of the highest breed [for Jihâd (holy fighting in Allâh’s Cause)].</p>
