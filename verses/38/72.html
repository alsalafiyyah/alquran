<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>38:72</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَإِذَا سَوَّيۡتُهُۥ وَنَفَخۡتُ فِيهِ مِن رُّوحِي فَقَعُواْ لَهُۥ سَٰجِدِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">72. So when I have fashioned him and breathed into him (his) soul created by Me, then you fall down prostrate to him."</p>
