<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>38:52</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">۞ وَعِندَهُمۡ قَٰصِرَٰتُ ٱلطَّرۡفِ أَتۡرَابٌ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">52. And beside them will be Qâsirât-at-Tarf [chaste females (wives) restraining their glances (desiring none except their husbands)], (and) of equal ages.</p>
