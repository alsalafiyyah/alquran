<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>38:39</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">هَٰذَا عَطَآؤُنَا فَٱمۡنُنۡ أَوۡ أَمۡسِكۡ بِغَيۡرِ حِسَابٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">39. [Allâh said to Sulaimân (Solomon)]: "This is Our gift: so spend you or withhold, no account will be asked (of you)."</p>
