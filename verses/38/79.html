<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Sad (38:79)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ رَبِّ فَأَنظِرۡنِيٓ إِلَىٰ يَوۡمِ يُبۡعَثُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">79. [Iblîs (Satan)] said: "My Lord! Give me then respite till the Day the (dead) are resurrected."</p>
