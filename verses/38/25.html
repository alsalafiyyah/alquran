<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>38:25</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَغَفَرۡنَا لَهُۥ ذَٰلِكَۖ وَإِنَّ لَهُۥ عِندَنَا لَزُلۡفَىٰ وَحُسۡنَ مَـَٔابٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">25. So We forgave him that, and verily, for him is a near access to Us, and a good place of (final) return (Paradise).</p>
