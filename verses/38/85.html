<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Sad (38:85)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَأَمۡلَأَنَّ جَهَنَّمَ مِنكَ وَمِمَّن تَبِعَكَ مِنۡهُمۡ أَجۡمَعِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">85. That I will fill Hell with you [Iblîs (Satan)] and those of them (mankind) that follow you, together."</p>
