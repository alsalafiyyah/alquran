<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>38:16</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَقَالُواْ رَبَّنَا عَجِّل لَّنَا قِطَّنَا قَبۡلَ يَوۡمِ ٱلۡحِسَابِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">16. They say: "Our Lord! Hasten to us Qittanâ (i.e. our Record of good and bad deeds so that we may see it) before the Day of Reckoning!"</p>
