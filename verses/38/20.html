<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>38:20</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَشَدَدۡنَا مُلۡكَهُۥ وَءَاتَيۡنَٰهُ ٱلۡحِكۡمَةَ وَفَصۡلَ ٱلۡخِطَابِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">20. We made his kingdom strong and gave him Al-Hikmah (Prophethood) and sound judgement in speech and decision.</p>
