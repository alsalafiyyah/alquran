  <p class="text-emerald-700 font-bold mb-4"><strong>Sad (38:69)</strong></p>

  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">69. "I had no knowledge of the chiefs (angels) on high when they were disputing and discussing (about the creation of Adam).</p>
