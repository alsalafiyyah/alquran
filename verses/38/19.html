<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>38:19</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَٱلطَّيۡرَ مَحۡشُورَةٗۖ كُلّٞ لَّهُۥٓ أَوَّابٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">19. And (so did) the birds assembled: all obedient to him [Dâwûd (David)] [i.e. they came and glorified Allâh’s Praises along with him]. (Tafsir Al-Qurtubi ).</p>
