<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>38:33</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">رُدُّوهَا عَلَيَّۖ فَطَفِقَ مَسۡحَۢا بِٱلسُّوقِ وَٱلۡأَعۡنَاقِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">33. Then he said "Bring them (horses) back to me." Then he began to pass his hand over their legs and their necks (till the end of the display).</p>
