  <p class="text-emerald-700 font-bold mb-4"><strong>38:36</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَسَخَّرۡنَا لَهُ ٱلرِّيحَ تَجۡرِي بِأَمۡرِهِۦ رُخَآءً حَيۡثُ أَصَابَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">36. So, We subjected to him the wind; it blew gently by his order whithersoever he willed,</p>
