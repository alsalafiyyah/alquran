<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>38:71</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِذۡ قَالَ رَبُّكَ لِلۡمَلَٰٓئِكَةِ إِنِّي خَٰلِقُۢ بَشَرٗا مِّن طِينٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">71. (Remember) when your Lord said to the angels: "Truly I am going to create man from clay".</p>
