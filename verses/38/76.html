<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Sad (38:76)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ أَنَا۠ خَيۡرٞ مِّنۡهُ خَلَقۡتَنِي مِن نَّارٖ وَخَلَقۡتَهُۥ مِن طِينٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">76. [Iblîs (Satan)] said: "I am better than he. You created me from fire, and You created him from clay."</p>
