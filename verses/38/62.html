<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>38:62</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَقَالُواْ مَا لَنَا لَا نَرَىٰ رِجَالٗا كُنَّا نَعُدُّهُم مِّنَ ٱلۡأَشۡرَارِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">62. And they will say: "What is the matter with us that we see not men whom we used to count among the bad ones?"</p>
