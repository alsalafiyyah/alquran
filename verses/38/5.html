  <p class="text-emerald-700 font-bold mb-4"><strong>38:5</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَجَعَلَ ٱلۡأٓلِهَةَ إِلَٰهٗا وَٰحِدًاۖ إِنَّ هَٰذَا لَشَيۡءٌ عُجَابٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">5. "Has he made the âlihah (gods) (all) into One Ilâh (God - Allâh). Verily, this is a curious thing!"</p>
