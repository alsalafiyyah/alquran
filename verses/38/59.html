<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Sad (38:59)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">هَٰذَا فَوۡجٞ مُّقۡتَحِمٞ مَّعَكُمۡ لَا مَرۡحَبَۢا بِهِمۡۚ إِنَّهُمۡ صَالُواْ ٱلنَّارِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">59. This is a troop entering with you (in Hell), no welcome for them! Verily, they shall burn in the Fire!</p>
