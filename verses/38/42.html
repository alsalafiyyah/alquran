<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Sad (38:42)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱرۡكُضۡ بِرِجۡلِكَۖ هَٰذَا مُغۡتَسَلُۢ بَارِدٞ وَشَرَابٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">42. (Allâh said to him): "Strike the ground with your foot: This is (a spring of) water to wash in, cool and a (refreshing) drink."</p>
