<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>38:30</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَوَهَبۡنَا لِدَاوُۥدَ سُلَيۡمَٰنَۚ نِعۡمَ ٱلۡعَبۡدُ إِنَّهُۥٓ أَوَّابٌ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">30. And to Dâwûd (David) We gave Sulaimân (Solomon). How excellent a slave! Verily, he was ever oft-returning in repentance (to Us)!</p>
