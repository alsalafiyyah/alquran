<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>38:3</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">كَمۡ أَهۡلَكۡنَا مِن قَبۡلِهِم مِّن قَرۡنٖ فَنَادَواْ وَّلَاتَ حِينَ مَنَاصٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">3. How many a generation have We destroyed before them! And they cried out when there was no longer time for escape.</p>
