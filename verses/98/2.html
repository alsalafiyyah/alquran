<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>98:2</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">رَسُولٞ مِّنَ ٱللَّهِ يَتۡلُواْ صُحُفٗا مُّطَهَّرَةٗ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">2. A Messenger (Muhammad صلى الله عليه وسلم) from Allâh, reciting (the Qur’ân) purified pages [purified from Al-Bâtil (falsehood)].</p>
