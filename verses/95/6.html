<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>95:6</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِلَّا ٱلَّذِينَ ءَامَنُواْ وَعَمِلُواْ ٱلصَّٰلِحَٰتِ فَلَهُمۡ أَجۡرٌ غَيۡرُ مَمۡنُونٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">6. Save those who believe (in Islâmic Monotheism) and do righteous deeds. Then they shall have a reward without end (Paradise).</p>
