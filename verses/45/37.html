<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>45:37</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَهُ ٱلۡكِبۡرِيَآءُ فِي ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِۖ وَهُوَ ٱلۡعَزِيزُ ٱلۡحَكِيمُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">37. And His (Alone) is the Majesty in the heavens and the earth, and He is the All-Mighty, the All-Wise.</p>
