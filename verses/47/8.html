<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>47:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَٱلَّذِينَ كَفَرُواْ فَتَعۡسٗا لَّهُمۡ وَأَضَلَّ أَعۡمَٰلَهُمۡ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">8. But those who disbelieve (in the Oneness of Allâh - Islâmic Monotheism), for them is destruction, and (Allâh) will make their deeds vain.</p>
