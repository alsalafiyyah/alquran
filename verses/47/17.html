<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Muhammad (47:17)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَٱلَّذِينَ ٱهۡتَدَوۡاْ زَادَهُمۡ هُدٗى وَءَاتَىٰهُمۡ تَقۡوَىٰهُمۡ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">17. While as for those who accept guidance, He increases their guidance and bestows on them their piety.</p>
