<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>47:9</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ذَٰلِكَ بِأَنَّهُمۡ كَرِهُواْ مَآ أَنزَلَ ٱللَّهُ فَأَحۡبَطَ أَعۡمَٰلَهُمۡ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">9. That is because they hate that which Allâh has sent down (this Qur’ân and Islâmic laws, etc.); so He has made their deeds fruitless.</p>
