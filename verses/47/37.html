<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>47:37</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِن يَسۡـَٔلۡكُمُوهَا فَيُحۡفِكُمۡ تَبۡخَلُواْ وَيُخۡرِجۡ أَضۡغَٰنَكُمۡ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">37. If He were to ask you of it, and press you, you would covetously withhold, and He will bring out all your (secret) ill-wills.</p>
