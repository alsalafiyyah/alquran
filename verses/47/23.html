<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>47:23</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أُوْلَٰٓئِكَ ٱلَّذِينَ لَعَنَهُمُ ٱللَّهُ فَأَصَمَّهُمۡ وَأَعۡمَىٰٓ أَبۡصَٰرَهُمۡ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">23. Such are they whom Allâh has cursed, so that He has made them deaf and blinded their sight.</p>
