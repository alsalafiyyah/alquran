<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Muhammad (47:24)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَفَلَا يَتَدَبَّرُونَ ٱلۡقُرۡءَانَ أَمۡ عَلَىٰ قُلُوبٍ أَقۡفَالُهَآ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">24. Do they not then think deeply in the Qur’ân, or are their hearts locked up (from understanding it)?</p>
