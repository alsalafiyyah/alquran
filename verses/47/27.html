<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>47:27</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَكَيۡفَ إِذَا تَوَفَّتۡهُمُ ٱلۡمَلَٰٓئِكَةُ يَضۡرِبُونَ وُجُوهَهُمۡ وَأَدۡبَٰرَهُمۡ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">27. Then how (will it be) when the angels will take their souls at death, smiting their faces and their backs?</p>
