<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>47:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوٓاْ إِن تَنصُرُواْ ٱللَّهَ يَنصُرۡكُمۡ وَيُثَبِّتۡ أَقۡدَامَكُمۡ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">7. O you who believe! If you help (in the cause of) Allâh, He will help you, and make your foothold firm.</p>
