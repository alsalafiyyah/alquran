<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>96:19</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">كَلَّا لَا تُطِعۡهُ وَٱسۡجُدۡۤ وَٱقۡتَرِب۩</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">19. Nay! (O Muhammad صلى الله عليه وسلم)! Do not obey him (Abû Jahl). Fall prostrate and draw near to Allâh!</p>
