<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>42:34</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَوۡ يُوبِقۡهُنَّ بِمَا كَسَبُواْ وَيَعۡفُ عَن كَثِيرٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">34. Or He may destroy them (by shipwreck) because of that which their (people) have earned. And He pardons much.</p>
