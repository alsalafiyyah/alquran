<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>42:43</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَمَن صَبَرَ وَغَفَرَ إِنَّ ذَٰلِكَ لَمِنۡ عَزۡمِ ٱلۡأُمُورِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">43. And verily, whosoever shows patience and forgives, that would truly be from the things recommended by Allâh.</p>
