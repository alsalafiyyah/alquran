<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>42:4</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَهُۥ مَا فِي ٱلسَّمَٰوَٰتِ وَمَا فِي ٱلۡأَرۡضِۖ وَهُوَ ٱلۡعَلِيُّ ٱلۡعَظِيمُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">4. To Him belongs all that is in the heavens and all that is in the earth, and He is the Most High, the Most Great.</p>
