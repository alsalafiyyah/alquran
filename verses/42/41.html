<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Ash-Shura (42:41)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَمَنِ ٱنتَصَرَ بَعۡدَ ظُلۡمِهِۦ فَأُوْلَٰٓئِكَ مَا عَلَيۡهِم مِّن سَبِيلٍ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">41. And indeed whosoever takes revenge after he has suffered wrong, for such there is no way (of blame) against them.</p>
