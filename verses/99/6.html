  <p class="text-emerald-700 font-bold mb-4"><strong>99:6</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يَوۡمَئِذٖ يَصۡدُرُ ٱلنَّاسُ أَشۡتَاتٗا لِّيُرَوۡاْ أَعۡمَٰلَهُمۡ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">6. That Day mankind will proceed in scattered groups that they may be shown their deeds.[1]</p>
