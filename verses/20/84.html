<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>20:84</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ هُمۡ أُوْلَآءِ عَلَىٰٓ أَثَرِي وَعَجِلۡتُ إِلَيۡكَ رَبِّ لِتَرۡضَىٰ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">84. He said: "They are close on my footsteps: and I hastened to You, O my Lord, that You might be pleased."</p>
