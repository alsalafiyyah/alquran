  <p class="text-emerald-700 font-bold mb-4"><strong>20:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱللَّهُ لَآ إِلَٰهَ إِلَّا هُوَۖ لَهُ ٱلۡأَسۡمَآءُ ٱلۡحُسۡنَىٰ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">8. Allâh! Lâ ilâha illa Huwa (none has the right to be worshipped but He)! To Him belong the Best Names.[1]</p>
