<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>20:65</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ يَٰمُوسَىٰٓ إِمَّآ أَن تُلۡقِيَ وَإِمَّآ أَن نَّكُونَ أَوَّلَ مَنۡ أَلۡقَىٰ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">65. They said: "O Mûsâ (Moses)! Either you throw first or we be the first to throw?"</p>
