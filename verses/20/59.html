<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Ta-Ha (20:59)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ مَوۡعِدُكُمۡ يَوۡمُ ٱلزِّينَةِ وَأَن يُحۡشَرَ ٱلنَّاسُ ضُحٗى</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">59. [Mûsâ (Moses)] said: "Your appointed meeting is the day of the festival, and let the people assemble when the sun has risen (forenoon)."</p>
