  <p class="text-emerald-700 font-bold mb-4"><strong>20:12</strong></p>

  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">12. "Verily I am your Lord! So take off your shoes; you are in the sacred valley, Tuwa.</p>
