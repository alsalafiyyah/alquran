<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>20:54</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">كُلُواْ وَٱرۡعَوۡاْ أَنۡعَٰمَكُمۡۚ إِنَّ فِي ذَٰلِكَ لَأٓيَٰتٖ لِّأُوْلِي ٱلنُّهَىٰ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">54. Eat and pasture your cattle (therein); verily, in this are Ayât (proofs and signs) for men of understanding.</p>
