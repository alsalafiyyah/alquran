<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>20:56</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَقَدۡ أَرَيۡنَٰهُ ءَايَٰتِنَا كُلَّهَا فَكَذَّبَ وَأَبَىٰ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">56. And indeed We showed him [Fir‘aun (Pharaoh)] all Our Ayât (signs and evidence), but he denied and refused.</p>
