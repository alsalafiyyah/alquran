<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>20:45</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَا رَبَّنَآ إِنَّنَا نَخَافُ أَن يَفۡرُطَ عَلَيۡنَآ أَوۡ أَن يَطۡغَىٰ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">45. They said: "Our Lord! Verily we fear lest he should hasten to punish us or lest he should transgress (all bounds against us)."</p>
