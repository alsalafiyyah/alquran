<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>20:70</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَأُلۡقِيَ ٱلسَّحَرَةُ سُجَّدٗا قَالُوٓاْ ءَامَنَّا بِرَبِّ هَٰرُونَ وَمُوسَىٰ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">70. So the magicians fell down prostrate. They said: "We believe in the Lord of Hârûn (Aaron) and Mûsâ (Moses)."</p>
