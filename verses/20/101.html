<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>20:101</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">خَٰلِدِينَ فِيهِۖ وَسَآءَ لَهُمۡ يَوۡمَ ٱلۡقِيَٰمَةِ حِمۡلٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">101. They will abide in that (state in the Fire of Hell) - and evil indeed will it be that load for them on the Day of Resurrection;</p>
