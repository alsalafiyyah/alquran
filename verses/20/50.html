<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>20:50</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ رَبُّنَا ٱلَّذِيٓ أَعۡطَىٰ كُلَّ شَيۡءٍ خَلۡقَهُۥ ثُمَّ هَدَىٰ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">50. [Mûsâ (Moses)] said: "Our Lord is He Who gave to each thing its form and nature, then guided it aright."</p>
