  <p class="text-emerald-700 font-bold mb-4"><strong>20:62</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَتَنَٰزَعُوٓاْ أَمۡرَهُم بَيۡنَهُمۡ وَأَسَرُّواْ ٱلنَّجۡوَىٰ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">62. Then they debated one with another what they must do, and they kept their talk secret.</p>
