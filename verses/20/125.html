<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>20:125</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ رَبِّ لِمَ حَشَرۡتَنِيٓ أَعۡمَىٰ وَقَدۡ كُنتُ بَصِيرٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">125. He will say: "O my Lord! Why have you raised me up blind, while I had sight (before)."</p>
