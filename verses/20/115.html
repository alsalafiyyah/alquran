<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>20:115</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَقَدۡ عَهِدۡنَآ إِلَىٰٓ ءَادَمَ مِن قَبۡلُ فَنَسِيَ وَلَمۡ نَجِدۡ لَهُۥ عَزۡمٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">115. And indeed We made a covenant with Adam before, but he forgot, and We found on his part no firm will-power.</p>
