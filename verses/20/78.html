<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>20:78</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَأَتۡبَعَهُمۡ فِرۡعَوۡنُ بِجُنُودِهِۦ فَغَشِيَهُم مِّنَ ٱلۡيَمِّ مَا غَشِيَهُمۡ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">78. Then Fir‘aun (Pharaoh) pursued them with his hosts, but the sea-water completely overwhelmed them and covered them up.</p>
