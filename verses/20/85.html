<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>20:85</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ فَإِنَّا قَدۡ فَتَنَّا قَوۡمَكَ مِنۢ بَعۡدِكَ وَأَضَلَّهُمُ ٱلسَّامِرِيُّ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">85. (Allâh) said: "Verily We have tried your people in your absence, and As-Sâmirî has led them astray."</p>
