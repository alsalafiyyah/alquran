<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Ta-Ha (20:52)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ عِلۡمُهَا عِندَ رَبِّي فِي كِتَٰبٖۖ لَّا يَضِلُّ رَبِّي وَلَا يَنسَى</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">52. [Mûsâ (Moses)] said: "The knowledge thereof is with my Lord, in a Record. My Lord neither errs nor He forgets."</p>
