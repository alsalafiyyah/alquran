<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>20:91</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ لَن نَّبۡرَحَ عَلَيۡهِ عَٰكِفِينَ حَتَّىٰ يَرۡجِعَ إِلَيۡنَا مُوسَىٰ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">91. They said: "We will not stop worshipping it (i.e. the calf), until Mûsâ (Moses) returns to us."</p>
