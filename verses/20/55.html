<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>20:55</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">۞ مِنۡهَا خَلَقۡنَٰكُمۡ وَفِيهَا نُعِيدُكُمۡ وَمِنۡهَا نُخۡرِجُكُمۡ تَارَةً أُخۡرَىٰ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">55. Thereof (the earth) We created you, and into it We shall return you, and from it We shall bring you out once again.</p>
