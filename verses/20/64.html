<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>20:64</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَأَجۡمِعُواْ كَيۡدَكُمۡ ثُمَّ ٱئۡتُواْ صَفّٗاۚ وَقَدۡ أَفۡلَحَ ٱلۡيَوۡمَ مَنِ ٱسۡتَعۡلَىٰ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">64. "So devise your plot, and then assemble in line. And whoever overcomes this day will be indeed successful."</p>
