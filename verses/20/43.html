  <p class="text-emerald-700 font-bold mb-4"><strong>20:43</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱذۡهَبَآ إِلَىٰ فِرۡعَوۡنَ إِنَّهُۥ طَغَىٰ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">43. "Go, both of you, to Fir‘aun (Pharaoh), verily, he has transgressed (all bounds in disbelief and disobedience and behaved as an arrogant and as a tyrant).</p>
