<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>20:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَإِن تَجۡهَرۡ بِٱلۡقَوۡلِ فَإِنَّهُۥ يَعۡلَمُ ٱلسِّرَّ وَأَخۡفَى</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">7. And if you (O Muhammad صلى الله عليه وسلم) speak (the invocation) aloud, then verily, He knows the secret and that which is yet more hidden.</p>
