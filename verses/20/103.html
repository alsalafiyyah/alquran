<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>20:103</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يَتَخَٰفَتُونَ بَيۡنَهُمۡ إِن لَّبِثۡتُمۡ إِلَّا عَشۡرٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">103. They will speak in a very low voice to each other (saying): "You stayed not longer than ten (days)."</p>
