<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>43:72</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَتِلۡكَ ٱلۡجَنَّةُ ٱلَّتِيٓ أُورِثۡتُمُوهَا بِمَا كُنتُمۡ تَعۡمَلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">72. This is the Paradise which you have been made to inherit because of your deeds which you used to do (in the life of the world).</p>
