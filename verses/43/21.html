<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>43:21</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَمۡ ءَاتَيۡنَٰهُمۡ كِتَٰبٗا مِّن قَبۡلِهِۦ فَهُم بِهِۦ مُسۡتَمۡسِكُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">21. Or have We given them any Book before this (the Qur’ân) to which they are holding fast?</p>
