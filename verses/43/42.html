<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>43:42</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَوۡ نُرِيَنَّكَ ٱلَّذِي وَعَدۡنَٰهُمۡ فَإِنَّا عَلَيۡهِم مُّقۡتَدِرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">42. Or (if) We show you that wherewith We threaten them: then verily We have perfect command over them.</p>
