<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Az-Zukhruf (43:41)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَإِمَّا نَذۡهَبَنَّ بِكَ فَإِنَّا مِنۡهُم مُّنتَقِمُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">41. And even if We take you (O Muhammad صلى الله عليه و سلم) away, We shall indeed take vengeance on them.</p>
