<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>43:25</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَٱنتَقَمۡنَا مِنۡهُمۡۖ فَٱنظُرۡ كَيۡفَ كَانَ عَٰقِبَةُ ٱلۡمُكَذِّبِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">25. So We took revenge on them, then see what was the end of those who denied (Islâmic Monotheism).</p>
