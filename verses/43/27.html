  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِلَّا ٱلَّذِي فَطَرَنِي فَإِنَّهُۥ سَيَهۡدِينِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">27. "Except Him (i.e. I worship none but Allâh Alone) Who did create me; and verily He will guide me."</p>
