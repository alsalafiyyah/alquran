<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>43:47</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَلَمَّا جَآءَهُم بِـَٔايَٰتِنَآ إِذَا هُم مِّنۡهَا يَضۡحَكُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">47. But when he came to them with Our Ayât (proofs, evidence, verses, lessons, signs, revelations) behold, they laughed at them.</p>
