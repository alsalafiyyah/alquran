<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>43:50</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَلَمَّا كَشَفۡنَا عَنۡهُمُ ٱلۡعَذَابَ إِذَا هُمۡ يَنكُثُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">50. But when We removed the torment from them, behold, they broke their covenant (that they will believe if We remove the torment from them).</p>
