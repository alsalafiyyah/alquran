  <p class="text-emerald-700 font-bold mb-4"><strong>43:52</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَمۡ أَنَا۠ خَيۡرٞ مِّنۡ هَٰذَا ٱلَّذِي هُوَ مَهِينٞ وَلَا يَكَادُ يُبِينُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">52. "Am I not better than this one [Mûsâ (Moses)] who is despicable and can scarcely express himself clearly?</p>
