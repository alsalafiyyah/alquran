<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>43:40</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَفَأَنتَ تُسۡمِعُ ٱلصُّمَّ أَوۡ تَهۡدِي ٱلۡعُمۡيَ وَمَن كَانَ فِي ضَلَٰلٖ مُّبِينٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">40. Can you (O Muhammad صلى الله عليه و سلم) make the deaf to hear, or can you guide the blind or him who is in manifest error?</p>
