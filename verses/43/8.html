<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Az-Zukhruf (43:8)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَأَهۡلَكۡنَآ أَشَدَّ مِنۡهُم بَطۡشٗا وَمَضَىٰ مَثَلُ ٱلۡأَوَّلِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">8. Then We destroyed men stronger (in power) than these - and the example of the ancients has passed away (before them).</p>
