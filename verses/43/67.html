  <p class="text-emerald-700 font-bold mb-4"><strong>43:67</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱلۡأَخِلَّآءُ يَوۡمَئِذِۭ بَعۡضُهُمۡ لِبَعۡضٍ عَدُوٌّ إِلَّا ٱلۡمُتَّقِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">67. Friends on that Day will be foes one to another except Al-Muttaqûn (the pious. See V.2:2).</p>
