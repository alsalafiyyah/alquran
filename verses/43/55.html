  <p class="text-emerald-700 font-bold mb-4"><strong>43:55</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَلَمَّآ ءَاسَفُونَا ٱنتَقَمۡنَا مِنۡهُمۡ فَأَغۡرَقۡنَٰهُمۡ أَجۡمَعِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">55. So when they angered Us, We punished them, and drowned them all.</p>
