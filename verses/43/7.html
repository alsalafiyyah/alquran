<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>43:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَا يَأۡتِيهِم مِّن نَّبِيٍّ إِلَّا كَانُواْ بِهِۦ يَسۡتَهۡزِءُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">7. And never came there a Prophet to them but they used to mock at him.</p>
