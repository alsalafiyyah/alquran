<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>43:37</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَإِنَّهُمۡ لَيَصُدُّونَهُمۡ عَنِ ٱلسَّبِيلِ وَيَحۡسَبُونَ أَنَّهُم مُّهۡتَدُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">37. And verily, they (Satans / devils) hinder them from the Path (of Allâh), but they think that they are guided aright!</p>
