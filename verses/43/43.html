<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>43:43</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَٱسۡتَمۡسِكۡ بِٱلَّذِيٓ أُوحِيَ إِلَيۡكَۖ إِنَّكَ عَلَىٰ صِرَٰطٖ مُّسۡتَقِيمٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">43. So hold you (O Muhammad صلى الله عليه و سلم) fast to that which is revealed to you. Verily you are on the Straight Path.</p>
