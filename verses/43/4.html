<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>43:4</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَإِنَّهُۥ فِيٓ أُمِّ ٱلۡكِتَٰبِ لَدَيۡنَا لَعَلِيٌّ حَكِيمٌ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">4. And verily, it (this Qur’ân) is in the Mother of the Book (i.e. Al-Lauh Al-Mahfûz), with Us, indeed exalted, full of wisdom.</p>
