<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>43:31</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَقَالُواْ لَوۡلَا نُزِّلَ هَٰذَا ٱلۡقُرۡءَانُ عَلَىٰ رَجُلٖ مِّنَ ٱلۡقَرۡيَتَيۡنِ عَظِيمٍ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">31. And they say: "Why is not this Qur’ân sent down to some great man of the two towns (Makkah and Tâ’if)?"</p>
