<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Az-Zukhruf (43:3)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّا جَعَلۡنَٰهُ قُرۡءَٰنًا عَرَبِيّٗا لَّعَلَّكُمۡ تَعۡقِلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">3. Verily, We have made it a Qur’ân in Arabic that you may be able to understand (its meanings and its admonitions).</p>
