<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>43:10</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱلَّذِي جَعَلَ لَكُمُ ٱلۡأَرۡضَ مَهۡدٗا وَجَعَلَ لَكُمۡ فِيهَا سُبُلٗا لَّعَلَّكُمۡ تَهۡتَدُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">10. Who has made for you the earth like a bed, and has made for you roads therein, in order that you may find your way.</p>
