<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>43:66</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">هَلۡ يَنظُرُونَ إِلَّا ٱلسَّاعَةَ أَن تَأۡتِيَهُم بَغۡتَةٗ وَهُمۡ لَا يَشۡعُرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">66. Do they only wait for the Hour that it shall come upon them suddenly, while they perceive not?</p>
