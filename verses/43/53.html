<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>43:53</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَلَوۡلَآ أُلۡقِيَ عَلَيۡهِ أَسۡوِرَةٞ مِّن ذَهَبٍ أَوۡ جَآءَ مَعَهُ ٱلۡمَلَٰٓئِكَةُ مُقۡتَرِنِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">53. "Why then are not golden bracelets bestowed on him, or angels sent along with him?"</p>
