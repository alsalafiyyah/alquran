<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>49:18</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ ٱللَّهَ يَعۡلَمُ غَيۡبَ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِۚ وَٱللَّهُ بَصِيرُۢ بِمَا تَعۡمَلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">18. Verily, Allâh knows the Unseen of the heavens and the earth. And Allâh is the All-Seer of what you do.</p>
