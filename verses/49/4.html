  <p class="text-emerald-700 font-bold mb-4"><strong>49:4</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ ٱلَّذِينَ يُنَادُونَكَ مِن وَرَآءِ ٱلۡحُجُرَٰتِ أَكۡثَرُهُمۡ لَا يَعۡقِلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">4. Verily those who call you from behind the dwellings, most of them have no sense.</p>
