  <p class="text-emerald-700 font-bold mb-4"><strong>9:22</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">خَٰلِدِينَ فِيهَآ أَبَدًاۚ إِنَّ ٱللَّهَ عِندَهُۥٓ أَجۡرٌ عَظِيمٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">22. They will dwell therein forever. Verily, with Allâh is a great reward.</p>
