<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>At-Tawbah (9:27)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ثُمَّ يَتُوبُ ٱللَّهُ مِنۢ بَعۡدِ ذَٰلِكَ عَلَىٰ مَن يَشَآءُۗ وَٱللَّهُ غَفُورٞ رَّحِيمٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">27. Then after that Allâh will accept the repentance of whom He wills. And Allâh is Oft-Forgiving, Most Merciful.</p>
