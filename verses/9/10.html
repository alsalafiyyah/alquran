<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>9:10</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَا يَرۡقُبُونَ فِي مُؤۡمِنٍ إِلّٗا وَلَا ذِمَّةٗۚ وَأُوْلَٰٓئِكَ هُمُ ٱلۡمُعۡتَدُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">10. With regard to a believer, they respect not the ties, either of kinship or of covenant! It is they who are the transgressors.</p>
