<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>72:20</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قُلۡ إِنَّمَآ أَدۡعُواْ رَبِّي وَلَآ أُشۡرِكُ بِهِۦٓ أَحَدٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">20. Say (O Muhammad صلى الله عليه وسلم): "I invoke only my Lord (Allâh Alone), and I associate none as partners along with Him."</p>
