  <p class="text-emerald-700 font-bold mb-4"><strong>72:5</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَأَنَّا ظَنَنَّآ أَن لَّن تَقُولَ ٱلۡإِنسُ وَٱلۡجِنُّ عَلَى ٱللَّهِ كَذِبٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">5. ‘And verily, we thought that men and jinn would not utter a lie against Allâh.</p>
