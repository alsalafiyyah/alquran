<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>72:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَأَنَّا لَمَسۡنَا ٱلسَّمَآءَ فَوَجَدۡنَٰهَا مُلِئَتۡ حَرَسٗا شَدِيدٗا وَشُهُبٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">8. ‘And we have sought to reach the heaven; but found it filled with stern guards and flaming fires.</p>
