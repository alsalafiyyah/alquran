<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Jinn (72:12)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَأَنَّا ظَنَنَّآ أَن لَّن نُّعۡجِزَ ٱللَّهَ فِي ٱلۡأَرۡضِ وَلَن نُّعۡجِزَهُۥ هَرَبٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">12. ‘And we think that we cannot escape (the punishment of) Allâh in the earth, nor can we escape Him by flight.</p>
