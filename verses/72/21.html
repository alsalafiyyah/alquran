  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Jinn (72:21)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قُلۡ إِنِّي لَآ أَمۡلِكُ لَكُمۡ ضَرّٗا وَلَا رَشَدٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">21. Say: "It is not in my power to cause you harm, or to bring you to the Right Path."</p>
