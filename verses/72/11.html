  <p class="text-emerald-700 font-bold mb-4"><strong>72:11</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَأَنَّا مِنَّا ٱلصَّٰلِحُونَ وَمِنَّا دُونَ ذَٰلِكَۖ كُنَّا طَرَآئِقَ قِدَدٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">11. ‘There are among us some that are righteous, and some the contrary; we are groups having different ways (religious sects).</p>
