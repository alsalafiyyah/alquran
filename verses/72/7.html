<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>72:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَأَنَّهُمۡ ظَنُّواْ كَمَا ظَنَنتُمۡ أَن لَّن يَبۡعَثَ ٱللَّهُ أَحَدٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">7. ‘And they thought as you thought, that Allâh will not send any Messenger (to mankind or jinn).</p>
