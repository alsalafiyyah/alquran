<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>85:20</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَٱللَّهُ مِن وَرَآئِهِم مُّحِيطُۢ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">20. And Allâh encompasses them from behind! (i.e. all their deeds are within His Knowledge, and He will requite them for their deeds).</p>
