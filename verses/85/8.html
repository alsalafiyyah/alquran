<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>85:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَا نَقَمُواْ مِنۡهُمۡ إِلَّآ أَن يُؤۡمِنُواْ بِٱللَّهِ ٱلۡعَزِيزِ ٱلۡحَمِيدِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">8. And they had no fault except that they believed in Allâh, the All-Mighty, Worthy of all Praise!</p>
