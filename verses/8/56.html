<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>8:56</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱلَّذِينَ عَٰهَدتَّ مِنۡهُمۡ ثُمَّ يَنقُضُونَ عَهۡدَهُمۡ فِي كُلِّ مَرَّةٖ وَهُمۡ لَا يَتَّقُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">56. They are those with whom you made a covenant, but they break their covenant every time and they do not fear Allâh.</p>
