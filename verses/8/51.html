<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>8:51</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ذَٰلِكَ بِمَا قَدَّمَتۡ أَيۡدِيكُمۡ وَأَنَّ ٱللَّهَ لَيۡسَ بِظَلَّٰمٖ لِّلۡعَبِيدِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">51. "This is because of that which your hands had forwarded. And verily, Allâh is not unjust to His slaves."</p>
