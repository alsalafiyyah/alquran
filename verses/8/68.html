<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>8:68</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَّوۡلَا كِتَٰبٞ مِّنَ ٱللَّهِ سَبَقَ لَمَسَّكُمۡ فِيمَآ أَخَذۡتُمۡ عَذَابٌ عَظِيمٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">68. Were it not a previous ordainment from Allâh, a severe torment would have touched you for what you took.</p>
