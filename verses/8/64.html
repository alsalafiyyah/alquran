<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>8:64</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يَٰٓأَيُّهَا ٱلنَّبِيُّ حَسۡبُكَ ٱللَّهُ وَمَنِ ٱتَّبَعَكَ مِنَ ٱلۡمُؤۡمِنِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">64. O Prophet (Muhammad صلى الله عليه وسلم)! Allâh is Sufficient for you and for the believers who follow you.</p>
