  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ذَٰلِكُمۡ وَأَنَّ ٱللَّهَ مُوهِنُ كَيۡدِ ٱلۡكَٰفِرِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">18. This (is the fact) and surely, Allâh weakens the deceitful plots of the disbelievers.</p>
