<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>18:43</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَمۡ تَكُن لَّهُۥ فِئَةٞ يَنصُرُونَهُۥ مِن دُونِ ٱللَّهِ وَمَا كَانَ مُنتَصِرًا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">43. And he had no group of men to help him against Allâh, nor could he defend (or save) himself.</p>
