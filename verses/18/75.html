  <p class="text-emerald-700 font-bold mb-4"><strong>18:75</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">۞ قَالَ أَلَمۡ أَقُل لَّكَ إِنَّكَ لَن تَسۡتَطِيعَ مَعِيَ صَبۡرٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">75. (Khidr) said: "Did I not tell you that you can have no patience with me?"</p>
