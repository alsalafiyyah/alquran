  <p class="text-emerald-700 font-bold mb-4"><strong>18:83</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَيَسۡـَٔلُونَكَ عَن ذِي ٱلۡقَرۡنَيۡنِۖ قُلۡ سَأَتۡلُواْ عَلَيۡكُم مِّنۡهُ ذِكۡرًا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">83. And they ask you about Dhul-Qarnain. Say: "I shall recite to you something of his story."</p>
