<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>18:97</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَمَا ٱسۡطَٰعُوٓاْ أَن يَظۡهَرُوهُ وَمَا ٱسۡتَطَٰعُواْ لَهُۥ نَقۡبٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">97. So they [Ya’jûj and Ma’jûj (Gog and Magog)] could not scale it or dig through it.</p>
