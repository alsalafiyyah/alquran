  <p class="text-emerald-700 font-bold mb-4"><strong>18:23</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَا تَقُولَنَّ لِشَاْيۡءٍ إِنِّي فَاعِلٞ ذَٰلِكَ غَدًا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">23. And never say of anything, "I shall do such and such thing tomorrow."</p>
