<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>18:64</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ ذَٰلِكَ مَا كُنَّا نَبۡغِۚ فَٱرۡتَدَّا عَلَىٰٓ ءَاثَارِهِمَا قَصَصٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">64. [Mûsâ (Moses)] said: "That is what we have been seeking." So they went back retracing their footsteps.</p>
