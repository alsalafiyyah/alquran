  <p class="text-emerald-700 font-bold mb-4"><strong>18:41</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَوۡ يُصۡبِحَ مَآؤُهَا غَوۡرٗا فَلَن تَسۡتَطِيعَ لَهُۥ طَلَبٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">41. "Or the water thereof (of the gardens) becomes deep-sunken (underground) so that you will never be able to seek it."</p>
