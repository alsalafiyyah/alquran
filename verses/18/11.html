<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Kahf (18:11)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَضَرَبۡنَا عَلَىٰٓ ءَاذَانِهِمۡ فِي ٱلۡكَهۡفِ سِنِينَ عَدَدٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">11. Therefore We covered up their (sense of) hearing (causing them to go in deep sleep) in the Cave for a number of years.</p>
