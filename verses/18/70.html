<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>18:70</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ فَإِنِ ٱتَّبَعۡتَنِي فَلَا تَسۡـَٔلۡنِي عَن شَيۡءٍ حَتَّىٰٓ أُحۡدِثَ لَكَ مِنۡهُ ذِكۡرٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">70. He (Khidr) said: "Then, if you follow me, ask me not about anything till I myself mention of it to you."</p>
