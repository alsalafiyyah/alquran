<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Kahf (18:84)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّا مَكَّنَّا لَهُۥ فِي ٱلۡأَرۡضِ وَءَاتَيۡنَٰهُ مِن كُلِّ شَيۡءٖ سَبَبٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">84. Verily, We established him in the earth, and We gave him the means of everything.</p>
