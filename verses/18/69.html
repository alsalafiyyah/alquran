<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>18:69</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ سَتَجِدُنِيٓ إِن شَآءَ ٱللَّهُ صَابِرٗا وَلَآ أَعۡصِي لَكَ أَمۡرٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">69. Mûsâ (Moses) said: "If Allâh wills, you will find me patient, and I will not disobey you in aught."</p>
