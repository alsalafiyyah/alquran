<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>18:38</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَّٰكِنَّا۠ هُوَ ٱللَّهُ رَبِّي وَلَآ أُشۡرِكُ بِرَبِّيٓ أَحَدٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">38. "But as for my part, (I believe) that He is Allâh, my Lord, and none shall I associate as partner with my Lord.</p>
