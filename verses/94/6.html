<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Ash-Sharh (94:6)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ مَعَ ٱلۡعُسۡرِ يُسۡرٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">6. Verily, along with every hardship is relief (i.e. there is one hardship with two reliefs, so one hardship cannot overcome two reliefs).</p>
