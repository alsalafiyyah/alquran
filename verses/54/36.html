<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>54:36</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَقَدۡ أَنذَرَهُم بَطۡشَتَنَا فَتَمَارَوۡاْ بِٱلنُّذُرِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">36. And he [Lût (Lot)] indeed had warned them of Our Seizure (punishment), but they did doubt the warnings!</p>
