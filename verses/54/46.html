<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>54:46</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">بَلِ ٱلسَّاعَةُ مَوۡعِدُهُمۡ وَٱلسَّاعَةُ أَدۡهَىٰ وَأَمَرُّ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">46. Nay, but the Hour is their appointed time (for their full recompense), and the Hour will be more grievous and more bitter.</p>
