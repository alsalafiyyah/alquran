<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>54:31</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّآ أَرۡسَلۡنَا عَلَيۡهِمۡ صَيۡحَةٗ وَٰحِدَةٗ فَكَانُواْ كَهَشِيمِ ٱلۡمُحۡتَظِرِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">31. Verily, We sent against them a single Saihah (torment - awful cry), and they became like the stubble of a fold-builder.</p>
