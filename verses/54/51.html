<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Qamar (54:51)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَقَدۡ أَهۡلَكۡنَآ أَشۡيَاعَكُمۡ فَهَلۡ مِن مُّدَّكِرٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">51. And indeed, We have destroyed your likes; then is there any that will remember (or receive admonition)?</p>
