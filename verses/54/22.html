<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Qamar (54:22)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَقَدۡ يَسَّرۡنَا ٱلۡقُرۡءَانَ لِلذِّكۡرِ فَهَلۡ مِن مُّدَّكِرٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">22. And We have indeed made the Qur’ân easy to understand and remember; then is there any that will remember (or receive admonition)?</p>
