<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>54:47</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ ٱلۡمُجۡرِمِينَ فِي ضَلَٰلٖ وَسُعُرٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">47. Verily the Mujrimûn (polytheists, disbelievers, sinners, criminals) are in error (in this world) and will burn (in the Hell-fire in the Hereafter).</p>
