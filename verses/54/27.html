<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>54:27</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّا مُرۡسِلُواْ ٱلنَّاقَةِ فِتۡنَةٗ لَّهُمۡ فَٱرۡتَقِبۡهُمۡ وَٱصۡطَبِرۡ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">27. Verily, We are sending the she-camel as a test for them. So watch them [O Sâlih عليه السلام], and be patient!</p>
