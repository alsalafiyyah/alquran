<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Qamar (54:19)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّآ أَرۡسَلۡنَا عَلَيۡهِمۡ رِيحٗا صَرۡصَرٗا فِي يَوۡمِ نَحۡسٖ مُّسۡتَمِرّٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">19. Verily, We sent against them a furious wind of harsh voice on a day of evil omen and continuous calamity.</p>
