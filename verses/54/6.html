<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Qamar (54:6)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَتَوَلَّ عَنۡهُمۡۘ يَوۡمَ يَدۡعُ ٱلدَّاعِ إِلَىٰ شَيۡءٖ نُّكُرٍ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">6. So (O Muhammad صلى الله عليه وسلم) withdraw from them. The Day that the caller will call (them) to a terrible thing.</p>
