<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>54:25</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَءُلۡقِيَ ٱلذِّكۡرُ عَلَيۡهِ مِنۢ بَيۡنِنَا بَلۡ هُوَ كَذَّابٌ أَشِرٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">25. "Is it that the Reminder is sent to him [Prophet Sâlih عليه السلام] alone from among us? Nay, he is an insolent liar!"</p>
