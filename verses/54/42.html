<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>54:42</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">كَذَّبُواْ بِـَٔايَٰتِنَا كُلِّهَا فَأَخَذۡنَٰهُمۡ أَخۡذَ عَزِيزٖ مُّقۡتَدِرٍ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">42. (They) belied all Our Signs, so We seized them with a Seizure of the All-Mighty, All-Capable (Omnipotent).</p>
