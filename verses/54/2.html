  <p class="text-emerald-700 font-bold mb-4"><strong>54:2</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَإِن يَرَوۡاْ ءَايَةٗ يُعۡرِضُواْ وَيَقُولُواْ سِحۡرٞ مُّسۡتَمِرّٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">2. And if they see a sign, they turn away, and say: "This is continuous magic."</p>
