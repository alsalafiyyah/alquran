  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَقَد تَّرَكۡنَٰهَآ ءَايَةٗ فَهَلۡ مِن مُّدَّكِرٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">15. And indeed, We have left this as a sign. Then is there any that will remember (or receive admonition)?</p>
