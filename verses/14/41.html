<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>14:41</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">رَبَّنَا ٱغۡفِرۡ لِي وَلِوَٰلِدَيَّ وَلِلۡمُؤۡمِنِينَ يَوۡمَ يَقُومُ ٱلۡحِسَابُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">41. "Our Lord! Forgive me and my parents, and (all) the believers on the Day when the reckoning will be established."</p>
