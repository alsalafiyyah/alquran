  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">مِّن وَرَآئِهِۦ جَهَنَّمُ وَيُسۡقَىٰ مِن مَّآءٖ صَدِيدٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">16. In front of him (every obstinate, arrogant dictator) is Hell, and he will be made to drink boiling, festering water.</p>
