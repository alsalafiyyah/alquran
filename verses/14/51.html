<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Ibrahim (14:51)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لِيَجۡزِيَ ٱللَّهُ كُلَّ نَفۡسٖ مَّا كَسَبَتۡۚ إِنَّ ٱللَّهَ سَرِيعُ ٱلۡحِسَابِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">51. That Allâh may requite each person according to what he has earned. Truly, Allâh is Swift at reckoning.</p>
