<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>76:11</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَوَقَىٰهُمُ ٱللَّهُ شَرَّ ذَٰلِكَ ٱلۡيَوۡمِ وَلَقَّىٰهُمۡ نَضۡرَةٗ وَسُرُورٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">11. So Allâh saved them from the evil of that Day, and gave them Nadrah (a light of beauty) and joy.</p>
