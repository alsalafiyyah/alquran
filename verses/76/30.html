<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Insan (76:30)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَا تَشَآءُونَ إِلَّآ أَن يَشَآءَ ٱللَّهُۚ إِنَّ ٱللَّهَ كَانَ عَلِيمًا حَكِيمٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">30. But you cannot will, unless Allâh wills. Verily, Allâh is Ever All-Knowing, All-Wise.</p>
