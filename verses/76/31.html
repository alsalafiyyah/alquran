<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>76:31</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يُدۡخِلُ مَن يَشَآءُ فِي رَحۡمَتِهِۦۚ وَٱلظَّٰلِمِينَ أَعَدَّ لَهُمۡ عَذَابًا أَلِيمَۢا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">31. He will admit to His Mercy whom He wills and as for the Zâlimûn - (polytheists, wrong-doers) He has prepared a painful torment.</p>
