<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>76:27</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ هَٰٓؤُلَآءِ يُحِبُّونَ ٱلۡعَاجِلَةَ وَيَذَرُونَ وَرَآءَهُمۡ يَوۡمٗا ثَقِيلٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">27. Verily, these (disbelievers) love the present life of this world, and put behind them a heavy Day (that will be hard).</p>
