  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Insan (76:6)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">عَيۡنٗا يَشۡرَبُ بِهَا عِبَادُ ٱللَّهِ يُفَجِّرُونَهَا تَفۡجِيرٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">6. A spring wherefrom the slaves of Allâh will drink, causing it to gush forth abundantly.</p>
