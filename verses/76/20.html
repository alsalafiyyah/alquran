  <p class="text-emerald-700 font-bold mb-4"><strong>76:20</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَإِذَا رَأَيۡتَ ثَمَّ رَأَيۡتَ نَعِيمٗا وَمُلۡكٗا كَبِيرًا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">20. And when you look there (in Paradise), you will see a delight (that cannot be imagined), and a great dominion.</p>
