<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Insan (76:9)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّمَا نُطۡعِمُكُمۡ لِوَجۡهِ ٱللَّهِ لَا نُرِيدُ مِنكُمۡ جَزَآءٗ وَلَا شُكُورًا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">9. (Saying): "We feed you seeking Allâh’s Countenance only. We wish for no reward, nor thanks from you.</p>
