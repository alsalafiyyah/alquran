  <p class="text-emerald-700 font-bold mb-4"><strong>76:10</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّا نَخَافُ مِن رَّبِّنَا يَوۡمًا عَبُوسٗا قَمۡطَرِيرٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">10. "Verily, We fear from our Lord a Day, hard and distressful, that will make the faces look horrible (from extreme dislike to it)."</p>
