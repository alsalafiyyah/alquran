<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Insan (76:1)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">هَلۡ أَتَىٰ عَلَى ٱلۡإِنسَٰنِ حِينٞ مِّنَ ٱلدَّهۡرِ لَمۡ يَكُن شَيۡـٔٗا مَّذۡكُورًا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">1. Has there not been over man a period of time, when he was not a thing worth mentioning?</p>
