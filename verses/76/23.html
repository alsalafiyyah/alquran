<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Insan (76:23)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّا نَحۡنُ نَزَّلۡنَا عَلَيۡكَ ٱلۡقُرۡءَانَ تَنزِيلٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">23. Verily, it is We Who have sent down the Qur’ân to you (O Muhammad صلى الله عليه وسلم) by stages.</p>
