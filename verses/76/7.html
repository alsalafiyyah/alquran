  <p class="text-emerald-700 font-bold mb-4"><strong>76:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يُوفُونَ بِٱلنَّذۡرِ وَيَخَافُونَ يَوۡمٗا كَانَ شَرُّهُۥ مُسۡتَطِيرٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">7. They (are those who) fulfil (their) vows, and they fear a Day whose evil will be wide-spreading.</p>
