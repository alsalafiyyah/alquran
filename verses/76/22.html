<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Insan (76:22)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ هَٰذَا كَانَ لَكُمۡ جَزَآءٗ وَكَانَ سَعۡيُكُم مَّشۡكُورًا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">22. (And it will be said to them): "Verily, this is a reward for you, and your endeavour has been accepted."</p>
