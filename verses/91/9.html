<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>91:9</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَدۡ أَفۡلَحَ مَن زَكَّىٰهَا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">9. Indeed he succeeds who purifies his ownself (i.e. obeys and performs all that Allâh ordered, by following the true Faith of Islâmic Monotheism and by doing righteous good deeds).</p>
