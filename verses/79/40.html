<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>79:40</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَأَمَّا مَنۡ خَافَ مَقَامَ رَبِّهِۦ وَنَهَى ٱلنَّفۡسَ عَنِ ٱلۡهَوَىٰ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">40. But as for him who feared standing before his Lord, and restrained himself from impure evil desires and lusts.</p>
