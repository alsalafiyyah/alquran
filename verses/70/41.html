  <p class="text-emerald-700 font-bold mb-4"><strong>70:41</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">عَلَىٰٓ أَن نُّبَدِّلَ خَيۡرٗا مِّنۡهُمۡ وَمَا نَحۡنُ بِمَسۡبُوقِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">41. To replace them by (others) better than them; and We are not to be outrun.</p>
