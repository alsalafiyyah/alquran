<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>83:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">كَلَّآ إِنَّ كِتَٰبَ ٱلۡفُجَّارِ لَفِي سِجِّينٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">7. Nay! Truly, the Record (writing of the deeds) of the Fujjâr (disbelievers, polytheists, sinners, evil-doers and the wicked) is (preserved) in Sijjîn.</p>
