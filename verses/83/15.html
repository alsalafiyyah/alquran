  <p class="text-emerald-700 font-bold mb-4"><strong>83:15</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">كَلَّآ إِنَّهُمۡ عَن رَّبِّهِمۡ يَوۡمَئِذٖ لَّمَحۡجُوبُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">15. Nay! Surely they (evil-doers) will be veiled from seeing their Lord that Day.</p>
