<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>83:12</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَا يُكَذِّبُ بِهِۦٓ إِلَّا كُلُّ مُعۡتَدٍ أَثِيمٍ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">12. And none can deny it except every transgressor beyond bounds, (in disbelief, oppression and disobedience to Allâh) the sinner!</p>
