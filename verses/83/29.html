  <p class="text-emerald-700 font-bold mb-4"><strong>83:29</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ ٱلَّذِينَ أَجۡرَمُواْ كَانُواْ مِنَ ٱلَّذِينَ ءَامَنُواْ يَضۡحَكُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">29. Verily, (during the worldly life) those who committed crimes used to laugh at those who believed.</p>
