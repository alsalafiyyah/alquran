<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Ankabut (29:37)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَكَذَّبُوهُ فَأَخَذَتۡهُمُ ٱلرَّجۡفَةُ فَأَصۡبَحُواْ فِي دَارِهِمۡ جَٰثِمِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">37. And they belied him [Shu‘aib]: so the earthquake seized them, and they lay (dead), prostrate in their dwellings.</p>
