<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>29:19</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَوَلَمۡ يَرَوۡاْ كَيۡفَ يُبۡدِئُ ٱللَّهُ ٱلۡخَلۡقَ ثُمَّ يُعِيدُهُۥٓۚ إِنَّ ذَٰلِكَ عَلَى ٱللَّهِ يَسِيرٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">19. See they not how Allâh originates the creation, then repeats it. Verily, that is easy for Allâh.</p>
