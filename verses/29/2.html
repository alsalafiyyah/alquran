<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>29:2</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَحَسِبَ ٱلنَّاسُ أَن يُتۡرَكُوٓاْ أَن يَقُولُوٓاْ ءَامَنَّا وَهُمۡ لَا يُفۡتَنُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">2. Do people think that they will be left alone because they say: "We believe," and will not be tested.</p>
