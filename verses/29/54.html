<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>29:54</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يَسۡتَعۡجِلُونَكَ بِٱلۡعَذَابِ وَإِنَّ جَهَنَّمَ لَمُحِيطَةُۢ بِٱلۡكَٰفِرِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">54. They ask you to hasten on the torment. And verily, Hell, of a surety, will encompass the disbelievers.</p>
