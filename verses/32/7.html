<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>32:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱلَّذِيٓ أَحۡسَنَ كُلَّ شَيۡءٍ خَلَقَهُۥۖ وَبَدَأَ خَلۡقَ ٱلۡإِنسَٰنِ مِن طِينٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">7. Who made everything He has created good and He began the creation of man from clay.</p>
