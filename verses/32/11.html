<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>32:11</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">۞ قُلۡ يَتَوَفَّىٰكُم مَّلَكُ ٱلۡمَوۡتِ ٱلَّذِي وُكِّلَ بِكُمۡ ثُمَّ إِلَىٰ رَبِّكُمۡ تُرۡجَعُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">11. Say: "The angel of death, who is set over you, will take your souls. Then you shall be brought to your Lord."</p>
