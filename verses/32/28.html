<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>32:28</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَيَقُولُونَ مَتَىٰ هَٰذَا ٱلۡفَتۡحُ إِن كُنتُمۡ صَٰدِقِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">28. They say: "When will this Fath (Decision) be (between us and you, i.e. the Day of Resurrection), if you are telling the truth?"</p>
