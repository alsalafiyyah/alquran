<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>As-Sajdah (32:18)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَفَمَن كَانَ مُؤۡمِنٗا كَمَن كَانَ فَاسِقٗاۚ لَّا يَسۡتَوُۥنَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">18. Is then he who is a believer like him who is a Fâsiq (disbeliever and disobedient to Allâh)? Not equal are they.</p>
