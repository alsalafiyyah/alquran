<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>32:2</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">تَنزِيلُ ٱلۡكِتَٰبِ لَا رَيۡبَ فِيهِ مِن رَّبِّ ٱلۡعَٰلَمِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">2. The revelation of the Book (this Qur’ân) in which there is no doubt is from the Lord of the ‘Âlamîn (mankind, jinn and all that exists)!</p>
