  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ثُمَّ جَعَلَ نَسۡلَهُۥ مِن سُلَٰلَةٖ مِّن مَّآءٖ مَّهِينٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">8. Then He made his offspring from semen of despised water (male and female sexual discharge).</p>
