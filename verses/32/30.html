<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>32:30</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَأَعۡرِضۡ عَنۡهُمۡ وَٱنتَظِرۡ إِنَّهُم مُّنتَظِرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">30. So turn aside from them (O Muhammad صلى الله عليه وسلم) and await: verily, they (too) are awaiting.</p>
