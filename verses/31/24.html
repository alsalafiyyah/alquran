  <p class="text-emerald-700 font-bold mb-4"><strong>31:24</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">نُمَتِّعُهُمۡ قَلِيلٗا ثُمَّ نَضۡطَرُّهُمۡ إِلَىٰ عَذَابٍ غَلِيظٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">24. We let them enjoy for a little while, then in the end We shall oblige them to (enter) a great torment.</p>
