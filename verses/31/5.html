  <p class="text-emerald-700 font-bold mb-4"><strong>31:5</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أُوْلَٰٓئِكَ عَلَىٰ هُدٗى مِّن رَّبِّهِمۡۖ وَأُوْلَٰٓئِكَ هُمُ ٱلۡمُفۡلِحُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">5. Such are on guidance from their Lord, and such are the successful.</p>
