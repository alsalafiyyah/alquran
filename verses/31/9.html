<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>31:9</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">خَٰلِدِينَ فِيهَاۖ وَعۡدَ ٱللَّهِ حَقّٗاۚ وَهُوَ ٱلۡعَزِيزُ ٱلۡحَكِيمُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">9. To abide therein. It is a Promise of Allâh in truth. And He is the All-Mighty, the All-Wise.</p>
