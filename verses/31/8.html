<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>31:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ ٱلَّذِينَ ءَامَنُواْ وَعَمِلُواْ ٱلصَّٰلِحَٰتِ لَهُمۡ جَنَّٰتُ ٱلنَّعِيمِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">8. Verily, those who believe (in Islâmic Monotheism) and do righteous good deeds, for them are Gardens of Delight (Paradise).</p>
