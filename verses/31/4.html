<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>31:4</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱلَّذِينَ يُقِيمُونَ ٱلصَّلَوٰةَ وَيُؤۡتُونَ ٱلزَّكَوٰةَ وَهُم بِٱلۡأٓخِرَةِ هُمۡ يُوقِنُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">4. Those who perform As-Salât (Iqamat-as-Salât) and give Zakât and they have faith in the Hereafter with certainty.</p>
