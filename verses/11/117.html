<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Hud (11:117)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَا كَانَ رَبُّكَ لِيُهۡلِكَ ٱلۡقُرَىٰ بِظُلۡمٖ وَأَهۡلُهَا مُصۡلِحُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">117. And your Lord would never destroy the towns wrongfully, while their people were right-doers.</p>
