<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>11:26</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَن لَّا تَعۡبُدُوٓاْ إِلَّا ٱللَّهَۖ إِنِّيٓ أَخَافُ عَلَيۡكُمۡ عَذَابَ يَوۡمٍ أَلِيمٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">26. "That you worship none but Allâh; surely, I fear for you the torment of a painful Day."</p>
