<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>11:106</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَأَمَّا ٱلَّذِينَ شَقُواْ فَفِي ٱلنَّارِ لَهُمۡ فِيهَا زَفِيرٞ وَشَهِيقٌ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">106. As for those who are wretched, they will be in the Fire, sighing in a high and low tone.</p>
