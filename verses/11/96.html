<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>11:96</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَقَدۡ أَرۡسَلۡنَا مُوسَىٰ بِـَٔايَٰتِنَا وَسُلۡطَٰنٖ مُّبِينٍ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">96. And indeed We sent Mûsâ (Moses) with Our Ayât (proofs, evidence, verses, lessons, signs, revelations, etc.) and a manifest authority.</p>
