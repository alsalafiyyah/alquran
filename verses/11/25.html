<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Hud (11:25)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَقَدۡ أَرۡسَلۡنَا نُوحًا إِلَىٰ قَوۡمِهِۦٓ إِنِّي لَكُمۡ نَذِيرٞ مُّبِينٌ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">25. And indeed We sent Nûh (Noah) to his people (and he said): "I have come to you as a plain warner."</p>
