<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>11:2</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَلَّا تَعۡبُدُوٓاْ إِلَّا ٱللَّهَۚ إِنَّنِي لَكُم مِّنۡهُ نَذِيرٞ وَبَشِيرٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">2. (Saying) worship none but Allâh. Verily, I (Muhammad صلى الله عليه و سلم) am unto you from Him a warner and a bringer of glad tidings.</p>
