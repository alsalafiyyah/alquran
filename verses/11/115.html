<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>11:115</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَٱصۡبِرۡ فَإِنَّ ٱللَّهَ لَا يُضِيعُ أَجۡرَ ٱلۡمُحۡسِنِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">115. And be patient; verily, Allâh wastes not the reward of the good-doers.</p>
