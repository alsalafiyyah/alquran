<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>11:33</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ إِنَّمَا يَأۡتِيكُم بِهِ ٱللَّهُ إِن شَآءَ وَمَآ أَنتُم بِمُعۡجِزِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">33. He said: "Only Allâh will bring it (the punishment) on you, if He wills, and then you will escape not.</p>
