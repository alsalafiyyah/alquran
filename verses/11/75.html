<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>11:75</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ إِبۡرَٰهِيمَ لَحَلِيمٌ أَوَّٰهٞ مُّنِيبٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">75. Verily, Ibrahîm (Abraham) was, without doubt, forbearing, used to invoking Allâh with humility, and was repentant (to Allâh all the time, again and again).</p>
