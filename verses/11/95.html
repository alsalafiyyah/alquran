<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>11:95</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">كَأَن لَّمۡ يَغۡنَوۡاْ فِيهَآۗ أَلَا بُعۡدٗا لِّمَدۡيَنَ كَمَا بَعِدَتۡ ثَمُودُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">95. As if they had never lived there! So away with Madyan (Midian) as away with Thamûd! (All these nations were destroyed).</p>
