<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Hud (11:68)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">كَأَن لَّمۡ يَغۡنَوۡاْ فِيهَآۗ أَلَآ إِنَّ ثَمُودَاْ كَفَرُواْ رَبَّهُمۡۗ أَلَا بُعۡدٗا لِّثَمُودَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">68. As if they had never lived there. No doubt! Verily, Thamûd disbelieved in their Lord. So away with Thamûd!</p>
