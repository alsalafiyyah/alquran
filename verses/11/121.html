<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>11:121</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَقُل لِّلَّذِينَ لَا يُؤۡمِنُونَ ٱعۡمَلُواْ عَلَىٰ مَكَانَتِكُمۡ إِنَّا عَٰمِلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">121. And say to those who do not believe: "Act according to your ability and way, We are acting (in our way).</p>
