<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>11:111</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَإِنَّ كُلّٗا لَّمَّا لَيُوَفِّيَنَّهُمۡ رَبُّكَ أَعۡمَٰلَهُمۡۚ إِنَّهُۥ بِمَا يَعۡمَلُونَ خَبِيرٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">111. And verily, to each of them your Lord will repay their works in full. Surely, He is All-Aware of what they do.</p>
