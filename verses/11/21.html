<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>11:21</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أُوْلَٰٓئِكَ ٱلَّذِينَ خَسِرُوٓاْ أَنفُسَهُمۡ وَضَلَّ عَنۡهُم مَّا كَانُواْ يَفۡتَرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">21. They are those who have lost their ownselves, and their invented false deities will vanish from them.</p>
