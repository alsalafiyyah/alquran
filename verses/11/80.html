<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Hud (11:80)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ لَوۡ أَنَّ لِي بِكُمۡ قُوَّةً أَوۡ ءَاوِيٓ إِلَىٰ رُكۡنٖ شَدِيدٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">80. He said: "Would that I had strength (men) to overpower you, or that I could betake myself to some powerful support (to resist you)."</p>
</div>
