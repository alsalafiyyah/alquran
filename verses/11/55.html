  <p class="text-emerald-700 font-bold mb-4"><strong>11:55</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">مِن دُونِهِۦۖ فَكِيدُونِي جَمِيعٗا ثُمَّ لَا تُنظِرُونِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">55. With Him (Allâh). So plot against me, all of you, and give me no respite.</p>
