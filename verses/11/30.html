  <p class="text-emerald-700 font-bold mb-4"><strong>11:30</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَيَٰقَوۡمِ مَن يَنصُرُنِي مِنَ ٱللَّهِ إِن طَرَدتُّهُمۡۚ أَفَلَا تَذَكَّرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">30. "And O my people! Who will help me against Allâh, if I drove them away? Will you not then give a thought?</p>
