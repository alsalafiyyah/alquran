<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>61:10</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُواْ هَلۡ أَدُلُّكُمۡ عَلَىٰ تِجَٰرَةٖ تُنجِيكُم مِّنۡ عَذَابٍ أَلِيمٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">10. O you who believe! Shall I guide you to a trade that will save you from a painful torment?</p>
