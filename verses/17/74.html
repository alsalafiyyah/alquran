<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>17:74</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَوۡلَآ أَن ثَبَّتۡنَٰكَ لَقَدۡ كِدتَّ تَرۡكَنُ إِلَيۡهِمۡ شَيۡـٔٗا قَلِيلًا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">74. And had We not made you stand firm, you would nearly have inclined to them a little.</p>
