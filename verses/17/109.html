  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Isra' (17:109)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَيَخِرُّونَ لِلۡأَذۡقَانِ يَبۡكُونَ وَيَزِيدُهُمۡ خُشُوعٗا۩</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">109. And they fall down on their faces weeping and it increases their humility.</p>
