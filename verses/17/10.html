<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>17:10</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَأَنَّ ٱلَّذِينَ لَا يُؤۡمِنُونَ بِٱلۡأٓخِرَةِ أَعۡتَدۡنَا لَهُمۡ عَذَابًا أَلِيمٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">10. And that those who believe not in the Hereafter, for them We have prepared a painful torment (Hell).</p>
