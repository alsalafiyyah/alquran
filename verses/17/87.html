<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>17:87</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِلَّا رَحۡمَةٗ مِّن رَّبِّكَۚ إِنَّ فَضۡلَهُۥ كَانَ عَلَيۡكَ كَبِيرٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">87. Except as a Mercy from your Lord. Verily His Grace unto you (O Muhammad صلى الله عليه و سلم) is ever great.</p>
