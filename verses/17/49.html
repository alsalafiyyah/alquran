<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>17:49</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَقَالُوٓاْ أَءِذَا كُنَّا عِظَٰمٗا وَرُفَٰتًا أَءِنَّا لَمَبۡعُوثُونَ خَلۡقٗا جَدِيدٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">49. And they say: "When we are bones and fragments (destroyed), should we really be resurrected (to be) a new creation?"</p>
</div>
