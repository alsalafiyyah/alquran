<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>17:103</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَأَرَادَ أَن يَسۡتَفِزَّهُم مِّنَ ٱلۡأَرۡضِ فَأَغۡرَقۡنَٰهُ وَمَن مَّعَهُۥ جَمِيعٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">103. So he resolved to turn them out of the land (of Egypt). But We drowned him and all who were with him.</p>
