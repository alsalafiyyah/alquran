  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Isra' (17:3)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ذُرِّيَّةَ مَنۡ حَمَلۡنَا مَعَ نُوحٍۚ إِنَّهُۥ كَانَ عَبۡدٗا شَكُورٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">3. "O offspring of those whom We carried (in the ship) with Nûh (Noah)! Verily, he was a grateful slave."</p>
