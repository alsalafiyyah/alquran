<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Isra' (17:48)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱنظُرۡ كَيۡفَ ضَرَبُواْ لَكَ ٱلۡأَمۡثَالَ فَضَلُّواْ فَلَا يَسۡتَطِيعُونَ سَبِيلٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">48. See what examples they have put forward for you. So they have gone astray, and never can they find a way.</p>
