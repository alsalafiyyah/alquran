<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Ikhlas (112:1)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قُلۡ هُوَ ٱللَّهُ أَحَدٌ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">1. Say (O Muhammad صلى الله عليه وسلم): "He is Allâh, (the) One.[1]</p>
  <div class="mt-6 bg-slate-50 border-l-4 border-slate-300 p-4 text-xs text-slate-500 rounded-r-md leading-relaxed"><small>[1] (V.112:1) See Tauhîd in the Glossary (Appendix).</small></div>
