<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>7:55</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱدۡعُواْ رَبَّكُمۡ تَضَرُّعٗا وَخُفۡيَةًۚ إِنَّهُۥ لَا يُحِبُّ ٱلۡمُعۡتَدِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">55. Invoke your Lord with humility and in secret. He likes not the aggressors.</p>
