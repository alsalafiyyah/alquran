<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>7:84</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَأَمۡطَرۡنَا عَلَيۡهِم مَّطَرٗاۖ فَٱنظُرۡ كَيۡفَ كَانَ عَٰقِبَةُ ٱلۡمُجۡرِمِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">84. And We rained down on them a rain (of stones). Then see what was the end of the Mujrimûn (criminals, polytheists and sinners).</p>
</div>
