<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>7:6</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَلَنَسۡـَٔلَنَّ ٱلَّذِينَ أُرۡسِلَ إِلَيۡهِمۡ وَلَنَسۡـَٔلَنَّ ٱلۡمُرۡسَلِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">6. Then surely, We shall question those (people) to whom it (the Book) was sent and verily, We shall question the Messengers.</p>
