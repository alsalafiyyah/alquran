  <p class="text-emerald-700 font-bold mb-4"><strong>7:191</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَيُشۡرِكُونَ مَا لَا يَخۡلُقُ شَيۡـٔٗا وَهُمۡ يُخۡلَقُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">191. Do they attribute as partners to Allâh those who created nothing but they themselves are created?</p>
