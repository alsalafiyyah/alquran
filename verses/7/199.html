<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-A'raf (7:199)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">خُذِ ٱلۡعَفۡوَ وَأۡمُرۡ بِٱلۡعُرۡفِ وَأَعۡرِضۡ عَنِ ٱلۡجَٰهِلِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">199. Show forgiveness, enjoin what is good, and turn away from the foolish (i.e. don’t punish them).</p>
</div>
