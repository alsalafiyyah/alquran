<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-A'raf (7:78)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَأَخَذَتۡهُمُ ٱلرَّجۡفَةُ فَأَصۡبَحُواْ فِي دَارِهِمۡ جَٰثِمِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">78. So the earthquake seized them, and they lay (dead), prostrate in their homes.</p>
