<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>7:202</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَإِخۡوَٰنُهُمۡ يَمُدُّونَهُمۡ فِي ٱلۡغَيِّ ثُمَّ لَا يُقۡصِرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">202. But (as for) their brothers (the devils) they (i.e. the devils) plunge them deeper into error, and they never stop short.</p>
