<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>7:124</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَأُقَطِّعَنَّ أَيۡدِيَكُمۡ وَأَرۡجُلَكُم مِّنۡ خِلَٰفٖ ثُمَّ لَأُصَلِّبَنَّكُمۡ أَجۡمَعِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">124. "Surely, I will cut off your hands and your feet from opposite sides, then I will crucify you all."</p>
