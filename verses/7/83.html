<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>7:83</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَأَنجَيۡنَٰهُ وَأَهۡلَهُۥٓ إِلَّا ٱمۡرَأَتَهُۥ كَانَتۡ مِنَ ٱلۡغَٰبِرِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">83. Then We saved him and his family, except his wife; she was of those who remained behind (in the torment).</p>
