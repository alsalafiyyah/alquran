<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>7:25</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ فِيهَا تَحۡيَوۡنَ وَفِيهَا تَمُوتُونَ وَمِنۡهَا تُخۡرَجُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">25. He said: "Therein you shall live, and therein you shall die, and from it you shall be brought out (i.e. resurrected)."</p>
</div>
