<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>7:135</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَلَمَّا كَشَفۡنَا عَنۡهُمُ ٱلرِّجۡزَ إِلَىٰٓ أَجَلٍ هُم بَٰلِغُوهُ إِذَا هُمۡ يَنكُثُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">135. But when We removed the punishment from them to a fixed term, which they had to reach, behold! they broke their word!</p>
</div>
