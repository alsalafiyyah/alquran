  <p class="text-emerald-700 font-bold mb-4"><strong>7:14</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ أَنظِرۡنِيٓ إِلَىٰ يَوۡمِ يُبۡعَثُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">14. (Iblîs) said: "Allow me respite till the Day they are raised up (i.e. the Day of Resurrection)."</p>
