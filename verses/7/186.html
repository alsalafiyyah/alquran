<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>7:186</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">مَن يُضۡلِلِ ٱللَّهُ فَلَا هَادِيَ لَهُۥۚ وَيَذَرُهُمۡ فِي طُغۡيَٰنِهِمۡ يَعۡمَهُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">186. Whomsoever Allâh sends astray, none can guide him; and He lets them wander blindly in their transgressions.</p>
