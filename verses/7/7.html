<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-A'raf (7:7)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَلَنَقُصَّنَّ عَلَيۡهِم بِعِلۡمٖۖ وَمَا كُنَّا غَآئِبِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">7. Then surely, We shall narrate unto them (their whole story) with knowledge, and indeed We have not been absent.</p>
