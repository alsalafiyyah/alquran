<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-A'raf (7:181)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمِمَّنۡ خَلَقۡنَآ أُمَّةٞ يَهۡدُونَ بِٱلۡحَقِّ وَبِهِۦ يَعۡدِلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">181. And of those whom We have created, there is a community who guides (others) with the truth, and establishes justice therewith.</p>
