<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-A'raf (7:76)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ ٱلَّذِينَ ٱسۡتَكۡبَرُوٓاْ إِنَّا بِٱلَّذِيٓ ءَامَنتُم بِهِۦ كَٰفِرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">76. Those who were arrogant said: "Verily, we disbelieve in that which you believe in."</p>
