<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>7:115</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ يَٰمُوسَىٰٓ إِمَّآ أَن تُلۡقِيَ وَإِمَّآ أَن نَّكُونَ نَحۡنُ ٱلۡمُلۡقِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">115. They said: "O Mûsâ (Moses)! Either you throw (first), or shall we have the (first) throw?"</p>
