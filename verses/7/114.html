<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>7:114</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ نَعَمۡ وَإِنَّكُمۡ لَمِنَ ٱلۡمُقَرَّبِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">114. He said: "Yes, and moreover you will (in that case) be of the nearest (to me)."</p>
