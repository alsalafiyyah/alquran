<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>7:16</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ فَبِمَآ أَغۡوَيۡتَنِي لَأَقۡعُدَنَّ لَهُمۡ صِرَٰطَكَ ٱلۡمُسۡتَقِيمَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">16. (Iblîs) said: "Because You have sent me astray, surely I will sit in wait against them (human beings) on Your Straight Path.</p>
