  <p class="text-emerald-700 font-bold mb-4"><strong>7:21</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَقَاسَمَهُمَآ إِنِّي لَكُمَا لَمِنَ ٱلنَّٰصِحِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">21. And he [Shaitân (Satan)] swore by Allâh to them both (saying): "Verily, I am one of the sincere well-wishers for you both."</p>
