<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>7:178</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">مَن يَهۡدِ ٱللَّهُ فَهُوَ ٱلۡمُهۡتَدِيۖ وَمَن يُضۡلِلۡ فَأُوْلَٰٓئِكَ هُمُ ٱلۡخَٰسِرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">178. Whomsoever Allâh guides, he is the guided one, and whomsoever He sends astray,- then those! they are the losers.</p>
