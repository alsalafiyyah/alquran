<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-A'raf (7:106)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ إِن كُنتَ جِئۡتَ بِـَٔايَةٖ فَأۡتِ بِهَآ إِن كُنتَ مِنَ ٱلصَّٰدِقِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">106. [Fir‘aun (Pharaoh)] said: "If you have come with a sign, show it forth, if you are one of those who tell the truth."</p>
</div>
