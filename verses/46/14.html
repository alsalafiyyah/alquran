<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>46:14</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أُوْلَٰٓئِكَ أَصۡحَٰبُ ٱلۡجَنَّةِ خَٰلِدِينَ فِيهَا جَزَآءَۢ بِمَا كَانُواْ يَعۡمَلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">14. Such shall be the dwellers of Paradise, abiding therein (forever) - a reward for what they used to do.</p>
