<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>40:59</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ ٱلسَّاعَةَ لَأٓتِيَةٞ لَّا رَيۡبَ فِيهَا وَلَٰكِنَّ أَكۡثَرَ ٱلنَّاسِ لَا يُؤۡمِنُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">59. Verily, the Hour (Day of Judgement) is surely coming, there is no doubt about it, yet most men believe not.</p>
