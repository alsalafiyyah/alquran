<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>40:68</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">هُوَ ٱلَّذِي يُحۡيِۦ وَيُمِيتُۖ فَإِذَا قَضَىٰٓ أَمۡرٗا فَإِنَّمَا يَقُولُ لَهُۥ كُن فَيَكُونُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">68. It is He Who gives life and causes death. And when He decides upon a thing He says to it only: "Be!" - and it is.</p>
