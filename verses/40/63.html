<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Ghafir (40:63)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">كَذَٰلِكَ يُؤۡفَكُ ٱلَّذِينَ كَانُواْ بِـَٔايَٰتِ ٱللَّهِ يَجۡحَدُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">63. Thus were turned away those who used to deny the Ayât (proofs, evidence, verses, lessons, signs, revelations, etc.) of Allâh.</p>
