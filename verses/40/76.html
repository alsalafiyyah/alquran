<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Ghafir (40:76)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱدۡخُلُوٓاْ أَبۡوَٰبَ جَهَنَّمَ خَٰلِدِينَ فِيهَاۖ فَبِئۡسَ مَثۡوَى ٱلۡمُتَكَبِّرِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">76. Enter the gates of Hell to abide therein: and (indeed) what an evil abode of the arrogant!</p>
