<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>40:32</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَيَٰقَوۡمِ إِنِّيٓ أَخَافُ عَلَيۡكُمۡ يَوۡمَ ٱلتَّنَادِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">32. "And, O my people! Verily, I fear for you the Day when there will be mutual calling (between the people of Hell and of Paradise)."</p>
