<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Ghafir (40:41)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">۞ وَيَٰقَوۡمِ مَا لِيٓ أَدۡعُوكُمۡ إِلَى ٱلنَّجَوٰةِ وَتَدۡعُونَنِيٓ إِلَى ٱلنَّارِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">41. "And O my people! How is it that I call you to salvation while you call me to the Fire!</p>
