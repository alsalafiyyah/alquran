<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Ghafir (40:79)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱللَّهُ ٱلَّذِي جَعَلَ لَكُمُ ٱلۡأَنۡعَٰمَ لِتَرۡكَبُواْ مِنۡهَا وَمِنۡهَا تَأۡكُلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">79. Allâh, it is He Who has made cattle for you, that you may ride on some of them, and of some you eat.</p>
