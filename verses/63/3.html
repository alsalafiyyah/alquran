<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>63:3</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ذَٰلِكَ بِأَنَّهُمۡ ءَامَنُواْ ثُمَّ كَفَرُواْ فَطُبِعَ عَلَىٰ قُلُوبِهِمۡ فَهُمۡ لَا يَفۡقَهُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">3. That is because they believed, and then disbelieved; therefore their hearts are sealed, so they understand not.</p>
