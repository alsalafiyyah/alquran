<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>63:11</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَن يُؤَخِّرَ ٱللَّهُ نَفۡسًا إِذَا جَآءَ أَجَلُهَاۚ وَٱللَّهُ خَبِيرُۢ بِمَا تَعۡمَلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">11. And Allâh grants respite to none when his appointed time (death) comes. And Allâh is All-Aware of what you do.</p>
