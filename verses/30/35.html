<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>30:35</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَمۡ أَنزَلۡنَا عَلَيۡهِمۡ سُلۡطَٰنٗا فَهُوَ يَتَكَلَّمُ بِمَا كَانُواْ بِهِۦ يُشۡرِكُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">35. Or have We revealed to them an authority (a Scripture), which speaks of that which they have been associating with Him?</p>
