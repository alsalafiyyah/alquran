<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Ar-Rum (30:11)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱللَّهُ يَبۡدَؤُاْ ٱلۡخَلۡقَ ثُمَّ يُعِيدُهُۥ ثُمَّ إِلَيۡهِ تُرۡجَعُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">11. Allâh (Alone) originates the creation, then He will repeat it, then to Him you will be returned.</p>
