<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>30:49</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَإِن كَانُواْ مِن قَبۡلِ أَن يُنَزَّلَ عَلَيۡهِم مِّن قَبۡلِهِۦ لَمُبۡلِسِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">49. And verily before that (rain) - just before it was sent down upon them - they were in despair!</p>
