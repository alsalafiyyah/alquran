  <p class="text-emerald-700 font-bold mb-4"><strong>Ar-Rum (30:3)</strong></p>

  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">3. In the nearest land (Syria, Iraq, Jordan, and Palestine), and they, after their defeat, will be victorious.</p>
