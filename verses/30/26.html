  <p class="text-emerald-700 font-bold mb-4"><strong>Ar-Rum (30:26)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَهُۥ مَن فِي ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِۖ كُلّٞ لَّهُۥ قَٰنِتُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">26. To Him belongs whatever is in the heavens and the earth. All are obedient to Him.</p>
