<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>30:34</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لِيَكۡفُرُواْ بِمَآ ءَاتَيۡنَٰهُمۡۚ فَتَمَتَّعُواْ فَسَوۡفَ تَعۡلَمُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">34. So as to be ungrateful for the graces which We have bestowed on them. Then enjoy (your short life); but you will come to know.</p>
