  <p class="text-emerald-700 font-bold mb-4"><strong>Ad-Dukhan (44:24)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَٱتۡرُكِ ٱلۡبَحۡرَ رَهۡوًاۖ إِنَّهُمۡ جُندٞ مُّغۡرَقُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">24. "And leave the sea as it is (quiet and divided). Verily, they are a host to be drowned."</p>
