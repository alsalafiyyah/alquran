  <p class="text-emerald-700 font-bold mb-4"><strong>44:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">رَبِّ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِ وَمَا بَيۡنَهُمَآۖ إِن كُنتُم مُّوقِنِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">7. The Lord of the heavens and the earth and all that is between them, if you (but) have a faith with certainty.</p>
