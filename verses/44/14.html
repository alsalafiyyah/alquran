  <p class="text-emerald-700 font-bold mb-4"><strong>44:14</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ثُمَّ تَوَلَّوۡاْ عَنۡهُ وَقَالُواْ مُعَلَّمٞ مَّجۡنُونٌ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">14. Then they had turned away from him (Messenger Muhammad صلى الله عليه و سلم) and said: (He is) one taught (by a human being), a madman!"</p>
