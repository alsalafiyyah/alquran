<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Ad-Dukhan (44:18)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَنۡ أَدُّوٓاْ إِلَيَّ عِبَادَ ٱللَّهِۖ إِنِّي لَكُمۡ رَسُولٌ أَمِينٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">18. Saying: "Deliver to me the slaves of Allâh (i.e. the Children of Israel). Verily, I am to you a Messenger worthy of all trust.</p>
