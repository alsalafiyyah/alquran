  <p class="text-emerald-700 font-bold mb-4"><strong>44:16</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يَوۡمَ نَبۡطِشُ ٱلۡبَطۡشَةَ ٱلۡكُبۡرَىٰٓ إِنَّا مُنتَقِمُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">16. On the Day when We shall seize you with the greatest seizure (punishment). Verily, We will exact retribution.</p>
