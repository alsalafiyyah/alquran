<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Ad-Dukhan (44:38)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَا خَلَقۡنَا ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضَ وَمَا بَيۡنَهُمَا لَٰعِبِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">38. And We created not the heavens and the earth, and all that is between them, for mere play.</p>
