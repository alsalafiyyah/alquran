<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Ad-Dukhan (44:42)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِلَّا مَن رَّحِمَ ٱللَّهُۚ إِنَّهُۥ هُوَ ٱلۡعَزِيزُ ٱلرَّحِيمُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">42. Except him on whom Allâh has Mercy. Verily, He is the All-Mighty, the Most Merciful.</p>
