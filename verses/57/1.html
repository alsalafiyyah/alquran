<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>57:1</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">سَبَّحَ لِلَّهِ مَا فِي ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِۖ وَهُوَ ٱلۡعَزِيزُ ٱلۡحَكِيمُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">1. Whatsoever is in the heavens and the earth glorifies Allâh - and He is the All-Mighty, All-Wise.</p>
