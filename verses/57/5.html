  <p class="text-emerald-700 font-bold mb-4"><strong>57:5</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَّهُۥ مُلۡكُ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِۚ وَإِلَى ٱللَّهِ تُرۡجَعُ ٱلۡأُمُورُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">5. His is the kingdom of the heavens and the earth. And to Allâh return all the matters (for decision).</p>
