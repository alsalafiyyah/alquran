<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-'Adiyat (100:9)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">۞ أَفَلَا يَعۡلَمُ إِذَا بُعۡثِرَ مَا فِي ٱلۡقُبُورِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">9. Knows he not that when the contents of the graves are poured forth (all mankind is resurrected)?</p>
