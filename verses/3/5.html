  <p class="text-emerald-700 font-bold mb-4"><strong>3:5</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ ٱللَّهَ لَا يَخۡفَىٰ عَلَيۡهِ شَيۡءٞ فِي ٱلۡأَرۡضِ وَلَا فِي ٱلسَّمَآءِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">5. Truly, nothing is hidden from Allâh, in the earth or in the heaven.</p>
