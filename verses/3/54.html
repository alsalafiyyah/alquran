<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Aal 'Imran (3:54)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَكَرُواْ وَمَكَرَ ٱللَّهُۖ وَٱللَّهُ خَيۡرُ ٱلۡمَٰكِرِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">54. And they (disbelievers) plotted to kill ‘Îsâ [(Jesus) عليه السلام], and Allâh plotted too. And Allâh is the Best of those who plot.</p>
</div>
