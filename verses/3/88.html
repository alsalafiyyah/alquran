<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al 'Imran (3:88)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">خَٰلِدِينَ فِيهَا لَا يُخَفَّفُ عَنۡهُمُ ٱلۡعَذَابُ وَلَا هُمۡ يُنظَرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">88. They will abide therein (Hell). Neither will their torment be lightened, nor will it be delayed or postponed (for a while).</p>
