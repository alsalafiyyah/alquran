  <p class="text-emerald-700 font-bold mb-4"><strong>3:189</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلِلَّهِ مُلۡكُ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِۗ وَٱللَّهُ عَلَىٰ كُلِّ شَيۡءٖ قَدِيرٌ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">189. And to Allâh belongs the dominion of the heavens and the earth, and Allâh has power over all things.</p>
