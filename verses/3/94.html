<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>3:94</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَمَنِ ٱفۡتَرَىٰ عَلَى ٱللَّهِ ٱلۡكَذِبَ مِنۢ بَعۡدِ ذَٰلِكَ فَأُوْلَٰٓئِكَ هُمُ ٱلظَّٰلِمُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">94. Then after that, whosoever shall invent a lie against Allâh, ... such shall indeed be the Zâlimûn (disbelievers).</p>
