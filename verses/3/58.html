<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>3:58</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ذَٰلِكَ نَتۡلُوهُ عَلَيۡكَ مِنَ ٱلۡأٓيَٰتِ وَٱلذِّكۡرِ ٱلۡحَكِيمِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">58. This is what We recite to you (O Muhammad صلى الله عليه وسلم) of the Verses and the Wise Reminder (i.e. the Qur’ân).</p>
