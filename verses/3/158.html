<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Aal 'Imran (3:158)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَئِن مُّتُّمۡ أَوۡ قُتِلۡتُمۡ لَإِلَى ٱللَّهِ تُحۡشَرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">158. And whether you die, or are killed, verily, unto Allâh you shall be gathered.</p>
