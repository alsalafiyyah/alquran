<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>3:197</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">مَتَٰعٞ قَلِيلٞ ثُمَّ مَأۡوَىٰهُمۡ جَهَنَّمُۖ وَبِئۡسَ ٱلۡمِهَادُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">197. A brief enjoyment; then, their ultimate abode is Hell; and worst indeed is that place for rest.</p>
