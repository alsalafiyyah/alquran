<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Aal 'Imran (3:141)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلِيُمَحِّصَ ٱللَّهُ ٱلَّذِينَ ءَامَنُواْ وَيَمۡحَقَ ٱلۡكَٰفِرِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">141. And that Allâh may test (or purify) the believers (from sins) and destroy the disbelievers.</p>
