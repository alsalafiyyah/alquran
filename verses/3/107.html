<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>3:107</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَأَمَّا ٱلَّذِينَ ٱبۡيَضَّتۡ وُجُوهُهُمۡ فَفِي رَحۡمَةِ ٱللَّهِۖ هُمۡ فِيهَا خَٰلِدُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">107. And for those whose faces will become white, they will be in Allâh’s Mercy (Paradise), therein they shall dwell forever.</p>
