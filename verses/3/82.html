<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al 'Imran (3:82)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَمَن تَوَلَّىٰ بَعۡدَ ذَٰلِكَ فَأُوْلَٰٓئِكَ هُمُ ٱلۡفَٰسِقُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">82. Then whoever turns away after this, they are the Fâsiqûn (rebellious: those who turn away from Allâh’s Obedience).</p>
</div>
