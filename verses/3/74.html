<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>3:74</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يَخۡتَصُّ بِرَحۡمَتِهِۦ مَن يَشَآءُۗ وَٱللَّهُ ذُو ٱلۡفَضۡلِ ٱلۡعَظِيمِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">74. He selects for His Mercy (Islâm and the Qur’ân with Prophethood) whom He wills and Allâh is the Owner of Great Bounty.</p>
