<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>3:51</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ ٱللَّهَ رَبِّي وَرَبُّكُمۡ فَٱعۡبُدُوهُۚ هَٰذَا صِرَٰطٞ مُّسۡتَقِيمٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">51. Truly! Allâh is my Lord and your Lord, so worship Him (Alone). This is the Straight Path.</p>
