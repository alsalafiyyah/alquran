<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>3:182</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ذَٰلِكَ بِمَا قَدَّمَتۡ أَيۡدِيكُمۡ وَأَنَّ ٱللَّهَ لَيۡسَ بِظَلَّامٖ لِّلۡعَبِيدِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">182. This is because of that (evil) which your hands have sent before you. And certainly, Allâh is never unjust to (His) slaves.</p>
</div>
