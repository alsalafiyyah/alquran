<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Aal 'Imran (3:63)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَإِن تَوَلَّوۡاْ فَإِنَّ ٱللَّهَ عَلِيمُۢ بِٱلۡمُفۡسِدِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">63. And if they turn away (and do not accept these true proofs and evidence), then surely, Allâh is All-Aware of those who do mischief.</p>
