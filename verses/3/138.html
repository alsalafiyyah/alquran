<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>3:138</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">هَٰذَا بَيَانٞ لِّلنَّاسِ وَهُدٗى وَمَوۡعِظَةٞ لِّلۡمُتَّقِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">138. This (the Qur’ân) is a plain statement for mankind, a guidance and instruction to those who are Al-Muttaqûn (the pious - See V.2:2).</p>
