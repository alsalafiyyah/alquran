<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>3:22</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أُوْلَٰٓئِكَ ٱلَّذِينَ حَبِطَتۡ أَعۡمَٰلُهُمۡ فِي ٱلدُّنۡيَا وَٱلۡأٓخِرَةِ وَمَا لَهُم مِّن نَّٰصِرِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">22. They are those whose works will be lost in this world and in the Hereafter, and they will have no helpers.</p>
