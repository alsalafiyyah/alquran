<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>3:89</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِلَّا ٱلَّذِينَ تَابُواْ مِنۢ بَعۡدِ ذَٰلِكَ وَأَصۡلَحُواْ فَإِنَّ ٱللَّهَ غَفُورٞ رَّحِيمٌ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">89. Except for those who repent after that and do righteous deeds. Verily, Allâh is Oft-Forgiving, Most Merciful.</p>
