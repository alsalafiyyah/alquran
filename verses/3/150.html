<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al 'Imran (3:150)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">بَلِ ٱللَّهُ مَوۡلَىٰكُمۡۖ وَهُوَ خَيۡرُ ٱلنَّٰصِرِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">150. Nay, Allâh is your Maulâ (Patron, Lord, Helper, Protector), and He is the Best of helpers.</p>
