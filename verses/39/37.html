<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>39:37</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَن يَهۡدِ ٱللَّهُ فَمَا لَهُۥ مِن مُّضِلٍّۗ أَلَيۡسَ ٱللَّهُ بِعَزِيزٖ ذِي ٱنتِقَامٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">37. And whomsoever Allâh guides, for him there will be no misleader. Is not Allâh All-Mighty, Possessor of Retribution?</p>
