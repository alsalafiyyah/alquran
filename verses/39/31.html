  <p class="text-emerald-700 font-bold mb-4"><strong>39:31</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ثُمَّ إِنَّكُمۡ يَوۡمَ ٱلۡقِيَٰمَةِ عِندَ رَبِّكُمۡ تَخۡتَصِمُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">31. Then, on the Day of Resurrection, you will be disputing before your Lord.</p>
