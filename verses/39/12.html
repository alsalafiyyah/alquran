<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>39:12</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَأُمِرۡتُ لِأَنۡ أَكُونَ أَوَّلَ ٱلۡمُسۡلِمِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">12. "And I am commanded (this) in order that I may be the first of those who submit themselves to Allâh (in Islâm) as Muslims."</p>
