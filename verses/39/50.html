<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Az-Zumar (39:50)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَدۡ قَالَهَا ٱلَّذِينَ مِن قَبۡلِهِمۡ فَمَآ أَغۡنَىٰ عَنۡهُم مَّا كَانُواْ يَكۡسِبُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">50. Verily, those before them said it, yet (all) that they had earned availed them not.</p>
