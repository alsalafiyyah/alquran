<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>39:57</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَوۡ تَقُولَ لَوۡ أَنَّ ٱللَّهَ هَدَىٰنِي لَكُنتُ مِنَ ٱلۡمُتَّقِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">57. Or (lest) he should say: "If only Allâh had guided me, I should indeed have been among the Muttaqûn (the pious - See V.2:2)."</p>
</div>
