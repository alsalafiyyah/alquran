<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>39:72</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قِيلَ ٱدۡخُلُوٓاْ أَبۡوَٰبَ جَهَنَّمَ خَٰلِدِينَ فِيهَاۖ فَبِئۡسَ مَثۡوَى ٱلۡمُتَكَبِّرِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">72. It will be said (to them): "Enter you the gates of Hell, to abide therein. And (indeed) what an evil abode of the arrogant!"</p>
</div>
