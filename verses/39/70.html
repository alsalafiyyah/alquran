<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Az-Zumar (39:70)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَوُفِّيَتۡ كُلُّ نَفۡسٖ مَّا عَمِلَتۡ وَهُوَ أَعۡلَمُ بِمَا يَفۡعَلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">70. And each person will be paid in full of what he did; and He is Best Aware of what they do.</p>
