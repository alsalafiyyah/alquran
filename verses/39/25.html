<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Az-Zumar (39:25)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">كَذَّبَ ٱلَّذِينَ مِن قَبۡلِهِمۡ فَأَتَىٰهُمُ ٱلۡعَذَابُ مِنۡ حَيۡثُ لَا يَشۡعُرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">25. Those before them belied, and so the torment came on them from directions they perceived not.</p>
