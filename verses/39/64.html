<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Az-Zumar (39:64)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قُلۡ أَفَغَيۡرَ ٱللَّهِ تَأۡمُرُوٓنِّيٓ أَعۡبُدُ أَيُّهَا ٱلۡجَٰهِلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">64. Say (O Muhammad صلى الله عليه وسلم to the polytheists): "Do you order me to worship other than Allâh? O you fools!"</p>
</div>
