<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>39:13</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قُلۡ إِنِّيٓ أَخَافُ إِنۡ عَصَيۡتُ رَبِّي عَذَابَ يَوۡمٍ عَظِيمٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">13. Say (O Muhammad صلى الله عليه وسلم): "Verily if I disobey my Lord, I am afraid of the torment of a great Day."</p>
