<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>4:118</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَّعَنَهُ ٱللَّهُۘ وَقَالَ لَأَتَّخِذَنَّ مِنۡ عِبَادِكَ نَصِيبٗا مَّفۡرُوضٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">118. Allâh cursed him. And he [Shaitân (Satan)] said: "I will take an appointed portion of your slaves.</p>
