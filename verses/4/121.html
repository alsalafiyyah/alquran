  <p class="text-emerald-700 font-bold mb-4"><strong>4:121</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أُوْلَٰٓئِكَ مَأۡوَىٰهُمۡ جَهَنَّمُ وَلَا يَجِدُونَ عَنۡهَا مَحِيصٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">121. The dwelling of such (people) is Hell, and they will find no way of escape from it.</p>
