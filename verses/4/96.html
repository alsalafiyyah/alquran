<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>4:96</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">دَرَجَٰتٖ مِّنۡهُ وَمَغۡفِرَةٗ وَرَحۡمَةٗۚ وَكَانَ ٱللَّهُ غَفُورٗا رَّحِيمًا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">96. Degrees of (higher) grades from Him, and Forgiveness and Mercy. And Allâh is Ever Oft-Forgiving, Most Merciful.</p>
