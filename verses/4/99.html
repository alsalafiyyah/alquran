<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>4:99</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَأُوْلَٰٓئِكَ عَسَى ٱللَّهُ أَن يَعۡفُوَ عَنۡهُمۡۚ وَكَانَ ٱللَّهُ عَفُوًّا غَفُورٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">99. These are they whom Allâh is likely to forgive them, and Allâh is Ever Oft-Pardoning, Oft-Forgiving.</p>
