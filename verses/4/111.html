<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>An-Nisa' (4:111)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَن يَكۡسِبۡ إِثۡمٗا فَإِنَّمَا يَكۡسِبُهُۥ عَلَىٰ نَفۡسِهِۦۚ وَكَانَ ٱللَّهُ عَلِيمًا حَكِيمٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">111. And whoever earns sin, he earns it only against himself. And Allâh is Ever All-Knowing, All-Wise.</p>
