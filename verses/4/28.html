<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>4:28</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يُرِيدُ ٱللَّهُ أَن يُخَفِّفَ عَنكُمۡۚ وَخُلِقَ ٱلۡإِنسَٰنُ ضَعِيفٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">28. Allâh wishes to lighten (the burden) for you; and man was created weak (cannot be patient to leave sexual intercourse with woman).</p>
