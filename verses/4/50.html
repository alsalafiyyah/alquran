<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>4:50</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ٱنظُرۡ كَيۡفَ يَفۡتَرُونَ عَلَى ٱللَّهِ ٱلۡكَذِبَۖ وَكَفَىٰ بِهِۦٓ إِثۡمٗا مُّبِينًا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">50. Look, how they invent a lie against Allâh, and enough is that as a manifest sin.</p>
