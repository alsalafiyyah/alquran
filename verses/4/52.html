<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>An-Nisa' (4:52)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أُوْلَٰٓئِكَ ٱلَّذِينَ لَعَنَهُمُ ٱللَّهُۖ وَمَن يَلۡعَنِ ٱللَّهُ فَلَن تَجِدَ لَهُۥ نَصِيرًا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">52. They are those whom Allâh has cursed, and he whom Allâh curses, you will not find for him (any) helper,</p>
