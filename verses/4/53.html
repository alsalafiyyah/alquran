<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>4:53</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَمۡ لَهُمۡ نَصِيبٞ مِّنَ ٱلۡمُلۡكِ فَإِذٗا لَّا يُؤۡتُونَ ٱلنَّاسَ نَقِيرًا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">53. Or have they a share in the dominion? Then in that case they would not give mankind even a speck on the back of a date-stone.</p>
</div>
