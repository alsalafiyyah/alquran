<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>4:151</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أُوْلَٰٓئِكَ هُمُ ٱلۡكَٰفِرُونَ حَقّٗاۚ وَأَعۡتَدۡنَا لِلۡكَٰفِرِينَ عَذَابٗا مُّهِينٗا</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">151. They are in truth disbelievers. And We have prepared for the disbelievers a humiliating torment.</p>
