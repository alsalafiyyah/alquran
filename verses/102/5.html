<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>At-Takathur (102:5)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">كَلَّا لَوۡ تَعۡلَمُونَ عِلۡمَ ٱلۡيَقِينِ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">5. Nay! If you knew with a sure knowledge (the end result of piling up, you would not have been occupied yourselves in worldly things).</p>
