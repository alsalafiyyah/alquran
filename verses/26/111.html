<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>26:111</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">۞ قَالُوٓاْ أَنُؤۡمِنُ لَكَ وَٱتَّبَعَكَ ٱلۡأَرۡذَلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">111. They said: "Shall we believe in you, when the meanest (of the people) follow you?"</p>
