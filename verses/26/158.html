<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>26:158</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَأَخَذَهُمُ ٱلۡعَذَابُۚ إِنَّ فِي ذَٰلِكَ لَأٓيَةٗۖ وَمَا كَانَ أَكۡثَرُهُم مُّؤۡمِنِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">158. So the torment overtook them. Verily, in this is indeed a sign, yet most of them are not believers.</p>
