  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَأَلۡقَىٰ مُوسَىٰ عَصَاهُ فَإِذَا هِيَ تَلۡقَفُ مَا يَأۡفِكُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">45. Then Mûsâ (Moses) threw his stick, and behold, it swallowed up all that they falsely showed!</p>
