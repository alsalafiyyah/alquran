<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>26:35</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يُرِيدُ أَن يُخۡرِجَكُم مِّنۡ أَرۡضِكُم بِسِحۡرِهِۦ فَمَاذَا تَأۡمُرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">35. "He wants to drive you out of your land by his sorcery: what is it then that you command?"</p>
