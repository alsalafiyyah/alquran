<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>26:29</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ لَئِنِ ٱتَّخَذۡتَ إِلَٰهًا غَيۡرِي لَأَجۡعَلَنَّكَ مِنَ ٱلۡمَسۡجُونِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">29. [Fir‘aun (Pharaoh)] said: "If you choose an ilâh (god) other than me, I will certainly put you among the prisoners."</p>
