<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>26:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أَوَلَمۡ يَرَوۡاْ إِلَى ٱلۡأَرۡضِ كَمۡ أَنۢبَتۡنَا فِيهَا مِن كُلِّ زَوۡجٖ كَرِيمٍ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">7. Do they not observe the earth - how much of every good kind We cause to grow therein?</p>
