<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>26:28</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ رَبُّ ٱلۡمَشۡرِقِ وَٱلۡمَغۡرِبِ وَمَا بَيۡنَهُمَآۖ إِن كُنتُمۡ تَعۡقِلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">28. [Mûsâ (Moses)] said: "Lord of the east and the west, and all that is between them, if you did but understand!"</p>
