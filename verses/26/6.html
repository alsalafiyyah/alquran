<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>26:6</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَقَدۡ كَذَّبُواْ فَسَيَأۡتِيهِمۡ أَنۢبَٰٓؤُاْ مَا كَانُواْ بِهِۦ يَسۡتَهۡزِءُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">6. So they have indeed denied (the truth - this Qur’ân), then the news of what they mocked at will come to them.</p>
</div>
