  <p class="text-emerald-700 font-bold mb-4"><strong>Ash-Shu'ara' (26:201)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَا يُؤۡمِنُونَ بِهِۦ حَتَّىٰ يَرَوُاْ ٱلۡعَذَابَ ٱلۡأَلِيمَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">201. They will not believe in it until they see the painful torment.</p>
