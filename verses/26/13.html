<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>26:13</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَيَضِيقُ صَدۡرِي وَلَا يَنطَلِقُ لِسَانِي فَأَرۡسِلۡ إِلَىٰ هَٰرُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">13. "And my breast straitens, and my tongue expresses not well. So send for Hârûn (Aaron) (to come along with me).</p>
