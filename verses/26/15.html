  <p class="text-emerald-700 font-bold mb-4"><strong>26:15</strong></p>

  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">15. (Allâh) said: "Nay! Go you both with Our Signs. Verily We shall be with you, listening.</p>
