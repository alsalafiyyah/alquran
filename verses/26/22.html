  <p class="text-emerald-700 font-bold mb-4"><strong>26:22</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَتِلۡكَ نِعۡمَةٞ تَمُنُّهَا عَلَيَّ أَنۡ عَبَّدتَّ بَنِيٓ إِسۡرَٰٓءِيلَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">22. "And this is the past favour with which you reproach me: that you have enslaved the Children of Israel."</p>
