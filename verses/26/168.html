<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>26:168</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ إِنِّي لِعَمَلِكُم مِّنَ ٱلۡقَالِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">168. He said: "I am, indeed, of those who disapprove with severe anger and fury your (this evil) action (of sodomy).</p>
