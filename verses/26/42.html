<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>26:42</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ نَعَمۡ وَإِنَّكُمۡ إِذٗا لَّمِنَ ٱلۡمُقَرَّبِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">42. He said: "Yes, and you shall then verily be of those brought near (to myself)."</p>
