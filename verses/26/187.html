  <p class="text-emerald-700 font-bold mb-4"><strong>26:187</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَأَسۡقِطۡ عَلَيۡنَا كِسَفٗا مِّنَ ٱلسَّمَآءِ إِن كُنتَ مِنَ ٱلصَّٰدِقِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">187. "So cause a piece of the heaven to fall on us, if you are of the truthful!"</p>
