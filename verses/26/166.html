<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>26:166</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَتَذَرُونَ مَا خَلَقَ لَكُمۡ رَبُّكُم مِّنۡ أَزۡوَٰجِكُمۚ بَلۡ أَنتُمۡ قَوۡمٌ عَادُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">166. "And leave those whom Allâh has created for you to be your wives? Nay, you are a trespassing people!"</p>
