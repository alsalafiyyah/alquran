<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Ash-Shu'ara' (26:83)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">رَبِّ هَبۡ لِي حُكۡمٗا وَأَلۡحِقۡنِي بِٱلصَّٰلِحِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">83. My Lord! Bestow Hukm (religious knowledge, right judgement of the affairs and Prophethood) on me, and join me with the righteous.</p>
