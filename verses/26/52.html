<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>26:52</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">۞ وَأَوۡحَيۡنَآ إِلَىٰ مُوسَىٰٓ أَنۡ أَسۡرِ بِعِبَادِيٓ إِنَّكُم مُّتَّبَعُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">52. And We revealed to Mûsâ (Moses), saying: "Depart by night with My slaves, verily you will be pursued."</p>
