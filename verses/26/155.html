<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>26:155</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ هَٰذِهِۦ نَاقَةٞ لَّهَا شِرۡبٞ وَلَكُمۡ شِرۡبُ يَوۡمٖ مَّعۡلُومٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">155. He said: "Here is a she-camel: it has a right to drink (water), and you have a right to drink (water) (each) on a day, known.</p>
