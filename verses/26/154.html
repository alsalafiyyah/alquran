<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>26:154</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">مَآ أَنتَ إِلَّا بَشَرٞ مِّثۡلُنَا فَأۡتِ بِـَٔايَةٍ إِن كُنتَ مِنَ ٱلصَّٰدِقِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">154. "You are but a human being like us. Then bring us a sign if you are of the truthful."</p>
