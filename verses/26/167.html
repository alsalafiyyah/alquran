<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Ash-Shu'ara' (26:167)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ لَئِن لَّمۡ تَنتَهِ يَٰلُوطُ لَتَكُونَنَّ مِنَ ٱلۡمُخۡرَجِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">167. They said: "If you cease not O Lût (Lot)! verily, you will be one of those who are driven out!"</p>
