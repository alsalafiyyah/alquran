<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Ash-Shu'ara' (26:27)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ إِنَّ رَسُولَكُمُ ٱلَّذِيٓ أُرۡسِلَ إِلَيۡكُمۡ لَمَجۡنُونٞ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">27. [Fir‘aun (Pharaoh)] said: "Verily, your Messenger who has been sent to you is a madman!"</p>
