<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>26:99</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَآ أَضَلَّنَآ إِلَّا ٱلۡمُجۡرِمُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">99. And none has brought us into error except the Mujrimûn [Iblîs (Satan) and those of human beings who commit crimes, murderers, polytheists, oppressors].</p>
