  <p class="text-emerald-700 font-bold mb-4"><strong>Ash-Shu'ara' (26:156)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَلَا تَمَسُّوهَا بِسُوٓءٖ فَيَأۡخُذَكُمۡ عَذَابُ يَوۡمٍ عَظِيمٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">156. "And touch her not with harm, lest the torment of a Great Day should seize you."</p>
