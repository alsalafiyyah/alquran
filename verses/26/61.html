<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Ash-Shu'ara' (26:61)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَلَمَّا تَرَٰٓءَا ٱلۡجَمۡعَانِ قَالَ أَصۡحَٰبُ مُوسَىٰٓ إِنَّا لَمُدۡرَكُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">61. And when the two hosts saw each other, the companions of Mûsâ (Moses) said: "We are sure to be overtaken."</p>
