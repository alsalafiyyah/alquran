  <p class="text-emerald-700 font-bold mb-4"><strong>26:92</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَقِيلَ لَهُمۡ أَيۡنَ مَا كُنتُمۡ تَعۡبُدُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">92. And it will be said to them: "Where are those (the false gods whom you used to set up as rivals with Allâh) that you used to worship.</p>
