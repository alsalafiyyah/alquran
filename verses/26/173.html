  <p class="text-emerald-700 font-bold mb-4"><strong>26:173</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَأَمۡطَرۡنَا عَلَيۡهِم مَّطَرٗاۖ فَسَآءَ مَطَرُ ٱلۡمُنذَرِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">173. And We rained on them a rain (of torment). And how evil was the rain of those who had been warned!</p>
