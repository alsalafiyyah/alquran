<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>26:116</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ لَئِن لَّمۡ تَنتَهِ يَٰنُوحُ لَتَكُونَنَّ مِنَ ٱلۡمَرۡجُومِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">116. They said: "If you cease not, O Nûh (Noah) you will surely be among those stoned (to death)."</p>
