<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Ash-Shu'ara' (26:200)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">كَذَٰلِكَ سَلَكۡنَٰهُ فِي قُلُوبِ ٱلۡمُجۡرِمِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">200. Thus have We caused it (the denial of the Qur’ân) to enter the hearts of the Mûjrimûn (criminals, polytheists, sinners).</p>
</div>
