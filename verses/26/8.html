<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>26:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّ فِي ذَٰلِكَ لَأٓيَةٗۖ وَمَا كَانَ أَكۡثَرُهُم مُّؤۡمِنِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">8. Verily, in this is an Ayâh (proof or sign), yet most of them (polytheists, pagans who do not believe in Resurrection) are not believers.</p>
