<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>26:40</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَعَلَّنَا نَتَّبِعُ ٱلسَّحَرَةَ إِن كَانُواْ هُمُ ٱلۡغَٰلِبِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">40. "That we may follow the sorcerers [who were on Fir‘aun’s (Pharaoh) religion of disbelief] if they are the winners."</p>
