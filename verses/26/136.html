  <p class="text-emerald-700 font-bold mb-4"><strong>26:136</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ سَوَآءٌ عَلَيۡنَآ أَوَعَظۡتَ أَمۡ لَمۡ تَكُن مِّنَ ٱلۡوَٰعِظِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">136. They said: "It is the same to us whether you preach or be not of those who preach.</p>
