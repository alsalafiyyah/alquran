  <p class="text-emerald-700 font-bold mb-4"><strong>Ash-Shu'ara' (26:223)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">يُلۡقُونَ ٱلسَّمۡعَ وَأَكۡثَرُهُمۡ كَٰذِبُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">223. Who gives ear (to the devils and they pour what they may have heard of the Unseen from the angels), and most of them are liars.</p>
