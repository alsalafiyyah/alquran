  <p class="text-emerald-700 font-bold mb-4"><strong>Ash-Shu'ara' (26:102)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَلَوۡ أَنَّ لَنَا كَرَّةٗ فَنَكُونَ مِنَ ٱلۡمُؤۡمِنِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">102. (Alas!) If we only had a chance to return (to the world), we shall truly be among the believers!</p>
