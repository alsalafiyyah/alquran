<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>26:213</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَلَا تَدۡعُ مَعَ ٱللَّهِ إِلَٰهًا ءَاخَرَ فَتَكُونَ مِنَ ٱلۡمُعَذَّبِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">213. So invoke not with Allâh another ilâh (god) lest you should be among those who receive punishment.</p>
