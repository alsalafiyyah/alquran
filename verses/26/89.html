<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Ash-Shu'ara' (26:89)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِلَّا مَنۡ أَتَى ٱللَّهَ بِقَلۡبٖ سَلِيمٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">89. Except him who brings to Allâh a clean heart [clean from Shirk (polytheism) and Nifâq (hypocrisy)]."</p>
