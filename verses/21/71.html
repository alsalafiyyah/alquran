<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>21:71</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَنَجَّيۡنَٰهُ وَلُوطًا إِلَى ٱلۡأَرۡضِ ٱلَّتِي بَٰرَكۡنَا فِيهَا لِلۡعَٰلَمِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">71. And We rescued him and Lût (Lot) to the land which We have blessed for the ‘Âlamîn (mankind and jinn).</p>
