<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>21:58</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَجَعَلَهُمۡ جُذَٰذًا إِلَّا كَبِيرٗا لَّهُمۡ لَعَلَّهُمۡ إِلَيۡهِ يَرۡجِعُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">58. So he broke them to pieces, (all) except the biggest of them, that they might turn to it.</p>
