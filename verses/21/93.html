<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>21:93</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَتَقَطَّعُوٓاْ أَمۡرَهُم بَيۡنَهُمۡۖ كُلٌّ إِلَيۡنَا رَٰجِعُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">93. But they have broken up and differed as regards their religion among themselves. (And) they all shall return to Us.</p>
