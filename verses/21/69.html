<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>21:69</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قُلۡنَا يَٰنَارُ كُونِي بَرۡدٗا وَسَلَٰمًا عَلَىٰٓ إِبۡرَٰهِيمَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">69. We (Allâh) said: "O fire! Be you coolness and safety for Ibrâhîm (Abraham)!"</p>
