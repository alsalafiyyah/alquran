  <p class="text-emerald-700 font-bold mb-4"><strong>21:62</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُوٓاْ ءَأَنتَ فَعَلۡتَ هَٰذَا بِـَٔالِهَتِنَا يَٰٓإِبۡرَٰهِيمُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">62. They said: "Are you the one who has done this to our gods, O Ibrâhîm (Abraham)?"</p>
