<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>21:33</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَهُوَ ٱلَّذِي خَلَقَ ٱلَّيۡلَ وَٱلنَّهَارَ وَٱلشَّمۡسَ وَٱلۡقَمَرَۖ كُلّٞ فِي فَلَكٖ يَسۡبَحُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">33. And He it is Who has created the night and the day, and the sun and the moon, each in an orbit floating.</p>
