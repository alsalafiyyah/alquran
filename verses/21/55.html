<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Anbiya' (21:55)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُوٓاْ أَجِئۡتَنَا بِٱلۡحَقِّ أَمۡ أَنتَ مِنَ ٱللَّٰعِبِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">55. They said: "Have you brought us the truth, or are you one of those who play about?"</p>
