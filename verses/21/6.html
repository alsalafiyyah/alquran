<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>21:6</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">مَآ ءَامَنَتۡ قَبۡلَهُم مِّن قَرۡيَةٍ أَهۡلَكۡنَٰهَآۖ أَفَهُمۡ يُؤۡمِنُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">6. Not one of the towns (populations), of those which We destroyed, believed before them (though We sent them signs): will they then believe?</p>
