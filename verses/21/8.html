<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>21:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَا جَعَلۡنَٰهُمۡ جَسَدٗا لَّا يَأۡكُلُونَ ٱلطَّعَامَ وَمَا كَانُواْ خَٰلِدِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">8. And We did not create them (the Messengers, with) bodies that ate not food, nor were they immortals.</p>
