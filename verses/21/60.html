<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>21:60</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ سَمِعۡنَا فَتٗى يَذۡكُرُهُمۡ يُقَالُ لَهُۥٓ إِبۡرَٰهِيمُ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">60. They said: "We heard a young man talking against them, who is called Ibrâhîm (Abraham)."</p>
