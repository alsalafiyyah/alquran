<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>21:65</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">ثُمَّ نُكِسُواْ عَلَىٰ رُءُوسِهِمۡ لَقَدۡ عَلِمۡتَ مَا هَٰٓؤُلَآءِ يَنطِقُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">65. Then they turned to themselves (their first thought and said): "Indeed you [Ibrâhîm (Abraham)] know well that these (idols) speak not!"</p>
