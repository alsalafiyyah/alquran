<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>21:102</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَا يَسۡمَعُونَ حَسِيسَهَاۖ وَهُمۡ فِي مَا ٱشۡتَهَتۡ أَنفُسُهُمۡ خَٰلِدُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">102. They shall not hear the slightest sound of it (Hell), while they abide in that which their ownselves desire.</p>
