<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>21:111</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَإِنۡ أَدۡرِي لَعَلَّهُۥ فِتۡنَةٞ لَّكُمۡ وَمَتَٰعٌ إِلَىٰ حِينٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">111. And I know not, perhaps it may be a trial for you, and an enjoyment for a while.</p>
