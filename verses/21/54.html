<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Anbiya' (21:54)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالَ لَقَدۡ كُنتُمۡ أَنتُمۡ وَءَابَآؤُكُمۡ فِي ضَلَٰلٖ مُّبِينٖ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">54. He said: "Indeed, you and your fathers have been in manifest error."</p>
