<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>21:72</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَوَهَبۡنَا لَهُۥٓ إِسۡحَٰقَ وَيَعۡقُوبَ نَافِلَةٗۖ وَكُلّٗا جَعَلۡنَا صَٰلِحِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">72. And We bestowed upon him Ishâq (Isaac), and (a grandson) Ya‘qûb (Jacob). Each one We made righteous.</p>
</div>
