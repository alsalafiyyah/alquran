  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَلَمَّآ أَحَسُّواْ بَأۡسَنَآ إِذَا هُم مِّنۡهَا يَرۡكُضُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">12. Then, when they perceived (saw) Our Torment (coming), behold, they (tried to) flee from it.</p>
