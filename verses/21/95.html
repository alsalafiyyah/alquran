<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>21:95</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَحَرَٰمٌ عَلَىٰ قَرۡيَةٍ أَهۡلَكۡنَٰهَآ أَنَّهُمۡ لَا يَرۡجِعُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">95. And a ban is laid on every town (population) which We have destroyed that they shall not return (to this world again, nor repent to Us).</p>
