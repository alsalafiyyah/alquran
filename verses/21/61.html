<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>21:61</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ فَأۡتُواْ بِهِۦ عَلَىٰٓ أَعۡيُنِ ٱلنَّاسِ لَعَلَّهُمۡ يَشۡهَدُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">61. They said: "Then bring him before the eyes of the people, that they may testify."</p>
