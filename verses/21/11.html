<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>21:11</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَكَمۡ قَصَمۡنَا مِن قَرۡيَةٖ كَانَتۡ ظَالِمَةٗ وَأَنشَأۡنَا بَعۡدَهَا قَوۡمًا ءَاخَرِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">11. How many a town (community) given to wrong-doing, have We destroyed, and raised up after them another people!</p>
