<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>21:68</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ حَرِّقُوهُ وَٱنصُرُوٓاْ ءَالِهَتَكُمۡ إِن كُنتُمۡ فَٰعِلِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">68. They said: "Burn him and help your âlihah (gods), if you will be doing."</p>
