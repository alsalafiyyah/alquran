  <p class="text-emerald-700 font-bold mb-4"><strong>21:14</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ يَٰوَيۡلَنَآ إِنَّا كُنَّا ظَٰلِمِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">14. They cried: "Woe to us! Certainly we have been Zâlimûn (polytheists, wrong-doers and disbelievers in the Oneness of Allâh)."</p>
