<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>21:59</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">قَالُواْ مَن فَعَلَ هَٰذَا بِـَٔالِهَتِنَآ إِنَّهُۥ لَمِنَ ٱلظَّٰلِمِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">59. They said: "Who has done this to our âlihah (gods)? He must indeed be one of the Zâlimun (wrong-doers)."</p>
