<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>21:110</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِنَّهُۥ يَعۡلَمُ ٱلۡجَهۡرَ مِنَ ٱلۡقَوۡلِ وَيَعۡلَمُ مَا تَكۡتُمُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">110. (Say O Muhammad صلى الله عليه وسلم): Verily, He (Allâh) knows that which is spoken aloud (openly) and that which you conceal.</p>
