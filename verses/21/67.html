  <p class="text-emerald-700 font-bold mb-4"><strong>21:67</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">أُفّٖ لَّكُمۡ وَلِمَا تَعۡبُدُونَ مِن دُونِ ٱللَّهِۚ أَفَلَا تَعۡقِلُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">67. "Fie upon you, and upon that which you worship besides Allâh! Have you then no sense?"</p>
