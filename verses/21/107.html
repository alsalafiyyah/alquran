<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Anbiya' (21:107)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَمَآ أَرۡسَلۡنَٰكَ إِلَّا رَحۡمَةٗ لِّلۡعَٰلَمِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">107. And We have sent you (O Muhammad صلى الله عليه وسلم): not but as a mercy for the ‘Âlamîn (mankind, jinn and all that exists).</p>
