<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>21:52</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">إِذۡ قَالَ لِأَبِيهِ وَقَوۡمِهِۦ مَا هَٰذِهِ ٱلتَّمَاثِيلُ ٱلَّتِيٓ أَنتُمۡ لَهَا عَٰكِفُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">52. When he said to his father and his people: "What are these images, to which you are devoted?"</p>
