<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>21:15</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَمَا زَالَت تِّلۡكَ دَعۡوَىٰهُمۡ حَتَّىٰ جَعَلۡنَٰهُمۡ حَصِيدًا خَٰمِدِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">15. And that cry of theirs ceased not, till We made them as a field that is reaped, extinct (dead).</p>
