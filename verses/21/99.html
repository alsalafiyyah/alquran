<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Anbiya' (21:99)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">لَوۡ كَانَ هَٰٓؤُلَآءِ ءَالِهَةٗ مَّا وَرَدُوهَاۖ وَكُلّٞ فِيهَا خَٰلِدُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">99. Had these (idols) been âlihah (gods), they would not have entered there (Hell), and all of them will abide therein.</p>
