<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>Al-Anbiya' (21:57)</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">وَتَٱللَّهِ لَأَكِيدَنَّ أَصۡنَٰمَكُم بَعۡدَ أَن تُوَلُّواْ مُدۡبِرِينَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">57. "And by Allâh, I shall plot a plan (to destroy) your idols after you have gone away and turned your backs."</p>
