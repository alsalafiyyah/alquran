<div class="single-verse">
  <p class="text-emerald-700 font-bold mb-4"><strong>21:64</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;" class="font-arabic text-slate-900 leading-widest mb-6">فَرَجَعُوٓاْ إِلَىٰٓ أَنفُسِهِمۡ فَقَالُوٓاْ إِنَّكُمۡ أَنتُمُ ٱلظَّٰلِمُونَ</p>
  <p style="font-size:18px;" class="text-slate-800 leading-relaxed">64. So they turned to themselves and said: "Verily, you are the Zâlimûn (polytheists and wrong-doers)."</p>
