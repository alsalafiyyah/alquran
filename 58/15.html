<div class="single-verse">
  <p><strong>58:15</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَعَدَّ ٱللَّهُ لَهُمۡ عَذَابٗا شَدِيدًاۖ إِنَّهُمۡ سَآءَ مَا كَانُواْ يَعۡمَلُونَ</p>
  <p style="font-size:18px;">15. Allâh has prepared for them a severe torment. Evil indeed is that which they used to do.</p>
