<div class="single-verse">
  <p><strong>58:21</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">كَتَبَ ٱللَّهُ لَأَغۡلِبَنَّ أَنَا۠ وَرُسُلِيٓۚ إِنَّ ٱللَّهَ قَوِيٌّ عَزِيزٞ</p>
  <p style="font-size:18px;">21. Allâh has decreed: "Verily, it is I and My Messengers who shall be the victorious." Verily, Allâh is All-Powerful, All-Mighty.</p>
