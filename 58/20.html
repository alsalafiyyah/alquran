<div class="single-verse">
  <p><strong>58:20</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ ٱلَّذِينَ يُحَآدُّونَ ٱللَّهَ وَرَسُولَهُۥٓ أُوْلَٰٓئِكَ فِي ٱلۡأَذَلِّينَ</p>
  <p style="font-size:18px;">20. Those who oppose Allâh and His Messenger (Muhammad صلى الله عليه وسلم) they will be among the lowest (most humiliated).</p>
