  <p><strong>69:14</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَحُمِلَتِ ٱلۡأَرۡضُ وَٱلۡجِبَالُ فَدُكَّتَا دَكَّةٗ وَٰحِدَةٗ</p>
