<div class="single-verse">
  <p><strong>69:11</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّا لَمَّا طَغَا ٱلۡمَآءُ حَمَلۡنَٰكُمۡ فِي ٱلۡجَارِيَةِ</p>
  <p style="font-size:18px;">11. Verily, when the water rose beyond its limits [Nûh’s (Noah) Flood], We carried you (mankind) in the floating [ship that was constructed by Nûh (Noah)]</p>
