<div class="single-verse">
  <p><strong>69:25</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَأَمَّا مَنۡ أُوتِيَ كِتَٰبَهُۥ بِشِمَالِهِۦ فَيَقُولُ يَٰلَيۡتَنِي لَمۡ أُوتَ كِتَٰبِيَهۡ</p>
  <p style="font-size:18px;">25. But as for him who will be given his Record in his left hand, will say: "I wish that I had not been given my Record!</p>
