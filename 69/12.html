  <p><strong>69:12</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لِنَجۡعَلَهَا لَكُمۡ تَذۡكِرَةٗ وَتَعِيَهَآ أُذُنٞ وَٰعِيَةٞ</p>
  <p style="font-size:18px;">12. That We might make it (Noah’s ship) an admonition for you and that it might be retained by the retaining ears.</p>
