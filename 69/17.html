<div class="single-verse">
  <p><strong>69:17</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱلۡمَلَكُ عَلَىٰٓ أَرۡجَآئِهَاۚ وَيَحۡمِلُ عَرۡشَ رَبِّكَ فَوۡقَهُمۡ يَوۡمَئِذٖ ثَمَٰنِيَةٞ</p>
  <p style="font-size:18px;">17. And the angels will be on its sides, and eight angels will, that Day, bear the Throne of your Lord above them.</p>
