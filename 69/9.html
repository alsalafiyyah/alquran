  <p><strong>69:9</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَجَآءَ فِرۡعَوۡنُ وَمَن قَبۡلَهُۥ وَٱلۡمُؤۡتَفِكَٰتُ بِٱلۡخَاطِئَةِ</p>
  <p style="font-size:18px;">9. And Fir‘aun (Pharaoh), and those before him, and the cities overthrown [the towns of the people of [Lût (Lot)] committed sin.</p>
