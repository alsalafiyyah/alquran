<div class="single-verse">
  <p><strong>69:40</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّهُۥ لَقَوۡلُ رَسُولٖ كَرِيمٖ</p>
  <p style="font-size:18px;">40. That this is verily, the word of an honoured Messenger [i.e. Jibrîl (Gabriel) or Muhammad صلى الله عليه وسلم which he has brought from Allâh].</p>
