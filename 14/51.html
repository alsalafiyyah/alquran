<div class="single-verse">
  <p><strong>14:51</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لِيَجۡزِيَ ٱللَّهُ كُلَّ نَفۡسٖ مَّا كَسَبَتۡۚ إِنَّ ٱللَّهَ سَرِيعُ ٱلۡحِسَابِ</p>
  <p style="font-size:18px;">51. That Allâh may requite each person according to what he has earned. Truly, Allâh is Swift at reckoning.</p>
