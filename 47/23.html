<div class="single-verse">
  <p><strong>47:23</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أُوْلَٰٓئِكَ ٱلَّذِينَ لَعَنَهُمُ ٱللَّهُ فَأَصَمَّهُمۡ وَأَعۡمَىٰٓ أَبۡصَٰرَهُمۡ</p>
  <p style="font-size:18px;">23. Such are they whom Allâh has cursed, so that He has made them deaf and blinded their sight.</p>
