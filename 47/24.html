<div class="single-verse">
  <p><strong>47:24</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَفَلَا يَتَدَبَّرُونَ ٱلۡقُرۡءَانَ أَمۡ عَلَىٰ قُلُوبٍ أَقۡفَالُهَآ</p>
  <p style="font-size:18px;">24. Do they not then think deeply in the Qur’ân, or are their hearts locked up (from understanding it)?</p>
