<div class="single-verse">
  <p><strong>47:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوٓاْ إِن تَنصُرُواْ ٱللَّهَ يَنصُرۡكُمۡ وَيُثَبِّتۡ أَقۡدَامَكُمۡ</p>
  <p style="font-size:18px;">7. O you who believe! If you help (in the cause of) Allâh, He will help you, and make your foothold firm.</p>
