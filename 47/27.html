<div class="single-verse">
  <p><strong>47:27</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَكَيۡفَ إِذَا تَوَفَّتۡهُمُ ٱلۡمَلَٰٓئِكَةُ يَضۡرِبُونَ وُجُوهَهُمۡ وَأَدۡبَٰرَهُمۡ</p>
  <p style="font-size:18px;">27. Then how (will it be) when the angels will take their souls at death, smiting their faces and their backs?</p>
