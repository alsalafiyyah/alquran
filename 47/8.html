<div class="single-verse">
  <p><strong>47:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱلَّذِينَ كَفَرُواْ فَتَعۡسٗا لَّهُمۡ وَأَضَلَّ أَعۡمَٰلَهُمۡ</p>
  <p style="font-size:18px;">8. But those who disbelieve (in the Oneness of Allâh - Islâmic Monotheism), for them is destruction, and (Allâh) will make their deeds vain.</p>
