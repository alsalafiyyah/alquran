<div class="single-verse">
  <p><strong>47:9</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ذَٰلِكَ بِأَنَّهُمۡ كَرِهُواْ مَآ أَنزَلَ ٱللَّهُ فَأَحۡبَطَ أَعۡمَٰلَهُمۡ</p>
  <p style="font-size:18px;">9. That is because they hate that which Allâh has sent down (this Qur’ân and Islâmic laws, etc.); so He has made their deeds fruitless.</p>
</div>
