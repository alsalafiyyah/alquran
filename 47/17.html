  <p><strong>47:17</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱلَّذِينَ ٱهۡتَدَوۡاْ زَادَهُمۡ هُدٗى وَءَاتَىٰهُمۡ تَقۡوَىٰهُمۡ</p>
