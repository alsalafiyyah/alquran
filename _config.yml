title: "The Noble Qur'an"
description: >- 
  Write an awesome description for your new site here. You can edit this
  line in _config.yml. It will appear in your document head meta (for
  Google search results) and in your feed.xml site description.
baseurl: "/alquran" 
url: ""
permalink           : pretty
paginate            : 10
paginate_path       : "/:num/"

# Build settings
include:
  - _pages

plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap

exclude:
  - bin
  - tmp
  - .jekyll-cache
  - .jekyll-metadata
  - .sass-cache
  - config
  - vite.config.ts
  - Procfile.dev
  - Makefile
  - .gitignore
  - docs
  - README.md
  - README
  - LICENSE
  - CODE_OF_CONDUCT.md 
  - vendor
  - node_modules
  - Gemfile
  - Gemfile.lock
  - "sample*.png" 
