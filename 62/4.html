<div class="single-verse">
  <p><strong>62:4</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ذَٰلِكَ فَضۡلُ ٱللَّهِ يُؤۡتِيهِ مَن يَشَآءُۚ وَٱللَّهُ ذُو ٱلۡفَضۡلِ ٱلۡعَظِيمِ</p>
  <p style="font-size:18px;">4. That is the Grace of Allâh, which He bestows on whom He wills. And Allâh is the Owner of Mighty Grace.</p>
