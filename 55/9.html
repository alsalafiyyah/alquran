  <p><strong>55:9</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَأَقِيمُواْ ٱلۡوَزۡنَ بِٱلۡقِسۡطِ وَلَا تُخۡسِرُواْ ٱلۡمِيزَانَ</p>
