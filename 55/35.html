<div class="single-verse">
  <p><strong>55:35</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يُرۡسَلُ عَلَيۡكُمَا شُوَاظٞ مِّن نَّارٖ وَنُحَاسٞ فَلَا تَنتَصِرَانِ</p>
  <p style="font-size:18px;">35. There will be sent against you both, smokeless flames of fire and (molten) brass, and you will not be able to defend yourselves.</p>
