<div class="single-verse">
  <p><strong>55:54</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">مُتَّكِـِٔينَ عَلَىٰ فُرُشِۭ بَطَآئِنُهَا مِنۡ إِسۡتَبۡرَقٖۚ وَجَنَى ٱلۡجَنَّتَيۡنِ دَانٖ</p>
  <p style="font-size:18px;">54. Reclining upon the couches lined with silk brocade, and the fruits of the two Gardens will be near at hand.</p>
