<div class="single-verse">
  <p><strong>55:74</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَمۡ يَطۡمِثۡهُنَّ إِنسٞ قَبۡلَهُمۡ وَلَا جَآنّٞ</p>
  <p style="font-size:18px;">74. With whom no man or jinni has had tamth[5] before them.</p>
  <div style="margin-top:20px; border-left:3px solid #ccc; padding-left:10px; color:#555;"><small>[5] (V.55:74) Tamth means: Opening their hymens with sexual intercourse.</small></div>
</div>
