<div class="single-verse">
  <p><strong>48:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّآ أَرۡسَلۡنَٰكَ شَٰهِدٗا وَمُبَشِّرٗا وَنَذِيرٗا</p>
  <p style="font-size:18px;">8. Verily, We have sent you (O Muhammad صلى الله عليه وسلم) as a witness, as a bearer of glad tidings, and as a warner[3].</p>
  <div style="margin-top:20px; border-left:3px solid #ccc; padding-left:10px; color:#555;"><small>[3] (V.48:8) See the footnote of (V.2:42).</small></div>
