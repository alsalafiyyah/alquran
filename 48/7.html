<div class="single-verse">
  <p><strong>48:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلِلَّهِ جُنُودُ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِۚ وَكَانَ ٱللَّهُ عَزِيزًا حَكِيمًا</p>
  <p style="font-size:18px;">7. And to Allâh belong the hosts of the heavens and the earth. And Allâh is Ever All-Powerful, All-Wise.</p>
