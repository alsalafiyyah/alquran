<div class="single-verse">
  <p><strong>31:4</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱلَّذِينَ يُقِيمُونَ ٱلصَّلَوٰةَ وَيُؤۡتُونَ ٱلزَّكَوٰةَ وَهُم بِٱلۡأٓخِرَةِ هُمۡ يُوقِنُونَ</p>
  <p style="font-size:18px;">4. Those who perform As-Salât (Iqamat-as-Salât) and give Zakât and they have faith in the Hereafter with certainty.</p>
