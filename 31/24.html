  <p><strong>31:24</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">نُمَتِّعُهُمۡ قَلِيلٗا ثُمَّ نَضۡطَرُّهُمۡ إِلَىٰ عَذَابٍ غَلِيظٖ</p>
  <p style="font-size:18px;">24. We let them enjoy for a little while, then in the end We shall oblige them to (enter) a great torment.</p>
