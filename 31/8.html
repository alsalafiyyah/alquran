<div class="single-verse">
  <p><strong>31:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ ٱلَّذِينَ ءَامَنُواْ وَعَمِلُواْ ٱلصَّٰلِحَٰتِ لَهُمۡ جَنَّٰتُ ٱلنَّعِيمِ</p>
  <p style="font-size:18px;">8. Verily, those who believe (in Islâmic Monotheism) and do righteous good deeds, for them are Gardens of Delight (Paradise).</p>
