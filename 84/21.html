  <p><strong>84:21</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِذَا قُرِئَ عَلَيۡهِمُ ٱلۡقُرۡءَانُ لَا يَسۡجُدُونَۤ۩</p>
  <p style="font-size:18px;">21. And when the Qur’ân is recited to them, they fall not prostrate.</p>
