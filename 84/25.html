<div class="single-verse">
  <p><strong>84:25</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِلَّا ٱلَّذِينَ ءَامَنُواْ وَعَمِلُواْ ٱلصَّٰلِحَٰتِ لَهُمۡ أَجۡرٌ غَيۡرُ مَمۡنُونِۭ</p>
  <p style="font-size:18px;">25. Save those who believe and do righteous good deeds, for them is a reward that will never come to an end (i.e. Paradise).</p>
