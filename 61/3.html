  <p><strong>61:3</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">كَبُرَ مَقۡتًا عِندَ ٱللَّهِ أَن تَقُولُواْ مَا لَا تَفۡعَلُونَ</p>
  <p style="font-size:18px;">3. Most hateful it is with Allâh that you say that which you do not do.</p>
