<div class="single-verse">
  <p><strong>61:10</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُواْ هَلۡ أَدُلُّكُمۡ عَلَىٰ تِجَٰرَةٖ تُنجِيكُم مِّنۡ عَذَابٍ أَلِيمٖ</p>
  <p style="font-size:18px;">10. O you who believe! Shall I guide you to a trade that will save you from a painful torment?</p>
