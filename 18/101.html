<div class="single-verse">
  <p><strong>18:101</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱلَّذِينَ كَانَتۡ أَعۡيُنُهُمۡ فِي غِطَآءٍ عَن ذِكۡرِي وَكَانُواْ لَا يَسۡتَطِيعُونَ سَمۡعًا</p>
  <p style="font-size:18px;">101. (To) those whose eyes had been under a covering from My Reminder (this Qur’ân), and who could not bear to hear (it).</p>
</div>
