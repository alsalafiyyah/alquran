  <p><strong>18:81</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَأَرَدۡنَآ أَن يُبۡدِلَهُمَا رَبُّهُمَا خَيۡرٗا مِّنۡهُ زَكَوٰةٗ وَأَقۡرَبَ رُحۡمٗا</p>
