<div class="single-verse">
  <p><strong>18:70</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ فَإِنِ ٱتَّبَعۡتَنِي فَلَا تَسۡـَٔلۡنِي عَن شَيۡءٍ حَتَّىٰٓ أُحۡدِثَ لَكَ مِنۡهُ ذِكۡرٗا</p>
  <p style="font-size:18px;">70. He (Khidr) said: "Then, if you follow me, ask me not about anything till I myself mention of it to you."</p>
</div>
