<div class="single-verse">
  <p><strong>18:43</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَمۡ تَكُن لَّهُۥ فِئَةٞ يَنصُرُونَهُۥ مِن دُونِ ٱللَّهِ وَمَا كَانَ مُنتَصِرًا</p>
  <p style="font-size:18px;">43. And he had no group of men to help him against Allâh, nor could he defend (or save) himself.</p>
