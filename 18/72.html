<div class="single-verse">
  <p><strong>18:72</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ أَلَمۡ أَقُلۡ إِنَّكَ لَن تَسۡتَطِيعَ مَعِيَ صَبۡرٗا</p>
  <p style="font-size:18px;">72. He (Khidr) said: "Did I not tell you, that you would not be able to have patience with me?"</p>
