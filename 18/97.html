  <p><strong>18:97</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَمَا ٱسۡطَٰعُوٓاْ أَن يَظۡهَرُوهُ وَمَا ٱسۡتَطَٰعُواْ لَهُۥ نَقۡبٗا</p>
