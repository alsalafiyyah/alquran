  <p><strong>18:75</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">۞ قَالَ أَلَمۡ أَقُل لَّكَ إِنَّكَ لَن تَسۡتَطِيعَ مَعِيَ صَبۡرٗا</p>
  <p style="font-size:18px;">75. (Khidr) said: "Did I not tell you that you can have no patience with me?"</p>
