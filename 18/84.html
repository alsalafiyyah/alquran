<div class="single-verse">
  <p><strong>18:84</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّا مَكَّنَّا لَهُۥ فِي ٱلۡأَرۡضِ وَءَاتَيۡنَٰهُ مِن كُلِّ شَيۡءٖ سَبَبٗا</p>
