  <p><strong>18:11</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَضَرَبۡنَا عَلَىٰٓ ءَاذَانِهِمۡ فِي ٱلۡكَهۡفِ سِنِينَ عَدَدٗا</p>
