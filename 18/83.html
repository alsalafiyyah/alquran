<div class="single-verse">
  <p><strong>18:83</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَيَسۡـَٔلُونَكَ عَن ذِي ٱلۡقَرۡنَيۡنِۖ قُلۡ سَأَتۡلُواْ عَلَيۡكُم مِّنۡهُ ذِكۡرًا</p>
  <p style="font-size:18px;">83. And they ask you about Dhul-Qarnain. Say: "I shall recite to you something of his story."</p>
