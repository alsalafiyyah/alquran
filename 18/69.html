<div class="single-verse">
  <p><strong>18:69</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ سَتَجِدُنِيٓ إِن شَآءَ ٱللَّهُ صَابِرٗا وَلَآ أَعۡصِي لَكَ أَمۡرٗا</p>
  <p style="font-size:18px;">69. Mûsâ (Moses) said: "If Allâh wills, you will find me patient, and I will not disobey you in aught."</p>
