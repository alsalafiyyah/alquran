  <p><strong>18:41</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَوۡ يُصۡبِحَ مَآؤُهَا غَوۡرٗا فَلَن تَسۡتَطِيعَ لَهُۥ طَلَبٗا</p>
  <p style="font-size:18px;">41. "Or the water thereof (of the gardens) becomes deep-sunken (underground) so that you will never be able to seek it."</p>
