<div class="single-verse">
  <p><strong>18:38</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَّٰكِنَّا۠ هُوَ ٱللَّهُ رَبِّي وَلَآ أُشۡرِكُ بِرَبِّيٓ أَحَدٗا</p>
  <p style="font-size:18px;">38. "But as for my part, (I believe) that He is Allâh, my Lord, and none shall I associate as partner with my Lord.</p>
