<div class="single-verse">
  <p><strong>18:64</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ ذَٰلِكَ مَا كُنَّا نَبۡغِۚ فَٱرۡتَدَّا عَلَىٰٓ ءَاثَارِهِمَا قَصَصٗا</p>
  <p style="font-size:18px;">64. [Mûsâ (Moses)] said: "That is what we have been seeking." So they went back retracing their footsteps.</p>
