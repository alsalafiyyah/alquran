<div class="single-verse">
  <p><strong>4:28</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يُرِيدُ ٱللَّهُ أَن يُخَفِّفَ عَنكُمۡۚ وَخُلِقَ ٱلۡإِنسَٰنُ ضَعِيفٗا</p>
  <p style="font-size:18px;">28. Allâh wishes to lighten (the burden) for you; and man was created weak (cannot be patient to leave sexual intercourse with woman).</p>
