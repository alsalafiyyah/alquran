  <p><strong>4:118</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَّعَنَهُ ٱللَّهُۘ وَقَالَ لَأَتَّخِذَنَّ مِنۡ عِبَادِكَ نَصِيبٗا مَّفۡرُوضٗا</p>
  <p style="font-size:18px;">118. Allâh cursed him. And he [Shaitân (Satan)] said: "I will take an appointed portion of your slaves.</p>
