<div class="single-verse">
  <p><strong>4:99</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَأُوْلَٰٓئِكَ عَسَى ٱللَّهُ أَن يَعۡفُوَ عَنۡهُمۡۚ وَكَانَ ٱللَّهُ عَفُوًّا غَفُورٗا</p>
  <p style="font-size:18px;">99. These are they whom Allâh is likely to forgive them, and Allâh is Ever Oft-Pardoning, Oft-Forgiving.</p>
