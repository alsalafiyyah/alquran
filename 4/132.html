<div class="single-verse">
  <p><strong>4:132</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلِلَّهِ مَا فِي ٱلسَّمَٰوَٰتِ وَمَا فِي ٱلۡأَرۡضِۚ وَكَفَىٰ بِٱللَّهِ وَكِيلًا</p>
  <p style="font-size:18px;">132. And to Allâh belongs all that is in the heavens and all that is in the earth. And Allâh is Ever All-Sufficient as Disposer of affairs.</p>
