<div class="single-verse">
  <p><strong>4:126</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلِلَّهِ مَا فِي ٱلسَّمَٰوَٰتِ وَمَا فِي ٱلۡأَرۡضِۚ وَكَانَ ٱللَّهُ بِكُلِّ شَيۡءٖ مُّحِيطٗا</p>
  <p style="font-size:18px;">126. And to Allâh belongs all that is in the heavens and all that is in the earth. And Allâh is Ever Encompassing all things.</p>
</div>
