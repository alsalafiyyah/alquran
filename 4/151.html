<div class="single-verse">
  <p><strong>4:151</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أُوْلَٰٓئِكَ هُمُ ٱلۡكَٰفِرُونَ حَقّٗاۚ وَأَعۡتَدۡنَا لِلۡكَٰفِرِينَ عَذَابٗا مُّهِينٗا</p>
  <p style="font-size:18px;">151. They are in truth disbelievers. And We have prepared for the disbelievers a humiliating torment.</p>
