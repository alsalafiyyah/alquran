<div class="single-verse">
  <p><strong>4:45</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱللَّهُ أَعۡلَمُ بِأَعۡدَآئِكُمۡۚ وَكَفَىٰ بِٱللَّهِ وَلِيّٗا وَكَفَىٰ بِٱللَّهِ نَصِيرٗا</p>
  <p style="font-size:18px;">45. Allâh has full knowledge of your enemies, and Allâh is Sufficient as a Walî (Protector), and Allâh is Sufficient as a Helper.</p>
</div>
