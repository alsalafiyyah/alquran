<div class="single-verse">
  <p><strong>4:50</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱنظُرۡ كَيۡفَ يَفۡتَرُونَ عَلَى ٱللَّهِ ٱلۡكَذِبَۖ وَكَفَىٰ بِهِۦٓ إِثۡمٗا مُّبِينًا</p>
  <p style="font-size:18px;">50. Look, how they invent a lie against Allâh, and enough is that as a manifest sin.</p>
