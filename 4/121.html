  <p dir="rtl" style="text-align:right; font-size:32px;">أُوْلَٰٓئِكَ مَأۡوَىٰهُمۡ جَهَنَّمُ وَلَا يَجِدُونَ عَنۡهَا مَحِيصٗا</p>
