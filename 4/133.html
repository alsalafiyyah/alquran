<div class="single-verse">
  <p><strong>4:133</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِن يَشَأۡ يُذۡهِبۡكُمۡ أَيُّهَا ٱلنَّاسُ وَيَأۡتِ بِـَٔاخَرِينَۚ وَكَانَ ٱللَّهُ عَلَىٰ ذَٰلِكَ قَدِيرٗا</p>
  <p style="font-size:18px;">133. If He wills, He can take you away, O people, and bring others. And Allâh is Ever All-Potent over that.</p>
