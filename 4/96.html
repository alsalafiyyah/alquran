<div class="single-verse">
  <p><strong>4:96</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">دَرَجَٰتٖ مِّنۡهُ وَمَغۡفِرَةٗ وَرَحۡمَةٗۚ وَكَانَ ٱللَّهُ غَفُورٗا رَّحِيمًا</p>
  <p style="font-size:18px;">96. Degrees of (higher) grades from Him, and Forgiveness and Mercy. And Allâh is Ever Oft-Forgiving, Most Merciful.</p>
