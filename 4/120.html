<div class="single-verse">
  <p><strong>4:120</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَعِدُهُمۡ وَيُمَنِّيهِمۡۖ وَمَا يَعِدُهُمُ ٱلشَّيۡطَٰنُ إِلَّا غُرُورًا</p>
  <p style="font-size:18px;">120. He [Shaitân (Satan)] makes promises to them, and arouses in them false desires; and Shaitân’s (Satân) promises are nothing but deceptions.</p>
</div>
