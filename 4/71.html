<div class="single-verse">
  <p><strong>4:71</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُواْ خُذُواْ حِذۡرَكُمۡ فَٱنفِرُواْ ثُبَاتٍ أَوِ ٱنفِرُواْ جَمِيعٗا</p>
  <p style="font-size:18px;">71. O you who believe! Take your precautions, and either go forth (on an expedition) in parties, or go forth all together.</p>
</div>
