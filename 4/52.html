<div class="single-verse">
  <p><strong>4:52</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أُوْلَٰٓئِكَ ٱلَّذِينَ لَعَنَهُمُ ٱللَّهُۖ وَمَن يَلۡعَنِ ٱللَّهُ فَلَن تَجِدَ لَهُۥ نَصِيرًا</p>
  <p style="font-size:18px;">52. They are those whom Allâh has cursed, and he whom Allâh curses, you will not find for him (any) helper,</p>
