<div class="single-verse">
  <p><strong>4:53</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَمۡ لَهُمۡ نَصِيبٞ مِّنَ ٱلۡمُلۡكِ فَإِذٗا لَّا يُؤۡتُونَ ٱلنَّاسَ نَقِيرًا</p>
  <p style="font-size:18px;">53. Or have they a share in the dominion? Then in that case they would not give mankind even a speck on the back of a date-stone.</p>
