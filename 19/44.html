<div class="single-verse">
  <p><strong>19:44</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَٰٓأَبَتِ لَا تَعۡبُدِ ٱلشَّيۡطَٰنَۖ إِنَّ ٱلشَّيۡطَٰنَ كَانَ لِلرَّحۡمَٰنِ عَصِيّٗا</p>
  <p style="font-size:18px;">44. "O my father! Worship not Shaitân (Satan). Verily Shaitân (Satan) has been a rebel against the Most Gracious (Allâh).</p>
