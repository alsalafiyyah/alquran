<div class="single-verse">
  <p><strong>19:19</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ إِنَّمَآ أَنَا۠ رَسُولُ رَبِّكِ لِأَهَبَ لَكِ غُلَٰمٗا زَكِيّٗا</p>
  <p style="font-size:18px;">19. (The angel) said: "I am only a messenger from your Lord, (to announce) to you the gift of a righteous son."</p>
