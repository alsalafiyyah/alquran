<div class="single-verse">
  <p><strong>19:20</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَتۡ أَنَّىٰ يَكُونُ لِي غُلَٰمٞ وَلَمۡ يَمۡسَسۡنِي بَشَرٞ وَلَمۡ أَكُ بَغِيّٗا</p>
  <p style="font-size:18px;">20. She said: "How can I have a son, when no man has touched me, nor am I unchaste?"</p>
