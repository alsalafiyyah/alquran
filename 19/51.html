<div class="single-verse">
  <p><strong>19:51</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱذۡكُرۡ فِي ٱلۡكِتَٰبِ مُوسَىٰٓۚ إِنَّهُۥ كَانَ مُخۡلَصٗا وَكَانَ رَسُولٗا نَّبِيّٗا</p>
  <p style="font-size:18px;">51. And mention in the Book (this Qur’ân) Mûsâ (Moses). Verily he was chosen and he was a Messenger (and) a Prophet.</p>
</div>
