  <p><strong>19:70</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ثُمَّ لَنَحۡنُ أَعۡلَمُ بِٱلَّذِينَ هُمۡ أَوۡلَىٰ بِهَا صِلِيّٗا</p>
