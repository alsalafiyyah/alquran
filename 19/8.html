<div class="single-verse">
  <p><strong>19:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ رَبِّ أَنَّىٰ يَكُونُ لِي غُلَٰمٞ وَكَانَتِ ٱمۡرَأَتِي عَاقِرٗا وَقَدۡ بَلَغۡتُ مِنَ ٱلۡكِبَرِ عِتِيّٗا</p>
  <p style="font-size:18px;">8. He said: "My Lord! How can I have a son, when my wife is barren, and I have reached the extreme old age."</p>
</div>
