<div class="single-verse">
  <p><strong>19:63</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">تِلۡكَ ٱلۡجَنَّةُ ٱلَّتِي نُورِثُ مِنۡ عِبَادِنَا مَن كَانَ تَقِيّٗا</p>
  <p style="font-size:18px;">63. Such is the Paradise which We shall give as an inheritance to those of Our slaves who have been Al-Muttaqûn (the pious - See V.2:2).</p>
