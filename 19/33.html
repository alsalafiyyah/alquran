<div class="single-verse">
  <p><strong>19:33</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱلسَّلَٰمُ عَلَيَّ يَوۡمَ وُلِدتُّ وَيَوۡمَ أَمُوتُ وَيَوۡمَ أُبۡعَثُ حَيّٗا</p>
  <p style="font-size:18px;">33. "And Salâm (peace) be upon me the day I was born, and the day I die, and the day I shall be raised alive!"</p>
