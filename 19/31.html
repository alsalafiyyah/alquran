<div class="single-verse">
  <p><strong>19:31</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَجَعَلَنِي مُبَارَكًا أَيۡنَ مَا كُنتُ وَأَوۡصَٰنِي بِٱلصَّلَوٰةِ وَٱلزَّكَوٰةِ مَا دُمۡتُ حَيّٗا</p>
  <p style="font-size:18px;">31. "And He has made me blessed wheresoever I be, and has enjoined on me Salât (prayer), and Zakât, as long as I live."</p>
