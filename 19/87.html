<div class="single-verse">
  <p><strong>19:87</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَّا يَمۡلِكُونَ ٱلشَّفَٰعَةَ إِلَّا مَنِ ٱتَّخَذَ عِندَ ٱلرَّحۡمَٰنِ عَهۡدٗا</p>
  <p style="font-size:18px;">87. None shall have the power of intercession, but such a one as has received permission (or promise) from the Most Gracious (Allâh).</p>
