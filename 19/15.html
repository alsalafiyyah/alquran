<div class="single-verse">
  <p><strong>19:15</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَسَلَٰمٌ عَلَيۡهِ يَوۡمَ وُلِدَ وَيَوۡمَ يَمُوتُ وَيَوۡمَ يُبۡعَثُ حَيّٗا</p>
  <p style="font-size:18px;">15. And Salâm (peace) be on him the day he was born, and the day he dies, and the day he will be raised up to life (again)!</p>
