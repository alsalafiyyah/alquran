<div class="single-verse">
  <p><strong>19:56</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱذۡكُرۡ فِي ٱلۡكِتَٰبِ إِدۡرِيسَۚ إِنَّهُۥ كَانَ صِدِّيقٗا نَّبِيّٗا</p>
  <p style="font-size:18px;">56. And mention in the Book (the Qur’ân) Idrîs (Enoch).Verily he was a man of truth, (and) a Prophet.</p>
