<div class="single-verse">
  <p><strong>19:52</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَنَٰدَيۡنَٰهُ مِن جَانِبِ ٱلطُّورِ ٱلۡأَيۡمَنِ وَقَرَّبۡنَٰهُ نَجِيّٗا</p>
  <p style="font-size:18px;">52. And We called him from the right side of the Mount, and made him draw near to Us for a talk with him [Mûsâ (Moses)].</p>
