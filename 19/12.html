<div class="single-verse">
  <p><strong>19:12</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَٰيَحۡيَىٰ خُذِ ٱلۡكِتَٰبَ بِقُوَّةٖۖ وَءَاتَيۡنَٰهُ ٱلۡحُكۡمَ صَبِيّٗا</p>
  <p style="font-size:18px;">12. (It was said to his son): "O Yahyâ (John)! Hold fast the Scripture [the Taurât (Torah)]." And We gave him wisdom while yet a child.</p>
