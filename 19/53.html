  <p><strong>19:53</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَوَهَبۡنَا لَهُۥ مِن رَّحۡمَتِنَآ أَخَاهُ هَٰرُونَ نَبِيّٗا</p>
  <p style="font-size:18px;">53. And We granted him his brother Hârûn (Aaron), (also) a Prophet, out of Our Mercy.</p>
