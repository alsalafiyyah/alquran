<div class="single-verse">
  <p><strong>19:41</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱذۡكُرۡ فِي ٱلۡكِتَٰبِ إِبۡرَٰهِيمَۚ إِنَّهُۥ كَانَ صِدِّيقٗا نَّبِيًّا</p>
  <p style="font-size:18px;">41. And mention in the Book (the Qur’ân) Ibrâhîm (Abraham). Verily he was a man of truth, a Prophet.</p>
