<div class="single-verse">
  <p><strong>19:69</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ثُمَّ لَنَنزِعَنَّ مِن كُلِّ شِيعَةٍ أَيُّهُمۡ أَشَدُّ عَلَى ٱلرَّحۡمَٰنِ عِتِيّٗا</p>
  <p style="font-size:18px;">69. Then indeed We shall drag out from every sect all those who were worst in obstinate rebellion against the Most Gracious (Allâh).</p>
