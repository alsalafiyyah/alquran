<div class="single-verse">
  <p><strong>19:5</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِنِّي خِفۡتُ ٱلۡمَوَٰلِيَ مِن وَرَآءِي وَكَانَتِ ٱمۡرَأَتِي عَاقِرٗا فَهَبۡ لِي مِن لَّدُنكَ وَلِيّٗا</p>
  <p style="font-size:18px;">5. "And verily I fear my relatives after me, and my wife is barren. So give me from Yourself an heir.</p>
