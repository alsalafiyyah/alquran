<div class="single-verse">
  <p><strong>19:67</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَوَلَا يَذۡكُرُ ٱلۡإِنسَٰنُ أَنَّا خَلَقۡنَٰهُ مِن قَبۡلُ وَلَمۡ يَكُ شَيۡـٔٗا</p>
  <p style="font-size:18px;">67. Does not man remember that We created him before, while he was nothing?</p>
