<div class="single-verse">
  <p><strong>19:74</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَكَمۡ أَهۡلَكۡنَا قَبۡلَهُم مِّن قَرۡنٍ هُمۡ أَحۡسَنُ أَثَٰثٗا وَرِءۡيٗا</p>
  <p style="font-size:18px;">74. And how many a generation (past nations) have We destroyed before them, who were better in wealth, goods and outward appearance?</p>
