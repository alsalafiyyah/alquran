  <p><strong>19:93</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِن كُلُّ مَن فِي ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِ إِلَّآ ءَاتِي ٱلرَّحۡمَٰنِ عَبۡدٗا</p>
