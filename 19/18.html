<div class="single-verse">
  <p><strong>19:18</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَتۡ إِنِّيٓ أَعُوذُ بِٱلرَّحۡمَٰنِ مِنكَ إِن كُنتَ تَقِيّٗا</p>
  <p style="font-size:18px;">18. She said: "Verily! I seek refuge with the Most Gracious (Allâh) from you, if you do fear Allâh."</p>
