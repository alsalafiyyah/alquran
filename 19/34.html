  <p><strong>19:34</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ذَٰلِكَ عِيسَى ٱبۡنُ مَرۡيَمَۖ قَوۡلَ ٱلۡحَقِّ ٱلَّذِي فِيهِ يَمۡتَرُونَ</p>
  <p style="font-size:18px;">34. Such is ‘Îsâ (Jesus), son of Maryam (Mary). (It is) a statement of truth, about which they doubt (or dispute).</p>
