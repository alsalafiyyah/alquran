<div class="single-verse">
  <p><strong>19:80</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَنَرِثُهُۥ مَا يَقُولُ وَيَأۡتِينَا فَرۡدٗا</p>
  <p style="font-size:18px;">80. And We shall inherit from him (at his death) all that he talks of (i.e. wealth and children which We have bestowed upon him in this world), and he shall come to Us alone.</p>
