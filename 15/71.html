<div class="single-verse">
  <p><strong>15:71</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ هَٰٓؤُلَآءِ بَنَاتِيٓ إِن كُنتُمۡ فَٰعِلِينَ</p>
  <p style="font-size:18px;">71. [Lût (Lot)] said: "These (the girls of the nation) are my daughters (to marry lawfully), if you must act (so)."</p>
