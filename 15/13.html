<div class="single-verse">
  <p><strong>15:13</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَا يُؤۡمِنُونَ بِهِۦ وَقَدۡ خَلَتۡ سُنَّةُ ٱلۡأَوَّلِينَ</p>
  <p style="font-size:18px;">13. They would not believe in it (the Qur’ân); and already the example of (Allâh’s punishment of) the ancients (who disbelieved) has gone forth.</p>
