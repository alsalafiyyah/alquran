  <p><strong>15:70</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُوٓاْ أَوَلَمۡ نَنۡهَكَ عَنِ ٱلۡعَٰلَمِينَ</p>
  <p style="font-size:18px;">70. They (people of the city) said: "Did we not forbid you from entertaining (or protecting) any of the ‘Âlamîn (people, foreigners and strangers from us)?"</p>
