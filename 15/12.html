<div class="single-verse">
  <p><strong>15:12</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">كَذَٰلِكَ نَسۡلُكُهُۥ فِي قُلُوبِ ٱلۡمُجۡرِمِينَ</p>
  <p style="font-size:18px;">12. Thus do We let it (polytheism and disbelief) enter the hearts of the Mujrimûn [criminals, polytheists and pagans (because of their mocking at the Messengers)].</p>
