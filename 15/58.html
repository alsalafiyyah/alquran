  <p><strong>15:58</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُوٓاْ إِنَّآ أُرۡسِلۡنَآ إِلَىٰ قَوۡمٖ مُّجۡرِمِينَ</p>
  <p style="font-size:18px;">58. They (the angels) said: "We have been sent to a people who are Mujrimûn (criminals, disbelievers, polytheists, sinners).</p>
