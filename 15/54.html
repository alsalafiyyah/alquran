<div class="single-verse">
  <p><strong>15:54</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ أَبَشَّرۡتُمُونِي عَلَىٰٓ أَن مَّسَّنِيَ ٱلۡكِبَرُ فَبِمَ تُبَشِّرُونَ</p>
  <p style="font-size:18px;">54. [Ibrâhîm (Abraham)] said: "Do you give me glad tidings (of a son) when old age has overtaken me? Of what then is your news?"</p>
</div>
