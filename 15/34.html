<div class="single-verse">
  <p><strong>15:34</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ فَٱخۡرُجۡ مِنۡهَا فَإِنَّكَ رَجِيمٞ</p>
  <p style="font-size:18px;">34. (Allâh) said: "Then, get out from here, for verily, you are Rajîm (an outcast or a cursed one)." [Tafsîr At-Tabarî]</p>
