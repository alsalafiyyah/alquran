<div class="single-verse">
  <p><strong>15:10</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَقَدۡ أَرۡسَلۡنَا مِن قَبۡلِكَ فِي شِيَعِ ٱلۡأَوَّلِينَ</p>
  <p style="font-size:18px;">10. Indeed, We sent (Messengers) before you (O Muhammad صلى الله عليه و سلم) amongst the sects (communities) of old.</p>
