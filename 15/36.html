<div class="single-verse">
  <p><strong>15:36</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ رَبِّ فَأَنظِرۡنِيٓ إِلَىٰ يَوۡمِ يُبۡعَثُونَ</p>
  <p style="font-size:18px;">36. [Iblîs (Satan)] said: "O my Lord! Give me then respite till the Day they (the dead) will be resurrected."</p>
