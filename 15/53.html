<div class="single-verse">
  <p><strong>15:53</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُواْ لَا تَوۡجَلۡ إِنَّا نُبَشِّرُكَ بِغُلَٰمٍ عَلِيمٖ</p>
  <p style="font-size:18px;">53. They (the angels) said: "Do not be afraid! We give you glad tidings of a boy (son) possessing much knowledge and wisdom."</p>
