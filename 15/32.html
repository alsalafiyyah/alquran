<div class="single-verse">
  <p><strong>15:32</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ يَٰٓإِبۡلِيسُ مَا لَكَ أَلَّا تَكُونَ مَعَ ٱلسَّٰجِدِينَ</p>
  <p style="font-size:18px;">32. (Allâh) said: "O Iblîs (Satan)! What is your reason for not being among the prostrators?"</p>
