<div class="single-verse">
  <p><strong>15:49</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">۞ نَبِّئۡ عِبَادِيٓ أَنِّيٓ أَنَا ٱلۡغَفُورُ ٱلرَّحِيمُ</p>
  <p style="font-size:18px;">49. Declare (O Muhammad صلى الله عليه و سلم) unto My slaves, that truly, I am the Oft-Forgiving, the Most-Merciful.</p>
