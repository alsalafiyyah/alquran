<div class="single-verse">
  <p><strong>15:56</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ وَمَن يَقۡنَطُ مِن رَّحۡمَةِ رَبِّهِۦٓ إِلَّا ٱلضَّآلُّونَ</p>
  <p style="font-size:18px;">56. [Ibrâhîm (Abraham)] said: "And who despairs of the Mercy of his Lord except those who are astray?"</p>
