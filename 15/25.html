  <p><strong>15:25</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِنَّ رَبَّكَ هُوَ يَحۡشُرُهُمۡۚ إِنَّهُۥ حَكِيمٌ عَلِيمٞ</p>
