  <p><strong>15:11</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمَا يَأۡتِيهِم مِّن رَّسُولٍ إِلَّا كَانُواْ بِهِۦ يَسۡتَهۡزِءُونَ</p>
  <p style="font-size:18px;">11. And never came a Messenger to them but they did mock at him.</p>
