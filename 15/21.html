<div class="single-verse">
  <p><strong>15:21</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِن مِّن شَيۡءٍ إِلَّا عِندَنَا خَزَآئِنُهُۥ وَمَا نُنَزِّلُهُۥٓ إِلَّا بِقَدَرٖ مَّعۡلُومٖ</p>
  <p style="font-size:18px;">21. And there is not a thing, but with Us are the stores thereof. And We send it not down except in a known measure.</p>
