<div class="single-verse">
  <p><strong>15:3</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ذَرۡهُمۡ يَأۡكُلُواْ وَيَتَمَتَّعُواْ وَيُلۡهِهِمُ ٱلۡأَمَلُۖ فَسَوۡفَ يَعۡلَمُونَ</p>
  <p style="font-size:18px;">3. Leave them to eat and enjoy, and let them be preoccupied with (false) hope. They will come to know!</p>
