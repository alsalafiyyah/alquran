<div class="single-verse">
  <p><strong>15:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">مَا نُنَزِّلُ ٱلۡمَلَٰٓئِكَةَ إِلَّا بِٱلۡحَقِّ وَمَا كَانُوٓاْ إِذٗا مُّنظَرِينَ</p>
  <p style="font-size:18px;">8. We send not the angels down except with the truth (i.e. for torment), and in that case, they (the disbelievers) would have no respite!</p>
