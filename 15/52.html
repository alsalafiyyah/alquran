<div class="single-verse">
  <p><strong>15:52</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِذۡ دَخَلُواْ عَلَيۡهِ فَقَالُواْ سَلَٰمٗا قَالَ إِنَّا مِنكُمۡ وَجِلُونَ</p>
  <p style="font-size:18px;">52. When they entered unto him, and said: Salâm (peace)! [Ibrâhîm (Abraham)] said: "Indeed! We are afraid of you."</p>
