<div class="single-verse">
  <p><strong>15:72</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَعَمۡرُكَ إِنَّهُمۡ لَفِي سَكۡرَتِهِمۡ يَعۡمَهُونَ</p>
  <p style="font-size:18px;">72. Verily, by your life (O Muhammad صلى الله عليه و سلم), in their wild intoxication, they were wandering blindly.</p>
