<div class="single-verse">
  <p><strong>15:74</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَجَعَلۡنَا عَٰلِيَهَا سَافِلَهَا وَأَمۡطَرۡنَا عَلَيۡهِمۡ حِجَارَةٗ مِّن سِجِّيلٍ</p>
  <p style="font-size:18px;">74. And We turned (the towns of Sodom in Palestine) upside down and rained down on them stones of baked clay.</p>
