  <p><strong>2:15</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱللَّهُ يَسۡتَهۡزِئُ بِهِمۡ وَيَمُدُّهُمۡ فِي طُغۡيَٰنِهِمۡ يَعۡمَهُونَ</p>
