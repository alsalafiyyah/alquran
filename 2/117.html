<div class="single-verse">
  <p><strong>2:117</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">بَدِيعُ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِۖ وَإِذَا قَضَىٰٓ أَمۡرٗا فَإِنَّمَا يَقُولُ لَهُۥ كُن فَيَكُونُ</p>
  <p style="font-size:18px;">117. The Originator of the heavens and the earth. When He decrees a matter, He only says to it: "Be!" - and it is.</p>
