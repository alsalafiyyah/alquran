<div class="single-verse">
  <p><strong>2:241</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلِلۡمُطَلَّقَٰتِ مَتَٰعُۢ بِٱلۡمَعۡرُوفِۖ حَقًّا عَلَى ٱلۡمُتَّقِينَ</p>
  <p style="font-size:18px;">241. And for divorced women, maintenance (should be provided) on reasonable (scale). This is a duty on Al-Muttaqûn (the pious - See V.2:2).</p>
