<div class="single-verse">
  <p><strong>2:156</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱلَّذِينَ إِذَآ أَصَٰبَتۡهُم مُّصِيبَةٞ قَالُوٓاْ إِنَّا لِلَّهِ وَإِنَّآ إِلَيۡهِ رَٰجِعُونَ</p>
  <p style="font-size:18px;">156. Who, when afflicted with calamity, say: "Truly! To Allâh we belong and truly, to Him we shall return."</p>
