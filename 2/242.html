  <p><strong>2:242</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">كَذَٰلِكَ يُبَيِّنُ ٱللَّهُ لَكُمۡ ءَايَٰتِهِۦ لَعَلَّكُمۡ تَعۡقِلُونَ</p>
