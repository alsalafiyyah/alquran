<div class="single-verse">
  <p><strong>2:9</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يُخَٰدِعُونَ ٱللَّهَ وَٱلَّذِينَ ءَامَنُواْ وَمَا يَخۡدَعُونَ إِلَّآ أَنفُسَهُمۡ وَمَا يَشۡعُرُونَ</p>
  <p style="font-size:18px;">9. They (think to) deceive Allâh and those who believe, while they only deceive themselves, and perceive (it) not!</p>
