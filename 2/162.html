<div class="single-verse">
  <p><strong>2:162</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">خَٰلِدِينَ فِيهَا لَا يُخَفَّفُ عَنۡهُمُ ٱلۡعَذَابُ وَلَا هُمۡ يُنظَرُونَ</p>
  <p style="font-size:18px;">162. They will abide therein (under the curse in Hell), their punishment will neither be lightened, nor will they be reprieved.</p>
