<div class="single-verse">
  <p><strong>2:202</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أُوْلَٰٓئِكَ لَهُمۡ نَصِيبٞ مِّمَّا كَسَبُواْۚ وَٱللَّهُ سَرِيعُ ٱلۡحِسَابِ</p>
  <p style="font-size:18px;">202. For them there will be allotted a share for what they have earned. And Allâh is Swift at reckoning.</p>
