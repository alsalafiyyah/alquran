<div class="single-verse">
  <p><strong>2:244</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَقَٰتِلُواْ فِي سَبِيلِ ٱللَّهِ وَٱعۡلَمُوٓاْ أَنَّ ٱللَّهَ سَمِيعٌ عَلِيمٞ</p>
  <p style="font-size:18px;">244. And fight in the Way of Allâh and know that Allâh is All-Hearer, All-Knower.</p>
