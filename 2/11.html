<div class="single-verse">
  <p><strong>2:11</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِذَا قِيلَ لَهُمۡ لَا تُفۡسِدُواْ فِي ٱلۡأَرۡضِ قَالُوٓاْ إِنَّمَا نَحۡنُ مُصۡلِحُونَ</p>
  <p style="font-size:18px;">11. And when it is said to them: "Make not mischief on the earth," they say: "We are only peace-makers."</p>
