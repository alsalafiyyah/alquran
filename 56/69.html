<div class="single-verse">
  <p><strong>56:69</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ءَأَنتُمۡ أَنزَلۡتُمُوهُ مِنَ ٱلۡمُزۡنِ أَمۡ نَحۡنُ ٱلۡمُنزِلُونَ</p>
  <p style="font-size:18px;">69. Is it you who cause it from the rain-clouds to come down, or are We the Causer of it to come down?</p>
