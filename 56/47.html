<div class="single-verse">
  <p><strong>56:47</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَكَانُواْ يَقُولُونَ أَئِذَا مِتۡنَا وَكُنَّا تُرَابٗا وَعِظَٰمًا أَءِنَّا لَمَبۡعُوثُونَ</p>
  <p style="font-size:18px;">47. And they used to say: "When we die and become dust and bones, shall we then indeed be resurrected?</p>
