<div class="single-verse">
  <p><strong>56:70</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَوۡ نَشَآءُ جَعَلۡنَٰهُ أُجَاجٗا فَلَوۡلَا تَشۡكُرُونَ</p>
  <p style="font-size:18px;">70. If We willed, We verily could make it salt (and undrinkable): why then do you not give thanks (to Allâh)?</p>
