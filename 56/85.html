<div class="single-verse">
  <p><strong>56:85</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَنَحۡنُ أَقۡرَبُ إِلَيۡهِ مِنكُمۡ وَلَٰكِن لَّا تُبۡصِرُونَ</p>
  <p style="font-size:18px;">85. But We (i.e. Our angels who take the soul) are nearer to him than you, but you see not, (Tafsir At-Tabarî)</p>
