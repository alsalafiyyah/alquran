<div class="single-verse">
  <p><strong>56:65</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَوۡ نَشَآءُ لَجَعَلۡنَٰهُ حُطَٰمٗا فَظَلۡتُمۡ تَفَكَّهُونَ</p>
  <p style="font-size:18px;">65. Were it Our Will, We could crumble it to dry pieces, and you would be regretful (or left in wonderment) [Tafsir Ibn Kathîr].</p>
