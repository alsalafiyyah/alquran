<div class="single-verse">
  <p><strong>56:62</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَقَدۡ عَلِمۡتُمُ ٱلنَّشۡأَةَ ٱلۡأُولَىٰ فَلَوۡلَا تَذَكَّرُونَ</p>
  <p style="font-size:18px;">62. And indeed, you have already known the first form of creation (i.e. the creation of Adam): why then do you not remember (or take heed)?</p>
