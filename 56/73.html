<div class="single-verse">
  <p><strong>56:73</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">نَحۡنُ جَعَلۡنَٰهَا تَذۡكِرَةٗ وَمَتَٰعٗا لِّلۡمُقۡوِينَ</p>
  <p style="font-size:18px;">73. We have made it a Reminder (of the Hell-fire in the Hereafter), and an article of use for the travellers (and all the others, in this world).</p>
