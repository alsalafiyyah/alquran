  <p><strong>56:25</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَا يَسۡمَعُونَ فِيهَا لَغۡوٗا وَلَا تَأۡثِيمًا</p>
  <p style="font-size:18px;">25. No Laghw (dirty, false, evil vain talk) will they hear therein, nor any sinful speech (like backbiting).</p>
