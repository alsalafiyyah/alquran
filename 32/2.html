<div class="single-verse">
  <p><strong>32:2</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">تَنزِيلُ ٱلۡكِتَٰبِ لَا رَيۡبَ فِيهِ مِن رَّبِّ ٱلۡعَٰلَمِينَ</p>
  <p style="font-size:18px;">2. The revelation of the Book (this Qur’ân) in which there is no doubt is from the Lord of the ‘Âlamîn (mankind, jinn and all that exists)!</p>
