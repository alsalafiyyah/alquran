<div class="single-verse">
  <p><strong>32:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱلَّذِيٓ أَحۡسَنَ كُلَّ شَيۡءٍ خَلَقَهُۥۖ وَبَدَأَ خَلۡقَ ٱلۡإِنسَٰنِ مِن طِينٖ</p>
  <p style="font-size:18px;">7. Who made everything He has created good and He began the creation of man from clay.</p>
