<div class="single-verse">
  <p><strong>32:30</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَأَعۡرِضۡ عَنۡهُمۡ وَٱنتَظِرۡ إِنَّهُم مُّنتَظِرُونَ</p>
  <p style="font-size:18px;">30. So turn aside from them (O Muhammad صلى الله عليه وسلم) and await: verily, they (too) are awaiting.</p>
