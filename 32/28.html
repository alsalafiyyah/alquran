<div class="single-verse">
  <p><strong>32:28</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَيَقُولُونَ مَتَىٰ هَٰذَا ٱلۡفَتۡحُ إِن كُنتُمۡ صَٰدِقِينَ</p>
  <p style="font-size:18px;">28. They say: "When will this Fath (Decision) be (between us and you, i.e. the Day of Resurrection), if you are telling the truth?"</p>
