<div class="single-verse">
  <p><strong>32:18</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَفَمَن كَانَ مُؤۡمِنٗا كَمَن كَانَ فَاسِقٗاۚ لَّا يَسۡتَوُۥنَ</p>
  <p style="font-size:18px;">18. Is then he who is a believer like him who is a Fâsiq (disbeliever and disobedient to Allâh)? Not equal are they.</p>
