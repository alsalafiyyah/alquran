<div class="single-verse">
  <p><strong>32:25</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ رَبَّكَ هُوَ يَفۡصِلُ بَيۡنَهُمۡ يَوۡمَ ٱلۡقِيَٰمَةِ فِيمَا كَانُواْ فِيهِ يَخۡتَلِفُونَ</p>
  <p style="font-size:18px;">25. Verily, your Lord will judge between them, on the Day of Resurrection, concerning that wherein they used to differ.</p>
