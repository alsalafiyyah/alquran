  <p><strong>39:62</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱللَّهُ خَٰلِقُ كُلِّ شَيۡءٖۖ وَهُوَ عَلَىٰ كُلِّ شَيۡءٖ وَكِيلٞ</p>
  <p style="font-size:18px;">62. Allâh is the Creator of all things, and He is the Wakîl (Trustee, Disposer of affairs, Guardian) over all things.</p>
