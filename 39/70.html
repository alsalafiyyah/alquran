  <p><strong>39:70</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَوُفِّيَتۡ كُلُّ نَفۡسٖ مَّا عَمِلَتۡ وَهُوَ أَعۡلَمُ بِمَا يَفۡعَلُونَ</p>
