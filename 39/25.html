  <p><strong>39:25</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">كَذَّبَ ٱلَّذِينَ مِن قَبۡلِهِمۡ فَأَتَىٰهُمُ ٱلۡعَذَابُ مِنۡ حَيۡثُ لَا يَشۡعُرُونَ</p>
  <p style="font-size:18px;">25. Those before them belied, and so the torment came on them from directions they perceived not.</p>
