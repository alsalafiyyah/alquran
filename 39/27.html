<div class="single-verse">
  <p><strong>39:27</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَقَدۡ ضَرَبۡنَا لِلنَّاسِ فِي هَٰذَا ٱلۡقُرۡءَانِ مِن كُلِّ مَثَلٖ لَّعَلَّهُمۡ يَتَذَكَّرُونَ</p>
  <p style="font-size:18px;">27. And indeed We have put forth for men, in this Qur’ân every kind of similitude in order that they may remember.</p>
