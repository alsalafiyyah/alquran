<div class="single-verse">
  <p><strong>39:48</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَبَدَا لَهُمۡ سَيِّـَٔاتُ مَا كَسَبُواْ وَحَاقَ بِهِم مَّا كَانُواْ بِهِۦ يَسۡتَهۡزِءُونَ</p>
  <p style="font-size:18px;">48. And the evils of that which they earned will become apparent to them, and that which they used to mock at will encircle them.</p>
