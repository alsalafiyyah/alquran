<div class="single-verse">
  <p><strong>39:50</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَدۡ قَالَهَا ٱلَّذِينَ مِن قَبۡلِهِمۡ فَمَآ أَغۡنَىٰ عَنۡهُم مَّا كَانُواْ يَكۡسِبُونَ</p>
  <p style="font-size:18px;">50. Verily, those before them said it, yet (all) that they had earned availed them not.</p>
