<div class="single-verse">
  <p><strong>39:13</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قُلۡ إِنِّيٓ أَخَافُ إِنۡ عَصَيۡتُ رَبِّي عَذَابَ يَوۡمٍ عَظِيمٖ</p>
  <p style="font-size:18px;">13. Say (O Muhammad صلى الله عليه وسلم): "Verily if I disobey my Lord, I am afraid of the torment of a great Day."</p>
