<div class="single-verse">
  <p><strong>39:12</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَأُمِرۡتُ لِأَنۡ أَكُونَ أَوَّلَ ٱلۡمُسۡلِمِينَ</p>
  <p style="font-size:18px;">12. "And I am commanded (this) in order that I may be the first of those who submit themselves to Allâh (in Islâm) as Muslims."</p>
