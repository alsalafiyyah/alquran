<div class="single-verse">
  <p><strong>39:34</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَهُم مَّا يَشَآءُونَ عِندَ رَبِّهِمۡۚ ذَٰلِكَ جَزَآءُ ٱلۡمُحۡسِنِينَ</p>
  <p style="font-size:18px;">34. They shall have all that they will desire with their Lord. That is the reward of Muhsinûn (good-doers - see the footnote of V.9:120).</p>
