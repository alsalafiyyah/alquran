<div class="single-verse">
  <p><strong>39:72</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قِيلَ ٱدۡخُلُوٓاْ أَبۡوَٰبَ جَهَنَّمَ خَٰلِدِينَ فِيهَاۖ فَبِئۡسَ مَثۡوَى ٱلۡمُتَكَبِّرِينَ</p>
  <p style="font-size:18px;">72. It will be said (to them): "Enter you the gates of Hell, to abide therein. And (indeed) what an evil abode of the arrogant!"</p>
</div>
