<div class="single-verse">
  <p><strong>39:64</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قُلۡ أَفَغَيۡرَ ٱللَّهِ تَأۡمُرُوٓنِّيٓ أَعۡبُدُ أَيُّهَا ٱلۡجَٰهِلُونَ</p>
  <p style="font-size:18px;">64. Say (O Muhammad صلى الله عليه وسلم to the polytheists): "Do you order me to worship other than Allâh? O you fools!"</p>
</div>
