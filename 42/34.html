<div class="single-verse">
  <p><strong>42:34</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَوۡ يُوبِقۡهُنَّ بِمَا كَسَبُواْ وَيَعۡفُ عَن كَثِيرٖ</p>
  <p style="font-size:18px;">34. Or He may destroy them (by shipwreck) because of that which their (people) have earned. And He pardons much.</p>
