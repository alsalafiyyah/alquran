<div class="single-verse">
  <p><strong>42:41</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَمَنِ ٱنتَصَرَ بَعۡدَ ظُلۡمِهِۦ فَأُوْلَٰٓئِكَ مَا عَلَيۡهِم مِّن سَبِيلٍ</p>
  <p style="font-size:18px;">41. And indeed whosoever takes revenge after he has suffered wrong, for such there is no way (of blame) against them.</p>
