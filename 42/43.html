<div class="single-verse">
  <p><strong>42:43</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَمَن صَبَرَ وَغَفَرَ إِنَّ ذَٰلِكَ لَمِنۡ عَزۡمِ ٱلۡأُمُورِ</p>
  <p style="font-size:18px;">43. And verily, whosoever shows patience and forgives, that would truly be from the things recommended by Allâh.</p>
