  <p><strong>42:39</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱلَّذِينَ إِذَآ أَصَابَهُمُ ٱلۡبَغۡيُ هُمۡ يَنتَصِرُونَ</p>
