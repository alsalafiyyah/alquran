<div class="single-verse">
  <p><strong>42:19</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱللَّهُ لَطِيفُۢ بِعِبَادِهِۦ يَرۡزُقُ مَن يَشَآءُۖ وَهُوَ ٱلۡقَوِيُّ ٱلۡعَزِيزُ</p>
  <p style="font-size:18px;">19. Allâh is very Gracious and Kind to His slaves. He gives provisions to whom He wills. And He is the All-Strong, the All-Mighty.</p>
