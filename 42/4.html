<div class="single-verse">
  <p><strong>42:4</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَهُۥ مَا فِي ٱلسَّمَٰوَٰتِ وَمَا فِي ٱلۡأَرۡضِۖ وَهُوَ ٱلۡعَلِيُّ ٱلۡعَظِيمُ</p>
  <p style="font-size:18px;">4. To Him belongs all that is in the heavens and all that is in the earth, and He is the Most High, the Most Great.</p>
