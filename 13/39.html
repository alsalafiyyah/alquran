<div class="single-verse">
  <p><strong>13:39</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَمۡحُواْ ٱللَّهُ مَا يَشَآءُ وَيُثۡبِتُۖ وَعِندَهُۥٓ أُمُّ ٱلۡكِتَٰبِ</p>
  <p style="font-size:18px;">39. Allâh blots out what He wills and confirms (what He wills). And with Him is the Mother of the Book (Al-Lauh Al-Mahfûz)</p>
