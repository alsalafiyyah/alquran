<div class="single-verse">
  <p><strong>22:59</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَيُدۡخِلَنَّهُم مُّدۡخَلٗا يَرۡضَوۡنَهُۥۚ وَإِنَّ ٱللَّهَ لَعَلِيمٌ حَلِيمٞ</p>
  <p style="font-size:18px;">59. Truly, He will make them enter an entrance with which they shall be well-pleased, and verily, Allâh indeed is All-Knowing, Most Forbearing.</p>
