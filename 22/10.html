<div class="single-verse">
  <p><strong>22:10</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ذَٰلِكَ بِمَا قَدَّمَتۡ يَدَاكَ وَأَنَّ ٱللَّهَ لَيۡسَ بِظَلَّٰمٖ لِّلۡعَبِيدِ</p>
  <p style="font-size:18px;">10. That is because of what your hands have sent forth, and verily, Allâh is not unjust to (His) slaves.</p>
