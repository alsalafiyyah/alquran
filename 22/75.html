<div class="single-verse">
  <p><strong>22:75</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱللَّهُ يَصۡطَفِي مِنَ ٱلۡمَلَٰٓئِكَةِ رُسُلٗا وَمِنَ ٱلنَّاسِۚ إِنَّ ٱللَّهَ سَمِيعُۢ بَصِيرٞ</p>
  <p style="font-size:18px;">75. Allâh chooses Messengers from angels and from men. Verily, Allâh is All-Hearer, All-Seer.</p>
