<div class="single-verse">
  <p><strong>22:49</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قُلۡ يَٰٓأَيُّهَا ٱلنَّاسُ إِنَّمَآ أَنَا۠ لَكُمۡ نَذِيرٞ مُّبِينٞ</p>
  <p style="font-size:18px;">49. Say (O Muhammad صلى الله عليه وسلم): "O mankind! I am (sent) to you only as a plain warner."</p>
