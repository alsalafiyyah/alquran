  <p><strong>22:74</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">مَا قَدَرُواْ ٱللَّهَ حَقَّ قَدۡرِهِۦٓۚ إِنَّ ٱللَّهَ لَقَوِيٌّ عَزِيزٌ</p>
  <p style="font-size:18px;">74. They have not estimated Allâh His Rightful Estimate. Verily, Allâh is All-Strong, All-Mighty.</p>
