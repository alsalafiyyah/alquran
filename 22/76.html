<div class="single-verse">
  <p><strong>22:76</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَعۡلَمُ مَا بَيۡنَ أَيۡدِيهِمۡ وَمَا خَلۡفَهُمۡۚ وَإِلَى ٱللَّهِ تُرۡجَعُ ٱلۡأُمُورُ</p>
  <p style="font-size:18px;">76. He knows what is before them, and what is behind them. And to Allâh return all matters (for decision).</p>
