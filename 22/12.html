<div class="single-verse">
  <p><strong>22:12</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَدۡعُواْ مِن دُونِ ٱللَّهِ مَا لَا يَضُرُّهُۥ وَمَا لَا يَنفَعُهُۥۚ ذَٰلِكَ هُوَ ٱلضَّلَٰلُ ٱلۡبَعِيدُ</p>
  <p style="font-size:18px;">12. He calls besides Allâh unto that which can neither harm him, nor profit him. That is a straying far away.</p>
