<div class="single-verse">
  <p><strong>22:57</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱلَّذِينَ كَفَرُواْ وَكَذَّبُواْ بِـَٔايَٰتِنَا فَأُوْلَٰٓئِكَ لَهُمۡ عَذَابٞ مُّهِينٞ</p>
  <p style="font-size:18px;">57. And those who disbelieved and belied Our Verses (of this Qur’ân), for them will be a humiliating torment (in Hell).</p>
