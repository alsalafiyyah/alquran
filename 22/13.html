<div class="single-verse">
  <p><strong>22:13</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَدۡعُواْ لَمَن ضَرُّهُۥٓ أَقۡرَبُ مِن نَّفۡعِهِۦۚ لَبِئۡسَ ٱلۡمَوۡلَىٰ وَلَبِئۡسَ ٱلۡعَشِيرُ</p>
  <p style="font-size:18px;">13. He calls unto him whose harm is nearer than his profit: certainly, an evil Maulâ (patron) and certainly an evil friend!</p>
