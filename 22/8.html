  <p><strong>22:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمِنَ ٱلنَّاسِ مَن يُجَٰدِلُ فِي ٱللَّهِ بِغَيۡرِ عِلۡمٖ وَلَا هُدٗى وَلَا كِتَٰبٖ مُّنِيرٖ</p>
  <p style="font-size:18px;">8. And among men is he who disputes about Allâh, without knowledge or guidance, or a Book giving light (from Allâh),</p>
