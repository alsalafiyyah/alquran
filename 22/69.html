  <p><strong>22:69</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱللَّهُ يَحۡكُمُ بَيۡنَكُمۡ يَوۡمَ ٱلۡقِيَٰمَةِ فِيمَا كُنتُمۡ فِيهِ تَخۡتَلِفُونَ</p>
  <p style="font-size:18px;">69. "Allâh will judge between you on the Day of Resurrection about that wherein you used to differ."</p>
