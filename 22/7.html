<div class="single-verse">
  <p><strong>22:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَأَنَّ ٱلسَّاعَةَ ءَاتِيَةٞ لَّا رَيۡبَ فِيهَا وَأَنَّ ٱللَّهَ يَبۡعَثُ مَن فِي ٱلۡقُبُورِ</p>
  <p style="font-size:18px;">7. And surely, the Hour is coming, there is no doubt about it; and certainly, Allâh will resurrect those who are in the graves.</p>
</div>
