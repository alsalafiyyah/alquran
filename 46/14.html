<div class="single-verse">
  <p><strong>46:14</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أُوْلَٰٓئِكَ أَصۡحَٰبُ ٱلۡجَنَّةِ خَٰلِدِينَ فِيهَا جَزَآءَۢ بِمَا كَانُواْ يَعۡمَلُونَ</p>
  <p style="font-size:18px;">14. Such shall be the dwellers of Paradise, abiding therein (forever) - a reward for what they used to do.</p>
