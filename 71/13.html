  <p><strong>71:13</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">مَّا لَكُمۡ لَا تَرۡجُونَ لِلَّهِ وَقَارٗا</p>
  <p style="font-size:18px;">13. What is the matter with you, that [you fear not Allâh (His punishment), and] you hope not for reward (from Allâh or you believe not in His Oneness).</p>
