<div class="single-verse">
  <p><strong>81:23</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَقَدۡ رَءَاهُ بِٱلۡأُفُقِ ٱلۡمُبِينِ</p>
  <p style="font-size:18px;">23. And indeed he (Muhammad صلى الله عليه وسلم) saw him [Jibrîl (Gabriel)] in the clear horizon (towards the east).</p>
