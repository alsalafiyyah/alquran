  <p><strong>81:19</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّهُۥ لَقَوۡلُ رَسُولٖ كَرِيمٖ</p>
  <p style="font-size:18px;">19. Verily, this is the Word (this Qur’ân brought by) a most honourable messenger [Jibrîl (Gabrîl), from Allâh to Prophet Muhammad صلى الله عليه وسلم].</p>
