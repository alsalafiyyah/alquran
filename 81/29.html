<div class="single-verse">
  <p><strong>81:29</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمَا تَشَآءُونَ إِلَّآ أَن يَشَآءَ ٱللَّهُ رَبُّ ٱلۡعَٰلَمِينَ</p>
  <p style="font-size:18px;">29. And you cannot will unless (it be) that Allâh wills - the Lord of the ‘Âlamîn (mankind, jinn and all that exists).</p>
