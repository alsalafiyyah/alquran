<div class="single-verse">
  <p><strong>9:82</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَلۡيَضۡحَكُواْ قَلِيلٗا وَلۡيَبۡكُواْ كَثِيرٗا جَزَآءَۢ بِمَا كَانُواْ يَكۡسِبُونَ</p>
  <p style="font-size:18px;">82. So let them laugh a little and (they will) cry much as a recompense of what they used to earn (by committing sins).</p>
