<div class="single-verse">
  <p><strong>9:57</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَوۡ يَجِدُونَ مَلۡجَـًٔا أَوۡ مَغَٰرَٰتٍ أَوۡ مُدَّخَلٗا لَّوَلَّوۡاْ إِلَيۡهِ وَهُمۡ يَجۡمَحُونَ</p>
  <p style="font-size:18px;">57. Should they find a refuge, or caves, or a place of concealment, they would turn straightway thereto with a swift rush.</p>
