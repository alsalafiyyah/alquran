<div class="single-verse">
  <p><strong>9:27</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ثُمَّ يَتُوبُ ٱللَّهُ مِنۢ بَعۡدِ ذَٰلِكَ عَلَىٰ مَن يَشَآءُۗ وَٱللَّهُ غَفُورٞ رَّحِيمٞ</p>
  <p style="font-size:18px;">27. Then after that Allâh will accept the repentance of whom He wills. And Allâh is Oft-Forgiving, Most Merciful.</p>
