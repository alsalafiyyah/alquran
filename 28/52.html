<div class="single-verse">
  <p><strong>28:52</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱلَّذِينَ ءَاتَيۡنَٰهُمُ ٱلۡكِتَٰبَ مِن قَبۡلِهِۦ هُم بِهِۦ يُؤۡمِنُونَ</p>
  <p style="font-size:18px;">52. Those to whom We gave the Scripture [i.e. the Taurât (Torah) and the Injeel (Gospel)] before it, they believe in it (the Qur’ân).</p>
