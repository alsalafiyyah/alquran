<div class="single-verse">
  <p><strong>28:41</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَجَعَلۡنَٰهُمۡ أَئِمَّةٗ يَدۡعُونَ إِلَى ٱلنَّارِۖ وَيَوۡمَ ٱلۡقِيَٰمَةِ لَا يُنصَرُونَ</p>
  <p style="font-size:18px;">41. And We made them leaders inviting to the Fire: and on the Day of Resurrection, they will not be helped.</p>
