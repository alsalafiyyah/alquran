<div class="single-verse">
  <p><strong>28:66</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَعَمِيَتۡ عَلَيۡهِمُ ٱلۡأَنۢبَآءُ يَوۡمَئِذٖ فَهُمۡ لَا يَتَسَآءَلُونَ</p>
  <p style="font-size:18px;">66. Then the news of a good answer will be obscured to them on that day, and they will not be able to ask one another.</p>
