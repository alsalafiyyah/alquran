  <p><strong>28:33</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ رَبِّ إِنِّي قَتَلۡتُ مِنۡهُمۡ نَفۡسٗا فَأَخَافُ أَن يَقۡتُلُونِ</p>
  <p style="font-size:18px;">33. He said: "My Lord! I have killed a man among them, and I fear that they will kill me.</p>
