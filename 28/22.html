<div class="single-verse">
  <p><strong>28:22</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَمَّا تَوَجَّهَ تِلۡقَآءَ مَدۡيَنَ قَالَ عَسَىٰ رَبِّيٓ أَن يَهۡدِيَنِي سَوَآءَ ٱلسَّبِيلِ</p>
  <p style="font-size:18px;">22. And when he went towards (the land of) Madyan (Midian), he said: "It may be that my Lord guides me to the Right Way."</p>
