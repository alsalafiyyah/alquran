  <p><strong>49:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَضۡلٗا مِّنَ ٱللَّهِ وَنِعۡمَةٗۚ وَٱللَّهُ عَلِيمٌ حَكِيمٞ</p>
  <p style="font-size:18px;">8. (This is) a Grace from Allâh and His Favour. And Allâh is All-Knowing, All-Wise.</p>
