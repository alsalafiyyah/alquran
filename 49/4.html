<div class="single-verse">
  <p><strong>49:4</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ ٱلَّذِينَ يُنَادُونَكَ مِن وَرَآءِ ٱلۡحُجُرَٰتِ أَكۡثَرُهُمۡ لَا يَعۡقِلُونَ</p>
  <p style="font-size:18px;">4. Verily those who call you from behind the dwellings, most of them have no sense.</p>
