<div class="single-verse">
  <p><strong>11:90</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱسۡتَغۡفِرُواْ رَبَّكُمۡ ثُمَّ تُوبُوٓاْ إِلَيۡهِۚ إِنَّ رَبِّي رَحِيمٞ وَدُودٞ</p>
  <p style="font-size:18px;">90. "And ask forgiveness of your Lord and turn unto Him in repentance. Verily, my Lord is Most Merciful, Most Loving."</p>
