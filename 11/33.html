<div class="single-verse">
  <p><strong>11:33</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ إِنَّمَا يَأۡتِيكُم بِهِ ٱللَّهُ إِن شَآءَ وَمَآ أَنتُم بِمُعۡجِزِينَ</p>
  <p style="font-size:18px;">33. He said: "Only Allâh will bring it (the punishment) on you, if He wills, and then you will escape not.</p>
