<div class="single-verse">
  <p><strong>11:68</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">كَأَن لَّمۡ يَغۡنَوۡاْ فِيهَآۗ أَلَآ إِنَّ ثَمُودَاْ كَفَرُواْ رَبَّهُمۡۗ أَلَا بُعۡدٗا لِّثَمُودَ</p>
  <p style="font-size:18px;">68. As if they had never lived there. No doubt! Verily, Thamûd disbelieved in their Lord. So away with Thamûd!</p>
</div>
