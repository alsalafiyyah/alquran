<div class="single-verse">
  <p><strong>11:121</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَقُل لِّلَّذِينَ لَا يُؤۡمِنُونَ ٱعۡمَلُواْ عَلَىٰ مَكَانَتِكُمۡ إِنَّا عَٰمِلُونَ</p>
  <p style="font-size:18px;">121. And say to those who do not believe: "Act according to your ability and way, We are acting (in our way).</p>
