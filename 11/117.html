<div class="single-verse">
  <p><strong>11:117</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمَا كَانَ رَبُّكَ لِيُهۡلِكَ ٱلۡقُرَىٰ بِظُلۡمٖ وَأَهۡلُهَا مُصۡلِحُونَ</p>
  <p style="font-size:18px;">117. And your Lord would never destroy the towns wrongfully, while their people were right-doers.</p>
