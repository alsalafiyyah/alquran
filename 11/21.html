<div class="single-verse">
  <p><strong>11:21</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أُوْلَٰٓئِكَ ٱلَّذِينَ خَسِرُوٓاْ أَنفُسَهُمۡ وَضَلَّ عَنۡهُم مَّا كَانُواْ يَفۡتَرُونَ</p>
  <p style="font-size:18px;">21. They are those who have lost their ownselves, and their invented false deities will vanish from them.</p>
