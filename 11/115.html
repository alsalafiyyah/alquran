  <p><strong>11:115</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱصۡبِرۡ فَإِنَّ ٱللَّهَ لَا يُضِيعُ أَجۡرَ ٱلۡمُحۡسِنِينَ</p>
