<div class="single-verse">
  <p><strong>11:80</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ لَوۡ أَنَّ لِي بِكُمۡ قُوَّةً أَوۡ ءَاوِيٓ إِلَىٰ رُكۡنٖ شَدِيدٖ</p>
  <p style="font-size:18px;">80. He said: "Would that I had strength (men) to overpower you, or that I could betake myself to some powerful support (to resist you)."</p>
