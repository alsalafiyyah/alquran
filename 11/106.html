<div class="single-verse">
  <p><strong>11:106</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَأَمَّا ٱلَّذِينَ شَقُواْ فَفِي ٱلنَّارِ لَهُمۡ فِيهَا زَفِيرٞ وَشَهِيقٌ</p>
  <p style="font-size:18px;">106. As for those who are wretched, they will be in the Fire, sighing in a high and low tone.</p>
