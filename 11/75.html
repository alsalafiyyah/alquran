<div class="single-verse">
  <p><strong>11:75</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ إِبۡرَٰهِيمَ لَحَلِيمٌ أَوَّٰهٞ مُّنِيبٞ</p>
  <p style="font-size:18px;">75. Verily, Ibrahîm (Abraham) was, without doubt, forbearing, used to invoking Allâh with humility, and was repentant (to Allâh all the time, again and again).</p>
