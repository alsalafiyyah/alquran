<div class="single-verse">
  <p><strong>11:2</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَلَّا تَعۡبُدُوٓاْ إِلَّا ٱللَّهَۚ إِنَّنِي لَكُم مِّنۡهُ نَذِيرٞ وَبَشِيرٞ</p>
  <p style="font-size:18px;">2. (Saying) worship none but Allâh. Verily, I (Muhammad صلى الله عليه و سلم) am unto you from Him a warner and a bringer of glad tidings.</p>
