<div class="single-verse">
  <p><strong>11:95</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">كَأَن لَّمۡ يَغۡنَوۡاْ فِيهَآۗ أَلَا بُعۡدٗا لِّمَدۡيَنَ كَمَا بَعِدَتۡ ثَمُودُ</p>
  <p style="font-size:18px;">95. As if they had never lived there! So away with Madyan (Midian) as away with Thamûd! (All these nations were destroyed).</p>
