<div class="single-verse">
  <p><strong>11:111</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِنَّ كُلّٗا لَّمَّا لَيُوَفِّيَنَّهُمۡ رَبُّكَ أَعۡمَٰلَهُمۡۚ إِنَّهُۥ بِمَا يَعۡمَلُونَ خَبِيرٞ</p>
  <p style="font-size:18px;">111. And verily, to each of them your Lord will repay their works in full. Surely, He is All-Aware of what they do.</p>
</div>
