<div class="single-verse">
  <p><strong>11:30</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَيَٰقَوۡمِ مَن يَنصُرُنِي مِنَ ٱللَّهِ إِن طَرَدتُّهُمۡۚ أَفَلَا تَذَكَّرُونَ</p>
  <p style="font-size:18px;">30. "And O my people! Who will help me against Allâh, if I drove them away? Will you not then give a thought?</p>
