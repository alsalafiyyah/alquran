<div class="single-verse">
  <p><strong>11:26</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَن لَّا تَعۡبُدُوٓاْ إِلَّا ٱللَّهَۖ إِنِّيٓ أَخَافُ عَلَيۡكُمۡ عَذَابَ يَوۡمٍ أَلِيمٖ</p>
  <p style="font-size:18px;">26. "That you worship none but Allâh; surely, I fear for you the torment of a painful Day."</p>
