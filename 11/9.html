<div class="single-verse">
  <p><strong>11:9</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَئِنۡ أَذَقۡنَا ٱلۡإِنسَٰنَ مِنَّا رَحۡمَةٗ ثُمَّ نَزَعۡنَٰهَا مِنۡهُ إِنَّهُۥ لَيَـُٔوسٞ كَفُورٞ</p>
  <p style="font-size:18px;">9. And if We give man a taste of Mercy from Us, and then withdraw it from him, verily! he is despairing, ungrateful.</p>
</div>
