  <p><strong>67:14</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَلَا يَعۡلَمُ مَنۡ خَلَقَ وَهُوَ ٱللَّطِيفُ ٱلۡخَبِيرُ</p>
