<div class="single-verse">
  <p><strong>67:4</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ثُمَّ ٱرۡجِعِ ٱلۡبَصَرَ كَرَّتَيۡنِ يَنقَلِبۡ إِلَيۡكَ ٱلۡبَصَرُ خَاسِئٗا وَهُوَ حَسِيرٞ</p>
  <p style="font-size:18px;">4. Then look again and yet again: your sight will return to you in a state of humiliation and worn out.</p>
