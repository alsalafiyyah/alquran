  <p><strong>67:18</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَقَدۡ كَذَّبَ ٱلَّذِينَ مِن قَبۡلِهِمۡ فَكَيۡفَ كَانَ نَكِيرِ</p>
