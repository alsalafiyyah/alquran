<div class="single-verse">
  <p><strong>67:10</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَقَالُواْ لَوۡ كُنَّا نَسۡمَعُ أَوۡ نَعۡقِلُ مَا كُنَّا فِيٓ أَصۡحَٰبِ ٱلسَّعِيرِ</p>
  <p style="font-size:18px;">10. And they will say: "Had we but listened or used our intelligence, we would not have been among the dwellers of the blazing Fire!"</p>
