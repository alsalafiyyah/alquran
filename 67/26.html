<div class="single-verse">
  <p><strong>67:26</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قُلۡ إِنَّمَا ٱلۡعِلۡمُ عِندَ ٱللَّهِ وَإِنَّمَآ أَنَا۠ نَذِيرٞ مُّبِينٞ</p>
  <p style="font-size:18px;">26. Say (O Muhammad صلى الله عليه وسلم): "The knowledge (of its exact time) is with Allâh only, and I am only a plain warner."</p>
</div>
