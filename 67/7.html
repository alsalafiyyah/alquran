  <p><strong>67:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِذَآ أُلۡقُواْ فِيهَا سَمِعُواْ لَهَا شَهِيقٗا وَهِيَ تَفُورُ</p>
