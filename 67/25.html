  <p><strong>67:25</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَيَقُولُونَ مَتَىٰ هَٰذَا ٱلۡوَعۡدُ إِن كُنتُمۡ صَٰدِقِينَ</p>
  <p style="font-size:18px;">25. They say: "When will this promise (i.e. the Day of Resurrection) come to pass if you are telling the truth.?"</p>
