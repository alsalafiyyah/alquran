<div class="single-verse">
  <p><strong>67:6</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلِلَّذِينَ كَفَرُواْ بِرَبِّهِمۡ عَذَابُ جَهَنَّمَۖ وَبِئۡسَ ٱلۡمَصِيرُ</p>
  <p style="font-size:18px;">6. And for those who disbelieve in their Lord (Allâh) is the torment of Hell, and worst indeed is that destination.</p>
