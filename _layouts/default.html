<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
  @import url('https://fonts.cdnfonts.com/css/kfgqpc-hafs-uthmanic-script'); 
  @font-face {
  font-family: 'KFGQPC Uthmanic Script HAFS';
  src: url('https://alsalafiyyah.github.io/alquran/assets/font/uthmani_hafs.otf') format('opentype'), local("KFGQPC Uthmanic Script HAFS");
  font-weight: normal;
  font-style: normal;
  font-display: swap;}
  @font-face {
  font-family: 'Uthman Hafs';
  src: local('KFGQPC Uthmanic Script HAFS'),
       url(https://raw.githubusercontent.com/mustafa0x/qpc-fonts/f93bf5f3/various-woff2/UthmanicHafs1%20Ver09.woff2);
  }
  body { font-family: 'Plus Jakarta Sans', sans-serif; }
  .font-arabic { 
  font-family: 'KFGQPC HAFS Uthmanic Script', serif;
  font-size: 2.5rem;       /* ~40px */
  line-height: 2.8;         /* Safe vertical breathing room */
  color: #0f172a;
  text-align: right;
  direction: rtl;
  }
.verse-marker {
  font-family: ui-sans-serif, system-ui, sans-serif; /* Clean numbers */
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #059669;          /* Emerald-600 */
  font-weight: 700;
  font-size: 1.1rem;       /* Scaled down to fit nicely in the sentence line */
  width: 2.2rem;
  height: 2.2rem;
  border: 2px solid #10b981; /* Emerald-500 border ring */
  border-radius: 9999px;   /* Perfect round circle */
  margin-right: 0.75rem;
  margin-left: 0.25rem;
  vertical-align: middle;  /* Keeps it aligned with the baseline */
  user-select: none;
}
  </style>
</head>
<body class="bg-slate-50/50 text-slate-800 antialiased min-h-screen flex flex-col">

  <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-200/80 py-4 shadow-xs">
    <div class="max-w-5xl mx-auto px-6 flex justify-between items-center">
      <a href="{{ site.url }}" class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-emerald-600 to-teal-700 bg-clip-text text-transparent">The Noble Qur'an</a>
      <span class="text-xs text-slate-600 font-semibold tracking-wide uppercase bg-slate-100 px-3 py-1 rounded-full border border-slate-200"></span>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-6 py-10 flex-grow w-full">
    {{ content }}
  </main>

  <footer class="bg-white border-t border-slate-200 py-8 text-center text-sm text-slate-400 font-medium">
    <p>{{ site.title}}</p>
  </footer>

  <div id="footnote-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-all duration-300">
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-xs custom-overlay-closer"></div>
    
    <div class="relative bg-white rounded-2xl shadow-xl border border-slate-100 w-full max-w-xl max-h-[80vh] flex flex-col transform scale-95 transition-all duration-300 overflow-hidden">
      <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
        <h3 id="modal-title" class="text-base font-bold text-slate-900">Footnote Commentary</h3>
        <button id="close-modal-btn" class="text-slate-400 hover:text-slate-600 p-1.5 rounded-lg hover:bg-slate-100 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
      <div id="modal-body" class="p-6 overflow-y-auto text-sm text-slate-600 leading-relaxed space-y-3 whitespace-pre-line">
        </div>
    </div>
  </div>

  <script>
    const modal = document.getElementById('footnote-modal');
    const modalBox = modal.querySelector('.relative');
    const modalTitle = document.getElementById('modal-title');
    const modalBody = document.getElementById('modal-body');

    function openFootnote(title, text) {
      modalTitle.innerText = title;
      modalBody.innerText = text;
      
      // Trigger smooth transition animations
      modal.classList.remove('opacity-0', 'pointer-events-none');
      modalBox.classList.remove('scale-95');
      modalBox.classList.add('scale-100');
      document.body.classList.add('overflow-hidden'); // Lock background scroll
    }

    function closeFootnote() {
      modal.classList.add('opacity-0', 'pointer-events-none');
      modalBox.classList.remove('scale-100');
      modalBox.classList.add('scale-95');
      document.body.classList.remove('overflow-hidden');
    }

    // Attach closing listeners
    document.getElementById('close-modal-btn').addEventListener('click', closeFootnote);
    modal.querySelector('.custom-overlay-closer').addEventListener('click', closeFootnote);
    window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeFootnote(); });
  </script>
</body>
</html>
