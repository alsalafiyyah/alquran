<div class="single-verse">
  <p><strong>40:68</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">هُوَ ٱلَّذِي يُحۡيِۦ وَيُمِيتُۖ فَإِذَا قَضَىٰٓ أَمۡرٗا فَإِنَّمَا يَقُولُ لَهُۥ كُن فَيَكُونُ</p>
  <p style="font-size:18px;">68. It is He Who gives life and causes death. And when He decides upon a thing He says to it only: "Be!" - and it is.</p>
</div>
