<div class="single-verse">
  <p><strong>40:63</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">كَذَٰلِكَ يُؤۡفَكُ ٱلَّذِينَ كَانُواْ بِـَٔايَٰتِ ٱللَّهِ يَجۡحَدُونَ</p>
  <p style="font-size:18px;">63. Thus were turned away those who used to deny the Ayât (proofs, evidence, verses, lessons, signs, revelations, etc.) of Allâh.</p>
