<div class="single-verse">
  <p><strong>40:76</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱدۡخُلُوٓاْ أَبۡوَٰبَ جَهَنَّمَ خَٰلِدِينَ فِيهَاۖ فَبِئۡسَ مَثۡوَى ٱلۡمُتَكَبِّرِينَ</p>
  <p style="font-size:18px;">76. Enter the gates of Hell to abide therein: and (indeed) what an evil abode of the arrogant!</p>
