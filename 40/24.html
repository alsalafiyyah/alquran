  <p><strong>40:24</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِلَىٰ فِرۡعَوۡنَ وَهَٰمَٰنَ وَقَٰرُونَ فَقَالُواْ سَٰحِرٞ كَذَّابٞ</p>
  <p style="font-size:18px;">24. To Fir‘aun (Pharaoh), Hâmân and Qârûn (Korah), but they called (him): "A sorcerer, a liar!"</p>
