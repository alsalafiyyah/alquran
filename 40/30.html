<div class="single-verse">
  <p><strong>40:30</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَقَالَ ٱلَّذِيٓ ءَامَنَ يَٰقَوۡمِ إِنِّيٓ أَخَافُ عَلَيۡكُم مِّثۡلَ يَوۡمِ ٱلۡأَحۡزَابِ</p>
  <p style="font-size:18px;">30. And he who believed said: "O my people! Verily, I fear for you a fate like that day (of disaster) of the Confederates (of old)!</p>
