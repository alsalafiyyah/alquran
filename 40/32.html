<div class="single-verse">
  <p><strong>40:32</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَيَٰقَوۡمِ إِنِّيٓ أَخَافُ عَلَيۡكُمۡ يَوۡمَ ٱلتَّنَادِ</p>
  <p style="font-size:18px;">32. "And, O my people! Verily, I fear for you the Day when there will be mutual calling (between the people of Hell and of Paradise)."</p>
