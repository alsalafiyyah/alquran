<div class="single-verse">
  <p><strong>38:85</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَأَمۡلَأَنَّ جَهَنَّمَ مِنكَ وَمِمَّن تَبِعَكَ مِنۡهُمۡ أَجۡمَعِينَ</p>
  <p style="font-size:18px;">85. That I will fill Hell with you [Iblîs (Satan)] and those of them (mankind) that follow you, together."</p>
