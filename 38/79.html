<div class="single-verse">
  <p><strong>38:79</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ رَبِّ فَأَنظِرۡنِيٓ إِلَىٰ يَوۡمِ يُبۡعَثُونَ</p>
  <p style="font-size:18px;">79. [Iblîs (Satan)] said: "My Lord! Give me then respite till the Day the (dead) are resurrected."</p>
