<div class="single-verse">
  <p><strong>38:21</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">۞ وَهَلۡ أَتَىٰكَ نَبَؤُاْ ٱلۡخَصۡمِ إِذۡ تَسَوَّرُواْ ٱلۡمِحۡرَابَ</p>
  <p style="font-size:18px;">21. And has the news of the litigants reached you? When they climbed over the wall into (his) Mihrâb (a praying place or a private room);</p>
