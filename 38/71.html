<div class="single-verse">
  <p><strong>38:71</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِذۡ قَالَ رَبُّكَ لِلۡمَلَٰٓئِكَةِ إِنِّي خَٰلِقُۢ بَشَرٗا مِّن طِينٖ</p>
  <p style="font-size:18px;">71. (Remember) when your Lord said to the angels: "Truly I am going to create man from clay".</p>
