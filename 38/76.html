<div class="single-verse">
  <p><strong>38:76</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ أَنَا۠ خَيۡرٞ مِّنۡهُ خَلَقۡتَنِي مِن نَّارٖ وَخَلَقۡتَهُۥ مِن طِينٖ</p>
  <p style="font-size:18px;">76. [Iblîs (Satan)] said: "I am better than he. You created me from fire, and You created him from clay."</p>
