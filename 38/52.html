<div class="single-verse">
  <p><strong>38:52</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">۞ وَعِندَهُمۡ قَٰصِرَٰتُ ٱلطَّرۡفِ أَتۡرَابٌ</p>
  <p style="font-size:18px;">52. And beside them will be Qâsirât-at-Tarf [chaste females (wives) restraining their glances (desiring none except their husbands)], (and) of equal ages.</p>
