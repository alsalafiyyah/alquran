  <p><strong>38:36</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَسَخَّرۡنَا لَهُ ٱلرِّيحَ تَجۡرِي بِأَمۡرِهِۦ رُخَآءً حَيۡثُ أَصَابَ</p>
