<div class="single-verse">
  <p><strong>38:61</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُواْ رَبَّنَا مَن قَدَّمَ لَنَا هَٰذَا فَزِدۡهُ عَذَابٗا ضِعۡفٗا فِي ٱلنَّارِ</p>
  <p style="font-size:18px;">61. They will say: "Our Lord! Whoever brought this upon us, add to him a double torment in the Fire!"</p>
