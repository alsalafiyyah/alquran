<div class="single-verse">
  <p><strong>38:30</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَوَهَبۡنَا لِدَاوُۥدَ سُلَيۡمَٰنَۚ نِعۡمَ ٱلۡعَبۡدُ إِنَّهُۥٓ أَوَّابٌ</p>
  <p style="font-size:18px;">30. And to Dâwûd (David) We gave Sulaimân (Solomon). How excellent a slave! Verily, he was ever oft-returning in repentance (to Us)!</p>
