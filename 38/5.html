<div class="single-verse">
  <p><strong>38:5</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَجَعَلَ ٱلۡأٓلِهَةَ إِلَٰهٗا وَٰحِدًاۖ إِنَّ هَٰذَا لَشَيۡءٌ عُجَابٞ</p>
  <p style="font-size:18px;">5. "Has he made the âlihah (gods) (all) into One Ilâh (God - Allâh). Verily, this is a curious thing!"</p>
