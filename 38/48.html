<div class="single-verse">
  <p><strong>38:48</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱذۡكُرۡ إِسۡمَٰعِيلَ وَٱلۡيَسَعَ وَذَا ٱلۡكِفۡلِۖ وَكُلّٞ مِّنَ ٱلۡأَخۡيَارِ</p>
  <p style="font-size:18px;">48. And remember Ismâ‘îl (Ishmael), Alyasa‘ (Elisha), and Dhul-Kifl (Isaiah), all are among the best.</p>
</div>
