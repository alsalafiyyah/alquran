<div class="single-verse">
  <p><strong>38:59</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">هَٰذَا فَوۡجٞ مُّقۡتَحِمٞ مَّعَكُمۡ لَا مَرۡحَبَۢا بِهِمۡۚ إِنَّهُمۡ صَالُواْ ٱلنَّارِ</p>
  <p style="font-size:18px;">59. This is a troop entering with you (in Hell), no welcome for them! Verily, they shall burn in the Fire!</p>
