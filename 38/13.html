<div class="single-verse">
  <p><strong>38:13</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَثَمُودُ وَقَوۡمُ لُوطٖ وَأَصۡحَٰبُ لۡـَٔيۡكَةِۚ أُوْلَٰٓئِكَ ٱلۡأَحۡزَابُ</p>
  <p style="font-size:18px;">13. And Thamûd, and the people of Lût (Lot), and the Dwellers of the Wood: such were the Confederates.</p>
