<div class="single-verse">
  <p><strong>38:20</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَشَدَدۡنَا مُلۡكَهُۥ وَءَاتَيۡنَٰهُ ٱلۡحِكۡمَةَ وَفَصۡلَ ٱلۡخِطَابِ</p>
  <p style="font-size:18px;">20. We made his kingdom strong and gave him Al-Hikmah (Prophethood) and sound judgement in speech and decision.</p>
