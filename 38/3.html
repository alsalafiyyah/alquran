<div class="single-verse">
  <p><strong>38:3</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">كَمۡ أَهۡلَكۡنَا مِن قَبۡلِهِم مِّن قَرۡنٖ فَنَادَواْ وَّلَاتَ حِينَ مَنَاصٖ</p>
  <p style="font-size:18px;">3. How many a generation have We destroyed before them! And they cried out when there was no longer time for escape.</p>
