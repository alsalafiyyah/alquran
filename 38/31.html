<div class="single-verse">
  <p><strong>38:31</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِذۡ عُرِضَ عَلَيۡهِ بِٱلۡعَشِيِّ ٱلصَّٰفِنَٰتُ ٱلۡجِيَادُ</p>
  <p style="font-size:18px;">31. When there were displayed before him, in the afternoon, well trained horses of the highest breed [for Jihâd (holy fighting in Allâh’s Cause)].</p>
