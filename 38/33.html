<div class="single-verse">
  <p><strong>38:33</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">رُدُّوهَا عَلَيَّۖ فَطَفِقَ مَسۡحَۢا بِٱلسُّوقِ وَٱلۡأَعۡنَاقِ</p>
  <p style="font-size:18px;">33. Then he said "Bring them (horses) back to me." Then he began to pass his hand over their legs and their necks (till the end of the display).</p>
