<div class="single-verse">
  <p><strong>38:25</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَغَفَرۡنَا لَهُۥ ذَٰلِكَۖ وَإِنَّ لَهُۥ عِندَنَا لَزُلۡفَىٰ وَحُسۡنَ مَـَٔابٖ</p>
  <p style="font-size:18px;">25. So We forgave him that, and verily, for him is a near access to Us, and a good place of (final) return (Paradise).</p>
