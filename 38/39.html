  <p><strong>38:39</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">هَٰذَا عَطَآؤُنَا فَٱمۡنُنۡ أَوۡ أَمۡسِكۡ بِغَيۡرِ حِسَابٖ</p>
  <p style="font-size:18px;">39. [Allâh said to Sulaimân (Solomon)]: "This is Our gift: so spend you or withhold, no account will be asked (of you)."</p>
