<div class="single-verse">
  <p><strong>38:19</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱلطَّيۡرَ مَحۡشُورَةٗۖ كُلّٞ لَّهُۥٓ أَوَّابٞ</p>
  <p style="font-size:18px;">19. And (so did) the birds assembled: all obedient to him [Dâwûd (David)] [i.e. they came and glorified Allâh’s Praises along with him]. (Tafsir Al-Qurtubi ).</p>
