<div class="single-verse">
  <p><strong>38:62</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَقَالُواْ مَا لَنَا لَا نَرَىٰ رِجَالٗا كُنَّا نَعُدُّهُم مِّنَ ٱلۡأَشۡرَارِ</p>
  <p style="font-size:18px;">62. And they will say: "What is the matter with us that we see not men whom we used to count among the bad ones?"</p>
