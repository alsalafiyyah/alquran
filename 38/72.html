<div class="single-verse">
  <p><strong>38:72</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَإِذَا سَوَّيۡتُهُۥ وَنَفَخۡتُ فِيهِ مِن رُّوحِي فَقَعُواْ لَهُۥ سَٰجِدِينَ</p>
  <p style="font-size:18px;">72. So when I have fashioned him and breathed into him (his) soul created by Me, then you fall down prostrate to him."</p>
