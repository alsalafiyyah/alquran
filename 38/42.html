<div class="single-verse">
  <p><strong>38:42</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱرۡكُضۡ بِرِجۡلِكَۖ هَٰذَا مُغۡتَسَلُۢ بَارِدٞ وَشَرَابٞ</p>
  <p style="font-size:18px;">42. (Allâh said to him): "Strike the ground with your foot: This is (a spring of) water to wash in, cool and a (refreshing) drink."</p>
