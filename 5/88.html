<div class="single-verse">
  <p><strong>5:88</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَكُلُواْ مِمَّا رَزَقَكُمُ ٱللَّهُ حَلَٰلٗا طَيِّبٗاۚ وَٱتَّقُواْ ٱللَّهَ ٱلَّذِيٓ أَنتُم بِهِۦ مُؤۡمِنُونَ</p>
  <p style="font-size:18px;">88. And eat of the things which Allâh has provided for you, lawful and good, and fear Allâh in Whom you believe.</p>
