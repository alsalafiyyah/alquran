<div class="single-verse">
  <p><strong>5:37</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يُرِيدُونَ أَن يَخۡرُجُواْ مِنَ ٱلنَّارِ وَمَا هُم بِخَٰرِجِينَ مِنۡهَاۖ وَلَهُمۡ عَذَابٞ مُّقِيمٞ</p>
  <p style="font-size:18px;">37. They will long to get out of the Fire, but never will they get out therefrom; and theirs will be a lasting torment.</p>
