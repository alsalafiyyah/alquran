<div class="single-verse">
  <p><strong>5:102</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَدۡ سَأَلَهَا قَوۡمٞ مِّن قَبۡلِكُمۡ ثُمَّ أَصۡبَحُواْ بِهَا كَٰفِرِينَ</p>
  <p style="font-size:18px;">102. Before you, a community asked such questions, then on that account they became disbelievers.</p>
