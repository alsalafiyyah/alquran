<div class="single-verse">
  <p><strong>5:98</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱعۡلَمُوٓاْ أَنَّ ٱللَّهَ شَدِيدُ ٱلۡعِقَابِ وَأَنَّ ٱللَّهَ غَفُورٞ رَّحِيمٞ</p>
  <p style="font-size:18px;">98. Know that Allâh is Severe in punishment and that Allâh is Oft-Forgiving, Most Merciful.</p>
