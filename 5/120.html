<div class="single-verse">
  <p><strong>5:120</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لِلَّهِ مُلۡكُ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِ وَمَا فِيهِنَّۚ وَهُوَ عَلَىٰ كُلِّ شَيۡءٖ قَدِيرُۢ</p>
  <p style="font-size:18px;">120. To Allâh belongs the dominion of the heavens and the earth and all that is therein, and He is Able to do all things.</p>
