<div class="single-verse">
  <p><strong>24:9</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱلۡخَٰمِسَةَ أَنَّ غَضَبَ ٱللَّهِ عَلَيۡهَآ إِن كَانَ مِنَ ٱلصَّٰدِقِينَ</p>
  <p style="font-size:18px;">9. And the fifth (testimony) should be that the Wrath of Allâh be upon her if he (her husband) speaks the truth.</p>
