<div class="single-verse">
  <p><strong>24:18</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَيُبَيِّنُ ٱللَّهُ لَكُمُ ٱلۡأٓيَٰتِۚ وَٱللَّهُ عَلِيمٌ حَكِيمٌ</p>
  <p style="font-size:18px;">18. And Allâh makes the Ayât (proofs, evidence, verses, lessons, signs, revelations, etc.) plain to you, and Allâh is All-Knowing, All-Wise.</p>
