<div class="single-verse">
  <p><strong>24:17</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَعِظُكُمُ ٱللَّهُ أَن تَعُودُواْ لِمِثۡلِهِۦٓ أَبَدًا إِن كُنتُم مُّؤۡمِنِينَ</p>
  <p style="font-size:18px;">17. Allâh forbids you from it and warns you not to repeat the like of it forever, if you are believers.</p>
