  <p><strong>24:42</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلِلَّهِ مُلۡكُ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِۖ وَإِلَى ٱللَّهِ ٱلۡمَصِيرُ</p>
  <p style="font-size:18px;">42. And to Allâh belongs the sovereignty of the heavens and the earth, and to Allâh is the return (of all).</p>
