<div class="single-verse">
  <p><strong>24:5</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِلَّا ٱلَّذِينَ تَابُواْ مِنۢ بَعۡدِ ذَٰلِكَ وَأَصۡلَحُواْ فَإِنَّ ٱللَّهَ غَفُورٞ رَّحِيمٞ</p>
  <p style="font-size:18px;">5. Except those who repent thereafter and do righteous deeds; (for such) verily, Allâh is Oft-Forgiving, Most Merciful.</p>
</div>
