<div class="single-verse">
  <p><strong>64:15</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّمَآ أَمۡوَٰلُكُمۡ وَأَوۡلَٰدُكُمۡ فِتۡنَةٞۚ وَٱللَّهُ عِندَهُۥٓ أَجۡرٌ عَظِيمٞ</p>
  <p style="font-size:18px;">15. Your wealth and your children are only a trial, whereas Allâh! With Him is a great reward (Paradise).</p>
