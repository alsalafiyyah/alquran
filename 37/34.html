  <p><strong>37:34</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّا كَذَٰلِكَ نَفۡعَلُ بِٱلۡمُجۡرِمِينَ</p>
  <p style="font-size:18px;">34. Certainly, that is how We deal with Al-Mujrimûn (polytheists, sinners, disbelievers, criminals, the disobedient to Allâh).</p>
