<div class="single-verse">
  <p><strong>37:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَّا يَسَّمَّعُونَ إِلَى ٱلۡمَلَإِ ٱلۡأَعۡلَىٰ وَيُقۡذَفُونَ مِن كُلِّ جَانِبٖ</p>
  <p style="font-size:18px;">8. They cannot listen to the higher group (angels) for they are pelted from every side.</p>
