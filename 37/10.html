<div class="single-verse">
  <p><strong>37:10</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِلَّا مَنۡ خَطِفَ ٱلۡخَطۡفَةَ فَأَتۡبَعَهُۥ شِهَابٞ ثَاقِبٞ</p>
  <p style="font-size:18px;">10. Except such as snatch away something by stealing, and they are pursued by a flaming fire of piercing brightness.</p>
