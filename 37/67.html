<div class="single-verse">
  <p><strong>37:67</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ثُمَّ إِنَّ لَهُمۡ عَلَيۡهَا لَشَوۡبٗا مِّنۡ حَمِيمٖ</p>
  <p style="font-size:18px;">67. Then on the top of that they will be given boiling water to drink so that it becomes a mixture (of boiling water and Zaqqûm in their bellies).</p>
