<div class="single-verse">
  <p><strong>37:97</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُواْ ٱبۡنُواْ لَهُۥ بُنۡيَٰنٗا فَأَلۡقُوهُ فِي ٱلۡجَحِيمِ</p>
  <p style="font-size:18px;">97. They said: "Build for him a building (it is said that the building was like a furnace) and throw him into the blazing fire!"</p>
