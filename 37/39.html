<div class="single-verse">
  <p><strong>37:39</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمَا تُجۡزَوۡنَ إِلَّا مَا كُنتُمۡ تَعۡمَلُونَ</p>
  <p style="font-size:18px;">39. And you will be requited nothing except for what you used to do (evil deeds, sins, and Allâh’s disobedience which you used to do in this world)</p>
