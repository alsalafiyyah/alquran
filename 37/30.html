  <p><strong>37:30</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمَا كَانَ لَنَا عَلَيۡكُم مِّن سُلۡطَٰنِۭۖ بَلۡ كُنتُمۡ قَوۡمٗا طَٰغِينَ</p>
  <p style="font-size:18px;">30. "And we had no authority over you. Nay! But you were Tâghûn (transgressing) people (polytheists, and disbelievers).</p>
