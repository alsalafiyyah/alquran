<div class="single-verse">
  <p><strong>37:149</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَٱسۡتَفۡتِهِمۡ أَلِرَبِّكَ ٱلۡبَنَاتُ وَلَهُمُ ٱلۡبَنُونَ</p>
  <p style="font-size:18px;">149. Now ask them (O Muhammad صلى الله عليه وسلم): "Are there (only) daughters for your Lord and sons for them?"</p>
