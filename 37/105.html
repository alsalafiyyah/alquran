<div class="single-verse">
  <p><strong>37:105</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَدۡ صَدَّقۡتَ ٱلرُّءۡيَآۚ إِنَّا كَذَٰلِكَ نَجۡزِي ٱلۡمُحۡسِنِينَ</p>
  <p style="font-size:18px;">105. You have fulfilled the dream!" Verily thus do We reward the Muhsinûn (good-doers - See 2:112).</p>
