<div class="single-verse">
  <p><strong>37:177</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَإِذَا نَزَلَ بِسَاحَتِهِمۡ فَسَآءَ صَبَاحُ ٱلۡمُنذَرِينَ</p>
  <p style="font-size:18px;">177. Then, when it descends in their courtyard (i.e. near to them), evil will be the morning for those who had been warned!</p>
