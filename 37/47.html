<div class="single-verse">
  <p><strong>37:47</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَا فِيهَا غَوۡلٞ وَلَا هُمۡ عَنۡهَا يُنزَفُونَ</p>
  <p style="font-size:18px;">47. Neither will they have Ghoul (any kind of hurt, abdominal pain, headache, a sin) from that, nor will they suffer intoxication therefrom.</p>
