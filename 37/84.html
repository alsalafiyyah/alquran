<div class="single-verse">
  <p><strong>37:84</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِذۡ جَآءَ رَبَّهُۥ بِقَلۡبٖ سَلِيمٍ</p>
  <p style="font-size:18px;">84. When he came to his Lord with a pure heart [attached to Allâh Alone and none else, worshipping none but Allâh Alone - true Islâmic Monotheism, pure from the filth of polytheism].</p>
