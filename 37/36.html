<div class="single-verse">
  <p><strong>37:36</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَيَقُولُونَ أَئِنَّا لَتَارِكُوٓاْ ءَالِهَتِنَا لِشَاعِرٖ مَّجۡنُونِۭ</p>
  <p style="font-size:18px;">36. And (they) said: "Are we going to abandon our âlihah (gods) for the sake of a mad poet?"</p>
