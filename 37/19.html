  <p><strong>37:19</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَإِنَّمَا هِيَ زَجۡرَةٞ وَٰحِدَةٞ فَإِذَا هُمۡ يَنظُرُونَ</p>
  <p style="font-size:18px;">19. It will be a single Zajrah [shout (i.e. the second blowing of the Trumpet)], and behold, they will be staring!</p>
