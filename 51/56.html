  <p><strong>51:56</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمَا خَلَقۡتُ ٱلۡجِنَّ وَٱلۡإِنسَ إِلَّا لِيَعۡبُدُونِ</p>
  <p style="font-size:18px;">56. And I (Allâh) created not the jinn and mankind except that they should worship Me (Alone).</p>
