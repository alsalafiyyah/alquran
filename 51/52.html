<div class="single-verse">
  <p><strong>51:52</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">كَذَٰلِكَ مَآ أَتَى ٱلَّذِينَ مِن قَبۡلِهِم مِّن رَّسُولٍ إِلَّا قَالُواْ سَاحِرٌ أَوۡ مَجۡنُونٌ</p>
  <p style="font-size:18px;">52. Likewise, no Messenger came to those before them but they said: "A sorcerer or a madman!"</p>
