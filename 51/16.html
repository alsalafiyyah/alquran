<div class="single-verse">
  <p><strong>51:16</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ءَاخِذِينَ مَآ ءَاتَىٰهُمۡ رَبُّهُمۡۚ إِنَّهُمۡ كَانُواْ قَبۡلَ ذَٰلِكَ مُحۡسِنِينَ</p>
  <p style="font-size:18px;">16. Taking joy in the things which their Lord has given them. Verily, they were before this Muhsinûn (good-doers. See V.2:112).</p>
