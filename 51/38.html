<div class="single-verse">
  <p><strong>51:38</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَفِي مُوسَىٰٓ إِذۡ أَرۡسَلۡنَٰهُ إِلَىٰ فِرۡعَوۡنَ بِسُلۡطَٰنٖ مُّبِينٖ</p>
  <p style="font-size:18px;">38. And in Mûsâ (Moses) (too, there is a sign), when We sent him to Fir‘aun (Pharaoh) with a manifest authority.</p>
