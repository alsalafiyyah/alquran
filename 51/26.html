<div class="single-verse">
  <p><strong>51:26</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَرَاغَ إِلَىٰٓ أَهۡلِهِۦ فَجَآءَ بِعِجۡلٖ سَمِينٖ</p>
  <p style="font-size:18px;">26. Then he turned to his household, and brought out a roasted calf [as the property of Ibrâhîm (Abraham) was mainly cows].</p>
