<div class="single-verse">
  <p><strong>51:36</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَمَا وَجَدۡنَا فِيهَا غَيۡرَ بَيۡتٖ مِّنَ ٱلۡمُسۡلِمِينَ</p>
  <p style="font-size:18px;">36. But We found not there any household of the Muslims except one [of Lût (Lot) and his two daughters].</p>
