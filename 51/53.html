<div class="single-verse">
  <p><strong>51:53</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَتَوَاصَوۡاْ بِهِۦۚ بَلۡ هُمۡ قَوۡمٞ طَاغُونَ</p>
  <p style="font-size:18px;">53. Have they (the people of the past) transmitted this saying to these (Quraish pagans)? Nay, they are themselves a people transgressing beyond bounds (in disbelief)!</p>
