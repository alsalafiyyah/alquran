  <p><strong>51:14</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ذُوقُواْ فِتۡنَتَكُمۡ هَٰذَا ٱلَّذِي كُنتُم بِهِۦ تَسۡتَعۡجِلُونَ</p>
