<div class="single-verse">
  <p><strong>51:24</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">هَلۡ أَتَىٰكَ حَدِيثُ ضَيۡفِ إِبۡرَٰهِيمَ ٱلۡمُكۡرَمِينَ</p>
  <p style="font-size:18px;">24. Has the story reached you, of the honoured guests [three angels; Jibrîl (Gabriel) along with another two] of Ibrâhîm (Abraham)?</p>
