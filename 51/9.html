<div class="single-verse">
  <p><strong>51:9</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يُؤۡفَكُ عَنۡهُ مَنۡ أُفِكَ</p>
  <p style="font-size:18px;">9. Turned aside therefrom (i.e. from Muhammad صلى الله عليه وسلم and the Qur’ân) is he who is turned aside (by the Decree and Preordainment القضاء والقدر of Allâh).</p>
