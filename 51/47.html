  <p><strong>51:47</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱلسَّمَآءَ بَنَيۡنَٰهَا بِأَيۡيْدٖ وَإِنَّا لَمُوسِعُونَ</p>
