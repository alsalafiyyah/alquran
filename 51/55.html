<div class="single-verse">
  <p><strong>51:55</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَذَكِّرۡ فَإِنَّ ٱلذِّكۡرَىٰ تَنفَعُ ٱلۡمُؤۡمِنِينَ</p>
  <p style="font-size:18px;">55. And remind (by preaching the Qur’ân, O Muhammad صلى الله عليه وسلم), for verily, the reminding profits the believers.</p>
