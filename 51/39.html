<div class="single-verse">
  <p><strong>51:39</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَتَوَلَّىٰ بِرُكۡنِهِۦ وَقَالَ سَٰحِرٌ أَوۡ مَجۡنُونٞ</p>
  <p style="font-size:18px;">39. But [Fir‘aun (Pharaoh)] turned away (from Belief in might) along with his hosts, and said: "A sorcerer, or a madman."</p>
