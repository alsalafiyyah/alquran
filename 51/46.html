<div class="single-verse">
  <p><strong>51:46</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَقَوۡمَ نُوحٖ مِّن قَبۡلُۖ إِنَّهُمۡ كَانُواْ قَوۡمٗا فَٰسِقِينَ</p>
  <p style="font-size:18px;">46. (So were) the people of Nûh (Noah) before them. Verily, they were a people who were Fâsiqûn (rebellious, disobedient to Allâh).</p>
