<div class="single-verse">
  <p><strong>51:42</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">مَا تَذَرُ مِن شَيۡءٍ أَتَتۡ عَلَيۡهِ إِلَّا جَعَلَتۡهُ كَٱلرَّمِيمِ</p>
  <p style="font-size:18px;">42. It spared nothing that it reached, but blew it into broken spreads of rotten ruins.</p>
