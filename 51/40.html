<div class="single-verse">
  <p><strong>51:40</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَأَخَذۡنَٰهُ وَجُنُودَهُۥ فَنَبَذۡنَٰهُمۡ فِي ٱلۡيَمِّ وَهُوَ مُلِيمٞ</p>
  <p style="font-size:18px;">40. So We took him and his hosts, and dumped them into the sea, for he was blameworthy.</p>
