<div class="single-verse">
  <p><strong>51:54</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَتَوَلَّ عَنۡهُمۡ فَمَآ أَنتَ بِمَلُومٖ</p>
  <p style="font-size:18px;">54. So turn away (O Muhammad صلى الله عليه وسلم) from them (Quraish pagans), you are not blame-worthy (as you have conveyed Allâh’s Message).</p>
