<div class="single-verse">
  <p><strong>70:44</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">خَٰشِعَةً أَبۡصَٰرُهُمۡ تَرۡهَقُهُمۡ ذِلَّةٞۚ ذَٰلِكَ ٱلۡيَوۡمُ ٱلَّذِي كَانُواْ يُوعَدُونَ</p>
  <p style="font-size:18px;">44. With their eyes lowered in fear and humility, ignominy covering them (all over)! That is the Day which they were promised!</p>
