<div class="single-verse">
  <p><strong>70:30</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِلَّا عَلَىٰٓ أَزۡوَٰجِهِمۡ أَوۡ مَا مَلَكَتۡ أَيۡمَٰنُهُمۡ فَإِنَّهُمۡ غَيۡرُ مَلُومِينَ</p>
  <p style="font-size:18px;">30. Except from their wives or the (women slaves) whom their right hands possess - for (then) they are not blameworthy.</p>
