<div class="single-verse">
  <p><strong>70:4</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">تَعۡرُجُ ٱلۡمَلَٰٓئِكَةُ وَٱلرُّوحُ إِلَيۡهِ فِي يَوۡمٖ كَانَ مِقۡدَارُهُۥ خَمۡسِينَ أَلۡفَ سَنَةٖ</p>
  <p style="font-size:18px;">4. The angels and the Rûh [Jibrîl (Gabriel)] ascend to Him in a Day the measure whereof is fifty thousand years.</p>
