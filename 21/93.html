<div class="single-verse">
  <p><strong>21:93</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَتَقَطَّعُوٓاْ أَمۡرَهُم بَيۡنَهُمۡۖ كُلٌّ إِلَيۡنَا رَٰجِعُونَ</p>
  <p style="font-size:18px;">93. But they have broken up and differed as regards their religion among themselves. (And) they all shall return to Us.</p>
