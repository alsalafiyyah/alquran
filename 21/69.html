  <p><strong>21:69</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قُلۡنَا يَٰنَارُ كُونِي بَرۡدٗا وَسَلَٰمًا عَلَىٰٓ إِبۡرَٰهِيمَ</p>
  <p style="font-size:18px;">69. We (Allâh) said: "O fire! Be you coolness and safety for Ibrâhîm (Abraham)!"</p>
