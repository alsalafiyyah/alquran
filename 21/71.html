<div class="single-verse">
  <p><strong>21:71</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَنَجَّيۡنَٰهُ وَلُوطًا إِلَى ٱلۡأَرۡضِ ٱلَّتِي بَٰرَكۡنَا فِيهَا لِلۡعَٰلَمِينَ</p>
  <p style="font-size:18px;">71. And We rescued him and Lût (Lot) to the land which We have blessed for the ‘Âlamîn (mankind and jinn).</p>
