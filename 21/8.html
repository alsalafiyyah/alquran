<div class="single-verse">
  <p><strong>21:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمَا جَعَلۡنَٰهُمۡ جَسَدٗا لَّا يَأۡكُلُونَ ٱلطَّعَامَ وَمَا كَانُواْ خَٰلِدِينَ</p>
  <p style="font-size:18px;">8. And We did not create them (the Messengers, with) bodies that ate not food, nor were they immortals.</p>
