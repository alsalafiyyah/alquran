  <p><strong>21:14</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُواْ يَٰوَيۡلَنَآ إِنَّا كُنَّا ظَٰلِمِينَ</p>
  <p style="font-size:18px;">14. They cried: "Woe to us! Certainly we have been Zâlimûn (polytheists, wrong-doers and disbelievers in the Oneness of Allâh)."</p>
