<div class="single-verse">
  <p><strong>21:11</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَكَمۡ قَصَمۡنَا مِن قَرۡيَةٖ كَانَتۡ ظَالِمَةٗ وَأَنشَأۡنَا بَعۡدَهَا قَوۡمًا ءَاخَرِينَ</p>
  <p style="font-size:18px;">11. How many a town (community) given to wrong-doing, have We destroyed, and raised up after them another people!</p>
