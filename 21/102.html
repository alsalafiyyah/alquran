<div class="single-verse">
  <p><strong>21:102</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَا يَسۡمَعُونَ حَسِيسَهَاۖ وَهُمۡ فِي مَا ٱشۡتَهَتۡ أَنفُسُهُمۡ خَٰلِدُونَ</p>
  <p style="font-size:18px;">102. They shall not hear the slightest sound of it (Hell), while they abide in that which their ownselves desire.</p>
