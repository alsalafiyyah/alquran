<div class="single-verse">
  <p><strong>21:111</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِنۡ أَدۡرِي لَعَلَّهُۥ فِتۡنَةٞ لَّكُمۡ وَمَتَٰعٌ إِلَىٰ حِينٖ</p>
  <p style="font-size:18px;">111. And I know not, perhaps it may be a trial for you, and an enjoyment for a while.</p>
