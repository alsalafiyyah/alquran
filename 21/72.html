<div class="single-verse">
  <p><strong>21:72</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَوَهَبۡنَا لَهُۥٓ إِسۡحَٰقَ وَيَعۡقُوبَ نَافِلَةٗۖ وَكُلّٗا جَعَلۡنَا صَٰلِحِينَ</p>
  <p style="font-size:18px;">72. And We bestowed upon him Ishâq (Isaac), and (a grandson) Ya‘qûb (Jacob). Each one We made righteous.</p>
