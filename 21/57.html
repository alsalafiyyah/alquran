  <p><strong>21:57</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَتَٱللَّهِ لَأَكِيدَنَّ أَصۡنَٰمَكُم بَعۡدَ أَن تُوَلُّواْ مُدۡبِرِينَ</p>
  <p style="font-size:18px;">57. "And by Allâh, I shall plot a plan (to destroy) your idols after you have gone away and turned your backs."</p>
