<div class="single-verse">
  <p><strong>21:107</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمَآ أَرۡسَلۡنَٰكَ إِلَّا رَحۡمَةٗ لِّلۡعَٰلَمِينَ</p>
  <p style="font-size:18px;">107. And We have sent you (O Muhammad صلى الله عليه وسلم): not but as a mercy for the ‘Âlamîn (mankind, jinn and all that exists).</p>
