<div class="single-verse">
  <p><strong>21:99</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَوۡ كَانَ هَٰٓؤُلَآءِ ءَالِهَةٗ مَّا وَرَدُوهَاۖ وَكُلّٞ فِيهَا خَٰلِدُونَ</p>
  <p style="font-size:18px;">99. Had these (idols) been âlihah (gods), they would not have entered there (Hell), and all of them will abide therein.</p>
