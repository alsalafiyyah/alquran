  <p><strong>21:86</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَأَدۡخَلۡنَٰهُمۡ فِي رَحۡمَتِنَآۖ إِنَّهُم مِّنَ ٱلصَّٰلِحِينَ</p>
