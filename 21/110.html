<div class="single-verse">
  <p><strong>21:110</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّهُۥ يَعۡلَمُ ٱلۡجَهۡرَ مِنَ ٱلۡقَوۡلِ وَيَعۡلَمُ مَا تَكۡتُمُونَ</p>
  <p style="font-size:18px;">110. (Say O Muhammad صلى الله عليه وسلم): Verily, He (Allâh) knows that which is spoken aloud (openly) and that which you conceal.</p>
