<div class="single-verse">
  <p><strong>21:65</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ثُمَّ نُكِسُواْ عَلَىٰ رُءُوسِهِمۡ لَقَدۡ عَلِمۡتَ مَا هَٰٓؤُلَآءِ يَنطِقُونَ</p>
  <p style="font-size:18px;">65. Then they turned to themselves (their first thought and said): "Indeed you [Ibrâhîm (Abraham)] know well that these (idols) speak not!"</p>
