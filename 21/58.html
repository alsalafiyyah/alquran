<div class="single-verse">
  <p><strong>21:58</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَجَعَلَهُمۡ جُذَٰذًا إِلَّا كَبِيرٗا لَّهُمۡ لَعَلَّهُمۡ إِلَيۡهِ يَرۡجِعُونَ</p>
  <p style="font-size:18px;">58. So he broke them to pieces, (all) except the biggest of them, that they might turn to it.</p>
