<div class="single-verse">
  <p><strong>21:32</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَجَعَلۡنَا ٱلسَّمَآءَ سَقۡفٗا مَّحۡفُوظٗاۖ وَهُمۡ عَنۡ ءَايَٰتِهَا مُعۡرِضُونَ</p>
  <p style="font-size:18px;">32. And We have made the heaven a roof, safe and well guarded. Yet they turn away from its signs (i.e. sun, moon, winds, clouds, etc.).</p>
