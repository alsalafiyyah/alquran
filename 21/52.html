<div class="single-verse">
  <p><strong>21:52</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِذۡ قَالَ لِأَبِيهِ وَقَوۡمِهِۦ مَا هَٰذِهِ ٱلتَّمَاثِيلُ ٱلَّتِيٓ أَنتُمۡ لَهَا عَٰكِفُونَ</p>
  <p style="font-size:18px;">52. When he said to his father and his people: "What are these images, to which you are devoted?"</p>
