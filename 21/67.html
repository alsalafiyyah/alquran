<div class="single-verse">
  <p><strong>21:67</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أُفّٖ لَّكُمۡ وَلِمَا تَعۡبُدُونَ مِن دُونِ ٱللَّهِۚ أَفَلَا تَعۡقِلُونَ</p>
  <p style="font-size:18px;">67. "Fie upon you, and upon that which you worship besides Allâh! Have you then no sense?"</p>
