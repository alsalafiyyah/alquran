<div class="single-verse">
  <p><strong>21:33</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَهُوَ ٱلَّذِي خَلَقَ ٱلَّيۡلَ وَٱلنَّهَارَ وَٱلشَّمۡسَ وَٱلۡقَمَرَۖ كُلّٞ فِي فَلَكٖ يَسۡبَحُونَ</p>
  <p style="font-size:18px;">33. And He it is Who has created the night and the day, and the sun and the moon, each in an orbit floating.</p>
