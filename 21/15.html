  <p><strong>21:15</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَمَا زَالَت تِّلۡكَ دَعۡوَىٰهُمۡ حَتَّىٰ جَعَلۡنَٰهُمۡ حَصِيدًا خَٰمِدِينَ</p>
  <p style="font-size:18px;">15. And that cry of theirs ceased not, till We made them as a field that is reaped, extinct (dead).</p>
