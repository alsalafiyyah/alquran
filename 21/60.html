<div class="single-verse">
  <p><strong>21:60</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُواْ سَمِعۡنَا فَتٗى يَذۡكُرُهُمۡ يُقَالُ لَهُۥٓ إِبۡرَٰهِيمُ</p>
  <p style="font-size:18px;">60. They said: "We heard a young man talking against them, who is called Ibrâhîm (Abraham)."</p>
