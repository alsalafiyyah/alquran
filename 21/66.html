<div class="single-verse">
  <p><strong>21:66</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ أَفَتَعۡبُدُونَ مِن دُونِ ٱللَّهِ مَا لَا يَنفَعُكُمۡ شَيۡـٔٗا وَلَا يَضُرُّكُمۡ</p>
  <p style="font-size:18px;">66. [Ibrâhîm (Abraham)] said: "Do you then worship besides Allâh, things that can neither profit you, nor harm you?</p>
