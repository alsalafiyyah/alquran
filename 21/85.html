<div class="single-verse">
  <p><strong>21:85</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِسۡمَٰعِيلَ وَإِدۡرِيسَ وَذَا ٱلۡكِفۡلِۖ كُلّٞ مِّنَ ٱلصَّٰبِرِينَ</p>
  <p style="font-size:18px;">85. And (remember) Ismâ‘îl (Ishmael), and Idrîs (Enoch) and Dhul-Kifl (Isaiah): all were from among As-Sâbirûn (the patient).</p>
</div>
