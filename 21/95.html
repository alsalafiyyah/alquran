<div class="single-verse">
  <p><strong>21:95</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَحَرَٰمٌ عَلَىٰ قَرۡيَةٍ أَهۡلَكۡنَٰهَآ أَنَّهُمۡ لَا يَرۡجِعُونَ</p>
  <p style="font-size:18px;">95. And a ban is laid on every town (population) which We have destroyed that they shall not return (to this world again, nor repent to Us).</p>
