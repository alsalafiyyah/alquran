<div class="single-verse">
  <p><strong>21:59</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُواْ مَن فَعَلَ هَٰذَا بِـَٔالِهَتِنَآ إِنَّهُۥ لَمِنَ ٱلظَّٰلِمِينَ</p>
  <p style="font-size:18px;">59. They said: "Who has done this to our âlihah (gods)? He must indeed be one of the Zâlimun (wrong-doers)."</p>
