  <p><strong>21:55</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُوٓاْ أَجِئۡتَنَا بِٱلۡحَقِّ أَمۡ أَنتَ مِنَ ٱللَّٰعِبِينَ</p>
  <p style="font-size:18px;">55. They said: "Have you brought us the truth, or are you one of those who play about?"</p>
