<div class="single-verse">
  <p><strong>21:64</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَرَجَعُوٓاْ إِلَىٰٓ أَنفُسِهِمۡ فَقَالُوٓاْ إِنَّكُمۡ أَنتُمُ ٱلظَّٰلِمُونَ</p>
  <p style="font-size:18px;">64. So they turned to themselves and said: "Verily, you are the Zâlimûn (polytheists and wrong-doers)."</p>
