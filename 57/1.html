<div class="single-verse">
  <p><strong>57:1</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">سَبَّحَ لِلَّهِ مَا فِي ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِۖ وَهُوَ ٱلۡعَزِيزُ ٱلۡحَكِيمُ</p>
  <p style="font-size:18px;">1. Whatsoever is in the heavens and the earth glorifies Allâh - and He is the All-Mighty, All-Wise.</p>
