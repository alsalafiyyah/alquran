  <p><strong>57:5</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَّهُۥ مُلۡكُ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِۚ وَإِلَى ٱللَّهِ تُرۡجَعُ ٱلۡأُمُورُ</p>
  <p style="font-size:18px;">5. His is the kingdom of the heavens and the earth. And to Allâh return all the matters (for decision).</p>
