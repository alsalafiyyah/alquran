<div class="single-verse">
  <p><strong>75:40</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَلَيۡسَ ذَٰلِكَ بِقَٰدِرٍ عَلَىٰٓ أَن يُحۡـِۧيَ ٱلۡمَوۡتَىٰ</p>
  <p style="font-size:18px;">40. Is not He (Allâh Who does that) Able to give life to the dead? (Yes! He is Able to do all things).</p>
