<div class="single-verse">
  <p><strong>75:13</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يُنَبَّؤُاْ ٱلۡإِنسَٰنُ يَوۡمَئِذِۭ بِمَا قَدَّمَ وَأَخَّرَ</p>
  <p style="font-size:18px;">13. On that Day man will be informed of what he sent forward (of his evil good deeds), and what he left behind (of his good or evil traditions).</p>
