<div class="single-verse">
  <p><strong>75:17</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ عَلَيۡنَا جَمۡعَهُۥ وَقُرۡءَانَهُۥ</p>
  <p style="font-size:18px;">17. It is for Us to collect it and to give you (O Muhammad صلى الله عليه وسلم) the ability to recite it (the Qur’ân).</p>
