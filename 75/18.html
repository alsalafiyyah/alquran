<div class="single-verse">
  <p><strong>75:18</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَإِذَا قَرَأۡنَٰهُ فَٱتَّبِعۡ قُرۡءَانَهُۥ</p>
  <p style="font-size:18px;">18. And when We have recited it to you [O Muhammad صلى الله عليه وسلم through Jibrîl (Gabriel)], then follow its (the Qur’an’s) recital.</p>
