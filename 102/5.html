  <p><strong>102:5</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">كَلَّا لَوۡ تَعۡلَمُونَ عِلۡمَ ٱلۡيَقِينِ</p>
  <p style="font-size:18px;">5. Nay! If you knew with a sure knowledge (the end result of piling up, you would not have been occupied yourselves in worldly things).</p>
