<div class="single-verse">
  <p><strong>26:111</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">۞ قَالُوٓاْ أَنُؤۡمِنُ لَكَ وَٱتَّبَعَكَ ٱلۡأَرۡذَلُونَ</p>
  <p style="font-size:18px;">111. They said: "Shall we believe in you, when the meanest (of the people) follow you?"</p>
