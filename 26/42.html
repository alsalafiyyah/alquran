  <p><strong>26:42</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ نَعَمۡ وَإِنَّكُمۡ إِذٗا لَّمِنَ ٱلۡمُقَرَّبِينَ</p>
  <p style="font-size:18px;">42. He said: "Yes, and you shall then verily be of those brought near (to myself)."</p>
