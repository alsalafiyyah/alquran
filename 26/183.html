  <p><strong>26:183</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَا تَبۡخَسُواْ ٱلنَّاسَ أَشۡيَآءَهُمۡ وَلَا تَعۡثَوۡاْ فِي ٱلۡأَرۡضِ مُفۡسِدِينَ</p>
