<div class="single-verse">
  <p><strong>26:6</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَقَدۡ كَذَّبُواْ فَسَيَأۡتِيهِمۡ أَنۢبَٰٓؤُاْ مَا كَانُواْ بِهِۦ يَسۡتَهۡزِءُونَ</p>
  <p style="font-size:18px;">6. So they have indeed denied (the truth - this Qur’ân), then the news of what they mocked at will come to them.</p>
