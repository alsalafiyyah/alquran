<div class="single-verse">
  <p><strong>26:27</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ إِنَّ رَسُولَكُمُ ٱلَّذِيٓ أُرۡسِلَ إِلَيۡكُمۡ لَمَجۡنُونٞ</p>
  <p style="font-size:18px;">27. [Fir‘aun (Pharaoh)] said: "Verily, your Messenger who has been sent to you is a madman!"</p>
