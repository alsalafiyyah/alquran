  <p><strong>26:35</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يُرِيدُ أَن يُخۡرِجَكُم مِّنۡ أَرۡضِكُم بِسِحۡرِهِۦ فَمَاذَا تَأۡمُرُونَ</p>
  <p style="font-size:18px;">35. "He wants to drive you out of your land by his sorcery: what is it then that you command?"</p>
