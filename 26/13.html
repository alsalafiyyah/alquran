  <p><strong>26:13</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَيَضِيقُ صَدۡرِي وَلَا يَنطَلِقُ لِسَانِي فَأَرۡسِلۡ إِلَىٰ هَٰرُونَ</p>
  <p style="font-size:18px;">13. "And my breast straitens, and my tongue expresses not well. So send for Hârûn (Aaron) (to come along with me).</p>
