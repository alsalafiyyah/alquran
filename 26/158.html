<div class="single-verse">
  <p><strong>26:158</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَأَخَذَهُمُ ٱلۡعَذَابُۚ إِنَّ فِي ذَٰلِكَ لَأٓيَةٗۖ وَمَا كَانَ أَكۡثَرُهُم مُّؤۡمِنِينَ</p>
  <p style="font-size:18px;">158. So the torment overtook them. Verily, in this is indeed a sign, yet most of them are not believers.</p>
