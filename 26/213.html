<div class="single-verse">
  <p><strong>26:213</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَلَا تَدۡعُ مَعَ ٱللَّهِ إِلَٰهًا ءَاخَرَ فَتَكُونَ مِنَ ٱلۡمُعَذَّبِينَ</p>
  <p style="font-size:18px;">213. So invoke not with Allâh another ilâh (god) lest you should be among those who receive punishment.</p>
