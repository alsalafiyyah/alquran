<div class="single-verse">
  <p><strong>26:40</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَعَلَّنَا نَتَّبِعُ ٱلسَّحَرَةَ إِن كَانُواْ هُمُ ٱلۡغَٰلِبِينَ</p>
  <p style="font-size:18px;">40. "That we may follow the sorcerers [who were on Fir‘aun’s (Pharaoh) religion of disbelief] if they are the winners."</p>
