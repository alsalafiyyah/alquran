<div class="single-verse">
  <p><strong>26:61</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَلَمَّا تَرَٰٓءَا ٱلۡجَمۡعَانِ قَالَ أَصۡحَٰبُ مُوسَىٰٓ إِنَّا لَمُدۡرَكُونَ</p>
  <p style="font-size:18px;">61. And when the two hosts saw each other, the companions of Mûsâ (Moses) said: "We are sure to be overtaken."</p>
