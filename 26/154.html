<div class="single-verse">
  <p><strong>26:154</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">مَآ أَنتَ إِلَّا بَشَرٞ مِّثۡلُنَا فَأۡتِ بِـَٔايَةٍ إِن كُنتَ مِنَ ٱلصَّٰدِقِينَ</p>
  <p style="font-size:18px;">154. "You are but a human being like us. Then bring us a sign if you are of the truthful."</p>
