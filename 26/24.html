<div class="single-verse">
  <p><strong>26:24</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ رَبُّ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِ وَمَا بَيۡنَهُمَآۖ إِن كُنتُم مُّوقِنِينَ</p>
  <p style="font-size:18px;">24. [Mûsâ (Moses)] said: "The Lord of the heavens and the earth, and all that is between them, if you seek to be convinced with certainty."</p>
