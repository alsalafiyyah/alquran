<div class="single-verse">
  <p><strong>26:118</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَٱفۡتَحۡ بَيۡنِي وَبَيۡنَهُمۡ فَتۡحٗا وَنَجِّنِي وَمَن مَّعِيَ مِنَ ٱلۡمُؤۡمِنِينَ</p>
  <p style="font-size:18px;">118. Therefore judge You between me and them, and save me and those of the believers who are with me."</p>
