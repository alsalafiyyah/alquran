<div class="single-verse">
  <p><strong>26:29</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ لَئِنِ ٱتَّخَذۡتَ إِلَٰهًا غَيۡرِي لَأَجۡعَلَنَّكَ مِنَ ٱلۡمَسۡجُونِينَ</p>
  <p style="font-size:18px;">29. [Fir‘aun (Pharaoh)] said: "If you choose an ilâh (god) other than me, I will certainly put you among the prisoners."</p>
