<div class="single-verse">
  <p><strong>26:92</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَقِيلَ لَهُمۡ أَيۡنَ مَا كُنتُمۡ تَعۡبُدُونَ</p>
  <p style="font-size:18px;">92. And it will be said to them: "Where are those (the false gods whom you used to set up as rivals with Allâh) that you used to worship.</p>
