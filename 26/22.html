  <p><strong>26:22</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَتِلۡكَ نِعۡمَةٞ تَمُنُّهَا عَلَيَّ أَنۡ عَبَّدتَّ بَنِيٓ إِسۡرَٰٓءِيلَ</p>
