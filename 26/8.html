<div class="single-verse">
  <p><strong>26:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ فِي ذَٰلِكَ لَأٓيَةٗۖ وَمَا كَانَ أَكۡثَرُهُم مُّؤۡمِنِينَ</p>
  <p style="font-size:18px;">8. Verily, in this is an Ayâh (proof or sign), yet most of them (polytheists, pagans who do not believe in Resurrection) are not believers.</p>
