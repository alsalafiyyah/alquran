  <p><strong>26:136</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُواْ سَوَآءٌ عَلَيۡنَآ أَوَعَظۡتَ أَمۡ لَمۡ تَكُن مِّنَ ٱلۡوَٰعِظِينَ</p>
  <p style="font-size:18px;">136. They said: "It is the same to us whether you preach or be not of those who preach.</p>
