<div class="single-verse">
  <p><strong>26:166</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَتَذَرُونَ مَا خَلَقَ لَكُمۡ رَبُّكُم مِّنۡ أَزۡوَٰجِكُمۚ بَلۡ أَنتُمۡ قَوۡمٌ عَادُونَ</p>
  <p style="font-size:18px;">166. "And leave those whom Allâh has created for you to be your wives? Nay, you are a trespassing people!"</p>
