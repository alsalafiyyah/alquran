<div class="single-verse">
  <p><strong>26:5</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمَا يَأۡتِيهِم مِّن ذِكۡرٖ مِّنَ ٱلرَّحۡمَٰنِ مُحۡدَثٍ إِلَّا كَانُواْ عَنۡهُ مُعۡرِضِينَ</p>
  <p style="font-size:18px;">5. And never comes there unto them a Reminder as a recent revelation from the Most Gracious (Allâh), but they turn away therefrom.</p>
</div>
