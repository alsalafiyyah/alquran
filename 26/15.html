  <p><strong>26:15</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ كَلَّاۖ فَٱذۡهَبَا بِـَٔايَٰتِنَآۖ إِنَّا مَعَكُم مُّسۡتَمِعُونَ</p>
  <p style="font-size:18px;">15. (Allâh) said: "Nay! Go you both with Our Signs. Verily We shall be with you, listening.</p>
