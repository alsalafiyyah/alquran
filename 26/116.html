<div class="single-verse">
  <p><strong>26:116</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُواْ لَئِن لَّمۡ تَنتَهِ يَٰنُوحُ لَتَكُونَنَّ مِنَ ٱلۡمَرۡجُومِينَ</p>
  <p style="font-size:18px;">116. They said: "If you cease not, O Nûh (Noah) you will surely be among those stoned (to death)."</p>
