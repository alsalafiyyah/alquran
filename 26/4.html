<div class="single-verse">
  <p><strong>26:4</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِن نَّشَأۡ نُنَزِّلۡ عَلَيۡهِم مِّنَ ٱلسَّمَآءِ ءَايَةٗ فَظَلَّتۡ أَعۡنَٰقُهُمۡ لَهَا خَٰضِعِينَ</p>
  <p style="font-size:18px;">4. If We will, We could send down to them from the heaven a sign, to which they would bend their necks in humility.</p>
