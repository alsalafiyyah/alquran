<div class="single-verse">
  <p><strong>26:99</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمَآ أَضَلَّنَآ إِلَّا ٱلۡمُجۡرِمُونَ</p>
  <p style="font-size:18px;">99. And none has brought us into error except the Mujrimûn [Iblîs (Satan) and those of human beings who commit crimes, murderers, polytheists, oppressors].</p>
