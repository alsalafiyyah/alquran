<div class="single-verse">
  <p><strong>26:139</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَكَذَّبُوهُ فَأَهۡلَكۡنَٰهُمۡۚ إِنَّ فِي ذَٰلِكَ لَأٓيَةٗۖ وَمَا كَانَ أَكۡثَرُهُم مُّؤۡمِنِينَ</p>
  <p style="font-size:18px;">139. So they belied him, and We destroyed them. Verily in this is indeed a sign, yet most of them are not believers.</p>
</div>
