<div class="single-verse">
  <p><strong>26:83</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">رَبِّ هَبۡ لِي حُكۡمٗا وَأَلۡحِقۡنِي بِٱلصَّٰلِحِينَ</p>
  <p style="font-size:18px;">83. My Lord! Bestow Hukm (religious knowledge, right judgement of the affairs and Prophethood) on me, and join me with the righteous.</p>
