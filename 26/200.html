<div class="single-verse">
  <p><strong>26:200</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">كَذَٰلِكَ سَلَكۡنَٰهُ فِي قُلُوبِ ٱلۡمُجۡرِمِينَ</p>
  <p style="font-size:18px;">200. Thus have We caused it (the denial of the Qur’ân) to enter the hearts of the Mûjrimûn (criminals, polytheists, sinners).</p>
