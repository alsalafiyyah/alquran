<div class="single-verse">
  <p><strong>26:167</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُواْ لَئِن لَّمۡ تَنتَهِ يَٰلُوطُ لَتَكُونَنَّ مِنَ ٱلۡمُخۡرَجِينَ</p>
  <p style="font-size:18px;">167. They said: "If you cease not O Lût (Lot)! verily, you will be one of those who are driven out!"</p>
