<div class="single-verse">
  <p><strong>26:52</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">۞ وَأَوۡحَيۡنَآ إِلَىٰ مُوسَىٰٓ أَنۡ أَسۡرِ بِعِبَادِيٓ إِنَّكُم مُّتَّبَعُونَ</p>
  <p style="font-size:18px;">52. And We revealed to Mûsâ (Moses), saying: "Depart by night with My slaves, verily you will be pursued."</p>
