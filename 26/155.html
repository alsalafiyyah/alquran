<div class="single-verse">
  <p><strong>26:155</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ هَٰذِهِۦ نَاقَةٞ لَّهَا شِرۡبٞ وَلَكُمۡ شِرۡبُ يَوۡمٖ مَّعۡلُومٖ</p>
  <p style="font-size:18px;">155. He said: "Here is a she-camel: it has a right to drink (water), and you have a right to drink (water) (each) on a day, known.</p>
