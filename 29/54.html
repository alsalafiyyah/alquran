<div class="single-verse">
  <p><strong>29:54</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَسۡتَعۡجِلُونَكَ بِٱلۡعَذَابِ وَإِنَّ جَهَنَّمَ لَمُحِيطَةُۢ بِٱلۡكَٰفِرِينَ</p>
  <p style="font-size:18px;">54. They ask you to hasten on the torment. And verily, Hell, of a surety, will encompass the disbelievers.</p>
