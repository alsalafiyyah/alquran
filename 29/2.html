<div class="single-verse">
  <p><strong>29:2</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَحَسِبَ ٱلنَّاسُ أَن يُتۡرَكُوٓاْ أَن يَقُولُوٓاْ ءَامَنَّا وَهُمۡ لَا يُفۡتَنُونَ</p>
  <p style="font-size:18px;">2. Do people think that they will be left alone because they say: "We believe," and will not be tested.</p>
