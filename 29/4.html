<div class="single-verse">
  <p><strong>29:4</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَمۡ حَسِبَ ٱلَّذِينَ يَعۡمَلُونَ ٱلسَّيِّـَٔاتِ أَن يَسۡبِقُونَاۚ سَآءَ مَا يَحۡكُمُونَ</p>
  <p style="font-size:18px;">4. Or think those who do evil deeds that they can outstrip Us (i.e. escape Our punishment)? Evil is that which they judge!</p>
