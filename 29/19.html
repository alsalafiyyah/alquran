<div class="single-verse">
  <p><strong>29:19</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَوَلَمۡ يَرَوۡاْ كَيۡفَ يُبۡدِئُ ٱللَّهُ ٱلۡخَلۡقَ ثُمَّ يُعِيدُهُۥٓۚ إِنَّ ذَٰلِكَ عَلَى ٱللَّهِ يَسِيرٞ</p>
  <p style="font-size:18px;">19. See they not how Allâh originates the creation, then repeats it. Verily, that is easy for Allâh.</p>
