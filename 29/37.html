<div class="single-verse">
  <p><strong>29:37</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَكَذَّبُوهُ فَأَخَذَتۡهُمُ ٱلرَّجۡفَةُ فَأَصۡبَحُواْ فِي دَارِهِمۡ جَٰثِمِينَ</p>
  <p style="font-size:18px;">37. And they belied him [Shu‘aib]: so the earthquake seized them, and they lay (dead), prostrate in their dwellings.</p>
