<div class="single-verse">
  <p><strong>73:10</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱصۡبِرۡ عَلَىٰ مَا يَقُولُونَ وَٱهۡجُرۡهُمۡ هَجۡرٗا جَمِيلٗا</p>
  <p style="font-size:18px;">10. And be patient (O Muhammad صلى الله عليه وسلم) with what they say, and keep away from them in a good way.</p>
