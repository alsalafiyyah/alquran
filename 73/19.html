<div class="single-verse">
  <p><strong>73:19</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ هَٰذِهِۦ تَذۡكِرَةٞۖ فَمَن شَآءَ ٱتَّخَذَ إِلَىٰ رَبِّهِۦ سَبِيلًا</p>
  <p style="font-size:18px;">19. Verily, this is an admonition: therefore whosoever will, let him take a Path to His Lord!</p>
