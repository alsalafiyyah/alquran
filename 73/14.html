<div class="single-verse">
  <p><strong>73:14</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَوۡمَ تَرۡجُفُ ٱلۡأَرۡضُ وَٱلۡجِبَالُ وَكَانَتِ ٱلۡجِبَالُ كَثِيبٗا مَّهِيلًا</p>
  <p style="font-size:18px;">14. On the Day when the earth and the mountains will be in violent shake, and the mountains will be a heap of sand poured out.</p>
