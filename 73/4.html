<div class="single-verse">
  <p><strong>73:4</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَوۡ زِدۡ عَلَيۡهِ وَرَتِّلِ ٱلۡقُرۡءَانَ تَرۡتِيلًا</p>
  <p style="font-size:18px;">4. Or a little more. And recite the Qur’ân (aloud) in a slow, (pleasant tone and) style.[1]</p>
