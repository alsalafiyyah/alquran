<div class="single-verse">
  <p><strong>73:17</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَكَيۡفَ تَتَّقُونَ إِن كَفَرۡتُمۡ يَوۡمٗا يَجۡعَلُ ٱلۡوِلۡدَٰنَ شِيبًا</p>
  <p style="font-size:18px;">17. Then how can you avoid the punishment, if you disbelieve, on a Day (i.e. the Day of Resurrection) that will make the children grey-headed?</p>
