<div class="single-verse">
  <p><strong>33:54</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِن تُبۡدُواْ شَيۡـًٔا أَوۡ تُخۡفُوهُ فَإِنَّ ٱللَّهَ كَانَ بِكُلِّ شَيۡءٍ عَلِيمٗا</p>
  <p style="font-size:18px;">54. Whether you reveal anything or conceal it, verily, Allâh is Ever All-Knower of everything.</p>
