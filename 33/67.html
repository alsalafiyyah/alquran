<div class="single-verse">
  <p><strong>33:67</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَقَالُواْ رَبَّنَآ إِنَّآ أَطَعۡنَا سَادَتَنَا وَكُبَرَآءَنَا فَأَضَلُّونَا ٱلسَّبِيلَا۠</p>
  <p style="font-size:18px;">67. And they will say: "Our Lord! Verily, we obeyed our chiefs and our great ones, and they misled us from the (Right) Way.</p>
