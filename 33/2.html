<div class="single-verse">
  <p><strong>33:2</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱتَّبِعۡ مَا يُوحَىٰٓ إِلَيۡكَ مِن رَّبِّكَۚ إِنَّ ٱللَّهَ كَانَ بِمَا تَعۡمَلُونَ خَبِيرٗا</p>
  <p style="font-size:18px;">2. And follow that which is revealed to you from your Lord. Verily, Allâh is Well-Acquainted with what you do.</p>
