<div class="single-verse">
  <p><strong>33:65</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">خَٰلِدِينَ فِيهَآ أَبَدٗاۖ لَّا يَجِدُونَ وَلِيّٗا وَلَا نَصِيرٗا</p>
  <p style="font-size:18px;">65. Wherein they will abide for ever, and they will find neither a Walî (a protector) nor a helper.</p>
