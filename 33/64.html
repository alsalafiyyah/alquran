<div class="single-verse">
  <p><strong>33:64</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ ٱللَّهَ لَعَنَ ٱلۡكَٰفِرِينَ وَأَعَدَّ لَهُمۡ سَعِيرًا</p>
  <p style="font-size:18px;">64. Verily, Allâh has cursed the disbelievers, and has prepared for them a flaming Fire (Hell).</p>
