  <p><strong>33:70</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُواْ ٱتَّقُواْ ٱللَّهَ وَقُولُواْ قَوۡلٗا سَدِيدٗا</p>
  <p style="font-size:18px;">70. O you who believe! Keep your duty to Allâh and fear Him, and speak (always) the truth.</p>
