<div class="single-verse">
  <p><strong>36:35</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لِيَأۡكُلُواْ مِن ثَمَرِهِۦ وَمَا عَمِلَتۡهُ أَيۡدِيهِمۡۚ أَفَلَا يَشۡكُرُونَ</p>
  <p style="font-size:18px;">35. So that they may eat of the fruit thereof - and their hands made it not. Will they not, then, give thanks?</p>
