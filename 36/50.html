<div class="single-verse">
  <p><strong>36:50</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَلَا يَسۡتَطِيعُونَ تَوۡصِيَةٗ وَلَآ إِلَىٰٓ أَهۡلِهِمۡ يَرۡجِعُونَ</p>
  <p style="font-size:18px;">50. Then they will not be able to make bequest, nor they will return to their family.</p>
