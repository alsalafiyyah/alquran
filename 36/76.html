<div class="single-verse">
  <p><strong>36:76</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَلَا يَحۡزُنكَ قَوۡلُهُمۡۘ إِنَّا نَعۡلَمُ مَا يُسِرُّونَ وَمَا يُعۡلِنُونَ</p>
  <p style="font-size:18px;">76. So let not their speech, then, grieve you (O Muhammad صلى الله عليه وسلم). Verily, We know what they conceal and what they reveal.</p>
</div>
