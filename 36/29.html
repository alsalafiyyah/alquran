  <p><strong>36:29</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِن كَانَتۡ إِلَّا صَيۡحَةٗ وَٰحِدَةٗ فَإِذَا هُمۡ خَٰمِدُونَ</p>
