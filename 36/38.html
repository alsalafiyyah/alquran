<div class="single-verse">
  <p><strong>36:38</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱلشَّمۡسُ تَجۡرِي لِمُسۡتَقَرّٖ لَّهَاۚ ذَٰلِكَ تَقۡدِيرُ ٱلۡعَزِيزِ ٱلۡعَلِيمِ</p>
  <p style="font-size:18px;">38. And the sun runs on its fixed course for a term (appointed). That is the Decree of the All-Mighty, the All-Knowing.</p>
