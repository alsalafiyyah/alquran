<div class="single-verse">
  <p><strong>36:51</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَنُفِخَ فِي ٱلصُّورِ فَإِذَا هُم مِّنَ ٱلۡأَجۡدَاثِ إِلَىٰ رَبِّهِمۡ يَنسِلُونَ</p>
  <p style="font-size:18px;">51. And the Trumpet will be blown (i.e. the second blowing) and behold from the graves they will come out quickly to their Lord.</p>
