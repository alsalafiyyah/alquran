<div class="single-verse">
  <p><strong>36:41</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَءَايَةٞ لَّهُمۡ أَنَّا حَمَلۡنَا ذُرِّيَّتَهُمۡ فِي ٱلۡفُلۡكِ ٱلۡمَشۡحُونِ</p>
  <p style="font-size:18px;">41. And an Ayâh (sign) for them is that We bore their offspring in the laden ship [of Nûh (Noah)].</p>
