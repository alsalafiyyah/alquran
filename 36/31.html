<div class="single-verse">
  <p><strong>36:31</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَلَمۡ يَرَوۡاْ كَمۡ أَهۡلَكۡنَا قَبۡلَهُم مِّنَ ٱلۡقُرُونِ أَنَّهُمۡ إِلَيۡهِمۡ لَا يَرۡجِعُونَ</p>
  <p style="font-size:18px;">31. Do they not see how many of the generations We have destroyed before them? Verily, they will not return to them.</p>
