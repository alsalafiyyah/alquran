<div class="single-verse">
  <p><strong>36:43</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِن نَّشَأۡ نُغۡرِقۡهُمۡ فَلَا صَرِيخَ لَهُمۡ وَلَا هُمۡ يُنقَذُونَ</p>
  <p style="font-size:18px;">43. And if We will, We shall drown them, and there will be no shout (or helper) for them (to hear their cry for help), nor will they be saved.</p>
