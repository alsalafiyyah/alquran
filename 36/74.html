  <p><strong>36:74</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱتَّخَذُواْ مِن دُونِ ٱللَّهِ ءَالِهَةٗ لَّعَلَّهُمۡ يُنصَرُونَ</p>
  <p style="font-size:18px;">74. And they have taken besides Allâh âlihah (gods), hoping that they might be helped (by those so-called gods).</p>
