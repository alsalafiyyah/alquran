<div class="single-verse">
  <p><strong>36:49</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">مَا يَنظُرُونَ إِلَّا صَيۡحَةٗ وَٰحِدَةٗ تَأۡخُذُهُمۡ وَهُمۡ يَخِصِّمُونَ</p>
  <p style="font-size:18px;">49. They await only but a single Saihah (shout), which will seize them while they are disputing!</p>
