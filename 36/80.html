<div class="single-verse">
  <p><strong>36:80</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱلَّذِي جَعَلَ لَكُم مِّنَ ٱلشَّجَرِ ٱلۡأَخۡضَرِ نَارٗا فَإِذَآ أَنتُم مِّنۡهُ تُوقِدُونَ</p>
  <p style="font-size:18px;">80. He Who produces for you fire out of the green tree, when behold you kindle therewith.</p>
