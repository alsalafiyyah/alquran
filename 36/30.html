<div class="single-verse">
  <p><strong>36:30</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَٰحَسۡرَةً عَلَى ٱلۡعِبَادِۚ مَا يَأۡتِيهِم مِّن رَّسُولٍ إِلَّا كَانُواْ بِهِۦ يَسۡتَهۡزِءُونَ</p>
  <p style="font-size:18px;">30. Alas for mankind! There never came a Messenger to them but they used to mock at him.</p>
