  <p><strong>36:72</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَذَلَّلۡنَٰهَا لَهُمۡ فَمِنۡهَا رَكُوبُهُمۡ وَمِنۡهَا يَأۡكُلُونَ</p>
  <p style="font-size:18px;">72. And We have subdued them unto them so that some of them they have for riding and some they eat.</p>
