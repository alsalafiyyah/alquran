<div class="single-verse">
  <p><strong>36:53</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِن كَانَتۡ إِلَّا صَيۡحَةٗ وَٰحِدَةٗ فَإِذَا هُمۡ جَمِيعٞ لَّدَيۡنَا مُحۡضَرُونَ</p>
  <p style="font-size:18px;">53. It will be but a single Saihah (shout), so behold they will all be brought up before Us!</p>
