<div class="single-verse">
  <p><strong>36:75</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَا يَسۡتَطِيعُونَ نَصۡرَهُمۡ وَهُمۡ لَهُمۡ جُندٞ مُّحۡضَرُونَ</p>
  <p style="font-size:18px;">75. They cannot help them, but they will be brought forward as a troop against those who worshipped them (at the time of Reckoning).</p>
