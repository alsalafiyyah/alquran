  <p><strong>36:62</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَقَدۡ أَضَلَّ مِنكُمۡ جِبِلّٗا كَثِيرًاۖ أَفَلَمۡ تَكُونُواْ تَعۡقِلُونَ</p>
