<div class="single-verse">
  <p><strong>36:68</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمَن نُّعَمِّرۡهُ نُنَكِّسۡهُ فِي ٱلۡخَلۡقِۚ أَفَلَا يَعۡقِلُونَ</p>
  <p style="font-size:18px;">68. And he whom We grant long life - We reverse him in creation (weakness after strength). Will they not then understand?</p>
