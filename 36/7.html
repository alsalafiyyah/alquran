<div class="single-verse">
  <p><strong>36:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لَقَدۡ حَقَّ ٱلۡقَوۡلُ عَلَىٰٓ أَكۡثَرِهِمۡ فَهُمۡ لَا يُؤۡمِنُونَ</p>
  <p style="font-size:18px;">7. Indeed the Word (of punishment) has proved true against most of them, so they will not believe.</p>
