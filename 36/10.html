<div class="single-verse">
  <p><strong>36:10</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَسَوَآءٌ عَلَيۡهِمۡ ءَأَنذَرۡتَهُمۡ أَمۡ لَمۡ تُنذِرۡهُمۡ لَا يُؤۡمِنُونَ</p>
  <p style="font-size:18px;">10. It is the same to them whether you warn them or you warn them not, they will not believe.</p>
