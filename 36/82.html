<div class="single-verse">
  <p><strong>36:82</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّمَآ أَمۡرُهُۥٓ إِذَآ أَرَادَ شَيۡـًٔا أَن يَقُولَ لَهُۥ كُن فَيَكُونُ</p>
  <p style="font-size:18px;">82. Verily, His Command, when He intends a thing, is only that He says to it, "Be!" - and it is!</p>
