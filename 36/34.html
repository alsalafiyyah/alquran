<div class="single-verse">
  <p><strong>36:34</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَجَعَلۡنَا فِيهَا جَنَّٰتٖ مِّن نَّخِيلٖ وَأَعۡنَٰبٖ وَفَجَّرۡنَا فِيهَا مِنَ ٱلۡعُيُونِ</p>
  <p style="font-size:18px;">34. And We have made therein gardens of date-palms and grapes, and We have caused springs of water to gush forth therein.</p>
