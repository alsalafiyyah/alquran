<div class="single-verse">
  <p><strong>36:37</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَءَايَةٞ لَّهُمُ ٱلَّيۡلُ نَسۡلَخُ مِنۡهُ ٱلنَّهَارَ فَإِذَا هُم مُّظۡلِمُونَ</p>
  <p style="font-size:18px;">37. And a sign for them is the night. We withdraw therefrom the day, and behold, they are in darkness.</p>
