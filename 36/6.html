<div class="single-verse">
  <p><strong>36:6</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">لِتُنذِرَ قَوۡمٗا مَّآ أُنذِرَ ءَابَآؤُهُمۡ فَهُمۡ غَٰفِلُونَ</p>
  <p style="font-size:18px;">6. In order that you may warn a people whose forefathers were not warned, so they are heedless.</p>
