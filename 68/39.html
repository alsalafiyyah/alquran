<div class="single-verse">
  <p><strong>68:39</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَمۡ لَكُمۡ أَيۡمَٰنٌ عَلَيۡنَا بَٰلِغَةٌ إِلَىٰ يَوۡمِ ٱلۡقِيَٰمَةِ إِنَّ لَكُمۡ لَمَا تَحۡكُمُونَ</p>
  <p style="font-size:18px;">39. Or have you oaths from Us, reaching to the Day of Resurrection, that yours will be what you judge?</p>
