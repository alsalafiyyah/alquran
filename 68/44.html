<div class="single-verse">
  <p><strong>68:44</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَذَرۡنِي وَمَن يُكَذِّبُ بِهَٰذَا ٱلۡحَدِيثِۖ سَنَسۡتَدۡرِجُهُم مِّنۡ حَيۡثُ لَا يَعۡلَمُونَ</p>
  <p style="font-size:18px;">44. Then leave Me Alone with such as belie this Qur’ân. We shall punish them gradually from directions they perceive not.</p>
</div>
