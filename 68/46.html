<div class="single-verse">
  <p><strong>68:46</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَمۡ تَسۡـَٔلُهُمۡ أَجۡرٗا فَهُم مِّن مَّغۡرَمٖ مُّثۡقَلُونَ</p>
  <p style="font-size:18px;">46. Or is it that you (O Muhammad صلى الله عليه وسلم) ask them a wage, so that they are heavily burdened with debt?</p>
