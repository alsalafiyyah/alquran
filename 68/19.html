<div class="single-verse">
  <p><strong>68:19</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَطَافَ عَلَيۡهَا طَآئِفٞ مِّن رَّبِّكَ وَهُمۡ نَآئِمُونَ</p>
  <p style="font-size:18px;">19. Then there passed by on the (garden) a visitation (fire) from your Lord at night and burnt it while they were asleep.</p>
