<div class="single-verse">
  <p><strong>68:47</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَمۡ عِندَهُمُ ٱلۡغَيۡبُ فَهُمۡ يَكۡتُبُونَ</p>
  <p style="font-size:18px;">47. Or that the Ghaib (the Unseen - here in this Verse it means Al-Lauh Al-Mahfûz) is in their hands, so that they can write it down?</p>
