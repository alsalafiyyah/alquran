<div class="single-verse">
  <p><strong>68:33</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">كَذَٰلِكَ ٱلۡعَذَابُۖ وَلَعَذَابُ ٱلۡأٓخِرَةِ أَكۡبَرُۚ لَوۡ كَانُواْ يَعۡلَمُونَ</p>
  <p style="font-size:18px;">33. Such is the punishment (in this life), but truly, the punishment of the Hereafter is greater if they but knew.</p>
