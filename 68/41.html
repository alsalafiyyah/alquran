<div class="single-verse">
  <p><strong>68:41</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَمۡ لَهُمۡ شُرَكَآءُ فَلۡيَأۡتُواْ بِشُرَكَآئِهِمۡ إِن كَانُواْ صَٰدِقِينَ</p>
  <p style="font-size:18px;">41. Or have they "partners"? Then let them bring their "partners" if they are truthful!</p>
