  <p><strong>68:15</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِذَا تُتۡلَىٰ عَلَيۡهِ ءَايَٰتُنَا قَالَ أَسَٰطِيرُ ٱلۡأَوَّلِينَ</p>
