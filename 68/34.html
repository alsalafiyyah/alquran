  <p><strong>68:34</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ لِلۡمُتَّقِينَ عِندَ رَبِّهِمۡ جَنَّٰتِ ٱلنَّعِيمِ</p>
  <p style="font-size:18px;">34. Verily, for the Muttaqûn (the pious - See V.2:2) are Gardens of delight (Paradise) with their Lord.</p>
