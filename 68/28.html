<div class="single-verse">
  <p><strong>68:28</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ أَوۡسَطُهُمۡ أَلَمۡ أَقُل لَّكُمۡ لَوۡلَا تُسَبِّحُونَ</p>
  <p style="font-size:18px;">28. The best among them said: "Did I not tell you: why say you not: Inshâ’ Allâh (If Allâh wills)."</p>
