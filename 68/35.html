<div class="single-verse">
  <p><strong>68:35</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَفَنَجۡعَلُ ٱلۡمُسۡلِمِينَ كَٱلۡمُجۡرِمِينَ</p>
  <p style="font-size:18px;">35. Shall We then treat the Muslims (believers of Islamic Monotheism, doers of righteous deeds) like the Mujrimûn (criminals, polytheists and disbelievers, etc.)?</p>
