  <p><strong>110:2</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَرَأَيۡتَ ٱلنَّاسَ يَدۡخُلُونَ فِي دِينِ ٱللَّهِ أَفۡوَاجٗا</p>
