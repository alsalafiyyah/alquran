<div class="single-verse">
  <p><strong>110:3</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَسَبِّحۡ بِحَمۡدِ رَبِّكَ وَٱسۡتَغۡفِرۡهُۚ إِنَّهُۥ كَانَ تَوَّابَۢا</p>
  <p style="font-size:18px;">3. So glorify the Praises of your Lord, and ask His Forgiveness. Verily, He is the One Who accepts the repentance and Who forgives.</p>
