<div class="single-verse">
  <p><strong>43:40</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَفَأَنتَ تُسۡمِعُ ٱلصُّمَّ أَوۡ تَهۡدِي ٱلۡعُمۡيَ وَمَن كَانَ فِي ضَلَٰلٖ مُّبِينٖ</p>
  <p style="font-size:18px;">40. Can you (O Muhammad صلى الله عليه و سلم) make the deaf to hear, or can you guide the blind or him who is in manifest error?</p>
</div>
