<div class="single-verse">
  <p><strong>43:74</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ ٱلۡمُجۡرِمِينَ فِي عَذَابِ جَهَنَّمَ خَٰلِدُونَ</p>
  <p style="font-size:18px;">74. Verily, the Mujrimûn (criminals, sinners, disbelievers) will be in the torment of Hell to abide therein forever.</p>
