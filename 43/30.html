<div class="single-verse">
  <p><strong>43:30</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَمَّا جَآءَهُمُ ٱلۡحَقُّ قَالُواْ هَٰذَا سِحۡرٞ وَإِنَّا بِهِۦ كَٰفِرُونَ</p>
  <p style="font-size:18px;">30. And when the truth (this Qur’ân) came to them, they (the disbelievers in this Qur’ân) said: "This is magic, and we disbelieve therein."</p>
