  <p><strong>43:67</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱلۡأَخِلَّآءُ يَوۡمَئِذِۭ بَعۡضُهُمۡ لِبَعۡضٍ عَدُوٌّ إِلَّا ٱلۡمُتَّقِينَ</p>
  <p style="font-size:18px;">67. Friends on that Day will be foes one to another except Al-Muttaqûn (the pious. See V.2:2).</p>
