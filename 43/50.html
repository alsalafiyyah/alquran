<div class="single-verse">
  <p><strong>43:50</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَلَمَّا كَشَفۡنَا عَنۡهُمُ ٱلۡعَذَابَ إِذَا هُمۡ يَنكُثُونَ</p>
  <p style="font-size:18px;">50. But when We removed the torment from them, behold, they broke their covenant (that they will believe if We remove the torment from them).</p>
