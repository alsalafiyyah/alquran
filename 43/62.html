<div class="single-verse">
  <p><strong>43:62</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَا يَصُدَّنَّكُمُ ٱلشَّيۡطَٰنُۖ إِنَّهُۥ لَكُمۡ عَدُوّٞ مُّبِينٞ</p>
  <p style="font-size:18px;">62. And let not Shaitân (Satan) hinder you (from the right religion, i.e. Islâmic Monotheism). Verily, he (Satan) to you is a plain enemy.</p>
</div>
