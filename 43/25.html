<div class="single-verse">
  <p><strong>43:25</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَٱنتَقَمۡنَا مِنۡهُمۡۖ فَٱنظُرۡ كَيۡفَ كَانَ عَٰقِبَةُ ٱلۡمُكَذِّبِينَ</p>
  <p style="font-size:18px;">25. So We took revenge on them, then see what was the end of those who denied (Islâmic Monotheism).</p>
