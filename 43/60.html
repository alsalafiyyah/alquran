<div class="single-verse">
  <p><strong>43:60</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَوۡ نَشَآءُ لَجَعَلۡنَا مِنكُم مَّلَٰٓئِكَةٗ فِي ٱلۡأَرۡضِ يَخۡلُفُونَ</p>
  <p style="font-size:18px;">60. And if it were Our Will, We would have [destroyed you (mankind) all, and] made angels to replace you on the earth. [Tafsir At-Tabarî].</p>
