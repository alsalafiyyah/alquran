<div class="single-verse">
  <p><strong>43:41</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَإِمَّا نَذۡهَبَنَّ بِكَ فَإِنَّا مِنۡهُم مُّنتَقِمُونَ</p>
  <p style="font-size:18px;">41. And even if We take you (O Muhammad صلى الله عليه و سلم) away, We shall indeed take vengeance on them.</p>
