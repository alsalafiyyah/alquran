<div class="single-verse">
  <p><strong>43:31</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَقَالُواْ لَوۡلَا نُزِّلَ هَٰذَا ٱلۡقُرۡءَانُ عَلَىٰ رَجُلٖ مِّنَ ٱلۡقَرۡيَتَيۡنِ عَظِيمٍ</p>
  <p style="font-size:18px;">31. And they say: "Why is not this Qur’ân sent down to some great man of the two towns (Makkah and Tâ’if)?"</p>
