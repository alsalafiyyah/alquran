<div class="single-verse">
  <p><strong>43:66</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">هَلۡ يَنظُرُونَ إِلَّا ٱلسَّاعَةَ أَن تَأۡتِيَهُم بَغۡتَةٗ وَهُمۡ لَا يَشۡعُرُونَ</p>
  <p style="font-size:18px;">66. Do they only wait for the Hour that it shall come upon them suddenly, while they perceive not?</p>
