<div class="single-verse">
  <p><strong>43:42</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَوۡ نُرِيَنَّكَ ٱلَّذِي وَعَدۡنَٰهُمۡ فَإِنَّا عَلَيۡهِم مُّقۡتَدِرُونَ</p>
  <p style="font-size:18px;">42. Or (if) We show you that wherewith We threaten them: then verily We have perfect command over them.</p>
