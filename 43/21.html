<div class="single-verse">
  <p><strong>43:21</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَمۡ ءَاتَيۡنَٰهُمۡ كِتَٰبٗا مِّن قَبۡلِهِۦ فَهُم بِهِۦ مُسۡتَمۡسِكُونَ</p>
  <p style="font-size:18px;">21. Or have We given them any Book before this (the Qur’ân) to which they are holding fast?</p>
