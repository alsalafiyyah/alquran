<div class="single-verse">
  <p><strong>43:53</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَلَوۡلَآ أُلۡقِيَ عَلَيۡهِ أَسۡوِرَةٞ مِّن ذَهَبٍ أَوۡ جَآءَ مَعَهُ ٱلۡمَلَٰٓئِكَةُ مُقۡتَرِنِينَ</p>
  <p style="font-size:18px;">53. "Why then are not golden bracelets bestowed on him, or angels sent along with him?"</p>
