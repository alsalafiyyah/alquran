<div class="single-verse">
  <p><strong>43:3</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّا جَعَلۡنَٰهُ قُرۡءَٰنًا عَرَبِيّٗا لَّعَلَّكُمۡ تَعۡقِلُونَ</p>
  <p style="font-size:18px;">3. Verily, We have made it a Qur’ân in Arabic that you may be able to understand (its meanings and its admonitions).</p>
