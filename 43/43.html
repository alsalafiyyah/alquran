<div class="single-verse">
  <p><strong>43:43</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَٱسۡتَمۡسِكۡ بِٱلَّذِيٓ أُوحِيَ إِلَيۡكَۖ إِنَّكَ عَلَىٰ صِرَٰطٖ مُّسۡتَقِيمٖ</p>
  <p style="font-size:18px;">43. So hold you (O Muhammad صلى الله عليه و سلم) fast to that which is revealed to you. Verily you are on the Straight Path.</p>
</div>
