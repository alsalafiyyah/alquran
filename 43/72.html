<div class="single-verse">
  <p><strong>43:72</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَتِلۡكَ ٱلۡجَنَّةُ ٱلَّتِيٓ أُورِثۡتُمُوهَا بِمَا كُنتُمۡ تَعۡمَلُونَ</p>
  <p style="font-size:18px;">72. This is the Paradise which you have been made to inherit because of your deeds which you used to do (in the life of the world).</p>
