  <p><strong>43:55</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَلَمَّآ ءَاسَفُونَا ٱنتَقَمۡنَا مِنۡهُمۡ فَأَغۡرَقۡنَٰهُمۡ أَجۡمَعِينَ</p>
  <p style="font-size:18px;">55. So when they angered Us, We punished them, and drowned them all.</p>
