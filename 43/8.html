<div class="single-verse">
  <p><strong>43:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَأَهۡلَكۡنَآ أَشَدَّ مِنۡهُم بَطۡشٗا وَمَضَىٰ مَثَلُ ٱلۡأَوَّلِينَ</p>
  <p style="font-size:18px;">8. Then We destroyed men stronger (in power) than these - and the example of the ancients has passed away (before them).</p>
