<div class="single-verse">
  <p><strong>43:47</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَلَمَّا جَآءَهُم بِـَٔايَٰتِنَآ إِذَا هُم مِّنۡهَا يَضۡحَكُونَ</p>
  <p style="font-size:18px;">47. But when he came to them with Our Ayât (proofs, evidence, verses, lessons, signs, revelations) behold, they laughed at them.</p>
