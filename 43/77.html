<div class="single-verse">
  <p><strong>43:77</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَنَادَوۡاْ يَٰمَٰلِكُ لِيَقۡضِ عَلَيۡنَا رَبُّكَۖ قَالَ إِنَّكُم مَّٰكِثُونَ</p>
  <p style="font-size:18px;">77. And they will cry: "O Malik (Keeper of Hell)! Let your Lord make an end of us." He will say: "Verily, you shall abide forever."</p>
