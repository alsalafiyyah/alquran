  <p><strong>43:88</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَقِيلِهِۦ يَٰرَبِّ إِنَّ هَٰٓؤُلَآءِ قَوۡمٞ لَّا يُؤۡمِنُونَ</p>
