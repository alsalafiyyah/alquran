<div class="single-verse">
  <p><strong>43:4</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِنَّهُۥ فِيٓ أُمِّ ٱلۡكِتَٰبِ لَدَيۡنَا لَعَلِيٌّ حَكِيمٌ</p>
  <p style="font-size:18px;">4. And verily, it (this Qur’ân) is in the Mother of the Book (i.e. Al-Lauh Al-Mahfûz), with Us, indeed exalted, full of wisdom.</p>
</div>
