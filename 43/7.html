<div class="single-verse">
  <p><strong>43:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمَا يَأۡتِيهِم مِّن نَّبِيٍّ إِلَّا كَانُواْ بِهِۦ يَسۡتَهۡزِءُونَ</p>
  <p style="font-size:18px;">7. And never came there a Prophet to them but they used to mock at him.</p>
