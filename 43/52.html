<div class="single-verse">
  <p><strong>43:52</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَمۡ أَنَا۠ خَيۡرٞ مِّنۡ هَٰذَا ٱلَّذِي هُوَ مَهِينٞ وَلَا يَكَادُ يُبِينُ</p>
  <p style="font-size:18px;">52. "Am I not better than this one [Mûsâ (Moses)] who is despicable and can scarcely express himself clearly?</p>
