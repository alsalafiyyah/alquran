<div class="single-verse">
  <p><strong>20:50</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ رَبُّنَا ٱلَّذِيٓ أَعۡطَىٰ كُلَّ شَيۡءٍ خَلۡقَهُۥ ثُمَّ هَدَىٰ</p>
  <p style="font-size:18px;">50. [Mûsâ (Moses)] said: "Our Lord is He Who gave to each thing its form and nature, then guided it aright."</p>
