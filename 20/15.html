<div class="single-verse">
  <p><strong>20:15</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ ٱلسَّاعَةَ ءَاتِيَةٌ أَكَادُ أُخۡفِيهَا لِتُجۡزَىٰ كُلُّ نَفۡسِۭ بِمَا تَسۡعَىٰ</p>
  <p style="font-size:18px;">15. "Verily, the Hour is coming - and I am almost hiding it from Myself - that every person may be rewarded for that which he strives.</p>
