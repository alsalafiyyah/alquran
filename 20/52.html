<div class="single-verse">
  <p><strong>20:52</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ عِلۡمُهَا عِندَ رَبِّي فِي كِتَٰبٖۖ لَّا يَضِلُّ رَبِّي وَلَا يَنسَى</p>
  <p style="font-size:18px;">52. [Mûsâ (Moses)] said: "The knowledge thereof is with my Lord, in a Record. My Lord neither errs nor He forgets."</p>
