<div class="single-verse">
  <p><strong>20:45</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَا رَبَّنَآ إِنَّنَا نَخَافُ أَن يَفۡرُطَ عَلَيۡنَآ أَوۡ أَن يَطۡغَىٰ</p>
  <p style="font-size:18px;">45. They said: "Our Lord! Verily we fear lest he should hasten to punish us or lest he should transgress (all bounds against us)."</p>
