  <p><strong>20:8</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱللَّهُ لَآ إِلَٰهَ إِلَّا هُوَۖ لَهُ ٱلۡأَسۡمَآءُ ٱلۡحُسۡنَىٰ</p>
  <p style="font-size:18px;">8. Allâh! Lâ ilâha illa Huwa (none has the right to be worshipped but He)! To Him belong the Best Names.[1]</p>
