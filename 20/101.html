<div class="single-verse">
  <p><strong>20:101</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">خَٰلِدِينَ فِيهِۖ وَسَآءَ لَهُمۡ يَوۡمَ ٱلۡقِيَٰمَةِ حِمۡلٗا</p>
  <p style="font-size:18px;">101. They will abide in that (state in the Fire of Hell) - and evil indeed will it be that load for them on the Day of Resurrection;</p>
