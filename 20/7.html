<div class="single-verse">
  <p><strong>20:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِن تَجۡهَرۡ بِٱلۡقَوۡلِ فَإِنَّهُۥ يَعۡلَمُ ٱلسِّرَّ وَأَخۡفَى</p>
  <p style="font-size:18px;">7. And if you (O Muhammad صلى الله عليه وسلم) speak (the invocation) aloud, then verily, He knows the secret and that which is yet more hidden.</p>
</div>
