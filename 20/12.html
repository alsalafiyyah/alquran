  <p><strong>20:12</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنِّيٓ أَنَا۠ رَبُّكَ فَٱخۡلَعۡ نَعۡلَيۡكَ إِنَّكَ بِٱلۡوَادِ ٱلۡمُقَدَّسِ طُوٗى</p>
  <p style="font-size:18px;">12. "Verily I am your Lord! So take off your shoes; you are in the sacred valley, Tuwa.</p>
