<div class="single-verse">
  <p><strong>20:43</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱذۡهَبَآ إِلَىٰ فِرۡعَوۡنَ إِنَّهُۥ طَغَىٰ</p>
  <p style="font-size:18px;">43. "Go, both of you, to Fir‘aun (Pharaoh), verily, he has transgressed (all bounds in disbelief and disobedience and behaved as an arrogant and as a tyrant).</p>
