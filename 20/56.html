<div class="single-verse">
  <p><strong>20:56</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَقَدۡ أَرَيۡنَٰهُ ءَايَٰتِنَا كُلَّهَا فَكَذَّبَ وَأَبَىٰ</p>
  <p style="font-size:18px;">56. And indeed We showed him [Fir‘aun (Pharaoh)] all Our Ayât (signs and evidence), but he denied and refused.</p>
