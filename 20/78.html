<div class="single-verse">
  <p><strong>20:78</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَأَتۡبَعَهُمۡ فِرۡعَوۡنُ بِجُنُودِهِۦ فَغَشِيَهُم مِّنَ ٱلۡيَمِّ مَا غَشِيَهُمۡ</p>
  <p style="font-size:18px;">78. Then Fir‘aun (Pharaoh) pursued them with his hosts, but the sea-water completely overwhelmed them and covered them up.</p>
