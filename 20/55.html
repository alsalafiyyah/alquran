<div class="single-verse">
  <p><strong>20:55</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">۞ مِنۡهَا خَلَقۡنَٰكُمۡ وَفِيهَا نُعِيدُكُمۡ وَمِنۡهَا نُخۡرِجُكُمۡ تَارَةً أُخۡرَىٰ</p>
  <p style="font-size:18px;">55. Thereof (the earth) We created you, and into it We shall return you, and from it We shall bring you out once again.</p>
