<div class="single-verse">
  <p><strong>20:115</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَقَدۡ عَهِدۡنَآ إِلَىٰٓ ءَادَمَ مِن قَبۡلُ فَنَسِيَ وَلَمۡ نَجِدۡ لَهُۥ عَزۡمٗا</p>
  <p style="font-size:18px;">115. And indeed We made a covenant with Adam before, but he forgot, and We found on his part no firm will-power.</p>
