<div class="single-verse">
  <p><strong>20:85</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ فَإِنَّا قَدۡ فَتَنَّا قَوۡمَكَ مِنۢ بَعۡدِكَ وَأَضَلَّهُمُ ٱلسَّامِرِيُّ</p>
  <p style="font-size:18px;">85. (Allâh) said: "Verily We have tried your people in your absence, and As-Sâmirî has led them astray."</p>
