<div class="single-verse">
  <p><strong>20:70</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَأُلۡقِيَ ٱلسَّحَرَةُ سُجَّدٗا قَالُوٓاْ ءَامَنَّا بِرَبِّ هَٰرُونَ وَمُوسَىٰ</p>
  <p style="font-size:18px;">70. So the magicians fell down prostrate. They said: "We believe in the Lord of Hârûn (Aaron) and Mûsâ (Moses)."</p>
