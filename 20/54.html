<div class="single-verse">
  <p><strong>20:54</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">كُلُواْ وَٱرۡعَوۡاْ أَنۡعَٰمَكُمۡۚ إِنَّ فِي ذَٰلِكَ لَأٓيَٰتٖ لِّأُوْلِي ٱلنُّهَىٰ</p>
  <p style="font-size:18px;">54. Eat and pasture your cattle (therein); verily, in this are Ayât (proofs and signs) for men of understanding.</p>
