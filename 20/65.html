<div class="single-verse">
  <p><strong>20:65</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُواْ يَٰمُوسَىٰٓ إِمَّآ أَن تُلۡقِيَ وَإِمَّآ أَن نَّكُونَ أَوَّلَ مَنۡ أَلۡقَىٰ</p>
  <p style="font-size:18px;">65. They said: "O Mûsâ (Moses)! Either you throw first or we be the first to throw?"</p>
