<div class="single-verse">
  <p><strong>20:103</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَتَخَٰفَتُونَ بَيۡنَهُمۡ إِن لَّبِثۡتُمۡ إِلَّا عَشۡرٗا</p>
  <p style="font-size:18px;">103. They will speak in a very low voice to each other (saying): "You stayed not longer than ten (days)."</p>
