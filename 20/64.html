<div class="single-verse">
  <p><strong>20:64</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَأَجۡمِعُواْ كَيۡدَكُمۡ ثُمَّ ٱئۡتُواْ صَفّٗاۚ وَقَدۡ أَفۡلَحَ ٱلۡيَوۡمَ مَنِ ٱسۡتَعۡلَىٰ</p>
  <p style="font-size:18px;">64. "So devise your plot, and then assemble in line. And whoever overcomes this day will be indeed successful."</p>
</div>
