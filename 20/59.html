<div class="single-verse">
  <p><strong>20:59</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ مَوۡعِدُكُمۡ يَوۡمُ ٱلزِّينَةِ وَأَن يُحۡشَرَ ٱلنَّاسُ ضُحٗى</p>
  <p style="font-size:18px;">59. [Mûsâ (Moses)] said: "Your appointed meeting is the day of the festival, and let the people assemble when the sun has risen (forenoon)."</p>
