<div class="single-verse">
  <p><strong>80:2</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَن جَآءَهُ ٱلۡأَعۡمَىٰ</p>
  <p style="font-size:18px;">2. Because there came to him the blind man (i.e. ‘Abdullâh bin Umm-Maktûm, who came to the Prophet صلى الله عليه وسلم while he was preaching to one or some of the Quraish chiefs).</p>
