<div class="single-verse">
  <p><strong>80:42</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أُوْلَٰٓئِكَ هُمُ ٱلۡكَفَرَةُ ٱلۡفَجَرَةُ</p>
  <p style="font-size:18px;">42. Such will be the Kafarah (disbelievers in Allâh, in His Oneness, and in His Messenger Muhammad صلى الله عليه وسلم, etc.), the Fajarah (wicked evil doers).</p>
