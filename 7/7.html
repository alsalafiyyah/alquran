  <p><strong>7:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَلَنَقُصَّنَّ عَلَيۡهِم بِعِلۡمٖۖ وَمَا كُنَّا غَآئِبِينَ</p>
