<div class="single-verse">
  <p><strong>7:62</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أُبَلِّغُكُمۡ رِسَٰلَٰتِ رَبِّي وَأَنصَحُ لَكُمۡ وَأَعۡلَمُ مِنَ ٱللَّهِ مَا لَا تَعۡلَمُونَ</p>
  <p style="font-size:18px;">62. "I convey unto you the Messages of my Lord and give sincere advice to you. And I know from Allâh what you know not.</p>
