<div class="single-verse">
  <p><strong>7:106</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ إِن كُنتَ جِئۡتَ بِـَٔايَةٖ فَأۡتِ بِهَآ إِن كُنتَ مِنَ ٱلصَّٰدِقِينَ</p>
  <p style="font-size:18px;">106. [Fir‘aun (Pharaoh)] said: "If you have come with a sign, show it forth, if you are one of those who tell the truth."</p>
