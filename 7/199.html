<div class="single-verse">
  <p><strong>7:199</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">خُذِ ٱلۡعَفۡوَ وَأۡمُرۡ بِٱلۡعُرۡفِ وَأَعۡرِضۡ عَنِ ٱلۡجَٰهِلِينَ</p>
  <p style="font-size:18px;">199. Show forgiveness, enjoin what is good, and turn away from the foolish (i.e. don’t punish them).</p>
