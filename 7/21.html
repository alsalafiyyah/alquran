<div class="single-verse">
  <p><strong>7:21</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَقَاسَمَهُمَآ إِنِّي لَكُمَا لَمِنَ ٱلنَّٰصِحِينَ</p>
  <p style="font-size:18px;">21. And he [Shaitân (Satan)] swore by Allâh to them both (saying): "Verily, I am one of the sincere well-wishers for you both."</p>
