<div class="single-verse">
  <p><strong>7:6</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَلَنَسۡـَٔلَنَّ ٱلَّذِينَ أُرۡسِلَ إِلَيۡهِمۡ وَلَنَسۡـَٔلَنَّ ٱلۡمُرۡسَلِينَ</p>
  <p style="font-size:18px;">6. Then surely, We shall question those (people) to whom it (the Book) was sent and verily, We shall question the Messengers.</p>
