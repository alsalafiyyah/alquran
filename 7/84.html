<div class="single-verse">
  <p><strong>7:84</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَأَمۡطَرۡنَا عَلَيۡهِم مَّطَرٗاۖ فَٱنظُرۡ كَيۡفَ كَانَ عَٰقِبَةُ ٱلۡمُجۡرِمِينَ</p>
  <p style="font-size:18px;">84. And We rained down on them a rain (of stones). Then see what was the end of the Mujrimûn (criminals, polytheists and sinners).</p>
</div>
