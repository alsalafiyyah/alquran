<div class="single-verse">
  <p><strong>7:83</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَأَنجَيۡنَٰهُ وَأَهۡلَهُۥٓ إِلَّا ٱمۡرَأَتَهُۥ كَانَتۡ مِنَ ٱلۡغَٰبِرِينَ</p>
  <p style="font-size:18px;">83. Then We saved him and his family, except his wife; she was of those who remained behind (in the torment).</p>
