<div class="single-verse">
  <p><strong>7:202</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِخۡوَٰنُهُمۡ يَمُدُّونَهُمۡ فِي ٱلۡغَيِّ ثُمَّ لَا يُقۡصِرُونَ</p>
  <p style="font-size:18px;">202. But (as for) their brothers (the devils) they (i.e. the devils) plunge them deeper into error, and they never stop short.</p>
