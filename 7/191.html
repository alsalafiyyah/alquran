  <p><strong>7:191</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَيُشۡرِكُونَ مَا لَا يَخۡلُقُ شَيۡـٔٗا وَهُمۡ يُخۡلَقُونَ</p>
