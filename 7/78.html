  <p><strong>7:78</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَأَخَذَتۡهُمُ ٱلرَّجۡفَةُ فَأَصۡبَحُواْ فِي دَارِهِمۡ جَٰثِمِينَ</p>
