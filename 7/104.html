<div class="single-verse">
  <p><strong>7:104</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَقَالَ مُوسَىٰ يَٰفِرۡعَوۡنُ إِنِّي رَسُولٞ مِّن رَّبِّ ٱلۡعَٰلَمِينَ</p>
  <p style="font-size:18px;">104. And Mûsâ (Moses) said: "O Fir‘aun (Pharaoh)! Verily, I am a Messenger from the Lord of the ‘Âlamîn (mankind, jinn and all that exists).</p>
