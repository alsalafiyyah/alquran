<div class="single-verse">
  <p><strong>7:5</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَمَا كَانَ دَعۡوَىٰهُمۡ إِذۡ جَآءَهُم بَأۡسُنَآ إِلَّآ أَن قَالُوٓاْ إِنَّا كُنَّا ظَٰلِمِينَ</p>
  <p style="font-size:18px;">5. No cry did they utter when Our Torment came upon them but this: "Verily, we were Zâlimûn (polytheists and wrong-doers)".</p>
</div>
