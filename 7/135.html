<div class="single-verse">
  <p><strong>7:135</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَلَمَّا كَشَفۡنَا عَنۡهُمُ ٱلرِّجۡزَ إِلَىٰٓ أَجَلٍ هُم بَٰلِغُوهُ إِذَا هُمۡ يَنكُثُونَ</p>
  <p style="font-size:18px;">135. But when We removed the punishment from them to a fixed term, which they had to reach, behold! they broke their word!</p>
