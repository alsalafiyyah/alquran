<div class="single-verse">
  <p><strong>7:55</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱدۡعُواْ رَبَّكُمۡ تَضَرُّعٗا وَخُفۡيَةًۚ إِنَّهُۥ لَا يُحِبُّ ٱلۡمُعۡتَدِينَ</p>
  <p style="font-size:18px;">55. Invoke your Lord with humility and in secret. He likes not the aggressors.</p>
