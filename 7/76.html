<div class="single-verse">
  <p><strong>7:76</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ ٱلَّذِينَ ٱسۡتَكۡبَرُوٓاْ إِنَّا بِٱلَّذِيٓ ءَامَنتُم بِهِۦ كَٰفِرُونَ</p>
  <p style="font-size:18px;">76. Those who were arrogant said: "Verily, we disbelieve in that which you believe in."</p>
