<div class="single-verse">
  <p><strong>7:198</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِن تَدۡعُوهُمۡ إِلَى ٱلۡهُدَىٰ لَا يَسۡمَعُواْۖ وَتَرَىٰهُمۡ يَنظُرُونَ إِلَيۡكَ وَهُمۡ لَا يُبۡصِرُونَ</p>
  <p style="font-size:18px;">198. And if you call them to guidance, they hear not and you will see them looking at you, yet they see not.</p>
</div>
