<div class="single-verse">
  <p><strong>7:97</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَفَأَمِنَ أَهۡلُ ٱلۡقُرَىٰٓ أَن يَأۡتِيَهُم بَأۡسُنَا بَيَٰتٗا وَهُمۡ نَآئِمُونَ</p>
  <p style="font-size:18px;">97. Did the people of the towns then feel secure against the coming of Our punishment by night while they were asleep?</p>
