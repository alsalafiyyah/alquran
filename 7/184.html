<div class="single-verse">
  <p><strong>7:184</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَوَلَمۡ يَتَفَكَّرُواْۗ مَا بِصَاحِبِهِم مِّن جِنَّةٍۚ إِنۡ هُوَ إِلَّا نَذِيرٞ مُّبِينٌ</p>
  <p style="font-size:18px;">184. Do they not reflect? There is no madness in their companion (Muhammad صلى الله عليه وسلم). He is but a plain warner.</p>
</div>
