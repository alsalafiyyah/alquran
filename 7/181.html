<div class="single-verse">
  <p><strong>7:181</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمِمَّنۡ خَلَقۡنَآ أُمَّةٞ يَهۡدُونَ بِٱلۡحَقِّ وَبِهِۦ يَعۡدِلُونَ</p>
  <p style="font-size:18px;">181. And of those whom We have created, there is a community who guides (others) with the truth, and establishes justice therewith.</p>
