<div class="single-verse">
  <p><strong>7:98</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَوَأَمِنَ أَهۡلُ ٱلۡقُرَىٰٓ أَن يَأۡتِيَهُم بَأۡسُنَا ضُحٗى وَهُمۡ يَلۡعَبُونَ</p>
  <p style="font-size:18px;">98. Or, did the people of the towns then feel secure against the coming of Our punishment in the forenoon while they were playing?</p>
