<div class="single-verse">
  <p><strong>7:197</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَٱلَّذِينَ تَدۡعُونَ مِن دُونِهِۦ لَا يَسۡتَطِيعُونَ نَصۡرَكُمۡ وَلَآ أَنفُسَهُمۡ يَنصُرُونَ</p>
  <p style="font-size:18px;">197. And those whom you call upon besides Him (Allâh) cannot help you nor can they help themselves.</p>
