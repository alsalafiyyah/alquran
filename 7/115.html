<div class="single-verse">
  <p><strong>7:115</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُواْ يَٰمُوسَىٰٓ إِمَّآ أَن تُلۡقِيَ وَإِمَّآ أَن نَّكُونَ نَحۡنُ ٱلۡمُلۡقِينَ</p>
  <p style="font-size:18px;">115. They said: "O Mûsâ (Moses)! Either you throw (first), or shall we have the (first) throw?"</p>
