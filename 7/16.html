<div class="single-verse">
  <p><strong>7:16</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ فَبِمَآ أَغۡوَيۡتَنِي لَأَقۡعُدَنَّ لَهُمۡ صِرَٰطَكَ ٱلۡمُسۡتَقِيمَ</p>
  <p style="font-size:18px;">16. (Iblîs) said: "Because You have sent me astray, surely I will sit in wait against them (human beings) on Your Straight Path.</p>
