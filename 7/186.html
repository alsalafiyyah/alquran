<div class="single-verse">
  <p><strong>7:186</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">مَن يُضۡلِلِ ٱللَّهُ فَلَا هَادِيَ لَهُۥۚ وَيَذَرُهُمۡ فِي طُغۡيَٰنِهِمۡ يَعۡمَهُونَ</p>
  <p style="font-size:18px;">186. Whomsoever Allâh sends astray, none can guide him; and He lets them wander blindly in their transgressions.</p>
