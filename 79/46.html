<div class="single-verse">
  <p><strong>79:46</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">كَأَنَّهُمۡ يَوۡمَ يَرَوۡنَهَا لَمۡ يَلۡبَثُوٓاْ إِلَّا عَشِيَّةً أَوۡ ضُحَىٰهَا</p>
  <p style="font-size:18px;">46. The Day they see it, (it will be) as if they had not tarried (in this world) except an afternoon or a morning.</p>
