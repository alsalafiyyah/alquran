<div class="single-verse">
  <p><strong>79:40</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَأَمَّا مَنۡ خَافَ مَقَامَ رَبِّهِۦ وَنَهَى ٱلنَّفۡسَ عَنِ ٱلۡهَوَىٰ</p>
  <p style="font-size:18px;">40. But as for him who feared standing before his Lord, and restrained himself from impure evil desires and lusts.</p>
