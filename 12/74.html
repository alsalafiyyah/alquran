<div class="single-verse">
  <p><strong>12:74</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُواْ فَمَا جَزَٰٓؤُهُۥٓ إِن كُنتُمۡ كَٰذِبِينَ</p>
  <p style="font-size:18px;">74. They [Yûsuf’s (Joseph) men] said: "What then shall be the penalty of him, if you are (proved to be) liars."</p>
