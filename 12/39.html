<div class="single-verse">
  <p><strong>12:39</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَٰصَٰحِبَيِ ٱلسِّجۡنِ ءَأَرۡبَابٞ مُّتَفَرِّقُونَ خَيۡرٌ أَمِ ٱللَّهُ ٱلۡوَٰحِدُ ٱلۡقَهَّارُ</p>
  <p style="font-size:18px;">39. "O two companions of the prison! Are many different lords (gods) better or Allâh, the One, the Irresistible?</p>
