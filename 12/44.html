<div class="single-verse">
  <p><strong>12:44</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُوٓاْ أَضۡغَٰثُ أَحۡلَٰمٖۖ وَمَا نَحۡنُ بِتَأۡوِيلِ ٱلۡأَحۡلَٰمِ بِعَٰلِمِينَ</p>
  <p style="font-size:18px;">44. They said: "Mixed up false dreams and we are not skilled in the interpretation of dreams."</p>
