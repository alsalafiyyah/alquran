<div class="single-verse">
  <p><strong>12:35</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ثُمَّ بَدَا لَهُم مِّنۢ بَعۡدِ مَا رَأَوُاْ ٱلۡأٓيَٰتِ لَيَسۡجُنُنَّهُۥ حَتَّىٰ حِينٖ</p>
  <p style="font-size:18px;">35. Then it occurred to them, after they had seen the proofs (of his innocence), to imprison him for a time.</p>
