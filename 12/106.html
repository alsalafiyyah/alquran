<div class="single-verse">
  <p><strong>12:106</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَمَا يُؤۡمِنُ أَكۡثَرُهُم بِٱللَّهِ إِلَّا وَهُم مُّشۡرِكُونَ</p>
  <p style="font-size:18px;">106. And most of them believe not in Allâh except that they attribute partners unto Him [i.e. they are Mushrikûn i.e. polytheists. See Verse 6: 121].</p>
</div>
