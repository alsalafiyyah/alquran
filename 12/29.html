<div class="single-verse">
  <p><strong>12:29</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يُوسُفُ أَعۡرِضۡ عَنۡ هَٰذَاۚ وَٱسۡتَغۡفِرِي لِذَنۢبِكِۖ إِنَّكِ كُنتِ مِنَ ٱلۡخَاطِـِٔينَ</p>
  <p style="font-size:18px;">29. "O Yûsuf (Joseph)! Turn away from this! (O woman!) Ask forgiveness for your sin. Verily, you were of the sinful."</p>
