<div class="single-verse">
  <p><strong>12:7</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">۞ لَّقَدۡ كَانَ فِي يُوسُفَ وَإِخۡوَتِهِۦٓ ءَايَٰتٞ لِّلسَّآئِلِينَ</p>
  <p style="font-size:18px;">7. Verily, in Yûsuf (Joseph) and his brethren, there were Ayât (proofs, evidence, verses, lessons, signs, revelations, etc.) for those who ask.</p>
