<div class="single-verse">
  <p><strong>12:61</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُواْ سَنُرَٰوِدُ عَنۡهُ أَبَاهُ وَإِنَّا لَفَٰعِلُونَ</p>
  <p style="font-size:18px;">61. They said: "We shall try to get permission (for him) from his father, and verily, we shall do it."</p>
