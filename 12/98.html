<div class="single-verse">
  <p><strong>12:98</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ سَوۡفَ أَسۡتَغۡفِرُ لَكُمۡ رَبِّيٓۖ إِنَّهُۥ هُوَ ٱلۡغَفُورُ ٱلرَّحِيمُ</p>
  <p style="font-size:18px;">98. He said: "I will ask my Lord for forgiveness for you, verily He! Only He is the Oft-Forgiving, the Most Merciful."</p>
