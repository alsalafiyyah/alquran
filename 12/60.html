<div class="single-verse">
  <p><strong>12:60</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَإِن لَّمۡ تَأۡتُونِي بِهِۦ فَلَا كَيۡلَ لَكُمۡ عِندِي وَلَا تَقۡرَبُونِ</p>
  <p style="font-size:18px;">60. "But if you bring him not to me, there shall be no measure (of corn) for you with me, nor shall you come near me."</p>
