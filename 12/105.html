<div class="single-verse">
  <p><strong>12:105</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَكَأَيِّن مِّنۡ ءَايَةٖ فِي ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِ يَمُرُّونَ عَلَيۡهَا وَهُمۡ عَنۡهَا مُعۡرِضُونَ</p>
  <p style="font-size:18px;">105. And how many a sign in the heavens and the earth they pass by, while they are averse therefrom.</p>
</div>
