<div class="single-verse">
  <p><strong>12:58</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَجَآءَ إِخۡوَةُ يُوسُفَ فَدَخَلُواْ عَلَيۡهِ فَعَرَفَهُمۡ وَهُمۡ لَهُۥ مُنكِرُونَ</p>
  <p style="font-size:18px;">58. And Yûsuf’s (Joseph) brethren came and they entered unto him, and he recognized them, but they recognized him not.</p>
