<div class="single-verse">
  <p><strong>12:14</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُواْ لَئِنۡ أَكَلَهُ ٱلذِّئۡبُ وَنَحۡنُ عُصۡبَةٌ إِنَّآ إِذٗا لَّخَٰسِرُونَ</p>
  <p style="font-size:18px;">14. They said: "If a wolf devours him, while we are a strong group (to guard him), then surely, we are the losers."</p>
