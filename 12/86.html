<div class="single-verse">
  <p><strong>12:86</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ إِنَّمَآ أَشۡكُواْ بَثِّي وَحُزۡنِيٓ إِلَى ٱللَّهِ وَأَعۡلَمُ مِنَ ٱللَّهِ مَا لَا تَعۡلَمُونَ</p>
  <p style="font-size:18px;">86. He said: "I only complain of my grief and sorrow to Allâh, and I know from Allâh that which you know not.</p>
</div>
