<div class="single-verse">
  <p><strong>12:97</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُواْ يَٰٓأَبَانَا ٱسۡتَغۡفِرۡ لَنَا ذُنُوبَنَآ إِنَّا كُنَّا خَٰطِـِٔينَ</p>
  <p style="font-size:18px;">97. They said: "O our father! Ask Forgiveness (from Allâh) for our sins, indeed we have been sinners."</p>
