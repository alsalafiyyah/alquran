<div class="single-verse">
  <p><strong>12:11</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُواْ يَٰٓأَبَانَا مَا لَكَ لَا تَأۡمَ۬نَّا عَلَىٰ يُوسُفَ وَإِنَّا لَهُۥ لَنَٰصِحُونَ</p>
  <p style="font-size:18px;">11. They said: "O our father! Why do you not trust us with Yûsuf (Joseph) though we are indeed his well-wishers?"</p>
