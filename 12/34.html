<div class="single-verse">
  <p><strong>12:34</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَٱسۡتَجَابَ لَهُۥ رَبُّهُۥ فَصَرَفَ عَنۡهُ كَيۡدَهُنَّۚ إِنَّهُۥ هُوَ ٱلسَّمِيعُ ٱلۡعَلِيمُ</p>
  <p style="font-size:18px;">34. So his Lord answered his invocation and turned away from him their plot. Verily, He is the All-Hearer, the All-Knower.</p>
</div>
