<div class="single-verse">
  <p><strong>12:73</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُواْ تَٱللَّهِ لَقَدۡ عَلِمۡتُم مَّا جِئۡنَا لِنُفۡسِدَ فِي ٱلۡأَرۡضِ وَمَا كُنَّا سَٰرِقِينَ</p>
  <p style="font-size:18px;">73. They said: "By Allâh! Indeed you know that we came not to make mischief in the land, and we are no thieves!"</p>
</div>
