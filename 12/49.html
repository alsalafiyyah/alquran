<div class="single-verse">
  <p><strong>12:49</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ثُمَّ يَأۡتِي مِنۢ بَعۡدِ ذَٰلِكَ عَامٞ فِيهِ يُغَاثُ ٱلنَّاسُ وَفِيهِ يَعۡصِرُونَ</p>
  <p style="font-size:18px;">49. "Then thereafter will come a year in which people will have abundant rain and in which they will press (wine and oil)."</p>
