<div class="single-verse">
  <p><strong>12:89</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ هَلۡ عَلِمۡتُم مَّا فَعَلۡتُم بِيُوسُفَ وَأَخِيهِ إِذۡ أَنتُمۡ جَٰهِلُونَ</p>
  <p style="font-size:18px;">89. He said: "Do you know what you did with Yûsuf (Joseph) and his brother, when you were ignorant?"</p>
