<div class="single-verse">
  <p><strong>12:91</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُواْ تَٱللَّهِ لَقَدۡ ءَاثَرَكَ ٱللَّهُ عَلَيۡنَا وَإِن كُنَّا لَخَٰطِـِٔينَ</p>
  <p style="font-size:18px;">91. They said: "By Allâh! Indeed Allâh has preferred you above us, and we certainly have been sinners."</p>
