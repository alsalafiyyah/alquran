<div class="single-verse">
  <p><strong>54:19</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّآ أَرۡسَلۡنَا عَلَيۡهِمۡ رِيحٗا صَرۡصَرٗا فِي يَوۡمِ نَحۡسٖ مُّسۡتَمِرّٖ</p>
  <p style="font-size:18px;">19. Verily, We sent against them a furious wind of harsh voice on a day of evil omen and continuous calamity.</p>
