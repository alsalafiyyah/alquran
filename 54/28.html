<div class="single-verse">
  <p><strong>54:28</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَنَبِّئۡهُمۡ أَنَّ ٱلۡمَآءَ قِسۡمَةُۢ بَيۡنَهُمۡۖ كُلُّ شِرۡبٖ مُّحۡتَضَرٞ</p>
  <p style="font-size:18px;">28. And inform them that the water is to be shared between (her and) them, each one’s right to drink being established (by turns).</p>
