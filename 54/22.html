<div class="single-verse">
  <p><strong>54:22</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَقَدۡ يَسَّرۡنَا ٱلۡقُرۡءَانَ لِلذِّكۡرِ فَهَلۡ مِن مُّدَّكِرٖ</p>
  <p style="font-size:18px;">22. And We have indeed made the Qur’ân easy to understand and remember; then is there any that will remember (or receive admonition)?</p>
