<div class="single-verse">
  <p><strong>54:36</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَقَدۡ أَنذَرَهُم بَطۡشَتَنَا فَتَمَارَوۡاْ بِٱلنُّذُرِ</p>
  <p style="font-size:18px;">36. And he [Lût (Lot)] indeed had warned them of Our Seizure (punishment), but they did doubt the warnings!</p>
