<div class="single-verse">
  <p><strong>54:17</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَقَدۡ يَسَّرۡنَا ٱلۡقُرۡءَانَ لِلذِّكۡرِ فَهَلۡ مِن مُّدَّكِرٖ</p>
  <p style="font-size:18px;">17. And We have indeed made the Qur’ân easy to understand and remember; then is there any one who will remember (or receive admonition)?</p>
