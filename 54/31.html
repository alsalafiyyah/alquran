<div class="single-verse">
  <p><strong>54:31</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّآ أَرۡسَلۡنَا عَلَيۡهِمۡ صَيۡحَةٗ وَٰحِدَةٗ فَكَانُواْ كَهَشِيمِ ٱلۡمُحۡتَظِرِ</p>
  <p style="font-size:18px;">31. Verily, We sent against them a single Saihah (torment - awful cry), and they became like the stubble of a fold-builder.</p>
