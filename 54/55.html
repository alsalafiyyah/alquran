  <p><strong>54:55</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فِي مَقۡعَدِ صِدۡقٍ عِندَ مَلِيكٖ مُّقۡتَدِرِۭ</p>
  <p style="font-size:18px;">55. In a seat of truth (i.e. Paradise), near the Omnipotent King (Allâh, the One, the All-Blessed, the Most High, the Owner of Majesty and Honour).</p>
