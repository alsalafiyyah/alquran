<div class="single-verse">
  <p><strong>54:27</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّا مُرۡسِلُواْ ٱلنَّاقَةِ فِتۡنَةٗ لَّهُمۡ فَٱرۡتَقِبۡهُمۡ وَٱصۡطَبِرۡ</p>
  <p style="font-size:18px;">27. Verily, We are sending the she-camel as a test for them. So watch them [O Sâlih عليه السلام], and be patient!</p>
