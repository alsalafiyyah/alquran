<div class="single-verse">
  <p><strong>54:6</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَتَوَلَّ عَنۡهُمۡۘ يَوۡمَ يَدۡعُ ٱلدَّاعِ إِلَىٰ شَيۡءٖ نُّكُرٍ</p>
  <p style="font-size:18px;">6. So (O Muhammad صلى الله عليه وسلم) withdraw from them. The Day that the caller will call (them) to a terrible thing.</p>
