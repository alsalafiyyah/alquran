  <p><strong>54:2</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِن يَرَوۡاْ ءَايَةٗ يُعۡرِضُواْ وَيَقُولُواْ سِحۡرٞ مُّسۡتَمِرّٞ</p>
  <p style="font-size:18px;">2. And if they see a sign, they turn away, and say: "This is continuous magic."</p>
