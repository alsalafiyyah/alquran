<div class="single-verse">
  <p><strong>54:47</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ ٱلۡمُجۡرِمِينَ فِي ضَلَٰلٖ وَسُعُرٖ</p>
  <p style="font-size:18px;">47. Verily the Mujrimûn (polytheists, disbelievers, sinners, criminals) are in error (in this world) and will burn (in the Hell-fire in the Hereafter).</p>
