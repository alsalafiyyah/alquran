<div class="single-verse">
  <p><strong>54:12</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَفَجَّرۡنَا ٱلۡأَرۡضَ عُيُونٗا فَٱلۡتَقَى ٱلۡمَآءُ عَلَىٰٓ أَمۡرٖ قَدۡ قُدِرَ</p>
  <p style="font-size:18px;">12. And We caused springs to gush forth from the earth. So the waters (of the heaven and the earth) met for a matter predestined.</p>
