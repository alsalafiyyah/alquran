<div class="single-verse">
  <p><strong>54:46</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">بَلِ ٱلسَّاعَةُ مَوۡعِدُهُمۡ وَٱلسَّاعَةُ أَدۡهَىٰ وَأَمَرُّ</p>
  <p style="font-size:18px;">46. Nay, but the Hour is their appointed time (for their full recompense), and the Hour will be more grievous and more bitter.</p>
