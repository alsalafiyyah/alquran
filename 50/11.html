<div class="single-verse">
  <p><strong>50:11</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">رِّزۡقٗا لِّلۡعِبَادِۖ وَأَحۡيَيۡنَا بِهِۦ بَلۡدَةٗ مَّيۡتٗاۚ كَذَٰلِكَ ٱلۡخُرُوجُ</p>
  <p style="font-size:18px;">11. A provision for (Allâh’s) slaves. And We give life therewith to a dead land. Thus will be the resurrection (of the dead).</p>
