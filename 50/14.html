<div class="single-verse">
  <p><strong>50:14</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَأَصۡحَٰبُ ٱلۡأَيۡكَةِ وَقَوۡمُ تُبَّعٖۚ كُلّٞ كَذَّبَ ٱلرُّسُلَ فَحَقَّ وَعِيدِ</p>
  <p style="font-size:18px;">14. And the Dwellers of the Wood, and the people of Tubba‘. Everyone of them denied (their) Messengers, so My Threat took effect.</p>
