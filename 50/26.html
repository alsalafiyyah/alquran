<div class="single-verse">
  <p><strong>50:26</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱلَّذِي جَعَلَ مَعَ ٱللَّهِ إِلَٰهًا ءَاخَرَ فَأَلۡقِيَاهُ فِي ٱلۡعَذَابِ ٱلشَّدِيدِ</p>
  <p style="font-size:18px;">26. "Who set up another ilâh (god) with Allâh. Then both of you cast him in the severe torment."</p>
