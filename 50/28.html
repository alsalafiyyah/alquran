  <p><strong>50:28</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالَ لَا تَخۡتَصِمُواْ لَدَيَّ وَقَدۡ قَدَّمۡتُ إِلَيۡكُم بِٱلۡوَعِيدِ</p>
