<div class="single-verse">
  <p><strong>50:15</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَفَعَيِينَا بِٱلۡخَلۡقِ ٱلۡأَوَّلِۚ بَلۡ هُمۡ فِي لَبۡسٖ مِّنۡ خَلۡقٖ جَدِيدٖ</p>
  <p style="font-size:18px;">15. Were We then tired with the first creation? Nay, they are in confused doubt about a new creation (i.e. Resurrection).</p>
