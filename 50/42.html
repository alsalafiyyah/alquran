<div class="single-verse">
  <p><strong>50:42</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">يَوۡمَ يَسۡمَعُونَ ٱلصَّيۡحَةَ بِٱلۡحَقِّۚ ذَٰلِكَ يَوۡمُ ٱلۡخُرُوجِ</p>
  <p style="font-size:18px;">42. The Day when they will hear As-Saihah (shout) in truth: that will be the Day of coming out (from the graves, i.e. the Day of Resurrection).</p>
</div>
