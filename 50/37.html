<div class="single-verse">
  <p><strong>50:37</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنَّ فِي ذَٰلِكَ لَذِكۡرَىٰ لِمَن كَانَ لَهُۥ قَلۡبٌ أَوۡ أَلۡقَى ٱلسَّمۡعَ وَهُوَ شَهِيدٞ</p>
  <p style="font-size:18px;">37. Verily, therein is indeed a reminder for him who has a heart or gives ear while he is heedful.</p>
