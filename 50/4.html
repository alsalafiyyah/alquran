<div class="single-verse">
  <p><strong>50:4</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَدۡ عَلِمۡنَا مَا تَنقُصُ ٱلۡأَرۡضُ مِنۡهُمۡۖ وَعِندَنَا كِتَٰبٌ حَفِيظُۢ</p>
  <p style="font-size:18px;">4. We know that which the earth takes of them (their dead bodies), and with Us is a Book preserved (i.e. the Book of Decrees).</p>
