<div class="single-verse">
  <p><strong>35:15</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">۞ يَٰٓأَيُّهَا ٱلنَّاسُ أَنتُمُ ٱلۡفُقَرَآءُ إِلَى ٱللَّهِۖ وَٱللَّهُ هُوَ ٱلۡغَنِيُّ ٱلۡحَمِيدُ</p>
  <p style="font-size:18px;">15. O mankind! it is you who stand in need of Allâh. But Allâh is Rich (Free of all needs), Worthy of all praise.</p>
