<div class="single-verse">
  <p><strong>35:23</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنۡ أَنتَ إِلَّا نَذِيرٌ</p>
  <p style="font-size:18px;">23. You (O Muhammad صلى الله عليه وسلم) are only a warner (i.e. your duty is to convey Allâh’s Message to mankind but the guidance is Allâh’s).</p>
