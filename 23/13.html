<div class="single-verse">
  <p><strong>23:13</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ثُمَّ جَعَلۡنَٰهُ نُطۡفَةٗ فِي قَرَارٖ مَّكِينٖ</p>
  <p style="font-size:18px;">13. Thereafter We made him (the offspring of Adam) as a Nutfah (mixed drops of the male and female sexual discharge and lodged it) in a safe lodging (womb of the woman).</p>
