<div class="single-verse">
  <p><strong>23:82</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُوٓاْ أَءِذَا مِتۡنَا وَكُنَّا تُرَابٗا وَعِظَٰمًا أَءِنَّا لَمَبۡعُوثُونَ</p>
  <p style="font-size:18px;">82. They said: "When we are dead and have become dust and bones, shall we be resurrected indeed?</p>
