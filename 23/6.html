<div class="single-verse">
  <p><strong>23:6</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِلَّا عَلَىٰٓ أَزۡوَٰجِهِمۡ أَوۡ مَا مَلَكَتۡ أَيۡمَٰنُهُمۡ فَإِنَّهُمۡ غَيۡرُ مَلُومِينَ</p>
  <p style="font-size:18px;">6. Except from their wives or (the slaves) that their right hands possess, - for then, they are free from blame;</p>
