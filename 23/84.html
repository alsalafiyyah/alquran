  <p><strong>23:84</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قُل لِّمَنِ ٱلۡأَرۡضُ وَمَن فِيهَآ إِن كُنتُمۡ تَعۡلَمُونَ</p>
  <p style="font-size:18px;">84. Say: "Whose is the earth and whosoever is therein? If you know!"</p>
