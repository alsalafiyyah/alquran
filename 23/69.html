<div class="single-verse">
  <p><strong>23:69</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَمۡ لَمۡ يَعۡرِفُواْ رَسُولَهُمۡ فَهُمۡ لَهُۥ مُنكِرُونَ</p>
  <p style="font-size:18px;">69. Or is it that they did not recognize their Messenger (Muhammad صلى الله عليه وسلم) so they deny him?</p>
