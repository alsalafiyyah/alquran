<div class="single-verse">
  <p><strong>23:80</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَهُوَ ٱلَّذِي يُحۡيِۦ وَيُمِيتُ وَلَهُ ٱخۡتِلَٰفُ ٱلَّيۡلِ وَٱلنَّهَارِۚ أَفَلَا تَعۡقِلُونَ</p>
  <p style="font-size:18px;">80. And it is He Who gives life and causes death, and His is the alternation of night and day. Will you not then understand?</p>
</div>
