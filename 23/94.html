<div class="single-verse">
  <p><strong>23:94</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">رَبِّ فَلَا تَجۡعَلۡنِي فِي ٱلۡقَوۡمِ ٱلظَّٰلِمِينَ</p>
  <p style="font-size:18px;">94. "My Lord! Then (save me from Your punishment), put me not amongst the people who are the Zâlimûn (polytheists and wrong-doers)."</p>
