<div class="single-verse">
  <p><strong>23:20</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَشَجَرَةٗ تَخۡرُجُ مِن طُورِ سَيۡنَآءَ تَنۢبُتُ بِٱلدُّهۡنِ وَصِبۡغٖ لِّلۡأٓكِلِينَ</p>
  <p style="font-size:18px;">20. And a tree (olive) that springs forth from Mount Sinai, that grows (produces) oil, and (it is a) relish for the eaters.</p>
