<div class="single-verse">
  <p><strong>23:64</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">حَتَّىٰٓ إِذَآ أَخَذۡنَا مُتۡرَفِيهِم بِٱلۡعَذَابِ إِذَا هُمۡ يَجۡـَٔرُونَ</p>
  <p style="font-size:18px;">64. Until when We seize those of them who lead a luxurious life with punishment: behold they make humble invocation with a loud voice.</p>
