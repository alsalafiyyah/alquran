<div class="single-verse">
  <p><strong>23:115</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَفَحَسِبۡتُمۡ أَنَّمَا خَلَقۡنَٰكُمۡ عَبَثٗا وَأَنَّكُمۡ إِلَيۡنَا لَا تُرۡجَعُونَ</p>
  <p style="font-size:18px;">115. "Did you think that We had created you in play (without any purpose), and that you would not be brought back to Us?"</p>
