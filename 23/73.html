<div class="single-verse">
  <p><strong>23:73</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِنَّكَ لَتَدۡعُوهُمۡ إِلَىٰ صِرَٰطٖ مُّسۡتَقِيمٖ</p>
  <p style="font-size:18px;">73. And certainly, you (O Muhammad صلى الله عليه وسلم) call them to the Straight Path (true religion - Islâmic Monotheism).</p>
