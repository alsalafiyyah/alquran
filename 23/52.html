<div class="single-verse">
  <p><strong>23:52</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِنَّ هَٰذِهِۦٓ أُمَّتُكُمۡ أُمَّةٗ وَٰحِدَةٗ وَأَنَا۠ رَبُّكُمۡ فَٱتَّقُونِ</p>
  <p style="font-size:18px;">52. And verily this your religion (of Islâmic Monotheism) is one religion, and I am your Lord, so fear (keep your duty to) Me.</p>
</div>
