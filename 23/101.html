<div class="single-verse">
  <p><strong>23:101</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَإِذَا نُفِخَ فِي ٱلصُّورِ فَلَآ أَنسَابَ بَيۡنَهُمۡ يَوۡمَئِذٖ وَلَا يَتَسَآءَلُونَ</p>
  <p style="font-size:18px;">101. Then, when the Trumpet is blown, there will be no kinship among them that Day, nor will they ask of one another.</p>
