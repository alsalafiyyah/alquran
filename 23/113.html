  <p><strong>23:113</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَالُواْ لَبِثۡنَا يَوۡمًا أَوۡ بَعۡضَ يَوۡمٖ فَسۡـَٔلِ ٱلۡعَآدِّينَ</p>
