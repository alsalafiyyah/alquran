  <p><strong>23:89</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">سَيَقُولُونَ لِلَّهِۚ قُلۡ فَأَنَّىٰ تُسۡحَرُونَ</p>
  <p style="font-size:18px;">89. They will say: "(All that belongs) to Allâh." Say: "How then are you deceived and turn away from the truth?"</p>
