<div class="single-verse">
  <p><strong>23:90</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">بَلۡ أَتَيۡنَٰهُم بِٱلۡحَقِّ وَإِنَّهُمۡ لَكَٰذِبُونَ</p>
  <p style="font-size:18px;">90. Nay, but We have brought them the truth (Islâmic Monotheism), and verily, they (disbelievers) are liars.</p>
