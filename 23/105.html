<div class="single-verse">
  <p><strong>23:105</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَلَمۡ تَكُنۡ ءَايَٰتِي تُتۡلَىٰ عَلَيۡكُمۡ فَكُنتُم بِهَا تُكَذِّبُونَ</p>
  <p style="font-size:18px;">105. "Were not My Verses (this Qur’ân) recited to you, and then you used to deny them?"</p>
