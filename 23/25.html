  <p><strong>23:25</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنۡ هُوَ إِلَّا رَجُلُۢ بِهِۦ جِنَّةٞ فَتَرَبَّصُواْ بِهِۦ حَتَّىٰ حِينٖ</p>
  <p style="font-size:18px;">25. "He is only a man in whom is madness, so wait for him a while."</p>
