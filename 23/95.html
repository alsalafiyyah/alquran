<div class="single-verse">
  <p><strong>23:95</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِنَّا عَلَىٰٓ أَن نُّرِيَكَ مَا نَعِدُهُمۡ لَقَٰدِرُونَ</p>
  <p style="font-size:18px;">95. And indeed We are Able to show you (O Muhammad صلى الله عليه وسلم) that with which We have threatened them.</p>
