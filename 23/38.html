<div class="single-verse">
  <p><strong>23:38</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنۡ هُوَ إِلَّا رَجُلٌ ٱفۡتَرَىٰ عَلَى ٱللَّهِ كَذِبٗا وَمَا نَحۡنُ لَهُۥ بِمُؤۡمِنِينَ</p>
  <p style="font-size:18px;">38. "He is only a man who has invented a lie against Allâh, and we are not going to believe in him."</p>
