  <p><strong>23:114</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">قَٰلَ إِن لَّبِثۡتُمۡ إِلَّا قَلِيلٗاۖ لَّوۡ أَنَّكُمۡ كُنتُمۡ تَعۡلَمُونَ</p>
