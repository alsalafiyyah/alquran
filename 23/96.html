  <p><strong>23:96</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">ٱدۡفَعۡ بِٱلَّتِي هِيَ أَحۡسَنُ ٱلسَّيِّئَةَۚ نَحۡنُ أَعۡلَمُ بِمَا يَصِفُونَ</p>
  <p style="font-size:18px;">96. Repel evil with that which is better. We are Best-Acquainted with the things they utter.</p>
