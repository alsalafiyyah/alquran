<div class="single-verse">
  <p><strong>23:35</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">أَيَعِدُكُمۡ أَنَّكُمۡ إِذَا مِتُّمۡ وَكُنتُمۡ تُرَابٗا وَعِظَٰمًا أَنَّكُم مُّخۡرَجُونَ</p>
  <p style="font-size:18px;">35. "Does he promise you that when you have died and have become dust and bones, you shall come out alive (resurrected)?</p>
