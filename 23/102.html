  <p><strong>23:102</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">فَمَن ثَقُلَتۡ مَوَٰزِينُهُۥ فَأُوْلَٰٓئِكَ هُمُ ٱلۡمُفۡلِحُونَ</p>
  <p style="font-size:18px;">102. Then, those whose scales (of good deeds) are heavy, they are the successful.</p>
