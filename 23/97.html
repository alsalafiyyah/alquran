  <p><strong>23:97</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَقُل رَّبِّ أَعُوذُ بِكَ مِنۡ هَمَزَٰتِ ٱلشَّيَٰطِينِ</p>
  <p style="font-size:18px;">97. And say: "My Lord! I seek refuge with You from the whisperings (suggestions) of the Shayâtîn (devils).</p>
