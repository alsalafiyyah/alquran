<div class="single-verse">
  <p><strong>23:17</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَلَقَدۡ خَلَقۡنَا فَوۡقَكُمۡ سَبۡعَ طَرَآئِقَ وَمَا كُنَّا عَنِ ٱلۡخَلۡقِ غَٰفِلِينَ</p>
  <p style="font-size:18px;">17. And indeed We have created above you seven heavens (one over the other), and We are never unaware of the creation.</p>
