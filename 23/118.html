<div class="single-verse">
  <p><strong>23:118</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَقُل رَّبِّ ٱغۡفِرۡ وَٱرۡحَمۡ وَأَنتَ خَيۡرُ ٱلرَّٰحِمِينَ</p>
  <p style="font-size:18px;">118. And say (O Muhammad صلى الله عليه وسلم): "My Lord! Forgive and have mercy, for You are the Best of those who show mercy!"</p>
