<div class="single-verse">
  <p><strong>23:37</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنۡ هِيَ إِلَّا حَيَاتُنَا ٱلدُّنۡيَا نَمُوتُ وَنَحۡيَا وَمَا نَحۡنُ بِمَبۡعُوثِينَ</p>
  <p style="font-size:18px;">37. "There is nothing but our life of this world! We die and we live! And we are not going to be resurrected!</p>
