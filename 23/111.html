<div class="single-verse">
  <p><strong>23:111</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">إِنِّي جَزَيۡتُهُمُ ٱلۡيَوۡمَ بِمَا صَبَرُوٓاْ أَنَّهُمۡ هُمُ ٱلۡفَآئِزُونَ</p>
  <p style="font-size:18px;">111. Verily I have rewarded them this Day for their patience: they are indeed the ones that are successful.</p>
