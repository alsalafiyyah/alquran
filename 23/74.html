<div class="single-verse">
  <p><strong>23:74</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">وَإِنَّ ٱلَّذِينَ لَا يُؤۡمِنُونَ بِٱلۡأٓخِرَةِ عَنِ ٱلصِّرَٰطِ لَنَٰكِبُونَ</p>
  <p style="font-size:18px;">74. And verily, those who believe not in the Hereafter are indeed deviating far astray from the Path (true religion - Islâmic Monotheism).</p>
</div>
