<div class="single-verse">
  <p><strong>23:87</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">سَيَقُولُونَ لِلَّهِۚ قُلۡ أَفَلَا تَتَّقُونَ</p>
  <p style="font-size:18px;">87. They will say: "Allâh." Say: "Will you not then fear Allâh (believe in His Oneness, obey Him, believe in the Resurrection and Recompense for every good or bad deed)?"</p>
