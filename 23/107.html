<div class="single-verse">
  <p><strong>23:107</strong></p>
  <p dir="rtl" style="text-align:right; font-size:32px;">رَبَّنَآ أَخۡرِجۡنَا مِنۡهَا فَإِنۡ عُدۡنَا فَإِنَّا ظَٰلِمُونَ</p>
  <p style="font-size:18px;">107. "Our Lord! Bring us out of this. If ever we return (to evil), then indeed we shall be Zâlimûn: (polytheists, oppressors, unjust, and wrong-doers)."</p>
